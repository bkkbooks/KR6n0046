body:
  text: 明武林蓮居弟子大惠録已說遍行別境二位善位心所其相云何已說下釋善位初結前問後頌曰善謂信慚愧至勤安不放逸行捨及不害頌曰下次舉頌答論曰唯善心俱名善心所謂信慚等定有十一論曰下解釋初句總標善心相應唯者顯不與染二俱故次句標名數云何為信於實德能至對治不信樂善為業云何下釋信徵出體用實德能即所信境深忍樂等即因果自性不信即所對治愛樂衆善而為業用然信差別略有三種至愛樂證修世出世善然信下轉釋法體無二對所顯能故有三種一信實有者謂實事理即世俗諦第一義諦忍謂忍受隨順印可而無違逆二信有德者謂三寶真淨德佛德謂常樂我淨力無畏等法德謂無為寂滅法性真如等僧德謂三學圓明六和自備等樂謂欣樂欣慕好尚而無厭足三信有能者謂世出世善世善謂五戒十善四禪八定等出世善謂諦緣度觀練熏修等能得能成者謂得世出世道及成世出世二勝果故希望謂欲希求冀望而求必得不信彼心謂於實等不忍樂欲穢染之心愛樂衆善對治不信忍謂勝解此即信因至豈不適言心淨為性忍謂下料簡先問此約因果為難皆非自性次句徵自相云何豈不下舉前心淨答此猶未了彼心淨言至心俱淨法為難亦然此猶下復問淨即是心應非善所能令心淨慚等皆然若謂心俱淨法慚等亦與心俱何關別相此性澄清能淨心等至此淨為相無濫彼失此性下重答先釋心淨此信心所體自澄清亦能淨餘心心所從勝立名但言心淨如水下舉喻合明清珠投於濁水濁水不得不清淨信投於穢心穢心不得不淨慚等下通前慚等何別難謂慚等法順益義通非淨為相此淨為相故與慚等無相濫失又諸染法各別有相至信正翻彼故淨為相又諸下約所治翻對諸染別相非專渾濁唯有不信自濁濁他信正翻彼故淨為相有說信者愛樂為相至又應苦集非信所緣有說下斥異先敘愛樂為信應通下次斥應非唯善即別境欲又苦集二諦信所緣境苦集非可愛樂若愛樂即信應非緣此而生信心有執信者隨順為相至由此應知心淨是信有執下先敘隨順為信應通下次斥應非唯善即勝解欲若印下轉約解欲順相破非信相印持決定而隨順者即勝解相愛樂希望而隨順者即是欲相離彼解欲無順相故由此下結云何為慙依自法力至對治無慚息諸惡行云何下釋慚徵出體用謂依下轉釋謂依自身具丈夫相及自稟受修學法此二俱有尊貴增上之力崇尚寶重賢善為性羞耻自己過惡有過必改有惡必悛別治無慚通息諸惡云何為愧依世間力至對治無愧息諸惡業云何下釋愧徵出體用謂依下轉釋謂依世間訶責厭惡增上之力輕蔑拒絶暴惡為性羞耻過罪而不敢犯別治無愧通息諸惡羞耻過惡是二通相至非受想等有此義故羞耻下料簡先定通別慚愧各有通別二相崇善拒惡是二別相羞耻過惡是二通相聖教從通假說為體若執一句牒執執通相為別相應慚下二句難破若二皆以羞耻為相體應無別二法一體定不相應二既相應云何體一非受下例破受想相應體各別故此二相應體既無別以例受想相應體應無別彼既不爾此云何然彼此互為同品以立二量反覆申明慚愧是有法定不相應宗體無差故喻如受想受想是有法定相應宗體差別故喻如慚愧若待自他立二別者至復違論說十遍善心若待下牒救伏救云羞耻雖二通相慚待自法愧待世間故立二別今牒破云應非實有待他而成故聖說實有故若許下復救救云慚愧雖皆羞耻各別起故故是實有今牒破云若執實而別起應此不遍一切善心便違聖說聖說十遍善心除輕安故崇重輕拒若二別相至二失既同何乃偏責崇重下外轉難崇重輕拒是二別體善境惡境所緣有殊境既殊異應不俱生不俱別起二義是同何乃偏責若起一無二又不遍善心誰言二法所緣有異至俱遍善心所緣無別誰言下內釋初句直答不爾下外復徵云崇重輕拒既各不同豈非所緣有異而何善心下答釋凡諸善心隨境生起皆具崇善拒惡二義故慙下結答俱遍善心所緣無別豈不我說亦有此義豈不下救前由上答云善心起時隨緣何境皆有崇重輕拒俱遍善心所緣無別故今救云豈不我說此二皆有羞耻過惡所緣亦是無別之義汝執慚愧自相既同何理能遮前所設難汝執下斥自相既同者汝執慚愧皆以羞耻為體是故同前應慚與愧體無差別二法定不相應之難然聖教說顧自他者至於己益損名自他故然聖下通前引證外問云待自他立非實有者何故聖教說顧自他釋云聖說自他非同汝執自法名自世間名他崇重賢善於己有益名自輕拒暴惡於己無損名他汝執唯一羞耻觀待自他而立二別故是假有崇重輕拒二性不同還指此二名為自他無貪等者等無瞋癡至三不善根近對治故無貪下釋三善根先總釋善根義根謂能生此三生善最勝名之為根近能對治貪瞋癡故云何無貪於有有具無著為性對治貪著作善為業云何下徵釋無貪體用有謂三有因果不忘之謂有即三界果報有具謂招果器具即有漏惑業於此因果不生染著為性別治貪著通作衆善為業云何無瞋於苦苦具無恚為性對治瞋恚作善為業云何下徵釋無瞋體用苦謂三苦即苦果苦具謂感苦之具即苦因於此因果不生瞋怒為性別治瞋恚通作衆善為業問苦具即惑業應當憎之使其遠離今於此不憎可縱之起耶答於染不憎甚顯無瞋之善善心起時隨緣何境至故此二種俱遍善心善心下二法共簡問云此二善根一緣有等一緣苦等所緣有異應不俱生非遍善心釋云善心起時隨緣何境皆於有等無著苦等無恚觀待有等無著立為無貪觀待苦等無恚立為無瞋非要緣彼如前下例釋如前慚愧觀善惡立非緣善惡故此二種俱遍善心云何無癡於諸理事明解為性對治愚癡作善為業云何下徵釋無癡體用理謂諸諦理事謂差別事一一明悟解知而不迷謬為性別治愚癡通作衆善為業有義無癡即慧為性至如次皆是決擇性故有義下料簡先初解無癡即慧次引論證論說無癡報教證智前因所感曰報智現生熏習曰教智忘言契理曰證智皆以決擇為體復引聞思修慧貼會如次皆是決擇性故此雖即慧為顯善品有勝功能如煩惱見故復別說此雖下釋妨難云慧即別境如何重說釋云此雖即慧為顯善品有勝功能無癡唯善慧通三性如煩下例釋見雖是慧以唯染故別開為二此亦應爾有義無癡非即是慧至三世俗有餘皆是實有義下第二解初句斥前非即是慧次句正釋別有自性別治愚癡故如無下立四量反覆證成非即是慧別有自性分此二句各立為宗互相影略初量云無癡別有自性三善根攝故如無貪瞋次引論大悲為同品量云大悲非即是慧攝無瞋癡攝故如無瞋癡又大悲無癡互為同品立定若彼下約大悲同品斥前以慧為性初句牒前家執次約大悲立量反斥大悲亦應慧根攝非無瞋癡攝故如慧力慧根等論說大悲既非慧根攝云何無癡以慧為性又若下立量反斥無別自性無癡應非實物無別自性故如不害等論說無癡既是實有應知別有自性三世俗有者不放逸捨不害然集論說慧為體者至表信自體理必應爾然集下通前引論報教智是無癡因證智是無癡果非此自性論說慧為體者是舉彼因果顯此自性如以下例明忍因樂果表信自體此亦例之以貪瞋癡六識相應至由此無癡必應別有以貪下約別對治釋成有體以貪瞋癡通六識俱根本煩惱攝起惡最勝立不善根斷彼必由通別二治通唯善慧別即三根若令無癡即善慧者通別無分應此不別對治愚癡由此無癡應如前二有別自性正對無明即明解為性勤謂精進於善惡品至即顯精進唯善性攝勤謂下釋勤體用於善品應修惡品應斷此二事中勇健強悍而為自性能治懈怠成滿善事而為業用勇表下轉釋勇健不息以表勝進簡諸染法無任退惰謂不善及有覆也強悍難奪以表精純簡淨無記易合間雜謂無覆也既簡三性表唯善攝此相差別略有五種至無間解脫勝進別故此相下顯勤差別初句總標五種所謂下正列五種差別被甲者從喻立名如人入陳先須被甲以防弓矢今求菩提必先誓願要制雖有勢力亦須加功䇿勵雖復有勤心或怯下必須勇猛進趣雖逢衆苦鐵輪頂旋必不退轉雖不退落恐著似愛頂墮故須無足即經下引證五名貼會此五下明二五修相自分行中分下中上三品或資下對凡聖五道等者等加行通達修習究竟位二乘下通妨問曰如上如次配對三乘賢聖智未窮斷未盡此須精進若至極位行圓理備云何究竟位亦有無足精進耶今釋云二乘究竟欣大菩提諸佛究竟利樂有情大海若知足百川應倒流故此位有無足精進或二下對五位修相二加行者資糧加行加行加行如上六番如次配對文顯可知安謂輕安遠離粗重至令所依止轉安適故安謂下釋輕安體用遠離粗重雜染品法調適暢悅所依身心於善品中堪任修持而為自性轉依為業謂此下轉釋能障定法即沉所依止即身心也轉安適者定體寂靜沉障之身心不安輕安對治不安轉安故曰轉依不放逸者精進三根至離四功能無別用故不放下釋不放逸體用無貪瞋癡及精進於善惡品修斷事中修學禁止而為自性對治放逸滿善為業謂即下轉釋此約四法功能假立無別體用於斷修事至無異相此明無別體於防惡事至無別用此明無別用總顯不放逸體用皆即四法故雖信慚等亦有此能至非根遍䇿故非此依雖信下伏難云信慚愧等皆能防修何不依彼立不放逸釋此如文根即三善根遍䇿即勤信慚等非四法故非不放逸依反顯四法是此依豈不防修是此相用至此應復待餘便有無窮失豈不下料簡問云既名防修防修即是此之相用何謂無體用防修下釋初句直釋防修即四法防修非不放逸相用轉救云彼四要待不放逸方有防修作用此救防修還是不放逸體用今牒破云此不放逸自既無體應復待餘慚等方有作用如是便有無窮失勤唯遍䇿根但為依如何說彼有防修用勤唯下復問勤唯遍䇿一切善法根但普為諸善依持如何此四有防修用意顯防修定屬不放逸汝防修用其相云何至故不放逸定無別體汝防下展轉詰破初句總徵若普下約諸法別詰如是下結答初句明離四法無別用次句以用驗體故不放逸定無別體云何行捨精進三根至初中後位辨捨差別云何下徵釋行捨體用行捨者此即行蘊中捨唯善性故簡非受中捨屬無記故四法令心平等正直無功用住而為自性對治掉舉寂靜安住而為業用謂即下轉釋此約四法離障立名先後有別四法令心遠離掉舉惛沉寂靜安住名捨初離沉掉次無邪曲後心任運安隱如次名為平等正直無功用住捨差別相由不放逸先除雜染至所令寂靜即心等故由不下釋妨問曰不放逸與捨皆依四法云何有別釋中約體同用別以立二名先明用別除離雜染不放逸用令心靜住是行捨用先後有別故次明體同捨如不放逸皆依四法以顯相用故無別體次二句轉釋捨依四法上云捨能令心寂靜似乎有異今復言離四無相用又似無差同異云何故今云能令即四法所令即心等欲顯此能是故別立雖皆四法不放逸離染捨令心靜體同用別故云何不害於諸有情至利樂有情彼二勝故云何下徵釋不害體用此以無瞋為體謂即下轉釋初句明不害依無瞋假立無瞋下簡異問曰不害既以無瞋為體云何顯此二別釋中初二句體上差別無瞋翻瞋不害翻害次二句用上差別無瞋與樂不害拔苦次一句結差別相次二句判假實異無瞋有體不害假立問云假實雖異總即一體云何而分與拔釋云為顯慈悲二相別故顯此何意利樂有情彼二勝故有說不害非即無瞋至慈悲賢善是無瞋故有說下斥異解先敘初句反斥前次出體謂賢善性次自徵釋無瞋下次斥不損惱仍是無瞋性次轉釋無瞋於物不為損惱寧得離此有不害性及顯十一義別心所至而體無異故不別立及顯下釋及字先總標義別及言為顯十一法外義別心所故謂欣下總列別名雖義下釋妨問曰名義既別應須別立云何以及字顯之今釋云名義雖別而體無異故不別立根隨染法二十六種十一善中已翻十一不信翻信無慚翻慚無愧翻愧貪瞋癡翻無貪瞋癡懈怠翻勤沉翻安放逸翻不放逸掉舉翻捨害翻不害餘十五染用別體同故無翻對餘欣等善義別體同故不別立今以及言顯之欣謂欲俱無瞋一分至隨應正翻瞋一分故先釋欣欲俱者與善欲相應起故不忿恨惱嫉不字貫下下倣此俱無瞋一分正翻瞋分厭謂慧俱無貪一分至隨應正翻貪一分故次釋厭慧俱者與善慧相應起故不慳不憍俱無貪分正翻貪分不覆誑諂無貪癡一分至無處說覆亦貪一分故次釋不覆誑諂無貪癡分正翻貪癡次解不覆唯無癡次句簡貪有義不慢信一分攝至若崇重彼不慢彼故次三家釋不慢或信或捨或慚皆初句標相攝次句釋攝義正翻慢分如次兼攝不信掉舉無慚有義不疑即信所攝至以正見者無猶豫故次三家釋不疑皆初句標次句釋正翻疑分初兼不信次家兼解三家兼慧不散亂體即正定攝至不忘念者即是正念次釋不散亂等四法即定慧念相攝如文悔眠尋伺通染不染如觸欲等無別翻對悔眠下釋不定無翻不定四法通染不染如遍行別境通三性故無別翻對何緣諸染所翻善中至餘善不然故不應責何緣下料簡先約善法立不立問諸染翻善染有二十六善亦應二十六今唯立十一餘不立者何也初約相用別不別答信等十一相用各別便別立之餘善相用不別便不爾也不應並責又諸染法遍六識者至翻入別境善中不說又諸下次約勝劣遍不遍答諸染遍六識者根本中貪瞋癡中二無慚無愧大隨中不信懈怠放逸掉舉沉小隨害從勝別立根本中慢疑見小隨忿等九唯意識俱故不別立問害亦意識俱何立不害答中初句牒問次二句舉過數損他故障大悲故為知過失翻立不害又問失念散亂不正知亦遍六識何不別立答云此三翻入別境中善念正定善慧善中不說染淨相翻淨寧少染至故於染淨不應齊責染淨下復約染淨多少問答中先約勝劣多少答次約迷悟通局答此十一法三是假有至餘八實有相用別故此十下異門分攝先釋假實三是假有隨他相故餘八是實相用別故有義十一四遍善心至攝衆生時有不害故有義下次釋遍不遍先異解初明四遍善心次明餘七不定推尋下出不定相未決定時不生信若決定時亦可生信慚愧同類者皆以羞耻為性故依處各別者自法世間故起一無二故成不定斷煩惱有輕安不斷則無無漏道時起不放逸捨有漏則不起悲愍有不害不愍則無此七或有或無故成不定論說下引證如文有義彼說未為應理至違能損法有不害故有義下次正解先斥前初句總斥推尋下別斥立量云推尋事理未決定心應非是善無淨信故如染心等慚愧類異謂崇善拒惡依別謂自法世間境同謂隨緣何境皆有崇拒義若世間道有輕安出世道無則安覺支非無漏攝若無漏道時有不放逸捨世間道無應非寂靜防修不伏掉舉放逸立量云有漏善心應有二法具四法故如出世道善心起時皆不損物應有不害違能損法論說六位起十一者至故彼所說定非應理論說下通前引論依彼彼增者謂決定位信增乃至攝衆生時不害增作此此說者謂決定位說有信乃至攝衆生時說有不害依彼增勝故作此說非此位有他位無也應說信等十一法中至定地心中增輕安故應說下正釋初二句明十遍善心輕安不遍次二句明不遍義定位方有散位則無次引決擇分證初句證十善遍定地謂四禪四空不定地謂五趣雜居次句反證不遍定地增安反顯散地則無有義定加行亦得定地名至信等十一通一切地有義下別釋輕安先異解論說定地增輕安者不必根本定前加行亦得定地名彼亦下一句轉釋加行亦名定義由斯下一句結欲界亦有輕安不爾者若謂欲界無有輕安便違論說十一通一切地謂三界九地也有義輕安唯在定有至通有尋伺等三地皆有故此與下明別境相應彼此不違故十一下明三性唯善者簡非染二輕安下明界繫輕安非欲唯在上二十通三界皆學下十一皆通學無學非二非見下明斷位非見斷者意明唯修所斷及非所斷有漏十一屬修所斷無漏十一非所斷六根謂信進念定慧未知當知根信進既爾餘可例然餘門下結示如是已說善位心所至謂貪瞋癡慢疑惡見如是下釋煩惱先結前徵後頌曰下舉頌答論曰此貪等六性是根本煩惱攝故得煩惱名論曰下先釋通名此六體是根本煩惱昏煩之法惱亂心性故能生隨惑枝葉故言根本合則言六開則成十即五鈍五利也云何為貪於有有具至謂由愛力取蘊生故云何下徵釋貪體用貪海吞流無有飽足義翻善相可知謂由一句轉釋貪能生苦愛力即貪取蘊即五蘊苦愛水沃灌能生有芽此貪依十事生一取蘊二諸見三未得境界四已得境界五己所受用過去境界六惡行七男女八親友九資具十後有及中有也云何為瞋於苦苦具至起諸惡業不善性故云何下徵釋瞋體用瞋蚖螫毒撓諸世間義翻善相謂嗔下轉釋業用身心熱惱故不安隱起諸惡業故為惡行所依此屬不善性故問憎恚苦具似是善相何稱不善答苦具是同類尚自憎之善非同類豈不恚耶此愈顯瞋之不善此嗔依十事生一己身二所愛有情三非所愛有情四過去怨親五未來怨親六現在怨親七不可意境八嫉妬九宿習十他見云何為癡於諸理事至能招後生雜染法故云何下徵釋癡體用癡暗頑嚚過諸墨漆理謂真如法性等事謂因果實事等於此愚迷暗昧而為自性能障無癡煩惱業生雜染所依而為業用謂由下轉釋雜染所依無明能起根隨煩惱及有漏業此二能招後生五趣果故無明還為此三雜染作依此癡依七事起一世事二世間安立事三運轉事四最勝事五真實事六雜染清淨事七增上慢事云何為慢恃己於他至輪轉無窮受諸苦故云何下徵釋慢體用陵高下視輕忽一切恃己勝事於他有情令心高舉而為自性能障不慢生苦為業謂若下轉釋慢能生苦德謂三寶淨德有德謂有德之者心不謙下即慢相由慢墮苦故此慢差別有七九種至慢類由斯起亦無失此慢下出慢差別七種者於他下劣謂己為勝或復於等於己為等令心高舉故名為慢於等謂勝於勝謂等令心高舉故名過慢於勝謂勝令心高舉名慢過慢妄觀諸行為我我所令心高舉故名我慢於其殊勝所證法中未得謂得令心高舉名增上慢於多勝中謂己少劣令心高舉名下劣慢實無其德謂己有德令心高舉故名邪慢九種類者一我勝慢類二我等慢類三我劣慢類四有勝我慢類五有等我慢類六有劣我慢類七無勝我慢類八無等我慢類九無劣我慢類三品我德處者謂依六事生慢一劣有情二等有情三勝有情四內取蘊五已得未得顛倒六功德顛倒當知二慢依勝有情事生餘各依一事謂慢依劣等二品有情事生過慢依等勝二品有情事生慢過慢卑慢此二依勝品有情事生邪及增上二慢依顛倒起即德處生也我慢妄計取蘊為我我所即我處生也一切皆通見修所斷者此明慢通粗細分別俱生有異故聖位下通妨問曰修所斷即聖位云何得有諸慢現起答如文下文別有斷文一科此中不須約斷釋云何為疑於諸諦理至謂猶豫者善不生故云何下徵釋疑體用疑網無信不可告實於真俗不決疑真為俗疑俗為真如世尊與彌勒談俗諦聲疑聞說真諦即此類也此疑依六事生一聞不正法二見師邪行三見所信受意見差別四性自愚魯五甚深法性六廣大教法有義此疑以慧為體至末底般若義無異故有義下簡異解先異解初句執慧為疑體次三句釋成簡擇即慧相也毗者比義助者輔助末底此云慧比助於慧即是疑義助慧之法應是慧故般若此云智智慧二義無別異故有義此疑別有自體至是故此疑非慧為體有義下次正解疑非即慧而自有體令慧猶豫非即慧故次引論證論說六中見假餘皆實故此證疑有實體次破毗助疑助慧故執慧為疑若南此云智識助於智智應為識非由助力義隨所助而即轉變是故下結慧非疑體云何惡見於諸諦理至謂惡見者多受苦故云何下徵釋惡見體用邪見交馳不能得出猶如羅網亦似稠林於諸諦理顛倒推求者由染慧故以苦計樂以染計淨非滅計滅非道計道能障如理清淨正見招集苦事而為業用謂惡下轉釋謂惡見者以苦捨苦於此他世恆受苦故此見行相差別有五至六十五等分別起攝此見下出見差別初句總標次別釋身見薩迦耶此云積聚即五蘊身於五取蘊心執增益計我我所一切見趣之所依止為業二十句者色大我小我在色中我大色小色在我中即色是我離色是我四蘊亦然成二十句六十五句者一陰為我四陰為所所中各具瓔珞僮僕窟宅三法我與我所合十三句五陰互論成六十五分別起者諸外道等計度而起二邊執見謂即於彼至七斷滅論等分別起攝二邊執見於五取蘊薩迦耶見增上力故心執增益計我斷常障處中行解脫出離令墮偏僻繫縛為業此見差別四遍常論者一者窮心境性二處無因知二萬劫衆生生滅循環不失計以為常二者窮四大元四性常住知四萬劫衆生生滅體恆不失計以為常三者窮心意識本性常恆知八萬劫一切衆生循環不失本來常住窮不失性計以為常四者既盡想元生理更無流止運轉因心所度計以為常一分常論者一者觀妙明心遍十方界湛然以為究竟神我衆生於此自生自死則我心性名之為常彼生滅者真無常性二者遍觀十方恆沙國土見劫壞處名為無常劫不壞處名究竟常三者別觀我心精細微密流轉十方性無移改能令此身即生即滅其不壞性名我性常一切生死名無常性四者知想陰滅見行陰流行陰常流計為常性色受想滅名為無常有想十六者或自固身云色是我或見我圓含遍國土云我有色或彼前緣隨我回復云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相無想八論者見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性銷散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相俱非八論者色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相七斷滅論者或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前銷滅滅已無復諸外道等計度而起三邪見謂謗因果作用實事至諸如是等皆邪見攝三邪見謗因果作用實事者謂依世間諸靜慮故見世施主一期壽命恆行布施無有斷絶從此命終生下賤家貧窮匱乏彼作是思定無施與愛養祠祀復見有人一期壽終恆行妙行或行惡行見彼命終墮於惡趣生諸捺洛迦或往善趣生於人天樂世界中彼作是思定無妙行及與惡行亦無妙行惡行二業果異熟復見有一剎帝利種命終之後生婆羅門吠舍戍陀羅諸種性中或婆羅門命終之後生剎帝利吠舍戍陀羅諸種性中吠舍戍陀羅等亦復如是彼作是思定無此世剎帝利等從彼世間剎帝利等種性中來亦無彼世剎帝利等從此世間剎帝利等種性中去又復觀見諸離欲者生於下地又見母命終已生而為女女命終已還作其母父終為子子還作父彼見父母不決定已作如是思世間畢定無父無母或復見人身壞命終或生無想或生無色或入涅槃求彼生處不能得見彼作是思決定無有化生衆生以彼處所不可知故或於自身起阿羅漢增上慢已臨命終時遂見生相彼作是念世間必無真阿羅漢無施無受亦無祠祀是名謗因無有妙行亦無惡行是名謗因無有妙行惡行諸業果及異熟是名謗果無父無母無化生有情亦無世間真阿羅漢諸漏永盡乃至廣說如是一切名壞實事二無因論者一者是人見本無因何以故是人既得生機全破乘於眼根八百功德見八萬劫所有衆生業流灣環死此生彼八萬劫外冥無所觀便作是解此等世間十方衆生八萬劫來無因自有二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本竪畜生本橫從八萬劫無復改移今盡此形亦復如是當知今日一切物象皆本無因四有邊者一者心計生元流用不息計過未者名為有邊計相續心名為無邊二者觀八萬劫則見衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊三者計我遍知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性四者窮行陰空以其所見心路籌度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊不死矯亂者一者觀變化元變恆生滅增減有無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句二者諦觀其心互互無處因無得證有人來問唯答一字但言其無除無之外無所言說三者諦觀其心各各有處因有得證有人來問唯答一字但言其是除是之餘無所言說四者有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰五現涅槃者或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂雙忘不受輪回生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟或計自在世主等者如初卷釋邪解脫者非果計果也非道為道者非因計因也因果單計是故言或諸如是等皆邪見攝四見取謂於諸見及所依至一切鬪諍所依為業四見取諸見謂單四復四具足四等納本末三世起不起成百非執為最極殊勝第一之因能得清淨解脫出離之果一切鬪諍者有與無諍無與有諍等諸見互違多諍競故五戒禁取謂於隨順諸見至無利勤苦所依為業五戒禁取謂牛狗等戒眠針臥棘拔髮燻鼻五熱炙身等執為勝因能得淨果無利勤苦者謂取戒者多行無益諸苦行事以苦捨苦故然有處說執為最勝至說為邪見非二取攝然有下釋妨難云有餘處說執為最勝名為見取執能得淨名為戒取此復云何釋云二取各說一單句者是影略說或隨轉門不爾下若言非影略者執為最勝即非滅計滅執能得淨即非道計道如何此二因果單計說為邪見攝非二取者反言二取因果雙計也故知餘處是影略耳見取戒禁皆在因故皆得清淨果故如是總別十煩惱中至自審思察方得生故如是下異門分攝先明俱生分別總別者前五名總不分析故後五名別見所開故貪瞋癡慢身見邊見通二所攝疑邪見見取戒取唯分別起次二句釋分別義邊執見中通俱生者至皆恐我斷而起驚怖邊執下別明邊見先初解邊見中唯斷見通俱生次句釋常見不通常相粗故惡教引故此是分別不通俱生瑜伽下引證問何邊執見是俱生耶答謂斷見攝何以知然先引人證謂見道前學現觀者已伏分別諸惑隨眠而於心中起如是怖今者我我何所在耶此俱生見寧非是斷次引禽獸證禽獸恐怖我斷此屬俱生有義彼論依粗相說至或是俱生或分別起有義下次解先通論依粗相說斷通俱生理推常見亦通俱生造集長時資具者謂蟄蟲壞戶羣鳥養羞獸搆穴鵲架巢等諸如是類執我常故顯揚下引證斷常通二此十煩惱誰幾相應至貪與五見相應無失此十下明自類相應初句徵起先以貪對餘八貪是愛瞋是憎二境不同故疑境不決貪則不生貪與慢見或相應者影不相應一句愛陵非一故不俱染恃境同故俱起見皆可愛與貪相應瞋與慢疑或得俱起至如次說瞋或無或有瞋與下次以瞋對餘七瞋與慢疑或得俱起亦影不俱一句瞋恃非一故不俱蔑憎境同故俱起猶豫未憎故不俱不決憤發故俱起疑順違者順事猶豫瞋得相應違未審決瞋不俱起瞋與二取必不相應瞋與三見或俱不俱樂蘊常見瞋不相應苦蘊常見瞋得俱起斷翻此者樂蘊斷見瞋得相應苦蘊斷見瞋不俱起邪見誹撥惡事無瞋誹撥好事瞋得俱起慢於境定疑則不然至與身邪見一分亦爾慢於下三以慢對餘六慢疑不俱定不定故慢與五見皆容俱起行相不違故慢與斷見不俱我斷無恃故與身邪見一分亦爾者薩迦耶見執苦劣蘊邪見誹撥所有好事慢皆不相應疑不審決與見相違故疑與見定不俱起疑不下四以疑對五見疑不審決見於境定故不相應五見展轉必不相應非一心中有多慧故五見下五以五見互對皆慧為體必不相應癡與九種皆定相應諸煩惱生必由癡故癡與下六以癡對餘九癡是諸惑根本故皆相應此十煩惱何識相應至由稱量等起慢等故此十下明諸識相應初句徵起次釋藏識全無意識全具末那有四皆如前釋五識唯貪瞋癡任運起故無分下釋不與慢疑五見相應稱量思察即分別由此起慢等七五識無計度分別故故不與慢疑見等相應此十煩惱何受相應至瞋遇順境喜樂俱故此十下明諸受相應初句徵起貪瞋下別釋貪瞋癡三皆與五受相應貪會下釋妨問貪境適情癡通憂苦瞋境逆心何有喜樂釋此如文有義俱生分別起慢至恃苦劣蘊憂相應故有義下初釋俱生分別慢與四受俱除苦問曰慢唯高舉何得有憂釋此如文有義俱生亦苦俱起至要分別起能發彼故有義下次釋俱生慢亦與苦俱純苦趣中意有苦故次分別慢不與苦俱純苦趣中無此慢故何故無耶彼無邪師邪教等故苦趣中不造引惡趣業故要分別慢能發惡業故此釋苦趣無分別正顯分別慢不與苦俱疑後三見容四受俱至爾時得與憂相應故疑後下釋疑後三見四俱除苦疑何容喜欲界繫疑猶豫未來無違苦等事亦喜相應故二取何憂緣憂俱見戒及所依蘊與憂相應故有義俱生身邊二見至斷見翻此與憂相應故有義下釋身邊二見先初解初句明俱生二見喜樂捨俱次二句明不與苦憂俱五識有苦非五識俱非苦相應論說憂根非無記身邊二見唯無記性非憂相應次明分別二見四俱除苦次釋有憂執苦蘊常執樂蘊斷皆與憂相應有義二見若俱生者至廣說如前餘如前說有義下次解俱生二見非唯喜樂捨亦通苦受次釋成有苦純苦苦蘊苦相應故論說下引證廣說如前者謂通一切識身等餘如前說者餘分別二見准前初家四俱除苦此依實義隨粗相者至邪見及疑四俱除苦初依下約粗相釋初句結前次句起後粗相者一往大略分也皆如文貪癡俱樂通下四地至餘受俱起如理應知貪癡下明所通樂居界地貪癡俱樂通欲界至三禪通六識故餘七俱樂通初二三禪除欲者疑慢五見唯意俱故不言瞋者瞋非樂故疑獨行癡欲界唯憂捨餘上二界餘七煩惱與餘喜苦受如理應知此與別境幾互相應至見非慧俱不異慧故此與下明別境相應初句徵起次釋貪瞋癡慢容五俱起問此相粗動何容定俱答專注一境得有定故如戲忘天專注一境起貪等故疑及五見各容四俱下二句明疑見各互除一疑除勝解不審決故見非慧俱見即慧故此十煩惱何性所攝至雖數現起不障善故此十下三性攝初句徵起次下釋成瞋唯不善餘九通不善及有覆無記上二下轉釋餘九通二上二界九唯無記攝若欲界繫九分別起者唯不善攝俱生能發惡行亦不善攝餘俱生九不發惡行細不障善上二界者非極損惱自他處故皆無記攝俱生身邊二見唯無記攝不發惡業故起不障善故此十煩惱何界繫耶至俱生諸惑皆容現前此十下界繫攝初句徵次句判生在下明現起位先明下地不起上惑九地傳傳論上下先二句明未離下染上染不現次二句明已離下染上染現前得彼定者離下染故諸有下問有漏道不能伏惑云何證得上定有漏道世間味禪也分別惑在意識細俱生在第七有漏雖不能伏以六行觀能伏第六中俱生展轉伏下證上故云漸次問云何唯伏第六俱生釋云但迷事故緣外境故散亂粗動正障定故第七俱生反此伏此俱生方得彼定彼地諸惑皆容現前生在上地下地諸惑至起下潤生俱生愛故生在下明上地能起下惑初二句釋上起下惑生第下轉釋先明起分別第四定謂無想天彼計四禪為四果自謂阿羅漢果報既滿中陰現前如無聞比丘謗阿羅漢身遭後有生地獄故次明起俱生上地生下起下潤生俱生愛故而言生上不起下者依多分說或隨轉門而言下通妨問有處言生上不起下何也答多分不起今依少分言起下地煩惱亦緣上地至餘五緣上其理極成下地下明下惑緣上初句標下緣上瑜伽下引證貪緣上地既說下例嗔緣上總緣下證身邊慢皆得緣上總緣諸行者通緣三界五陰為我我所執斷執常起慢故上五既爾餘癡疑三見例然皆得緣上而有處言貪瞋慢等至邊見必依身見起故而有下通妨問有說下惑不緣上者何也答或依粗相言不緣上或依別緣三界五陰各別緣故唯緣自地故次二句轉釋不緣義上地煩惱亦緣下地至疑後三見如理應思上地下明上惑緣下初句標上緣下說生下釋陵恃即慢我我所即身見斷常邊見愛即貪疑後三見八皆緣下不言瞋癡者上不行瞋故癡為惑本遍故不言而說上惑不緣下者彼依多分或別緣說而說下通妨如文此十煩惱學等何攝非學無學彼唯善故此十下三學攝初徵次釋學與無學唯善攝此十唯染故非二攝此十煩惱何所斷耶至唯修所斷粗易斷故此十下明所斷攝初句徵次釋無漏善法非所斷彼非染故此十唯染非非所斷反顯通二斷次約分別俱生粗細判二斷見所斷十實俱頓斷以真見道總緣諦故見所下先明粗相唯見所斷初句標十粗煩惱見道頓斷次句釋以真見道總緣三界四諦故諦既頓明迷諦煩惱應俱頓斷此以所迷對顯能迷然迷諦相有總有別至滅道是彼怖畏處故然迷下明迷諦總別初句總標次別釋總謂下先釋總迷初句標十通迷四次二句釋迷所以苦謂身心即彼依處集謂煩惱即是彼因滅即斷果道即淨因治障相違是彼怖畏由迷四諦不能知苦斷集慕滅修道別謂別迷四諦相起至別空非我屬苦諦故別謂下次釋別迷初句標次二句判別迷相二唯迷苦八通迷四身邊下先釋二唯迷苦苦是世間生死果報身邊二見迷此果起次句約能治釋所治別修空觀及無我觀對治身見及邊執見二觀唯觀苦諦境故謂疑三見親迷苦理至不共無明親迷苦理謂疑下次釋八通迷四先明十迷苦諦標中標八釋中通十者苦具身邊二見故疑與身邊邪親迷苦理略五取蘊總名為苦愚夫於此五取蘊中起二十句薩迦耶見五句見我餘見我所是名迷苦薩迦耶見即用此見以為依止於五取蘊見我斷常故邊執見亦迷於苦又諸邪見謂無施等乃至妙行惡行業果及與異熟是迷苦邪見若於苦諦心懷猶豫是迷苦疑二取執彼三見戒禁及所依蘊為勝能淨若有見取妄取迷苦所有諸見以為第一能得清淨解脫出離如是名為迷苦見取若有妄取隨順此見此見隨法所受戒禁以為第一能得清淨解脫出離如是名為迷苦戒取於自他見及彼眷屬如次隨應起貪恚慢若於如是自所起見寶愛堅著是迷苦貪若於異分他所起見心懷違損是迷苦恚若恃此見於彼眷屬心生高舉是迷苦慢相應無明與九同疏迷不共無明親迷苦理若有無智與此諸見及疑貪等相應若唯於苦獨行無智此二並名迷苦無明此十煩惱皆迷苦諦見苦所斷疑及邪見親迷集等至迷諦親疏粗相如是疑及下次釋八通迷三疑及邪見親迷集等二取貪等准苦應知謂諸沙門婆羅門謗因邪見計自在等是一切物生者化者及與作者無施無受亦無祠祀無有妙行亦無惡行是迷集諦所起邪見若有見取取彼諸見以為第一能得清淨解脫出離是迷集諦所起見取若於隨順此見諸法所受戒禁取為第一能得清淨是迷集戒取餘疑貪等如前應知如是八種煩惱隨眠迷於集諦見集所斷若諸沙門婆羅門等計邊無邊不死矯亂諸見一分及說現法涅槃論者撥阿羅漢所有斷德誹謗滅諦橫計解脫是迷滅諦所起邪見若有見取取彼諸見以為第一能得清淨是迷滅諦所起見取若於隨順彼見諸法所受戒禁取為第一能得清淨是迷滅諦所起戒取所餘貪等如前應知如是八種煩惱隨眠迷於滅諦見滅所斷若撥無世間真阿羅漢一切智為導首有為無漏不死矯亂一分誹謗道諦非真出離妄計非道以為正道能盡能出一切諸苦如是名為迷道邪見若有見取取彼邪見以為第一能得清淨解脫出離如是名為迷道見取若於隨順彼見諸法所受戒禁取為第一能得清淨解脫出離是名迷道所起戒取所餘貪等如前應知如是八種煩惱隨眠迷於道諦見道所斷然瞋亦能親迷滅道由怖畏彼生憎嫉故謂迷滅道起怖畏心起損害心起恚惱心如是瞋恚迷於滅道下結迷諦親疏粗相如是委細說者貪嗔慢三至不違諦觀故修所斷委細下次明細相通修所斷若分別貪瞋慢疑邪見二取相應起者隨應如彼見諦所斷若俱生身邊二見與彼相應愛慢無明此五雖迷苦理細故難斷修道方斷又瞋及餘愛別迷事生不違諦觀故修所斷雖諸煩惱皆有相分至名緣有事無事煩惱雖諸下明所緣差別先明有質無質皆有相分者如前云自心內蘊一切皆有本質不定自心外蘊或有或無若緣現境所仗質有名緣有事若緣過未所仗質無名緣無事彼親所緣雖皆有漏至名緣有漏無漏煩惱彼親下明緣漏無漏親所緣有漏者能變之心唯煩惱故本質通無漏者道滅屬無漏故緣自地者相分似質至餘門分別如理應思緣自下明名境事境緣自地者相分似質故名事境他地道滅相不似質故名名境瑜伽論云煩惱所緣略有五種一緣邪分別所起事境二緣見境三緣戒禁境四緣自分別所起名境五緣任運堅固事境餘門下結示已說根本六煩惱相諸隨煩惱其相云何已說下釋隨煩惱初文結前問後頌曰隨煩惱謂忿至放逸及失念散亂不正知頌曰下次舉頌答論曰唯是煩惱分位差別等流性故名隨煩惱論曰下解釋先釋通名煩惱即前根本分位謂無自體是前支分品位差別謂三性中染分攝者等流謂有自體是前平等流類皆隨根本而起隨惱於心令不離染令不解脫令不斷障故名隨煩惱此二十種類別有三至遍染心故名大隨煩惱此二下依義分類忿等各別起者謂其性猛利各自為主自類不俱不遍二性不遍染心故名小隨無慚無愧自類俱起唯遍不善不遍有覆不遍染心故名中隨掉舉等八自類俱起遍染二性遍諸染心故名大隨云何為忿依對現前至離瞋無別忿相用故云何下依類別釋先小隨先徵釋忿體用憑觸現前多損害境憤發為性謂懷下轉釋執仗為業身表業者瑜伽云若瞋恚纏能令面貌慘烈奮發若煩惱纏能令執持器仗鬪訟違諍瞋一分故此即下反覆釋成瞋為體云何為恨由忿為先至離瞋無別恨相用故云何下徵釋恨體用懷忿畜惡結怨為性先對不饒益境後即念念懷結怨恨不捨謂結下轉釋熱惱結恨不能容耐心熱發火鑄氣為金恆熱惱故此亦下反覆釋成瞋為體云何為覆於自作罪至後必悔惱不安隱故云何下徵釋覆體用自己作罪恐失利養名譽隱蔽遮藏而為自性謂覆下轉釋悔惱罪由懺滅覆必墮苦後時追悔恆憂惱故有義此覆癡一分攝至不懼當苦覆自罪故有義下明分位初釋癡分攝次引論證由癡暗覆藏不懼後苦故有義此覆貪癡一分攝至不可執為唯是貪分有義下次釋貪癡各一分攝恐失利養名譽是貪分故次通論唯癡義如說下舉掉舉例明掉舉貪分亦據粗顯非實貪分云何為惱忿恨為先至離瞋無別惱相用故云何下徵釋惱體用忿恨為先者追往過惡觸現違緣狠乖戾而為自性謂追下轉釋䖧螫蟲行毒也此亦下反覆釋瞋為體云何為嫉殉自名利至離瞋無別嫉相用故云何下徵嫉體用殉者以物循身也謂嫉下轉釋此亦下反覆釋體云何為慳耽著財法至離貪無別慳相用故云何下徵釋慳體用謂慳下轉釋此亦下反覆釋云何為誑為獲利譽至離二無別誑相用故云何下徵釋誑體用為獲利譽假現威儀顯異惑衆彰己有德詭譎欺詐或現親事或行染語故名詭詐謂矯下轉釋邪命者四邪謂方口維口仰口下口五邪者一詐現奇特二自說功德三占相吉凶四高聲現儀五為他說法此即下釋貪癡為體云何為諂為罔他故至離二無別諂相用故云何下徵釋諂體用謂諂下轉釋曲順時宜謂高低逐物進退合宜歡戚逢迎顏膝取意之類此亦下反覆釋貪癡為體云何為害於諸有情至瞋害別相准善應說云何下徵釋害體用謂有下轉釋逼惱此亦下反覆釋體瞋害別相者瞋斷物命害損惱他瞋障大慈害障大悲是二別相云何為憍於自盛事至離貪無別憍相用故云何下徵釋憍體用自盛事者盛壯種性富豪自在年壽聰明行善顏色文句用對八鳥鴟梟鵰鷲烏鵲鳩鴿醉傲者於諸尊重及以福田心不謙敬故謂憍下轉釋染依此亦下反覆釋貪為體云何為慚不顧自法至障慙生長諸惡行故云何下別釋中隨先徵釋無慙體用忽絶賢善於諸功德及有德人無敬無崇無所忌難無所隨屬名為無慙謂於下轉釋云何無愧不顧世間至障愧生長諸惡行故云何下徵釋無愧體用謂於下轉釋不耻過惡是二通相至復違論說俱遍惡心不耻下料簡先定通別無慙無愧各有通別二相聖教依通假說為體若執下一句牒執通相為體則應下難破非受下例破若待下牒救應非下牒破若許下復牒救破並如慙愧翻說不善心時隨緣何境至所緣不異無別起失不善下由有伏難云善惡境殊所緣有別應不俱生不俱別起二義既同何乃偏責若起一無二又不遍惡心故今答云凡諸惡心隨境生起皆有拒善崇惡義故此下結答俱遍惡心所緣無異然諸聖教說不顧自他者至是彼等流非即彼性然諸下通妨已上釋義並如慙愧翻說而論下問此二既各有體云何論說貪分通義如文云何掉舉令心於境至能障行捨奢摩他為業云何下別釋大隨先徵釋掉舉體用掉動輕舉令心於境不寂靜故身如獨落口似春蛙意若風燈行捨靜住為業奢摩他此云止息妄體真此令易解令能緣不寂故俱障之有義掉舉貪一分攝至此由憶昔樂事生故有義下明分位先初解貪分引證釋成如文有義掉舉非唯貪攝至而貪位增說為貪分有義下第二解初句斥前次句引論遍諸染心故非貪分又掉下明共相攝凡諸煩惱皆不寂靜故次句反明掉舉離此不寂靜無別相故雖依下通妨難云既共相攝論何說此而為貪分釋此如文有義掉舉別有自性遍諸染心如不信等有義下第三解立量明有別體掉舉別有自性遍諸染心故喻如不信等八大隨中不信懈怠遍諸染心別有自性故非說他分體便非實至如睡眠等隨他相說非說下斥初解初解貪攝無別自體故非實有今斥云非說他分體便非實如不信等雖說他分而是實有勿字反斥之辭而論下通妨難云此既實有云何論說世俗今舉例答例如睡眠體雖實有而論亦言世俗此亦應然量云掉舉別有自性隨他相說名世俗有故喻如睡眠掉舉別相謂即囂動令俱生法不寂靜故掉舉下正申體相囂浮躁動令俱生心心所不寂靜是掉舉相若離煩惱無別此相至故不寂靜非此別相若離下斥次解次解掉舉謂不寂靜煩惱共相攝依共相假立今二句牒釋若離煩惱共相無別自體不應別說障止既別障止必有別相故不下一句結斥云何沉令心於境至能障輕安毗鉢舍那為業云何下徵釋沉體用懵沉重令心於境不能明了無勝堪任不能修持一切善法輕安遠離粗重堪任修持毗鉢舍那此云觀靈明洞達此無堪任故俱障之有義沉癡一分攝至昧沉重是癡相故有義下明分位先初解癡分引證釋成如文有義惛沉非但癡攝至而癡相增但說癡分有義下第二解初句斥前次句釋無堪任是一切煩惱共相是此共相攝雖依下通妨難云既依一切煩惱共相假立云何論說癡分釋此如文有義沉別有自性至如不信等非即癡攝有義下第三解初句立定有體雖名下斥初解癡攝癡分平等流類顯有自性非即癡攝量云沉別有自性癡分等流非即癡攝故如不信等隨他相說名世俗有如睡眠等是實有性隨他下通妨難云既有自性云何論說世俗有答中立量沉是實有性隨他相說名世俗有故如睡眠等沉別相謂即懵重令俱生法無堪任故沉下正申體相懵昧沉重令俱生心心所不能修持是沉相若離煩惱無別沉相至故無堪任非此別相若離下斥次解次解惛沉謂無堪任是煩惱共相攝今二句牒釋若離煩惱共相無別自體不應別說障觀既別障觀必有別相故無下一句結斥此與癡相有差別者至正障輕安而非迷暗此與下簡異問沉與癡二相相似同異云何初句總標差別次釋異相癡相迷暗正障無癡沉懵重正障輕安迷暗懵重體上差別障無癡輕安用上差別云何不信於實德能至不信三相翻信應知云何下徵釋不信體用不信下轉解文中指前善信三相謂實有事理三寶淨德世出世善於此不忍樂欲故云翻信皆翻信說然諸染法各有別相至不忍樂欲非別有性問餘諸染法皆能令心穢何故唯言不信然諸下答餘染法各別有體非專渾濁唯此不信心穢為性由不下正顯體由心穢故不信由不信故於實德能不忍樂欲故以心穢為性非別有性若於餘事邪忍樂欲是此因果非此自性問雖於實等不信而於餘事邪忍樂欲此邪忍樂豈非不信自性耶答若於餘事邪忍則於實等不忍此是不信因若於餘事邪樂欲則於實等不樂欲此是不信果而非不信自性云何懈怠於善惡品至謂懈怠者滋長染故云何下徵釋懈怠體用於善法不修惡法不斷懶惰為性謂懈下轉釋增染為業於諸染事而䇿勤者至非淨非染無信不信於諸下簡異問云於善不修可名懈怠於染䇿勤可名精進否今釋云於染䇿勤亦名懈怠退善法故又問無記䇿勤云何釋云若於無記䇿勤於善無進無退是欲勝解非別有性如於下例釋如於無記忍可樂欲非淨故無信非染故無不信此亦如之云何放逸於染淨品至增惡損善所依為業云何下徵釋放逸體用於染不防於淨不修肆縱流蕩而為自性增長惡行損減善法所依為業謂由懈怠及貪瞋癡至總名放逸非別有體謂由下明分位此依懈怠貪瞋癡四法而立無別有體雖慢疑等亦有此能至障三善根遍䇿法故雖慢下伏問云慢疑等法皆不防修何不依彼而立放逸答慢疑雖有不防修能而比四法勢用微劣此四障三善根障遍䇿法勢用殊勝故此四法總名放逸推究此相如不放逸推究下料簡文中指前不放逸中豈不防修是此相用及勤唯遍䇿等文兩番問難翻善相說云何失念於諸所緣至謂失念者心散亂故云何下徵釋失念體用忘失曾習正境體相於諸類境散亂推尋故有義失念念一分攝至論復說此遍染心故有義下明分位三釋不同初解念攝次解癡攝三解俱攝前二影略故引論此遍染心者染念及癡皆屬染故云何散亂於諸所緣至謂散亂者發惡慧故云何下徵釋散亂體用散亂之者多發惡覺觀故有義散亂癡一分攝瑜伽說此是癡分故有義下明分位三釋不同初解癡分引論證成有義散亂貪瞋癡攝至勝餘法故說為散亂有義下第二解貪瞋癡攝引集論證說癡下通前引論癡遍染心論說癡分謂貪下釋成貪等令心流蕩勝餘法故說為散亂有義散亂別有自體至隨他相說名世俗有有義下第三解立量明有別體散亂別有自體非即貪攝說三分者是彼等流故如無慙等隨他下通妨問既有自體何名世俗有通妨如文散亂別相謂即躁擾令俱生法皆流蕩故散亂下正申體相浮躁擾動令俱生心心所皆流蕩故若離彼三無別自體不應別說障三摩地若離下斥前次解初句牒謬執既能別障三摩應有別體非三共相三摩地謂正定也掉舉散亂二用何別至而於相續有易義故掉舉下料簡先問掉以囂動為相散以躁擾為相其相似同二用何別彼令下答掉舉令心念念轉易散亂於境剎那別緣是謂此二別用雖一下通妨問一剎那心性自無易何容從此轉至餘方寧有易解易緣之義答義如文染汙心時由掉亂力至故掉與亂俱遍染心染汙下料簡遍染義問此二常易解緣心境不定染定中無此應不遍耶或由下答或由邪念邪定力所制伏有時暫住俱遍染心量云掉亂有暫時住力所制伏故如繫猿猴故云俱遍染心云何不正知於所觀境至謂不正知者多所毀犯故云何下徵釋不正知體用由知不正於所觀境邪謬知解無常計常無我計我等此即凡夫四倒常計無常等此即二乘四倒皆不能正知非枯非榮中道也謂不下轉釋毀犯如寶蓮香比丘尼謂淫非殺非偷之類尸羅軌則俱破而毀正見由知不正也有義不正知慧一分攝至論復說此遍染心故有義下明分位三釋不同初解慧分次解癡分三解俱攝前二影略故引論遍染心者染慧及癡俱遍染故與并及言顯隨煩惱至隨其類別如理應知與并下釋與并及言頌中三字顯隨煩惱非唯二十雜事下明餘多種差別若雜事中世尊所說諸隨煩惱廣說乃至愁歎憂嗟歡欣喜愛等問若如雜事說受中苦樂憂喜亦應煩惱攝耶答發而中節此是受攝發不中節此屬煩惱攝事分說隨煩惱者謂貪不善根瞋不善根癡不善根若忿若恨如是廣說諸雜穢事等隨煩惱亦攝根本煩惱者是前煩惱等流性故彼此互望俱名等流煩惱同類餘染汙法者謂別境不定三性中染分者但名隨煩惱非根本煩惱攝故問既具餘三類染法頌中唯言二十者何也答中先簡次收雖有餘類唯說二十者謂非煩惱簡去根本非字貫下非唯染簡去三性中染者唯字又貫下非唯粗簡去貪等多種通粗細者簡此三類故唯二十此餘染法收三性中染此分位收雜事中多種此等流收根本此三皆此隨煩惱攝次句釋成攝義隨其品類差別各各自相攝之故亦唯二十如是二十隨煩惱中至所引理教如前應知如是下異門分攝先判假實初句總標三類次判忿等小十大三放逸失念不正知定是假有依根本分位立故中二大二定是實有掉舉沉散亂通假通實此三各有三釋或貪分癡分共相遍染者是假囂動懵重躁擾為體者是實二十皆通俱生分別隨二煩惱勢力起故二十下明俱生分別初句標通二次句釋義此二十中小十展轉至展轉小中皆容俱起此二下自類相應小十自類不俱次二句釋不俱義中二不善心俱隨應者小中忿恨惱覆嫉慳害是不善大八一分通不善中二與此俱起故曰隨應八大於小中皆容俱起遍染心故有處說六遍染心者至以惛掉等違唯善故有處下通八大遍染妨瑜伽說六遍者惛掉互增各不俱起故集論說五遍者沉掉舉不信懈怠放逸但違唯善遍二性故此唯染故非第八俱至中大相通五識容有此唯下諸識相應二十唯染藏識唯無覆故不相應第七唯大八取捨差別者如前五遍六遍不同第六二十容俱五識唯大中不與小俱生粗猛故由斯中大五受相應至如煩惱說實義如是由斯下諸受相應由斯二字承上第六前五有中大故故中大二隨得與五受俱小十二解初解忿恨覆惱嫉慳害唯喜捨憂三受相應俱瞋分攝故非樂俱唯在意識故非苦俱諂誑憍三四俱除苦次解忿等四俱除樂諂誑憍三五受俱起此十皆與苦俱者意有苦受故此受下舉前例釋前云貪瞋癡三俱生分別一切容與五受俱起此中忿等七是瞋分故諂誑憍是貪癡分故彼既五俱此亦應爾故此二十皆通五受實義如是若隨粗相忿恨惱嫉害至中大隨粗亦如實義若隨下粗相明受俱忿等五小憂捨俱是嗔分故非樂喜俱唯意識有不與苦俱覆慳喜捨諂誑憍三樂喜捨俱皆貪分故中大如實義與五受俱起如是二十與別境五至故亂與定相應無失如是下別境俱起初明二十與五俱起染念下通妨問云染念謂失念染慧謂不正知不應與念慧俱起答而癡分者亦得相應又問念緣曾習忿對現違何得相應答念亦緣現前曾習類境忿亦得緣剎那過去或退念於後或進忿於前故忿與念亦得相應又問散亂躁擾何容定俱答染定起時心亦躁擾故亂與定相應無失中二大八十煩惱俱至行相無違貪癡分故中二下煩惱相應中二大八十煩惱俱小十定非見疑俱起者彼此粗細異故忿恨惱嫉害容慢癡俱者所憎所蔑境可同故癡遍染故非貪恚並是嗔分攝者境異類同故慳與癡慢俱者癡遍染心貪恃可同故非貪嗔並是貪分攝者類同境異故憍唯癡俱者此顯不與貪恚慢俱貪恚慢如上類同境異故與慢解別是貪分故者愛染陵蔑行相異故覆誑諂與貪癡慢俱者行相無違貪癡分故貪分者與癡俱癡分者與貪俱染恃境同得與慢俱故小七中二唯不善攝小三大八亦通無記小七下三性攝忿恨惱覆嫉慳害及無慚無愧唯不善攝小三大八通二性攝小七中二唯欲界攝誑諂欲色界餘通三界小七下三界攝小七中二唯欲界不通上二唯不善故誑諂欲色憍及大八通三界生在下地容起上十一至非正潤生及謗滅故生在下明現起位先下起上惑下地容起上十一謂諂誑憍及大八耽著不定於他上地有情起諂誑憍若生下明上起下惑上地起下後十謂中二大八也邪見謗解脫及生下潤生愛容起後十故小十生上無由起下非正潤生及謗滅故邪見謗滅貪愛潤生中二大八下亦緣上至憍不緣下非所恃故中二下明相緣先下惑緣上中二大八下亦緣上上緣貪等相應起故即味定貪憎離欲瞋總緣諸行身邊慢等小十二解初解小十下不緣上次解嫉等亦得緣上大八下上惑緣下大八諂誑上亦緣下下緣慢等相應起故梵於釋子起諂誑故如大梵王於自衆中匿己情事現相誑惑馬勝比丘為避馬勝所徵問故憍自嘆等憍不緣下彼下地法非所恃故二十皆非學無學攝此但是染彼唯淨故二十下三學攝可知後十唯通見修所斷至於滅道等生嫉等故後十下三斷攝後十唯通見修二斷非非所斷次句釋成與分別俱生煩惱相應起故見所下別釋後十見斷差別根本迷諦如前或總或別後十隨彼根本總別相應同起亦皆通迷四諦迷諦親疏亦隨根本說前十下別釋前十修斷差別二解初解唯修斷如文次解通二斷初句標二斷次句釋二斷相依分別俱生起故次句釋見斷相緣他見等生故見斷前十隨根本緣諦緣迷別迷亦皆通迷四諦此中下明親疏迷相二解初解疏迷次解嫉等通親疏迷皆如文然忿等十但緣有事至緣有漏等准上應知然忿下明有事無事有漏無漏如煩惱說
