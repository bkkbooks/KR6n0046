body:
  text: 明武林蓮居弟子大惠録又契經說一切有情至彼識食體不應有故又契下引經識食證有第八若無下反證謂契經說食有四種至以變壞時色無用故謂契下總釋四食一者下別釋先釋段食初標名示相段者一謂形段有形質可搏取故二謂分段簡非數取有時分故食者資益為義轉變消壞為相若不變壞反增違損謂欲下出體顯能三界中唯欲界繫以上三界不假段食故鼻舌二識不起故此以香味觸三微為體馨香甘辛冷暖等此三轉變壞長養諸根資益身命此即食之能事由此下簡別四微中不取色者以變壞時色無資益之用故色處非段食所攝或有段物而非是食謂諸段物不能長養諸根大種或有是食而非段物謂若有觸意思及識能令諸根大種長養或有是風亦是段物謂諸段物能令諸根大種長養或非段物亦非是食謂若有觸意思及識不能長養諸根大種如是所餘觸乃至識隨其所應當作四句二者觸食觸境為相至及順益捨資養勝故二者下釋觸食初標名示相觸謂觸對即五遍行之一觸對塵境為相謂有下出體顯能有漏者簡非無漏識相應之觸觸對可意等境攝受喜樂怡適諸根身心悅豫此即食之能事此觸下簡別問觸是遍行遍一切心何者為食答如文屬六識偏勝者觸對六塵粗顯境故攝喜樂受故能生順益身之捨故簡去七八二識中觸者行相所緣微細故不攝喜樂受故雖與捨俱非益非損故三意思食希望為相至意識於境希望勝故三意下釋思食初標名示相意即第六思亦遍行之一希冀攀望為相謂有下出體顯能有漏者簡非無漏識相應之思與別境中欲俱轉可愛境雖未能得由思惟希望故未得欲得亦能資延身命此即食之能事如懸沙止饑望梅止渴之類是也此思下簡別思遍八識今取意識相應者希望勝故四者識食執持為相至一類相續執持勝故四者下釋識食初標名示相識即第八執持根身令不散壞故謂有下出體顯能有漏者簡非無漏識無漏識不仗前三食增長有漏識由三食增長方能執持此即食之能事此識下簡別簡前七識取第八者一類相續執持勝故由是集論說此四食至令不壞斷故名為食由是下結判先約三科判四食三科攝者段食色蘊攝觸思行蘊攝識食識蘊攝又段食香味觸三處攝觸思法處攝識是意處攝又段是香味觸三界攝觸思法界攝識是六識及意界攝此四下結食義段食唯於欲界有用至而依識轉隨識有無段食下約三界判段食欲界有用者欲者此界有飲食睡眠淫欲故上界不如是故觸思雖遍一切地隨識有無故觸遍六識若隨鼻舌二識唯欲界有若隨眼耳身三通二地居若隨意識雖遍三界唯除無想天觸思隨之以判有無識食遍界略不言之眼等轉識有間有轉至一切有情皆依食住眼等下初簡轉識非識食體有執轉識可為食體初二句標簡謂無下釋約無心位明有間斷約有心位明有轉易無想天中無故不遍諸有下結斥外執執無第八身命誰持非但違理亦復違經非無心位過去未來至如虗空等非食性故非無下二破過未識為食由前云無心位中轉識間斷今計無心位中雖現無識過未有識及心所故可以為食立量破云過未識等是有法不可為無心位食宗彼非現常無體用故因喻如空華設有下縱過未識有體用立量破云過去有體用識是有法非食性宗非現在攝故因喻如虗空亦不可說入定心等至過去非食已極成故亦不下三破入定心心所為食入定心等謂定前加行破如文又不可說無想定等至不相應法非實有故又不下四破無想定等為食牒破如文有執滅定等猶有第六識於彼有情能為食事有執下復破滅定等以第六識為食先敘彼執非理後當廣破至於彼身命不可為食彼執下初句總破指廣在後又彼下先略破無漏心非食應說者反徵辭也無漏下破破壞有者未證轉依所有身命晝屬有漏治障相違故亦不可執無漏識中至不能執持有漏種故亦不下二破有漏種為食初文牒執無漏下立量破無漏識中有漏種是有法不能為彼食宗不能執持有漏種故因喻如涅槃復不可說上界有情至衆同分等無實體故復不下三破身命互為食初文牒執四食一句直破又無下身命互破初句無色無身則命無食次句衆同分即命根無實體故則身無食由此定知異諸轉識至一切有情皆依食住由此下正明異熟是識食體世尊下引聖言量證唯依取蘊建立有情至彼識即是此第八識唯依下通伏妨問曰一切有情皆依食住佛依食住應是有情耶答如文取蘊者取是著義謂有漏五蘊佛非有漏五蘊空故非有情攝又問衆生無上者佛是亦著衣持鉢乞食城中豈非有情耶答如文隨機應現故既異下結有第八又契經說住滅定身至不離身識不應有故又契下引滅定識證有第八身行謂出入息語行謂尋伺心行謂受想此三名行者三之加行也在滅定中皆悉滅故壽即命根一期果報連持不斷故暖即第八識之相分根謂五根亦第八相分由有執持故不離壞識即第八是總報主故不離身若無下反證謂眼等識行相粗動至依何而說識不離身謂眼下明住滅定者轉識皆滅此段成立經中身語心行無不皆滅若不下反顯不離身識即是第八何之一字徵顯第八若謂後時彼識還起至如壽暖等實不離身若謂下破轉救先立似能立量救滅定中轉識是有法名不離身宗後時還起故因喻如隔日瘧是則下以想受心行為同品立二量反覆例破無轉識滅定中想受心行是有法不應滅宗後時還起故因喻如轉識以轉識不滅喻受想不滅何名滅受想定亦違經中心行滅言又量云滅定中轉識是有法應滅宗起滅同故因喻如心行滅以心行滅喻轉識應滅云何計有轉識還起次以壽暖根三為同品立二量反覆例成有第八壽暖根三是有法亦應壞滅宗四法互相依持故因喻如識以轉識滅喻滅定中壽暖根滅如同無情便成大過又量云第八識是有法實不離身宗四法互相依持故因喻壽暖根三以壽等喻不離身識定是第八非謂後時還起之轉識又此位中若全無識至豈得說為住滅定者又此下立量斥同無情滅定位中行者是有法非有情數攝宗全無識故因喻如瓦礫全無識者轉識不起又不許有第八故又異熟識此位若無至離託餘身無重生故又異下立量斥無執持滅定位中諸根壽暖是有法皆應壞滅宗無識執持故因喻如死尸既爾下牒上諸根壽暖皆滅汝謂後時還起今破云後識必不還生何故不還生根壽既俱無汝說不離身識彼識何所依何所屬或云後識必不還生汝說不離身者彼名為何者諸異下釋不還生義前異熟既盡復生餘異熟故無重生又若此位無持種識至受熏持種亦已遮故又若下破無持種識初文謂無能持故則無所持無因種故則無現識過去下明諸法不能受熏持種然滅定等無心位中至決定有識實不離身然滅下立量明滅定有識滅定等無心位中是有法定實有識宗具諸根壽暖有情攝故因喻如有心位由斯下結成有第八若謂此位有第六識至此定亦名無心定故若謂下約名體相違破初句牒計如文亦不下破若有第六識又立名無心定名體失當兩不相符前云後當廣破指此文起若無五識名無心者至如五識身滅定非有若無下約諸定濫名破初句牒計謂無五識名無心此救名體不相違意成有第六識名不離身又遮無第八應一下先破彼以五識救諸定者謂九次第等定是則諸定皆無五識皆濫無心名故意識下立量破彼意成有第六意識是有法滅定非有宗六轉識攝故因喻如五識身或此位識行相所緣至可了知識入此定故或此下約可知不可知對顯有第八初量云此位識是有法非第六識宗行相所緣不可知故因喻如壽暖等次量云此位有識是有法非此位攝宗行相所緣可知故因喻如餘散心位本為下結斥當文本為止息可了知識故入此定云何入此定猶有第六識應知不可知識即是第八又若此位有第六識至又不應名滅受想定又若下約心所有無破先立有無兩關若有下先破有心所初句牒計次破一違聖言量二違本定名此定加行但厭受想至說心行滅何所相違此定下轉救二失初文唯滅受想此救無有違名失受想下受想資助功強獨名心行此救無有違教失意謂受想心行雖滅餘所猶存還成有心所又成滅受想無想定中應唯想滅至此二滅時心亦應滅無想下舉無想例破初救若謂滅定中唯滅受想例而言之無想定中秪唯滅想然汝不許者無想定中不唯滅想亦滅一切心所受想滅定中亦然何謂有心所耶既唯下破資助心強次救此二既能資助能助既無所助應滅膏盡明滅故何謂有第六識如身行滅而身猶在寧要責心令同行滅如身下敘轉救以身行滅例心行滅以身在例心亦應在安住定中出入息雖滅而身不滅寧要責心令同受想滅若爾語行尋伺滅時語應不滅而非所許若爾下以語行並破若爾者牒上救詞若謂身行滅而身猶在以例心行滅而心猶在亦應語行滅而語猶在而非所許者然汝不許滅定有語例應不許滅定有心然行於法有遍非遍至如何可說彼滅心在然行下出三行有別不應齊例初句通判三行有遍有不遍遍者遍大地法故不遍者不遍大地故次二句釋義非遍下依義判定三行差別如文許如下舉思等為同喻以大地法故因證成受想是遍行攝量云受想於心是有法亦遍行攝宗大地法故因喻如思觸作意受想下一句以語尋伺為同喻證受想滅時心亦隨滅量云受想滅是有法心定隨滅宗大地法故因喻如語尋伺如何下一句結責救詞如何說受想滅而心猶在尋伺即思以思為體故又許思等是大地法至如何可言有餘心所又許下以受想為同喻證思等亦應滅以成心所皆滅云何言有心所一滅一切滅故量云思等是有法亦應滅宗大地法故因喻如滅受想既爾牒上思等既滅信貪等餘心所亦應皆無非遍下一句證成餘心所滅遍行滅時餘隨滅故如何下一句結責有餘心所既許思等此位非無至想亦應生不相離故既許下以思等為同喻證成受想非無云何名滅受想定一立一切立故量云受想是有法此位非無宗大地法故因喻如思等又此下一句牒上有思等亦應下例思等是有亦應有餘心所此中大地法故一因一成受想是遍行攝二成心定隨滅三成思等亦應滅四成受想非無如受緣非一切受至由斯所難其理不成如受下轉救初舉例如受緣愛有受起愛有受不起愛以例觸緣受非一切觸皆能生受由斯下一句結難不成彼救不然有差別故至受與想俱其理決定彼救下斥救總斥有差別故不可並例謂佛下引聖言自簡云諸受生愛有二與無明俱觸所生受為緣生愛與明俱觸所生受不生愛曾無處簡何觸生受何觸不生受故若下承上不簡以明有觸必有受等或應如餘位受想亦不滅至亦不得成滅受想定或應下立量結違教違名過此位受想是有法亦不滅宗執此位中有思等故因喻如餘散心位許便下一結違教一結違名上破有心所竟若無心所識亦應無至如色等法亦非心故若無下約無心所例破有識不見下先以四因釋次立三支破先釋四句初餘心謂前五識五不離所意亦應然何謂無所次餘遍行謂餘識相應受等或語相應尋伺餘行滅時法既隨滅意亦應然何謂有識三謂若有心而無受等者受等應非大地攝大地滅時心定隨滅故四謂若心所雖無而心猶在此識應無相應法故又若無所而有識此識應非所之相應法故言相應者起滅同故若許有識而無相應法者次量破云此識是有法應無所依緣宗無相應法故非心性故因喻如色等無所依緣者根境識三和由觸力故若無相應觸三則不和故言識無所依根所緣境也又契經說意法為緣至如何有識而無心所又契下引經證有心所初引經若此下依經定義有識必應有所如何下一句結責有心無所若謂餘時三和有力至不成生觸亦無受等若謂下敘救初引餘散心時三和有力能成能生一切心所由此下對顯定位三事無能不成不生加行位中厭患彼故若爾應名滅心所定如何但說滅受想耶若爾下破牒前無觸故亦無受等破如文若謂厭時唯厭受想至依前所厭以定立名若謂下牒救依前所厭成立滅受想名心所皆滅又成無心所既爾此中心亦應滅至不爾如何名無心定既爾下破牒上心所皆滅者所厭俱故今立量例心應滅此中心是有法亦應滅宗所厭俱故因如餘心所不爾者謂唯滅心所心不滅者如何下一句結斥違名又此定位意識是何至非求寂靜翻起散故又此下約三性破初句徵次先約二性破初二句直言此定位無染及無記何也善定中無此二性故餘染下以散位二性心中有心所反例定位意識若是二性應亦有心所不應下反覆奪破定位二性本為厭染修善定不應厭善起染及無記故本為厭散求寂靜非求寂靜反起散故二性皆散動故若謂是善相應善故應無貪等善根相應若謂下次約善性破初二句牒計彼宗謂相應善故心善應無下一句約有無貪等心所破何謂無心所此心不應是自性善至非善根等及涅槃故此心下牒救轉破自性善謂信等善根勝義善謂清淨涅槃此二句牒救違自宗者破彼宗謂相應故善是故違也次二句破心非二種善若謂此心是等起善至如何善心由前等起若謂下牒救轉破先牒救等起者平等發起也由定前加行位中所有善根平等引發定中意識善故理亦下先斥違宗如餘下立量破滅定善心是有法非等起宗違自宗故因喻如餘善心次句出不等起意或善引不善無記不善引善無記無記引善不善故如何下一句結責散位既不由等起定位云何故心是善由相應力至故無心所心亦應無故心下結斥如文初文結斥無心所次文結斥有心王上破無心所竟如是推徵眼等轉識至無想等位類此應知如是下總結初文先遮轉識次文引經成立第八識不為止息寂靜識者意謂止息粗動轉識也無想下例結無想等類此應知等餘無心位也又契經說心雜染故至彼染淨心不應有故又契下約染淨心證有第八若無下反證謂染淨法以心為本至心受彼熏持彼種故謂染下總釋初句標心為本者心謂第八為染淨諸法之本下四句相對釋因心生者持彼種故現行由之而生依心住者受彼熏故種子依之而住然雜染法略有三種煩惱業果種類別故然雜下別釋先釋染法初文釋列三種煩惱謂見思能發業者業謂有漏善惡諸業是所發者此二是能感之因果謂三界苦樂之報此是所感之果此三各熏自種品類各別故若無此識持煩惱種至諸已斷者皆應起故若無下意顯有此第八識能持煩惱種文中反顯界地謂三界九地往者謂離下染生上界地還者謂報盡還來散入諸趣若無此識持煩惱種淨後起染皆應無因何也次二句證無因餘法謂轉識心心所色不相應行不能持故過未心等無自體故若諸一句牒上煩惱無因則無三乘學無學果須陀洹所斷見惑斯陀含欲界六品思阿那含欲思殘三品阿羅漢三界思諸已斷者皆無因起故若無此識持業果種至煩惱亦應無因生故若無下意顯有此第八識能持業果種文中反顯異類法者上下界地業果相望染淨不同互名異類餘種者色心互為種餘因者善惡業互為因彼此相望名餘業果無因而生聖應還復輪轉煩惱一句謂言業果必由煩惱而起彼無煩惱云何復生故云煩惱亦應無因生故又行緣識應不得成至此不成故後亦不成又行下約十二支不成破若無此識持業果種則行緣識應不得成行謂正感後世善惡之業識謂本識內親生當來異熟果攝異熟識種識中業種亦名識支業種識種俱名識故緣者行望業種為親因緣行望識種為增上緣既無本識無法持彼業種識種故行緣識應不得成若謂轉識能持種子轉識無受熏義不能持種前已遮故若謂結生染識能持種子染識又非業引非持種故結生染識者依中有位有愛恚俱染污意識結者繫也屬也俱舍云倒心趣欲境濕化染香處於母腹中一念受生便繫屬彼故名結生染識若無此第八應說行緣名色應字反語時分懸隔無緣義故此行緣識既不得成此後諸支亦俱不成諸清淨法亦有三種世出世道斷果別故諸清下次釋淨法初文標列三種世間淨道謂四禪八定及十二門禪等出世淨道謂九想八背捨十一切處等亦世間亦出世間禪謂六妙門十六特勝九通明等斷果謂自性清淨涅槃淨道各熏自種品類別故答無此識持世出世至所依亦應無因生故若無下意顯有此第八能持二淨道種文中反顯異類者以三塗望人天名異類無世淨道故以六凡望四聖名異類無出世淨道故既無二淨種後起則無因餘因者染為淨因有漏為無漏因所依者謂身心入無餘依涅槃者所作已辦故身心皆滅故謂言淨道必由身智而起彼無身智云何復生故云所依亦應無因生故又出世道初不應生至是則應無三乘道果又出下別明出世道初二句直明無種故不生有漏下牒救破救云從聞熏習而有淨種故斥云有漏類與無漏性別非彼無漏因非識種者非識中種子所生故初不生者無本有種故後不生者無新熏種故或可初無種不生以後例前亦不生既無淨因難期聖果道果謂道所證果三乘菩提也若無此識持煩惱種至依誰由誰而立斷果若兼下意顯有此第八能持煩惱種由能斷道斷此種子方能證得轉依二果文中反顯謂道下釋斷煩惱方證斷果道謂無漏觀智種現俱無者治障相違故染淨下一句釋現行非有明生暗滅故道相下一句釋種子非有公不藏私故量云道相應心是有法不持彼種宗自性相違故因水火不同器故喻如涅槃去來謂去來識也得等謂不相應行既無下結上無識持種所斷謂煩惱能斷謂觀智二皆叵得故二誰字一指所斷一指能斷此二皆由第八持故若由道力後惑不生至唯此能持染淨種故若由下牒救破初文牒救謂道起時惑不生故立為斷果則初下破初道起者謂五停心總別相念時即成無學現行道力對治現惑種未斷故未成無學若不約種子應須即成何也謂見道所斷見修道所斷思不假施功悉永不生故何故永不生無識持彼諸煩惱因種故許有下結本文有第八證此識有理趣無邊至諸有智人應深信受證此下總結十理別有下勸信已上釋初能變竟如是已說初能變相第二能變其相云何頌曰次第二能變至阿羅漢滅定出世道無有如是下釋第二能變識文中結前問後頌曰下十二句頌答分十門初二句釋名門依彼轉三字所依門緣彼二字所緣境界門思量為性體性門思量為相能緣行相門四煩下三句相應心所門及餘一句餘相應門有覆一句三性門隨所一句界繫門阿羅下二句斷伏位次門論曰次初異熟能變識後至恆審思量勝餘識故論曰下依門解釋初二句結前起後是識下先明釋名門依教立名也梵語末那具云訖利瑟吒耶末那此云染污意次句釋義亦恆亦審勝前六後一故料簡如前漏無漏位恆常審察我無我故此名何異第六意識至如眼識等識異意故此名下問答簡異此以名同徵其義別此持下約離合釋答此字指第七持業者識即是體意即業用識體即有思量之用以用顯體體能持用故如藏識者識體即有三藏之用體能持用故故舉例之量云末那意識是持業釋識即意故喻如藏識彼字指第六依主者識是能依意是所依意即第七是所依之主能依依主依主立名故如眼識等者識是能依眼是所依之主舉眼之主以表於識亦依主立名故舉例之餘四皆然量云第六意識是依主釋識異意故如眼識等然諸聖教恐此濫彼至為近所依故但名意然諸下簡異初約單雙簡名此單名意彼雙名意識又標下二約勝劣簡用第八名心積集義勝故前六名識了別義勝故第七二義皆劣故但標意或欲下三約遠近簡依意識望第八為遠所依此為彼俱有依故名近所依如眼識有四所依唯眼根是俱有依是近所依故故但名眼此與意識為近所依故但名意依彼轉者顯此所依至聖說此識依藏識故依彼下釋所依門先釋依彼二字文初總標此字指第七所依指第八彼謂下轉釋如文有義此意以彼識種至為俱有依方得生故有義下出二家所依不同初家明此第七唯依第八種子不假現識者如前言第八有轉義念念生滅前後變異故有義此意以彼識種至為俱有依方得生故次家明此俱依種現雖無下釋依現意此意地上染淨轉易故故可依現轉謂流轉顯示此識恆依彼識取所緣故轉謂下訓釋轉字流是相續義轉是變異義顯示下通釋三字顯示此第七恆依彼第八取之為所緣我故能依所依無間轉故諸心心所皆有所依至名有所依非所餘法諸心下通明諸心心所三所依初文總標三種初略釋一因緣等者初句標名次句出體因即是緣對果得名因有親能生起義緣有感發功用義若唯言因緣則通通現種故言因緣依則局局自種子故諸有下一句釋有為法等者謂色心根塵染淨等法皆託此依而生故次一句反顯反覆詳言簡通取局故二增上緣等者初句標名次句出體謂有力殊勝助彼發起故若唯言增上則通通內外違順親疏有力無力故言增上緣依則局局內六根處故諸心下一句釋八箇心王五位心所皆依俱有根轉故次一句反顯反覆詳言簡通取局故三等無間等者初句標名次句出體力用齊等無自類心於中為隔故若言等無間則通通諸心心所一一前念引生後念者皆名等無間言等無間緣依則局局心王故有主義故能開導故前滅意者此對依字而言唯約心王諸心心所皆託此依者一開導時餘亦開導故離開下反顯反覆詳言簡通取局故然此三依言生轉起別相云何生約依種辦體而生轉約隨順與力令轉起約由前開路令後得起此三別相也唯心下結唯二位心法通具三所依非所餘法者簡色及不相應并無為三位也初種子依有作是說至種與芽等不俱有故初種下廣釋先釋種子依種子義在生現為用不以引後為功此中二家解釋初引集論偏而不正後引攝論正而不偏先出偏解此約種引種義故云種滅果生故引集論證次引種滅芽生為喻有義彼說為證不成至𦦨炷同時互為因故有義下次家先斥前偏引集論說無種己生彼依種引自類後種說故種生下斥前喻種生芽非勝義者約世俗說非約理言種滅芽生非極成者亦有種子與芽俱有者故非極成𦦨炷下顯正義以喻顯法此喻種現相生互為因果然種自類因果不俱種現相生決定俱有然種下通明三種俱為因緣初句自類不俱此明種引種為因緣次句種現相生此明種生現現熏種此二異類俱起俱為因緣唯種生現是因緣依故瑜伽說無常法與至顯種與現行互為因義故瑜下通引證三類親因緣無常法即種子及現行剎那滅故自性謂種子自類皆無記故他性指現果通三性故對種子無記故言他現行望種亦名他性攝大乘論亦作是說至定各別有種子所依攝大下雙引證種現互為因緣如文又說下獨證種子為因緣依故種下一句結種子依必俱時故設有下通他處妨如文如是下總結次俱有依有作是說至眼等五根即種子故次釋俱有依能依所依必俱時故故云俱有此中四家釋義有別初則邪而不正第四正而不邪第二斥謬有致第三雖當未盡先出初家異解初句立意識為依次句釋必有同時意識故無別下一句遮根為依次句釋成己意根即識種故二十唯識伽他中言至故眼等根即五識種二十下引證先引頌彼頌下釋頌意初句文云世尊為成十法內外二處故為成內五處故說五識種子為眼等五根為成外五處故說五識所變相分為色等五境故眼下一句結成己意觀所緣論亦作是說至能熏與種遞為因故觀所下復引證先引頌彼頌下釋頌意眼等色識者依根名為眼識依境名為色識故合名之彼謬謂識之種子名為功能說為五根無別眼等根種與下釋後二句種與境色常互為因言色識者色是識之相分境正意根境互為因彼謬謂境色為色識即現行識此能熏現識與識種子遞為因故第七八識無別此依至要託末那而得起故第七下明後三識如文有義彼說理教相違至諸聖教中處處說故有義下第二家解先總斥前違教理若五下約九番斥破番番違教違理在文可見初句牒執一約界種雜亂破根塵識三各別有種五根屬色五識屬心若根即識種色種即心種翻此心種即色種色心無別種應雜亂然十下引教證成不可相濫又五識種各有能生至皆是色蘊內處所攝又五下二約相見二分破初句依理立二分次句雙徵以何為根若見下分破若以見分種為根見分屬心應識蘊攝便違聖教五根皆色蘊攝若以相分種為根相分屬色如前判屬外攝應外處攝便違聖教五根是內處攝又若五根即五識種至不應說為增上緣攝又若下三約親疏緣破初句牒執五根是五識俱有依增上緣依攝五識種是五識親因緣若五根即五識種是以增上緣為親因緣親疏二緣混濫過又鼻舌根即二識種至二地五地為難亦然又鼻下四約界地破鼻舌二根通色界二識唯欲界此約識種發現識破若根即識根隨於識唯應欲界繫若識即根識隨於根應通色界眼耳身根通五地三識唯二地若根即識根隨於識唯在二地若識即根識隨於根應通五地論言眼耳身三二地居例對而言鼻舌二識唯居欲界若根識無辨則界地難明故言相違又五識種既通善惡應五色根非唯無記又五下五約三性破識通三性根唯無記若五根即五識種則根非唯無記亦通三性又五識種無執受攝五根亦應非有執受又五下六約執受破識種無執受者種子潛伏受中闕令生覺受義但言執持根若即識種亦應非執受又五色根若五識種至彼以五根為同法故又五下七約同法破意識是有法以末那為俱有根宗轉識攝故因喻如五識依五根若五根即五識種應末那即是意識種何也彼以五根為同法故末那既非意識種五根豈是五識種又瑜伽論說眼等識至即五識種依但應二又瑜下八約三依破識種是現識親因緣依根是識之增上緣依前滅意是等無間緣依若根即識種是以增上緣為親因緣依但應二與論三依相違又諸聖教說眼等根至便與一切聖教相違又諸下九約現種彼現起五根與五識為俱有依聖教說故執根唯種種子潛伏不能與識為依故言相違有避如前所說過難至妙符二頌善順瑜伽有避下出朋救增上業種者即五識所作滿業熏成異熟習氣還感無記五識即此業種名五根作增上依生眼等識既以增上業種為根則合二十頌識從自種生亦合緣論功能名五根非作因緣生五識種此種但為增上不為因緣又善順瑜伽三所依前計識種即五根今言業種名根者識中業種名識支故前約識種今約業種業種識種俱名識故仍執識種名五色根彼有虗言都無實義至眼等不應通現種故彼有下亦約九番破六義與前全同三義與前稍異今缺界種雜亂親疏混濫論三所依足上後三如文可見初句責根應通三性次句責根應非執受非字貫下二句若見分為根應非色攝若相分為根應非內攝鼻舌下一句應補一句識隨於根應通色界三根下一句應補一句識隨於根不應唯二地感意識業應末那者彼以五根為同法故例而明之感五識業應是五根應字是反語若感意識業非是末那則感五識業豈是五根眼等根若唯是種者不能與識為依與教相違又應眼等非色根故至故彼所言非為善救眼等非色根者約色心相濫破業種名識若執為根應根非屬色攝又若下牒識皆業感約三性破五識通三性業所感者唯無記若皆業感唯應局無記不應通善染善等下約所依破承上無記五識是業所感有眼等為增上俱有依例對善染五識既非業感應無眼等為增上俱有依故彼下一句結責彼言業種為根非為善救又諸聖教處處皆說至如斯迷謬深違教理又諸下結斥違教理先引教教言阿賴耶變根及身并器界若謂無別眼等為俱有依如此撥無此深違教許眼下次引理初句舉例眼等五識許變相分五塵如何不許藏識變相分五根此深違理下句結責然伽陀說種子功能至非謂色根即識業種然伽下斥謬引頌初句雙牒二頌文為破下雙申二頌意如文非謂一句雙結責初後二家謂根即識種此責初家根即業種此責救家又緣五境明了意識至彼此相依勢力等故又緣下明意識俱有依意識以五識為俱有依者此約同時意識與五同緣境故若彼下反覆互顯俱有依初句謂若眼等識不與彼意識為俱有依次句謂意識亦不應與五識為俱有依何也彼此下一句釋相依義勢力等者意識以五識為明了門五識以意識為分別依故又第七識雖無間斷至此即現行第八識攝又第下明第七俱有依由初家判第七八識無別此依恆相續轉自力勝故今此通云第七雖無間斷等謂見道至修道位漏無漏相間起故量云第七識是有法有俱有依宗轉識攝故因喻如六識不爾者謂第七若無俱有依彼第七應非轉識攝若無俱有依宗此因名所立法不成過此則違理若非轉識攝因又成聖教相違過故應下結以第八為俱有依免違教理如瑜伽說有藏識故至由此彼說理教相違如瑜下引證初引如文彼論下出論意即前依彼轉不爾者謂第七不以第八為俱有依第七則不轉論應說有藏識故意識得轉由此一句結責仍如前有違理教之過是故應言前五轉識至自能立故無俱有依是故下結判諸識俱有依多少有無如文有義此說猶未盡理至更互為依斯有何失有義下第三家解初句斥前立量云第八是有法有俱有依宗識性攝故因喻如餘識第七下明七八互為依許現起識以種為依至識種離彼不生長住故許現下明第八種現互依初句引明現識依種若無自種現識不轉故次句例明種應依現由現識能執持令種住故能熏下反覆釋成種依現識如前七現識為能熏令第八中種子生長住故下文云初熏習位亦依能熏第八為所熏名種子識故依字正指能熏識為所依種子依之而生長住故次句反釋又異熟識有色界中至或所立因有不定失又異下明異熟識亦依色根初出意如契下引經順證異熟遍依諸根瑜伽下引論反證眼等識各別依若異下牒論意以明異熟若不遍諸根應如六識非能執受量云眼等六識是有法不能執受有色根身宗各別依故因喻如異熟識異熟識是有法亦不能執受有色根身宗各別依故因喻如六識今異熟不然能執受根身若能執受則所立各別依故因有共不定過量云異熟識是有法能執受宗各別依故因喻如六識則此各別依故一因又成六識不能執受又成異熟能執受故成不定過若欲免此不定過異熟須別立遍依諸根故因由此教理證成異熟識應遍依諸根是故藏識若現起者至亦依能熏餘如前說是故下結判諸識俱有依現藏識依第七此即前七八更互為依又依色根此即前有色界依色根轉藏識種子依現異熟此即前種依現識亦依能熏此即前能熏異熟為生長住依餘五六七識如前家所判有義前說皆不應理至如王與臣互相依等有義下第四家解初句總斥前諸家次句出斥意依與所依未了故依名則通所依則局前家混言依不了通局故今舉此二者意在簡通取局故先釋依有生滅法者一切有為若色若心皆被四相遷轉故此諸法生住皆仗因託緣故所仗因是親諸法自種故所託緣是疏與力助成故雖有親因若無助力則不能生雖有助緣若無親種亦不能生是以因須依緣緣須依因此二相依方能生法此不簡親疏皆名為依立量云一切生滅諸所仗託是有法皆說為依宗互相依故因如王與臣王依臣輔有宰治臣依君主得令行故言相依若法決定有境為主至此但如王非如臣等若法下次釋所依初文先立所依四義決定者定有也簡非或有或無不定有故有境者有照境義故為主者不由他力自在轉故令心心所取所緣者有發心心所功能令各緣自境故具此四義乃是所依即內六處此句出體謂六根乃不共顯自名處增上生所依餘非下簡餘字出所簡法即色等五塵種子轉識及心所不相應行也非有境者此簡色等五塵及種子塵是所緣無能緣故種子潛伏故非定者此簡轉識心王間斷不定有故非為主者此簡心所依王不自在故不相應行不能令心心所取所緣故舉喻云此字指內六處如王但為所依非能依非如臣是能依非所依故諸聖教唯心心所至或所依為依皆隨宜假說故諸下引教證成初句唯心心所名有所依者此證內六處謂心心所皆依根轉故非色下證簡意色等等餘塵及種子無所緣者反顯無能緣故但說下證心是所依簡心所非是所依無主義故上立所依唯取六根此引證中兼取心王者何也上約不共近所依故唯取根此約其遠依故兼取心王又前五依色根後三依心故然有下通妨可知由此五識俱有所依至又必同境近相順故由此下結判諸識所依先明前五所依同境者根識同一境故分別者前五緣境無別分析由第六標指分明了別故染淨者由第七執不執令前六染淨隨之六轉呼為染淨依故根本者諸識種子由第八之所攝藏故如樹之根本故聖教下會異不共者如眼根是眼識不共依不與餘識共故諸識例之近者後三依為遠根是近故順者根識同境故順餘三各約別義言依故不言順第六意識俱有所依至同轉識攝近相順故第六下明意識所依第七是俱有根又是染淨依第八根本依雖五下明不取五識為依意若同時意識可須五識若觸頭意識不須五識可有可無故言不定聖教下會異如文第七意識俱有所依至依止心及意餘轉識得生第七下明末那所依初文明第八為所依次句反顯論言藏識恆與一識俱轉故如伽下引證第八為第七所依依止下通證六轉識依第七第八阿賴耶識俱有所依至非無第八此亦應爾阿賴下明第八所依初文明第七為所依彼識下反顯引論證成而說下通妨問前說三位無末那第八以何為所依通意如文三位者謂阿羅漢滅定出世道有覆者染污意也四位者謂聲聞緣覺菩薩八地以上及如來位雖有色界亦依五根至可有依義而無所依雖有下遮前異解五根不定有者無色無故識種不能取現境者潛伏藏識故故皆非所依心所所依隨識應說至若作是說妙符理教心所下明心所隨王說所依復加心王若作下結後開導依有義五識至但以自類為開導依三釋開導依有三家先初家釋初句明五識皆不能為開導依自他者眼識望眼識為自望耳識為他次二句明必以意識為開導依第六下明第六開導依初句明獨頭意識自相續故次句明同時意識由前五引故以前下一句總結意識以前六為開導依次明七八自類各自開導有義前說未有究理至遇非勝境可如所說有義下次家釋初句總斥且前下縱未自在位者謂有漏位非勝境者謂微劣境如此二義可言五識不相續若自在位如諸佛等至如何不許多念相續若自下先明自在位諸根互用者此奪五識他不相續任運決定者此奪五識自不相續尋求是意識相應法言不假者此明無漏位五識不由意識引彼五識身自能相續等流下仍約有漏位明瑜伽中五輪心初率爾二尋求三決定四染淨五等流如眼識初剎那對境名率爾屬無記次意識於境尋求尋求已即於境決定好醜善惡等決定已即起染淨心次眼識隨染則染隨淨則淨名曰等流初後是眼識中三是意識等流眼識既為意識三心引起專注所緣未能捨頃此句明五識雖由意識引生於境不移自力亦能相續如何下一句奪前五識自他前後不相續故此段仍約有漏釋者自在位中無染故有漏位中假尋求故故瑜伽說決定心後至故非二識互相續生故瑜下引證意識染眼識不善轉意識淨眼識善轉不由自分別力者此明眼識由意識為分別依引生不趣餘境者此明意識同眼緣色不趣餘聲香等或善或染者此明二識同一性而轉如眼下例餘識亦然彼意下判論意二識同時而轉意識自相續轉眼識亦自相續轉既眼下一句牒上二識同時故非一句奪前第六前五互相引生若增盛境相續現前至如熱地獄戲忘天等若增下次明增盛境熱地獄苦境增盛戲忘天樂境增盛境既增盛相續五識對之亦自相續故瑜伽言若此六識至故知五識有相續義故瑜下引證此謂前念彼謂後念等無間有引生後義故名意根若五下牒初家五六互為開導彼論下引論斥初句斥意識引五識次句斥五識引意識既不下結成五識自相續五識起時必有意識至亦應與彼為開導依五識下明意識開導由自類同時意識引何假下一句斥前意識由五開導五位無心由七八引若彼用前自類開導至此既不然彼云何爾若彼下兩家互難初家伏難云彼無心位意識用前自類引何假七八引生次家牒彼難辭反難云五識亦應許自類何假意識引生此既不然者此句縱彼五識不用自類彼云何爾一句奪云何意識要用自類耶平等性智相應末那初起至亦應相彼為開導依平等下明第七開導末那初轉依時由意識修二空觀乃得轉染成淨故用意識為開導依圓鏡智俱第八淨識至由此彼言都未究理圓鏡下明第八開導無垢識初起由第六修我空觀第七我執不行煩惱障滅初捨藏名由第六修法空觀第七法執不行所知障滅後空異熟故云六七方便引生又有漏異熟以染污意為俱有依轉又依悲願相應善心悲願即意識相應法此即隨第六引業轉故云六七為開導依由此句總斥應說五識前六識內至皆不違理由前說故應說下結判諸識開導依開蒙云五識於前六內隨用何識即知前五有六重依也第六用自類及七八知有三重依也第七用自類及第六知有二重依也第八用自類及六七知有三重依也有義此說亦不應理至此但屬心非心所等有義下第三家釋初句斥前開導者須自類不俱此遮異類俱起初家五識自他不續則全用他意識自續亦由前五兼用自他七八自類相續則全用自此則前非後是次家諸識開導兼用自他此各有是有非三家自類不俱皆全用自唯是不非深契教理故斥前云亦不應理開導下先立開導法體正義一有所緣境故二自在能為主故三作等無間緣故若是等無間非開導此名則通通王所故若是等無間非開導此名則局唯局王故此字指前念心王有開闢引導力令後念心心所得生此開導依但屬心王故非心所等等色法也避字應作闢若此與彼無俱起義至便同異部心不並生若此下舉開導正義以是斥非此與彼者謂自類前念後念也無俱起者簡非同時謂要自類不俱二義有開導力一身下斥前八識互望則無自類義一身俱起則無不俱義此縱其俱起如何下一句奪其異類斥前諸識互作等無間之過若許為依者縱其異類應不俱起者奪其俱起若不俱起則心不並生故斥云便同小乘小乘止許一意識有見聞覺知之用故又一身中諸識俱起至等無間緣唯心心所又一下縱其諸識異類若多若少可作等無間緣次舉例破色等與心異類亦應作等無間緣若色等可為緣又違聖教然攝大乘說色亦容有至異類識作等無間緣然攝下舉論立妨然字是牒論辭是縱奪言者出論意謂假下申縱奪意小乘謂色心可互為親因緣論以等無間縱之奪其因緣不爾者救謂非縱辭實是等無間等言下一句斥等者一力用齊等故二遮多少故三表同類故若言色心互作開導三義俱闕故言無用若謂下牒救非遮多少者欲成多識引一識故但表同類者三義中唯得一義田虧二故彼言同類謂心望心為同類雖言同類還成異類故以異類作等無間破之此以彼言陳破彼意許也是故八識各唯自類至心所此依應隨識說是故下結如文心所亦以心王為開導故言隨識雖心心所異類並生至諸識不然不應為例雖心下通妨妨云上言自類不俱今言心所隨識豈非異類又與後念心王同起豈非並生耶初句牒難次以六義釋王所展轉相應故展轉曰互如衆燈之明和合難分故同王起滅故所依根事同故緣境業用同故一開導餘亦開導故謂一引一聚一聚酬一一聚引一一酬一聚一引一一酬一一聚引一聚一聚酬一聚故展下一句結前念心王引後念王所此所又引彼所故云展轉諸識下問心王既能引異類心所此心王亦應引彼心王答云諸識不然者諸心相望六義皆無不應為例然諸心所非開導依至諸心心所皆四緣生然諸下問上言展轉者如王為開導引所令起所亦展轉開導王否答如文問云若心所無主義後念心所誰所引生又所不能引所展轉之說亦復不成雖無主義還應自類引生此約等無間所引所難問若心下一句牒難第七下答云七八二識有漏位中無信等無漏位中有信等若後信等必由前引前無信等此緣便闕此約心王為開導依引生答次一句引教四緣證成由王開導引起故前云隨識應說四緣者一親因緣二等無間緣三所緣緣四增上緣心法具四緣色法唯初後二緣無心睡眠悶絶等位至何煩異類為開導依問上言無間可為開導五位無心意識已斷後時誰為開導答釋如文無自類一句應回文云自類心於中無間隔名無間故彼先滅時力用齊等已於後時為開導故何煩一句責前不應以七八為第六開導然聖教中說前六識至非等無間故不相違然聖下通前互引意教中說互引此言陳也意許是增上緣相引非等無間相引瑜伽論說若此識無間至故自類依深契教理瑜伽下通論此指前念彼指後念前者引生後義名之意根言總意別者總言六識其意一一別陳眼識望眼識乃至意識望意識各各自為等無間緣故自下結唯自類傍論已了應辨正論至或開導依易了知故傍論下結歸原文初文結前起後此末那雖具三所依今文中依彼轉之言但顯因緣依及增上依因緣即識種子增上即現識為顯一句釋成依同者以第八為俱有依故緣同者以第八為所緣自內我故又前下約用有勝劣故次約了知難易故從勝從難唯言前二由劣由易不言第三傍應作旁如是已說此識所依至聖說此識緣藏識故如是下釋所緣門文中結前徵後謂即一句舉頌答彼謂下釋彼字指第八即前第八是此末那所依之識聖教一句引證以所依為所緣故有義此意緣彼識體至如次執為我及我所有義下有四家釋先初家釋初句明以第八體及五種心所為所緣次引論我我所二執證成謂緣下會通論意然諸心所不離識故如唯識言無違教失然諸下通妨妨云論言緣彼藏識今緣心所豈不相違通意如文有義彼說理不應然至識為體故不違聖說有義下次家釋初文斥前應言下以相見為所緣會通二執相見下通妨如前如文有義此說亦不應理至厭色生彼不變色故有義下三家釋初句斥前相分不應理五色下約四義彼五根五境是第八相分是色攝非識攝第七緣心法故器界五塵是第八相分五識託之為本質名疏所緣緣是心外法第七唯緣內境故意識緣五塵與五識同緣故名共境第七不然緣不共境故相分判屬我所四空無相分色應無我所執故第五句成上無色義應說此意但緣藏識至非實有物不違聖教應說下出己意會通二執以種下妨難如前通云種即識之功能功能非實者故唯名緣識有義前說皆不應理至此無始來一味轉故有義下四家釋初句總斥前諸家色等下別斥第三家種子通心通色色非識攝此不緣色故論說下立量反明種子是因緣故是實種子是有法非因緣宗假故因喻如空華兔角反顯種子若是因緣定是實有又此下通斥諸家我所薩迦耶此云身四煩惱中之一一味執我故無一下例彼約外道剎那心執斷不執常故等者有無一異等無二執同一心故亦不下破不應前後次第執一味轉故應知此意但緣藏識至此唯執彼為自內我應知下申正義非餘法簡非心所相分種子又非餘者非餘三分也相續故似常似常故非種子種子剎那滅故一類故似一似一故非五心所及相見分等一類相續故故與染淨諸法作所依此唯執彼見分為自內我乘語勢故說我所言至我我所執不俱起故乘語下通妨妨云論言我我所執今何言唯執我耶通云初句約語勢言二次句以彼所執見分是我第七能執之我多處下引證如文未轉依位唯緣藏識至示現種種佛影像故未轉下明轉未轉位所緣有別初句明未轉依唯緣藏識唯緣俗故既轉下明已轉依位通緣真俗真如即真諸法即俗平等下二句證緣真如知諸下二句證緣俗諦十種平等性者一增上喜樂二領受緣起三遠離異相非相四弘濟大慈五無待大悲六隨諸衆生所樂示現七一切衆生敬愛所說八世間寂靜皆同一味九苦樂一味十功德究竟知勝解差別者知衆生根性樂欲上中下種種差別次句即如來現起他受用十地菩薩所被機此中且說未轉依時至無我我境遍不遍故此中下簡異問云既言通緣真俗何故頌中唯言緣彼藏識初二句約局答如文悟迷下約通答轉依曰悟了悟屬理未轉曰迷迷情屬事悟時緣通迷時緣局無我是理境故遍我是情境故不遍迷悟約能緣我無我約所緣故轉與未轉通局有異如何此識緣自所依至彼既極成此亦何咎如何下徵問如文如有下舉例答後念意識能緣前念滅意前意是後識等無間緣得與後識作所緣緣彼既極成今此所依是增上緣作所緣緣此有何咎又意根是意識所依增上緣意識緣十八界能緣意根彼既極成此亦何咎頌言思量為性相者至亦審思量無我相故頌言下釋體性門及行相門初句牒頌雙標雙顯下釋初句總釋以雙顯釋雙標次二句分釋自性者即自證分體行相即見分之用末那體用俱即思量故故云雙顯由思量兼釋別名者若以等無間名意此名通諸識今以思量名意別在末那次句轉釋後二句轉釋恆審未轉依位謂異生有學七地以前未捨阿賴耶恆思我故已轉依位謂八地以上已捨執藏恆思無我理故此意相應有幾心所至與四根本煩惱相應此意下釋相應門初句問起次句舉頌答先明根本未顯其餘是故言且次略消頌義其四者何謂我癡我見至遮餘部執無相應義其四下總徵別列我癡下別釋癡謂無明者無智慧真明故癡暗不覺過於漆墨愚迷為義我相者於第八見分託為本質自變影相愚之為我迷真如無我之理故我見謂我執者執我之見名為我見起見隨邪猶如羅網亦似稠林纏縛屈曲不能得出第八見分本非是我虗妄謬執故我慢謂倨傲者慢如高山矜凌自恃竪我慢幢打自大鼓故我愛謂我貪者念念執我無有懨足耽染愛著故癡即無明為體見慢愛以無明為因并表下釋并字謂慢與見相應愛與慢相應次句出遮意此四常起擾濁內心至不能出離故名煩惱此四下釋煩惱通名內心謂第七恆執我故故云常起擾濁外識成雜染者由第七執我故令前六所行施等不能忘相成有漏業惑業苦三輪轉不息彼有十種此何唯四至無一心中有二慧故彼有下通妨十煩惱者謂貪嗔癡慢癡名五鈍使身邊二取邪名五利使初徵偏取義有我下先簡餘四見諸見皆以慧為體故既有我見餘四不生如何此識要有我見至故此識俱煩惱唯四如何下問諸見皆慧攝五中何偏取我見不取餘四耶二取下答先簡三見約粗細有別斷有前後故二取邪見唯粗見所斷故故非此俱次簡邊所依我方起斷常及我所我見不依此二起故恆內下出偏取意由見下簡疑嗔如文故此下一句結答唯四見愛慢三如何俱起行相無違俱起何失見愛下徵三俱起行相下略答瑜伽論說貪令心下至故彼此文義無乖反瑜伽下引論約相違問分別下約無違答論言貪慢是第六分別惑故言相違此言貪慢是第七俱生惑故言無違第六貪外境慢外人行相粗浮第七貪內見恃內我行相微細名同義異彼此無違此意心所唯有四耶不爾及餘觸等俱故此意下釋餘相應門初文問起次舉頌答有義此意心所唯九至合與末那恆相應故有義下初家釋初文釋觸等俱三字總標唯九次別列證成前說下釋餘字及是下釋及字此意何故無餘心所至一類執我故非彼俱此意下明簡餘所先徵謂欲下簡五別境善是下簡善十一隨煩下簡二十隨煩惱惡作下簡四不定皆如文有義彼釋餘義非理至又闕意俱隨煩惱故有義下次家釋初句先斥釋餘字非理次斥闕隨煩惱煩惱必與隨煩惱俱故此餘言顯隨煩惱煩惱下正釋餘字顯隨煩惱此中有義五隨煩惱至囂動不信懈怠放逸故釋隨煩惱中四家各釋此中下初家釋初文明與五隨煩惱相應如集下引論列名及覆證成煩惱下約論意會通已釋無堪任即沉囂動即掉舉掉舉雖遍一切染心至而癡位增但說為癡分掉舉下通妨問論說掉舉是貪分攝此云何言遍一切染心答釋引例皆如文雖餘處說有隨煩惱至故此彼說非互相違雖餘下通瑜伽妨論言或六或十不同者依別義說謂依下轉釋別義解謂行相通第六識分別名粗通第七識俱生名細無記謂有覆無記二十二者二十隨中加邪欲邪勝解彼六及十別義如文與此五遍非互相違然此意俱心所十五謂前九法五隨煩惱并別境慧然此下正申己釋如文我見雖是別境慧攝至義有差別故開為二我見下妨云我見以慧為體如前云無一心中有二慧故今何又別言慧耶答我見唯染慧通三性義有別故諸見不然皆唯染故何緣此意無餘心所至無餘心所義如前說何緣下徵簡意謂忿下約粗細簡十小隨無慚下約二性簡中二散亂下約內外簡三大隨文中影略失念軌則即五篇七聚律儀由知不正令身口所作多諸毀犯三業不淨故云違越無餘下簡別境四根本六善不定如前所釋有義應說六隨煩惱至非諸染心皆能遍起有義下次家釋初文明六隨相應瑜伽下引論列名忘念下明取三隨煩惱意文中反釋忘念散亂惡慧要緣下順釋三義曾受境種類者忘於曾受正境體於相似類境緣之為真故名忘念惡慧邪簡擇即不正知沉下明簡二隨意論說五法遍染心者至說十遍言義如前說論說下通集論五遍說十下通瑜伽十遍然此意俱心所十九至并念定慧及加沉然此下正申己釋如文此別說念准前慧釋至無餘心所如上應知此別下妨云上忘念以念為體今何又別言念耶答准慧釋者五十一心所中義有別故忘念唯染念通三性故并有下釋加定意加下釋加沉意無掉下簡掉皆如文無餘心所別境中欲解并善不定等亦如上釋有義復說十隨煩惱至通一切處三界繫故有義下三家釋初文明十遍瑜伽下引論列名若無邪欲邪勝解時至方起貪等諸煩惱故若無下明加邪欲邪解意初文反顯於所下順明樂合離者此邪欲領受可愛境樂其合領受可憎境樂其離由邪解印定可愛境起貪印定可憎境起瞋諸疑理者於色等事至餘互有無義如前說諸疑下妨云上言邪解遍諸染心疑煩惱於境猶豫邪解於境決定何言邪解遍染心耶答云疑有二種理疑事疑於理不決起疑煩惱於事決定而起邪解故可相應於所下復妨云於事起疑解則無有云何相應答云於理起疑是煩惱疑於事猶豫非屬煩惱舉事例云如疑人杌非煩惱故餘處下通餘論二不遍妨餘處言緣非愛事無欲疑相應心無解者但約粗勝是故言無微薄欲解亦可言有非謂全無如緣非愛境欲其不合疑中推敲亦有決定也餘互有無者指上五遍六遍彼此互論有無也此意心所有二十四至無餘心所如上應知此意下正申己釋如文有義前說皆未盡理至如何能起煩惱現前有義下四家釋初句總斥前諸家且疑下斥第三家加欲解煩惱下斥第二家無沉掉舉若染下斥初家無散亂失念不正知量云掉舉是有法非染污位宗無囂動故因如善等位故染污心決定皆與至遍染心起由前說故故染下申正義列八隨名忘念下料簡忘念不正知遍不遍義忘念念一分攝亦癡一分攝不正知慧一分攝亦癡一分攝若念慧為體者不遍染心非諸一句釋成若以無明為體者此遍染心然此意俱心所十八至若作是說不違理教然此下結數論三文者集論五遍瑜伽六遍十遍准前者解通粗細等別義也
