body:
  text: 明武林蓮居弟子大惠録此十一障二障所攝此十下結前十一障攝屬二障文中通言二障義開二種二障一者異生性障屬分別攝後十種障屬俱生攝二者十一障中皆有煩惱障及所知障煩惱障中見所斷種至八地以上畢竟不行煩惱下通明諸位斷義先明見所斷煩惱障即分別惑異生性所攝初地初心斷彼種子地前加行伏彼現行修所下次明修所斷煩惱障即俱生惑即欲貪身見等金剛喻定頓斷彼種地前加行漸伏現行地上頓伏令永不行如阿羅漢由故下通妨問曰既如阿羅漢令永不行如何四地猶起我見三地猶有欲貪俱耶釋云由故意力等所知障中見所斷種至無漏伏故障不現起所知下先明見斷所知若種若現義同煩惱修所下次明修斷所知若種若現地地漸滅金剛喻定方永伏盡八地下約後三地以明諸識相應所知有現不現無漏觀心及生空智果即第六心也治障相違故不復行第七相應所知以微細故猶可現行金剛喻定法空智果方乃伏盡五識相應法貪癡等雖未轉依第六無漏觀心伏故障不現起雖於修道十地位中至而三位顯是故偏說雖於下別明三位斷義問曰十地位中何故但斷所知於煩惱種但伏不斷何故前文又云修習位中俱斷二愚及彼粗重答雖於修道位中不斷煩惱種斷所知時而彼煩惱粗重亦漸斷滅煩惱障種即有覆無記品所攝粗重即無堪任性三位斷者一見道位初二不動地前三金剛道後問諸位皆斷何獨三位答三位顯故是故偏說斷二障種漸頓云何至任運內起無粗細故斷二下明斷種頓漸先徵第七下釋先明俱生煩惱種第七識相應者三乘得無學時一時頓斷此約三乘共位遠行地後同斷此種止齊此地不及上位故次明俱生所知種七識相應者金剛喻定一時頓斷何故頓斷唯內緣第八為我法無粗細故此獨約菩薩故至佛地餘六識俱煩惱障種至一剎那中三界頓斷餘六下先明分別煩惱種六識相應者三乘見道一切頓斷次明俱生煩惱種二乘分二類一類三界九地一一地各分九品漸次別斷八十一品思惑是也一類三界九地地地中九品皆合為一聚總為九品別斷菩薩金剛喻定三界一時頓斷所知障種初地初心至品類差別有衆多故所知下先明分別所知種六識相應者初地初心頓斷修所下次明俱生所知種十地漸斷成佛斷盡何故漸斷謂六識俱者通緣內外粗細境生品類差別有衆多故二乘根鈍漸斷障時至前後相望皆容具有二乘下明能斷四道加行道者謂引無間道之方便無間道者謂力能斷惑故解脫道者謂已解脫所應斷障明證理故勝進道者謂所餘諸道漸勝進故是涅槃路故皆名道四道或別或總者總則俱時前位勝進即後位加行故別分前後各自建立故菩薩不分四道別者剎那剎那能斷證故問曰經無量劫佛果乃成何言剎那斷證答曰時節淹久分別謂長頌曰處夢謂經年覺乃須臾頃過時雖無量攝在一剎那若剎那剎那前後相望皆容具有四道差別十真如者一遍行真如至無有一法而不在故十真下明十地證十真如初二句標總別名謂此下釋義謂初地所證法界名遍行義真如遍在一切處一切衆生及國土三世悉在無有餘亦無形像而可得前三句即遍行義後一句即二空義二最勝真如謂此真如至於一切法最為勝故二最下初句標名謂此下釋義二地所證法界名最勝義遠離邪行犯戒垢故大惡病中戒為良藥大怖畏中戒為守護死愚暗中戒為明燈於惡道中戒為猛將死海水中戒為船筏即最勝義三勝流真如謂此真如至於餘教法極為勝故三勝下初句標名謂此下釋義謂三地所證法界名勝流義從真如流出正體智正智流出後得智後得流出大悲心大悲流出十二部經即勝流義四無攝受真如至非我執等所依取故四無下初句標名謂此下釋義四地所證法界名無攝受義謂四地斷微細煩惱障所證真如非色心有無等法所繫屬故亦非我執我慢我愛我癡邊見我所等所依所取故五類無別真如至非如眼等類有異故五類下初句標名謂此下釋義五地所證法界名類無別義謂五地斷下乘般涅槃障生死涅槃二皆平等非如眼等類有差別六無染淨真如至亦不可說後方淨故六無下初句標名謂此下釋義六地所證法界名無染淨義謂六地斷粗相現行障知緣起法無染無淨如摩尼寶體本離垢非瑩治方淨七法無別真如至種種安立而無異故七法下初句標名謂此下釋義七地所證法界名法無別義雖諸教法依如建立如無異故又於教中立種種名法界實相等體一名異而如無異八不增減真如至現相現土俱自在故八不下初句標名謂此下釋義八地所證法界名不增減義由通達此真如故於諸清淨雜染法中不見一法有增有減真如隨染淨緣成染淨法隨染緣時染無有增淨亦不減隨淨緣時淨無有增染亦不減真如平等故即此下出異名謂此法界是相自在之所依止大小勝劣隨欲現前名相自在謂此法界是土自在之所依止廣狹淨穢隨意皆成名土自在相約現身土約現界九智自在所依真如至於無礙解得自在故九智下初句標名謂若下釋義九地所證法界名智自在義謂九地斷利他不欲行障故能以四種無礙辨才任運自在善說法故十業自在等所依真如至總持定門皆自在故十業下初句標名謂若下釋義十地所證法界名業自在義謂十地斷諸法中未得自在障所證真如為神通等之所依止神通作業皆得自在雖真如性實無差別至為令圓滿後後建立雖真下伏問曰真如之理唯一法界體無殊異何有十耶釋曰隨德建號假立十名問曰初地見理理無二致一即一切何必後後立此十耶釋曰初地雖達一即一切而能證智明昧不同所修行猶未圓滿為令圓滿後後建立行即十波羅蜜多如是菩薩於十地中至於二轉依便能證得如是下釋二轉依文中先結前於二下起後由前標中依十地修十行斷十障證十真如二種轉依由斯證得故轉依位別略有六種至而漸伏現行亦名為轉轉依下總標六種一損下別釋初句標名謂初下釋義異熟識中所持染淨種子由資糧加行位中修習勝解慚愧故有損染之力益淨之能令染種漸减淨種漸增問若爾未斷障種何名轉依答中如文此約伏染名轉二通達轉謂通達位至證得一分真實轉依二通下初句標名謂通下釋義以斷異生性障證得一分真實轉依此約乍證名轉三修習轉謂修習位至多令非真不顯現故三修下初句標名謂修下釋義此依十地漸斷漸證攝大乘下判釋前六名通達後四名修習有相觀通俗無相觀通真入無相觀真現非真不現入有相觀非真現真不現非真即俗也後四常在無相觀多令非真不現餘惑未除少分猶現或七地少分非真現八地以上多不現此約分證名轉四果圓滿轉謂究竟位至窮未來際利樂無盡四果下初句標名謂究下釋義修行斷惑證果益機此即自行始終化他能所也此約究竟名轉五下劣轉謂二乘位至無勝堪能名下劣轉五下下初標名謂二下釋義專求自利如獐獨跳故欣厭未忘不契平等故唯通生空證理未圓故斷煩惱種有所未斷故證真擇滅非大涅槃故無勝堪能眇目矬陋無威德故此約偏真名轉六廣大轉謂大乘位至有勝堪能名廣大轉六廣下初句標名謂大下釋義自性衆生誓願度自性佛道誓願成故生死即涅槃離取捨故具達二空究盡淵府故雙斷二障五住究盡故頓證二德福足慧足故有勝堪能纓絡嚴身威德特尊故此約廣大名轉此中意說廣大轉依捨二粗重而證得故此中下約頌簡定前頌言捨二粗重故便證得轉依者意取第六廣大轉依六義殊勝故前五中第一約伏名斷二三分斷未盡第四對因說果第五六義俱劣是故簡之轉依義別略有四種轉依下總標義別略有四種別開一一復具二義一能轉道下有二一能伏道二能斷道二所轉依下有二一持種依二迷悟依三所轉捨下有二一所斷捨二所棄捨四所轉得下有二一所顯得二所生得今唯標四是故云略一能轉道此復有二至隨其所應漸頓伏彼一能下別釋初二句總標別列一能下明能伏道有漏加行唯能漸伏前云彼障現行地前漸伏無漏根本後得俱能頓伏前云初地以上能頓伏盡二能斷道謂能永斷至所證所引未成辦故二能下明能斷道先簡有漏加行非是能斷二道除有漏三智除加行有漏下出簡意有漏道是曾習相執所引故未泯相故謂異生類三性心時雖外起諸業而內恆執我令六識中所行施等不能忘相是故有漏非能斷道加行智趣求所證真如所引本智皆未能成辦故真理未明本智未顯是故加行非能斷道有義根本無分別智至後得不然故非斷道有義下二解初家唯取本智是能斷道不取後得變相觀空故隨眠前已斷故有義後得無分別智至根本後得俱能正斷有義下次家兼取後得是能斷道觀諦無倒故能斷迷事隨眠故瑜伽下引證出世斷道謂本智世出世斷道謂後得純世間道謂加行此證通取二智簡去加行由斯下結示本智通能斷分別俱生理事二障後得唯能斷俱生事障二所轉依此復有二至而不能持種故此不說二所下初二句總標別列一持下明持種依初句標名次句出體根本識即第八依他起由此下二句釋持種義由此本識持染種與染現行作所依持淨種與淨現行作所依聖道下一句釋轉依義無漏觀智捨染得淨染法種現俱離唯持清淨法種染淨雖遷識體無二餘依下通妨問前七識並名依他亦能轉識成智何非轉依釋中如文二迷悟依謂真如至而非根本故此不說二迷下明迷悟依初句標名次句出體真如即諸法實性由此下二句釋迷悟義迷此真如染法得生悟此真如淨法得生聖道下一句釋轉依義觀智起時翻迷就悟染法不捨而捨淨法不得而得迷悟雖翻覺心不動餘雖下通妨如前三所轉捨此復有二至由此名捨遍計所執三所下初二句總標別列一所下明所斷捨初句標名次句出體真無下先明斷種名捨真無間道是能治智二障種子是所治惑治障相違猶明與暗兩不並生彼種下次明斷現名捨所執我法是所遍計虗妄執情即能遍計種斷現滅亦說為捨二所棄捨謂餘有漏至由此名捨生死劣法二所下明所棄捨初句標名次句出體有漏謂地前所修有漏心俱善法種子劣無漏謂七地已前雜修無漏觀智種子金剛下正明棄種彼種下次明棄現有漏善法能感分段生死劣無漏法能感變易生死二現不生名捨生死劣法有義所餘有漏法種至與二障種俱時捨故有義下二家明棄捨先後初家釋無間道起皆已棄捨有義爾時猶未捨彼至第八淨識非彼依故有義下次家釋解脫道起方棄捨之初句斥前次五句釋成一無間道起但能斷障善無漏種不相違故二無間道時猶居因位若言兼捨有漏等種則此菩薩應無一分變易生死三第八異熟受熏持種金剛道後異熟方空無間道時若捨所持則應能持異熟亦捨此位應無所熏識故四若無間道已捨異熟是則菩薩應名佛故五若無間道已捨善等起解脫道應無用故解脫功用一棄有漏等種二證極果真理由此下結示解脫方棄四所轉得此復有二至故體即是清淨法界四所下初二句總標別列一所下先明所顯得初句標名次句出體涅槃此云圓寂即一真法界簡非二乘所證故名曰大具常樂我淨故此雖下釋所顯得義伏問涅槃自性清淨本然遍周法界聖凡咸具何言所顯及與所得釋此如文此依下又問既有障覆何名本淨釋此如文結歸清淨法界涅槃義別略有四種至其性本寂故名涅槃涅槃下顯涅槃義別初句總標四種涅槃之理殊無二致但以聖凡優劣言之略分四別次列釋一本下初句標名謂一下釋義先釋本淨謂蘊處界等一切諸法所依之理雖為客塵煩惱所覆其體本淨不染而染難可了知染而不染難可了知不簡聖凡平等共有與一下次釋涅槃此與諸法不一不異者異應真如非彼實性一則此性應是無常不可以相相不可以名名言語道斷心行亦訖真空寂滅唯聖乃知故名涅槃二有餘依涅槃至而障永寂故名涅槃二有下初句標名謂即下釋義先釋有餘但斷煩惱障子縛已盡身智未泯果縛猶存名曰有餘後二句釋涅槃身心雖在煩惱寂滅故名涅槃三無餘依涅槃至衆苦永寂故名涅槃三無下初句標名謂即下釋義先釋無餘灰身泯智苦依亦無名曰無餘後二句釋涅槃大患永滅萬纍俱寂故名涅槃四無住處涅槃至用而常寂故名涅槃四無下初句標名謂即下釋義出所知障者煩惱同二乘斷故略不說先釋無住有大悲故不住涅槃有般若故不住生死涅槃生死二俱不住故名無住後二句釋涅槃問窮未來際利樂有情即利他妙用何名涅槃釋云用而常寂故名涅槃寂照雙融雙泯兼顯無住之義一切有情皆有初一二乘至唯我世尊可言具四一切下簡判通約凡聖簡有情唯初一者理本具故二乘無後一者缺利他故世尊具四者有理有事故如何善逝有有餘依如何下七番料簡一問約如來簡有餘涅槃如來二死永忘諸苦俱寂寧有微苦所依之涅槃雖無實依而現似有至是故世尊可言具四雖無下答先約示現明有如索乳療疾金鎗背痛等皆現似有之義或苦下次約以無漏蘊為有餘依謂非苦所依無漏蘊在說有餘依如經云我今此身即是常身法身等若聲聞等有無餘依如何有處說彼非有若聲下二問約二乘簡無餘涅槃躡上文二乘無學容有前三為問初句牒定如何下正問若聲聞等有無餘依如何有處說聲聞等非有無餘既若有處說無則上容有前三之言徒設有處說彼都無涅槃豈有餘依彼亦非有有處下舉例斥答又有處說聲聞都無涅槃豈有餘依聲聞亦非有耶既說都無不妨猶有有餘依例證有處說非有不妨亦有無餘依然聲聞等身智在時至無苦依盡無餘涅槃然聲下判斷二處所說之意先申後義謂有處說都無者依所知障所依變易苦身未盡故說都無非無煩惱障盡有餘涅槃此約才證有餘時所知未滅圓寂義隱故言都無爾時下次申前義謂有處說非有無餘者即彼聲聞身智在時但證有餘未證無餘故說非有非無後時身智俱泯苦依滅盡之無餘依此約未證無餘時故言無無餘兩處論文義同望前望後別說故今以此例斥於彼或說二乘無涅槃者至非如一類入無餘依或說下先約實無答初句牒問依無下釋成依無第四無住處是故說無非無前三又說下次約不定答初句牒問依不下釋成謂不定性才證有餘回心向大不入無餘是故說無謂有二乘深樂圓寂至故復說彼與佛有異謂有下轉釋二種涅槃差別上言不定性但證有餘一類定性入無餘依今文先釋有餘二乘樂寂修生空觀證生空理滅煩惱障證得有餘涅槃彼能下次釋無餘煩惱因忘異熟果盡所依苦身既滅有為觀智亦亡身智雙泯證得無餘涅槃爾時下伏問曰身智都無涅槃誰證釋曰入無餘時雖無身智而由先時身智證得故可假說彼有身智此位下對佛簡異聲聞所證清淨寂滅與佛無差有體無用與佛有異諸所知障既不感生如何斷彼得無住處諸所下三問料簡無住涅槃此約敵對為問煩惱與生死乃因果對生死與涅槃乃染淨對今所知障以望生死因果不相主對若無生死亦無涅槃則應染淨亦不相對云何斷所知得無住處涅槃耶此約涅槃名同問彼能隱覆法空真如至令於二邊俱不住故彼能下答所知雖不感生然能障於法空真理體既被障不能起用利他斷此所知法空理顯此理即是無住涅槃非是滅生死所得之涅槃此約涅槃義異答煩惱隱覆人空真如障斷理顯沉空滯寂故所知隱覆法空真如障斷理顯起用化他故故此涅槃名同義有異也若所知障亦障涅槃如何斷彼不得擇滅若所下四問躡前起問所知若障無住涅槃斷彼既證涅槃真如亦應證得擇滅無為此約真如與無為名異體同為問擇滅離縛彼非縛故擇滅下答擇滅無為是離煩惱障縛所顯彼所知障既不感生非同煩惱能縛有情住於生死故斷彼時但證真如不得擇滅此約二障縛與非縛為答既爾斷彼寧得涅槃既爾下五問仍約二法理同問既爾二字躡前若所知障既非是縛如何斷彼亦得無住涅槃此約擇滅與涅槃二理既同斷彼不得擇滅亦應不得涅槃非諸涅槃皆擇滅攝至即真如中二擇滅攝非諸下約二法義異答初句直答四種涅槃有是擇滅有非擇滅非諸涅槃皆擇滅攝不爾者若謂諸涅槃皆擇滅者次舉性淨例答是則四中初一性淨不由擇滅應非涅槃能縛下正判義異煩惱是縛擇滅離縛故斷彼時證真擇滅所知非縛但障空理故斷彼時不得擇滅然斷下正答然斷所知法空理顯說得無住涅槃非此一句結判義別涅槃擇滅性各異故故四下約相攝結答以四涅槃對六無為性淨無住即真如攝非是擇滅所攝有餘無餘即擇滅攝故斷所知不得釋滅若唯斷縛得擇滅者不動等二四中誰攝若唯下六問初句牒上離縛得擇滅次句以相攝為問意在答出擇滅唯究竟滅不動無為及想受滅無為對餘四無為誰所攝耶餘四無為者即擇滅非擇滅真如虗空也非擇滅攝說暫離故至有非擇滅非永滅故非擇滅下直答此二非擇滅攝暫離者四禪捨念清淨名不動退沒還來散入諸趣故滅受想定入時暫離出時還起故擇滅下一句承上非擇滅對顯擇滅無為一滅永滅又以此究竟滅對顯暫離非擇滅攝故此二句反覆相成之意也有非下一句轉釋上初句義有一分非擇滅非是永滅此不動等二既非永滅故是非擇滅攝意外別顯有一分非擇滅是永滅者此指所知非擇滅攝是永滅故或無住處亦擇滅攝至究竟滅者擇滅所攝或無下上明無住涅槃非擇滅攝者以其非是滅縛得故今言亦擇滅攝者以由真智滅障得故伏問上明滅縛可是擇滅今言滅障何亦擇滅釋云擇滅有二一滅縛名擇滅二滅障名擇滅如文故四下約相攝結答以四涅槃對六無為性淨即真如後三皆擇滅不動下結以不動想受滅暫滅對顯後三擇滅唯究竟滅既所知障亦障涅槃如何但說是菩提障既所下七問初句牒前所知既障涅槃次句正難如何聖教但說障菩提不說障涅槃說煩惱障但障涅槃至理實俱能通障二果說煩下舉例答如文理實通障約用偏說煩惱勝用繫縛有情恆處生死不能證涅槃故所知勝用障覆所知理境不能證菩提故如是所說四涅槃中唯後三種名所顯得如是下結初一非所顯得者以自性清淨不由斷障顯故故此唯結後三名所顯得二所生得謂大菩提至此即四智相應心品二所下次明所生得初句標名次句出體菩提此云覺簡二乘中下故名曰大能斷惑盡能證理徹故此雖下釋所生得義伏問無漏種子法爾而有不從新生何名得耶釋此如文結歸四智菩提云何四智相應心品云何下總徵四智言相應心品者即淨八識與自相應二十一法和合共成一聚名之曰品品者類也下一一別釋一大圓鏡智相應心品至如大圓鏡現衆色像一大下初句法喻標名謂此下釋義離諸分別者謂此即無分別正智能所雙絶故所緣一句釋成如有漏識不可知執受處了純者無雜淨即無染圓者滿義現行功德此為所依種子功德此為能持此能現自受用身實報土能生後三智如大圓鏡現衆色像二平等性智相應心品至一味相續窮未來際二平下初句標名謂此下釋義因中執我自他不等今既離執故皆平等諸有情即十地菩薩為現他受用身實報莊嚴土地地優劣有殊影像亦有差別果上仍為妙觀察智作俱有依不住二邊名曰一味三妙觀察智相應心品至令諸有情皆獲利樂三妙下初句標名謂此下釋義攝論云圓成實性為共相依他起性為自相智觀此故六度道品為功德寶智攝此故神通十力即作用差別智現此故隨機演法名雨法雨智說此故四成所作智相應心品至成本願力所應作事四成下初句標名謂此下釋義普現十法界身三輪不思議化成就本願所應作業智能成此名成所作智如是四智相應心品至一切有為功德皆盡如是下結立智名伏問四智心品每品各有二十二能變所變等云何但得智名釋云如是等二十二法者謂五遍行五別境善十一并所依識能變謂內二分所變謂相見分與各各種子現行相應此中智用偏增故以智名顯之故此下正結有為功德即二十二法及神通十力等此轉有漏八七六五識至故說轉八識而得此四智此轉下明轉依體初句直明轉八成四如次可知智雖下伏問曰智即別境中慧應言轉慧成智何言轉識成智若爾豈不轉王成所耶釋云稱實轉王得王轉所得所由智隨識轉識為主故說轉識得又轉強得強有漏識強者煩惱增故境界勝故無漏智強者煩惱無故境界空故為勸有情故說轉識得大圓鏡智相應心品至持無漏種令不失故大圓鏡下明四智現起分位初家謂大圓鏡智無間道時即初現起異熟中種俱時空故異熟既捨鏡智未起便無能持淨種之識次家謂解脫道時方得初起異熟下斥前無間捨種猶未頓捨者但捨所知障種未捨有漏善及劣無漏種此與無間道金剛智不相違故非障下明解脫方捨此種但與圓滿佛果定相違故金剛下明無間道若捨異熟則無所熏識若無所熏則無漏不增彼時應即成佛何用復起解脫道為由斯下結平等性智相應心品至相依相續盡未來際平等下第七因中轉以由第六入雙空觀斷分別二執見道初起頌曰單執末那居種位平等性智不現前雙執末那歸種位平等性智方現前後十地中俱生未斷出觀入觀有時有漏無漏轉易是故隱顯有間十地後心與淨第八為俱有依盡未來際相續無盡妙觀察智相應心品至或無心時皆容現起妙觀下此亦因中轉生空智品通三乘法空智品獨菩薩若二乘生空見道位中亦得初起後至無學若漸悟菩薩解行地終起頓悟菩薩從初見道至上八地起非有漏心非字貫下非無心時無心謂滅盡定意顯無漏心有心時方容現起若菩薩法空見道位中方得初起乃至十地後心非有漏等者非字貫下有漏與智相違生空不違法執無心則無意識故此三時皆不現起意顯無漏心法空智果有心時方容現起此明因中雖轉容有間斷成所作智相應心品至而數間斷作意起故成所下有二師解初師云同六七識亦因中轉修道位中為第六識後得所引亦得初起次師云成佛方起以十下明所依根非無漏故非因中轉不共者眼根唯為眼識所依故必俱者是俱有依根識同時故同境者根識同緣一境故此三名異俱屬五根皆三依中俱有依攝所依之根既是有漏故不能發無漏識智有漏根昧無漏識明不相符故由斯下結顯此智成佛方起數間斷者非如前二智相續而轉此四種性雖皆本有至勿前佛德勝後佛故此四下伏問曰此四智品皆從本有無漏種生若起現行應一切時均成無漏云何得有前後因果轉依之不一耶釋云雖從種生熏有勝劣六七因位漸增五八果上圓滿又問何以佛位不增不減釋云但從種生更不熏種若更熏種則前佛熏多則優後佛熏少則劣大圓鏡智相應心品至餘一分二准此應知大圓下明智緣用大圓鏡智有二師解初師云但緣真如二智之中唯是根本行相下一句釋成無分別故是根本智次師云亦緣俗諦先引聖教證成緣俗如文又此下引理證成因中既緣三類境果上決定亦能緣之頌曰大圓無垢同時發普照十方塵剎中行緣微細說不可知非無分別名不可知如阿賴耶通緣真俗故緣真下判屬二智根本緣真後得緣俗言後得者謂根本證真之後而得故例餘平等妙觀體一分二准此應知平等性智相應心品至二智所攝於理無違平等下有三師解初師云但緣俗諦緣淨第八故例如染位緣藏識故次師云但緣真如緣平等性故等三師云遍緣真俗引經證緣真引論證緣俗隨他示現佛影像故頌曰如來現起他受用十地菩薩所被機由斯下結緣真俗根本緣真後得緣俗妙觀察智相應心品至皆無障礙二智所攝妙觀下通緣真俗二智所攝緣自相即依他起緣共相即圓成實緣一切法謂普照大千皆無障礙頌曰遠行地後純無漏觀察圓明照大千成所作智相應心品至起化業故後得智攝成所下有二師解初師云但緣五現境引論如文次師云亦能遍緣非局五境能緣三世非局現境引經證成能作三業化頌曰圓明初發成無漏三類分身息苦輪然此下通前引論皆如文隨作下釋唯後得隨作意生者隨妙觀察智作意引生故唯後得前三依心根故二智所攝後一依色根故唯後得攝此四心品雖皆遍能至破諸疑網利樂有情此四下總申用異先總標謂鏡下分釋皆如文四智所現總不出真應二身皆有集藏之義真集一切智慧藏於一心應集一切神通藏於一色色心不二通慧一如唯色唯心斯之謂也此約圓義釋前三教不爾如是等門差別多種如是下結示差別多種者初約體用明體則轉八七六五識而得用則能現三身四土次約四智現起分位六七因中轉五八果上圓後約所緣境界該真該俗根本後得智有差別故云多種此四心品名所生得至及前涅槃名所轉得此四下先結四智名菩提次總結菩提涅槃名所轉得雖轉依義總有四種至非已證得因位攝故雖轉下簡判先約頌簡雖轉依義總有四種而今轉依果中但取第四所轉得不取前三何也初一是能轉道第二是所轉依第三是所轉捨俱非所證得頌中既說證得轉依之言是故但取後一不取前三此修下約位簡此修習位四轉依中唯取前三不取後一何也非已下出簡果從因意後一屬果前三在因修習位既在因是故唯取前三不取後一後究竟位其相云何後究下大章究竟位先徵問起頌曰此即無漏界至安樂解脫身大牟尼名法頌曰下舉頌答論曰前修習位所得轉依至世出世間利樂事故論曰下解釋釋頌初一句初二句指前顯後總答徵問此謂下二句總釋頌相菩提涅槃二轉依果無漏界攝諸漏下轉釋先釋無漏諸漏永盡者二障名漏此即離相應縛義非漏隨增者此即顯離所緣縛義性淨簡異二乘無學有所知障不純淨故圓明簡彼十地菩薩未圓滿故具此諸義故名無漏界是下釋界字一者含藏功德二者能生善利五乘謂人天聲聞緣覺菩薩也清淨法界可唯漏攝四智心品如何唯無漏清淨下通妨問曰清淨法界謂涅槃有佛無佛性相常然是無為故可唯無漏四智心品斷惑證理屬有為故又六七二智因中間轉雜有漏故如何唯是無漏道諦攝故唯無漏攝至而實無漏道諦所攝道諦下答初二句標答苦集屬有漏道滅屬無漏謂佛下釋成佛功德者謂四智也身土等智所現也雖有下伏問曰成所作智隨類示現生死身此即苦諦業煩惱等此即集諦俱屬有漏云何皆言是無漏耶釋云同事攝化法門示現道諦所攝而實無漏集論等說十五界等至五根五識五外界等集論下躡前無漏以集論難問若佛功德身土皆唯無漏如何論說十八界中除後三界餘十五界唯是有漏若屬有漏豈如來無五根五識五塵耶有義如來功德身土至故與彼說理不相違有義下有三師釋初家約深妙理釋非界處攝集論三科是思議境今此功德是深妙理是故彼此無違有義如來五根五境至論說五識性散亂故有義下次家約法界釋非界處攝非集論所說根境是故彼此無違非佛下伏問曰如來五塵可言法界攝非佛有情緣聲光等必藉如來法界五塵為質變相而緣此所變相既屬五塵所託之質寧非五塵所攝耶釋曰有情五識雖託此變粗細有異故而所變相粗可言五境攝所託法界質細非五境攝如來下明如來五識非識界攝次二句引教釋成定散有異故如來心恆定有情識常散成所作智何識相應至是故於此不應為難成所下料簡成所作智由上言如來五識非五識攝今問云既非五識成所作智何識相應第六下答第六相應由前云隨妙觀察智作意引生故與觀下又問成智觀智若俱依第六二性有何差別彼觀下釋差別如文又問二智同依一識應不並生如一類眼識二不俱起智亦應然許不下答初約不並答次約用分答或與下又一釋第七相應依根緣境是平等智作用由前云遍緣俗故示現無邊佛影像故伏問成所作智依根緣境今平等智亦言依根緣境二智有何別耶謂淨下釋二智差別緣境雖同現身土有別如文豈不下離問前云轉五識成成所作智豈不此品五識所攝非轉下答非轉五識得智體即五識如轉下舉例釋是故下結責智由慧轉五識無慧六七有慧故今問出六七相應非轉五得此約因中無慧言也若至果上各各具有二十二法有義如來功德身土至彼三皆通有漏無漏有義下第三家釋約無漏界攝如來功德身土如應攝在蘊處界中如應者智即識攝身即根攝土即塵攝彼三皆通漏無漏故餘所成者通漏無漏佛所成者純無漏故集論等說十五界等至而非二乘所知境攝集論下通集論初句牒前難家引論彼依下會通論意二乘境既粗淺能緣根識亦粗淺故唯有漏不依如來無漏法說故云非說一切謂餘下轉釋餘者謂二乘已下成就後三通漏無漏十五唯有漏如來皆無漏然餘處說佛功德等至善常安樂解脫身等然餘下會通餘處即前初家所說非界處等法門所攝者此顯功德是無漏界非二乘劣智所知所以者何下徵釋是界攝功德身土皆屬有為聖說有為一切法皆蘊處界攝而又言非界等者應是第十九界第十三處第六蘊等所攝聖所不許十九等故既無十九等顯是無漏界攝若絶下復斥初家初句牒前亦不下以本頌斥又處處說轉無常蘊至故言非者是密意說又處下復引他處通斥二家常蘊常界即無漏蘊界寧非蘊界所攝又說五識性散亂者至皆悉具足而純無漏又說下斥次家引論如文故佛下結示由前難家以有漏難無蘊界等此直約事難次二解家直以理釋故言非界等所攝今約即理之事以成無漏界等所攝此轉依果又不思議至非諸世間喻所喻故此轉下釋第二句初句牒頌不思議三字次三句釋義初句總明不思議次二句別明忘言默證故非思喻所不喻故非議此又是善白法性故至違不善故俱說為善此又下初句牒頌善字白法性者總釋善相離染黑故清淨下別釋清淨法界遠離生滅解脫諸苦故曰安隱四智心品現身現土觀機說法故曰巧便二種下結善相論說處等不唯無記如來豈無五根三境論說下躡前是善以瑜伽難問論說處等不唯無記通三性故上言此又是善豈如來身無五根及香味觸耶不言色聲者許通三性故此中三釋廣說如前至善種所生無漏善攝此中下答初句指前三家論說處等通三性者依餘所成說非佛所成一切下別釋如來身土唯善如文佛識下伏問曰佛身土等雖皆是善應機所變有漏不善無記相等豈亦善耶釋此如文此又是常無盡期故至窮未來際無斷無盡此又下牒頌常字無盡期者總釋常義清淨下別釋如文所依者智依理故假說為常非自性常從因下轉釋非自性常然四下約化機無盡說常此又安樂無逼惱故至勝法故恆名解脫身此又下牒頌第三句初安樂二字無逼惱者總釋安樂義清淨下別釋體害者所知障能障理故是體上害此二下結釋二性皆無逼惱自安安他俱名安樂二乘下釋解脫身唯離煩惱不斷所知螢光獨照但得自利無殊勝法者無法身本不能起用不能利他恆名孤調解脫非大涅槃大覺世尊成就無上至二轉依果皆此攝故大覺下釋頌第四句先略釋頌文如文梵語牟尼此云寂默無量下轉釋先法次身無量功德等莊嚴者一切種智為頭第一義諦為髻八萬四千陀羅尼為髮權實二智為眼無漏為鼻四十不共法為齒四無礙辨為舌十力為手如來藏為腹大慈大悲為心三三昧為腰福慧二嚴為足身者體義依義聚義清淨法界為體四智菩提所依萬善功德聚集故此下結如是法身有三相別如是下廣解法身有六段初正釋三身次五法攝三身三三身德別四自他利殊五所依之土六身土合明一佛而有三身者此有三義一體用智與理冥能起大用自報上冥法性體謂之真身他報下赴機緣用謂之應身二權實權謂權暫實謂實録以施權故從勝起劣三佛離明以顯實故從劣歸勝秪是一身三理事佛本無身隨順世間而論三身仰觀至理本實無形俯隨物機迹垂化事頌云自性法受用變化差別轉文中先總標下別釋一自性身謂諸如來至大功德法所依止故一自下初正釋三身初句標名謂諸下一句出體受用等一句此以能依顯所依勝也離相下釋義湛湛絶慮寂寂名斷能為色相作所依止凡所有相皆是虗妄即此自性亦名法身次句以依止義釋軌持為法諸佛軌之而得成佛功德依止名身前二轉依果名法身者乃約復明此真淨法界名法身者乃約單顯今法身中有三相別者此則約開前二轉依果名法身者此則約合雖有單復開合不同此之三身非縱非橫不並不別文雖屬別義合通圓以法身中具三相故二受用身此有二種至合此二種名受用身二受下初句標總名次句列二一自受用恆自受用大乘法樂故謂諸下釋義真實功德即四智菩提極圓淨常遍色身即無漏五蘊智與理冥故慧光照無量久修業所得名為自受用報身者依止相續義有為功德所依止故相續湛然盡未來際故二他受用令他受用大乘法樂故微妙功德身即尊特勝應身純淨土即實報莊嚴土此之身土為十地菩薩示現如來現起他受用十地菩薩所被機此即平等智之所示現合此二種名受用身三變化身謂諸如來至令各獲得諸利樂事三變下初句標名謂諸下釋義隨類化者有三一大化現千丈身王大千界被地前機二小化現丈六身王一四天下被二乘凡夫三隨類化猿中現遠鹿中現鹿等淨穢土者或折或攝變淨變穢此被三賢二乘凡夫等所言化身者與應身有異觀音疏云變化者歘然而有歘然而無蓋是暫時益物相也應則應答同物始終如極樂人民壽不可數佛同無量此土壽促佛同八十有降生日有入滅時即八相佛也此中言隨類化者通應通化若應人天此化屬應若應餘趣此應屬化以五法性攝三身者至故知三身皆有實智以五下二明五法攝三身有二解初釋清淨法界大圓鏡智攝自性身次引經證真如攝法身引論證鏡智攝自性身真如即法界法身即自性名異體同耳圓鏡下一句轉釋上句會通轉阿賴耶即圓鏡智故中二平等觀察攝受用身次引論證平等智現身觀察智說法轉諸轉識得受用者此句通證二智攝受用後一成事智攝變化身次引論證成又智下一句通明四智具攝三身故知下一句結三身皆有實智有義初一攝自性身至無相無為非色心故有義下次釋清淨法界攝自性身此釋簡去鏡智者以鏡智品非本性常故有生滅故生因之所生故是有相有為色心法故自性反是故不相攝然說轉去藏識得者至不可說為色心等物然說下通前初家引論初句牒前引論然初家說轉藏識得自性者謂由下正通論意由轉藏識中二障種子顯法性身不可謂鏡智亦攝自性身智殊下通後句問既云鏡智不攝自性云何言智殊勝具攝三身耶釋云謂法身是彼四智之依止是彼四智之實性故言具攝三身理實鏡智不攝法身唯攝自受用身故自性下出鏡智不攝法身之所以問前云自性身中具無邊際真常功德豈非法身中有智何謂鏡智不攝法身釋云自性身中雖有功德而無為故非色心故是故不攝四智品中真實功德至種種身相攝變化身四智下明智攝後二身謂通以四智及鏡智所起色身攝自受用平等攝他受用成事攝變化說圓鏡智是受用佛至實有色心皆受用攝說圓下引證初句引證鏡智是自受用次句引證平等是他受用雖轉下通妨伏問曰此言轉藏識成鏡智亦得自受用何故前云轉第八顯法身不言得自受用者何也釋云此雖言轉藏識亦得受用前文但言轉藏識顯法身不說得受用者是文略耳應知轉藏識有二義一者轉去藏識中二障種子顯法身二者轉染藏識成鏡智得受用前文但說顯法身於轉染成淨得受用一義略不說之又說下以理推之鏡智唯應攝受用不攝法身先舉法身中無生無滅等相為例鏡智反此若非受用攝屬何身又受下通明自受用攝四智有為實德即四智也故四下結又他受用及變化身至故此二智自受用攝又他下斥初家三身皆有實智初文直斥二身非智為體雖說下通論意問聖說化身智殊勝攝今何言非智釋云論中雖說智殊勝攝化身者似智顯現故或依智起故假說智名體實非智又問聖說二身即是二智所現今何言體非實智但說下釋義如文故此下一句結二智既非二身故知即是自受用攝應知自性身如鏡面自受用身如鏡光他受用及變化身如所現像光與面不一不異無面不顯光無光不顯面此喻智理相冥不二而二二而不二不可施設離異後二身如所現像像雖依面光而現雖離面光無像可得不妨像終非面光不可施設令同故此二身但可云智所現非以智為體也然變化身及他受用至無根等用故不說有然變下通妨問曰若後二身非智為體如土木偶何能說法化利有情耶釋此如文無上下又問身等有質可能化現心等無形豈能化現釋此如文若不下反顯能現若謂如來不能現無形質心心所法者如來久已斷貪嗔等云何又能示現有三毒聲聞旁生知如來心者此是化現心而非實心如來實心等覺菩薩如稻竹葦尚不知故如佛一時深擯衆僧還念欲取梵王悉知又於一時念欲為王如法化世魔王即知而來勸請如佛將泥洹時阿那律陀知佛次第所入諸禪三昧由此下引證隨類化身皆令有心涅槃經說人天百萬設最後供唯純陀供是佛親受餘悉化佛皆似有心令彼人天各各自謂佛受我供成所作智化作三業意即心也又依他實心為質變相分心現故雖說下伏問曰聖說變化之者無有根心今何言能變根心等釋云化人無根心者約餘二乘外道等所化說也又聖說無根心者約根無生識用心等無實染善用故不說有非不化現也如是三身雖皆具足至利樂他用化相功德如是下三明三身德別初句總標三身德異謂自下別釋自性身唯有常樂我淨離諸雜染即淨義衆善所依即我義無為功德即常義無色心等即樂義自受用身具妙色心等真實功德即四智後二身具似色心等者似智顯現不以智為體故又自性身正自利攝至唯屬利他為他現故又自下四明自他利殊自性身為增上緣者謂真如遍在一切衆生身中以為內熏故兼利他自受用身唯自利者智冥理故後二身唯利他者應機現故又自性身依法性土至譬如虗空遍一切處又自下五明所依土初句標自性身依法性土雖此下釋問曰身即法界土即常寂光其體不二何分身土釋云雖無差別不分而分佛是相義二身自體故四智功德所依故衆德聚集故法是性義能持自性故功德自性故諸法自性故隨事無邊者以變化等三身三土事既無邊與之為性豈有邊耶立量云法性身土是有法其量無邊宗俱非色攝故因喻如虗空自受用身還依自土至亦可說言遍一切處自受下初句標自土即無漏色蘊情為能依屬報身器為所依屬報土此實報土謂圓下釋謂無垢識由昔所熏自利無漏淨土種子成熟從初成佛變為純淨佛土周圓無際如淨下例身根相好如淨土量一一無邊根根塵塵遍周沙界功德下釋妨問曰自受用身體即智慧非是色法如何可約形量而言周圓無量耶釋云智慧雖不可說形量而依所證理及所依身亦可言偏一切他受用身亦依自土至能依身量亦無定限他受下初句標自土謂實報莊嚴土然唯淨土謂平下釋謂平等智由利他無漏淨土種子成熟隨十地菩薩所宜變為淨土大小勝劣前後改轉者地地相望傳傳勝劣不同故能依下以土例身亦無定限一月不降百水不升而隨河長短任器方圓無前無後一時普現此是不思議妙應也若變化身依變化土至能依身量亦無定限若變下初句標變化土謂方便同居二土謂成下釋謂成事智由利他無漏淨穢佛土種子成熟隨未登地有情所宜化為佛土大凡小聖機器不同各隨業力所見亦異淨穢小大前後改轉者攝折不同故有淨穢隨機勝劣故有小大無漏言穢者示機見穢佛唯無漏如經云大火所燒時我此土安隱即此意也能依下以土例身亦無定限後二身應三土皆云前後改轉者橫論四教竪則三土同居四教方便二教實報一圓赴機有異故大略而分頓部根利漸教根鈍若委論者頓中別鈍圓利漸中圓利三鈍亦可四教傳傳論利鈍所說之法隨機興廢若機若應節節改轉不可文備宜准教思自性身土一切如來至一佛能益一切生故自性下六身土合明自性身土體即真如自他身土皆無差別自受用身土雖諸佛各變如衆燈之明彼此不相障礙餘二身土隨所化有情有共不共所化共者言佛各變者清涼釋云如今釋迦化身若一類衆生若與阿閦等諸佛皆有緣應受其化所化之者身不可分如一釋迦成佛度生諸佛同時皆化一身為釋迦同在菩提樹下一時成佛令諸衆生但謂一釋迦佛如多盞燈同照一物共發一影實有多光各發影而相雜故謂是一影於不共者言唯一佛變者設見十方百千化佛亦是一佛化諸身耳諸有下雙結釋成共不共義或多屬一或一屬多應更云或多屬多或一屬一文無者略由共不共相故一切凡聖雖同一心而有相見不相見異雖同變土而有同受用不同受用別是故靈山常耀而覩林樹潛輝丈六金軀復見土灰衆色蓮華寶剎反謂丘壚莊嚴寶地倒言砂礫斯皆同共不共故也此諸身土若淨若穢至不爾應無五十二等此諸下明所變漏無漏別先明無漏識變謂上四種身土若淨若穢約佛無漏識上所變現者同乎能變但純無漏純善下三句釋成問曰若能變是無漏所變亦無漏者例應能變是識所變亦應是識則不應有蘊等之別釋云所變蘊等與能變識不必皆同蘊等三法因緣雜引生故次明有漏識變此諸身土若淨若穢約一切有情有漏識上所變現者同乎能變俱是有漏純從下三句釋成善等下又問若所變同能變者則能變識性是無記所變亦應屬無記不應有三性差別釋云善等三性與能變識相不必皆同三性因緣雜引生故蘊等下問能變是識所變亦應同識不應有蘊等之別釋云所變能變不必皆同三法因緣雜引生故不爾者若所變須同識者應無五蘊十二處十八界三科差別然相分等依識變現至許識內境俱實有故然相下承上明所變四分虗實先初解相見二分依識所變遍計性攝是虗能變識體依他起攝是實不爾者若謂外二分亦是實此則識外有實法唯識理應不成或識相見等從緣生至不爾真如亦應非實或識下次解相見二分從緣生故俱依他起虗實如識者依勝義言識如幻夢則所變相見如識亦虗約世俗諦言依他不無則相見如識亦實若爾則有實境耶釋云唯言遣心外法不遮內境若不爾者後得變相緣如此之內境亦應非實內境與識既並非虗如何但言唯識非境內境下通妨問曰境識既並非虗是則應云唯識唯境如何但言唯識不言唯境識唯內有境亦通外至心與心所定相應故識唯下約三義答初云識唯內有境通內外若言唯境恐愚者濫計心外有法是故但言唯識或諸下二云愚夫執有外境起惑造業沉淪生死哀愍彼故遮彼外計令觀自心非謂亦無內境觀心有二一實相觀即於識心體其本寂三千宛然即空假中二唯識觀照於起心變造十界四性叵得故或相下三云相見二分皆識為性由熏習力似四分生實唯一體問識性是俗真如是真豈非心外有法釋云真如是識實性除識之外無別有法故問曰境唯識變可是一識然諸心所各別有體豈亦一識耶釋此如文上釋唯識位竟大章正宗意此論三分成立唯識至乃得圓滿非增減故已依聖教及正理分別唯識性相義所獲功德施羣生願共速登無上覺此論下大章釋結施願分此論下釋義三分成立故顯理明淨故本頌圓滿故名實雙彰故已依下結文依憑教理故分別性相故所獲下回施回自向他故回事向理故願共下發願見聞隨喜者藉因成果故唯識自考後跋自考録者靈源法師之所作也師夙植善本現身長者壯年依紹法師之席遍閲台宗精通唯識論翱翔法門已稱龍象既而晦迹都門精研積稔居士說法辨音廣長海內緇流久嚮唯識一宗蓮居獨傳滴派師剃髮後于丙寅春南詢偶閲海昌唯識疏雖並宗音義而剖晰煩言不無紕漏開衍大旨亦鮮心得蓋聖作既難于明述而篤信彌遠其師傳愾焉久之一夕以就龍居主人之請筆伸紙追其所憶蓋不數月而文成千番義該全帙往來南北再登猊座其所講演而參訂之者殆無遣旨矣廣顧向覿法師于長安飫聞緒論于茲十年今春復于蓮居座下得讀藁本如獲拱璧不忍韜之櫝中使後學無所遵仰捐資付梓獨肩厥任雖不謂遠駕證義繫長補短頗堪伯仲較之俗詮為確集解為簡淺學者既不厭其深文宿悟者亦難尋其遺義矣嘉慧後來續佛惠命庶幾無愧云爾崇禎改元戊辰長至日海幢居士廣顧和南書
