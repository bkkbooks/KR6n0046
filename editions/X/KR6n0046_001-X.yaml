body:
  text: 明武林蓮居弟子大惠錄成唯識論者廼標宗會旨摧邪顯正之說也明諸佛權實二智開契經勸誡二門立諸法真俗二諦成菩薩自他二益示行人邪正二解破眾生我法二執轉煩惱所知二障證菩提涅槃二果題中四字通別合稱言異眾典故云別名與他同故云通二題皆具教行理三茲不繁述就別題中成謂能成立法略則宗因喻三支廣有八種一立宗二辨因三引喻四同類五異類六比量七現量八正教量要而言之即安立義謂安布言教成立義理也唯識謂所成立義即真俗二諦之理然此二字若離釋者唯謂獨一之稱此外無餘略有三義一者簡持義簡去徧計所執虗妄我法任持依他圓成二性此以理簡情故言唯二者決定義決無離心之境定有具境之心此約心簡境故言唯三顯勝義五位百法一心變影故二心自體故三心相應故四心分位故五心實性故五中唯心顯著為主能變勝餘法故此則舉識該餘故言唯識謂了別眼等諸識各各皆能了別自分所緣境故若合釋者以唯言遮境非有識言表心不無心有境無故名唯識諸教所明唯識不出十界依正略則凡聖因果四位一約凡顯唯識如一恒河六道各見不同經云鬼旁生人天各隨其所應等事心異故許義非真實境若是實不應異見故云唯識二約聖顯唯識如二乘人修九想等觀隨觀一境眾相現前頌云心意識所緣皆非離自性故我說一切唯有識無餘境若是實寧隨心轉故云唯識三約因顯唯識依定自在心境雙寂隨欲轉變地等皆成如頌云菩薩於定位觀影唯是心義想既滅除審觀唯自想境若是實何容隱顯故云唯識四約果顯唯識大圓鏡智諸處境識皆於中現如莊嚴頌云如來無垢識是淨無漏界解脫一切障圓鏡智相應萬境森羅豈離鏡智故云唯識通題論者較言旨歸審明要會評量本頌意趣決了唯識宗旨聖人設教垂範無越三種方便破法方便袪遣餘乘外道情計心外我法故立法方便成就三種能變唯識性相故饒益有情方便令諸眾生修行斷障歷位證果故論有宗釋本末今者是宗非釋是末非本此之四字能所合標通別兼舉是故云也護法等薩薩造按佛滅後九百年中世親菩薩以慈氏瑜伽論文浩瀚深淵是以提挈綱維作唯識三十頌同時有親勝火辨二師造釋各有十卷千一百年繼有護法安慧陳那德慧難陀淨月勝友智月八師相次造釋亦各十卷故卷有百慈恩基師以十師制作旨殊見異稟者無依固請奘師揉成今之十卷然而文多影略所尚者以護法為司南故先標首諸師等之菩薩略梵語具云菩提質諦薩埵此云覺有情稟受大乘教法深達唯識理趣名自覺之有情以斯道覺斯民名覺他有情具斯二利故稱菩薩造者如法相解如法相說稱理建言故云造也唐三藏法師玄奘奉詔譯唐代名三藏謂經律論正法自任弘辯導他名曰法師玄奘者大師之諱譯者猶言易也以唐易梵以顯了義代未顯了義故論文大分有三初宗前敬敘分次依教廣成分後釋結施願分義當序正流通三段初序中先一偈歸敬述意次申造論緣起先歸敬述意稽首唯識性滿分清淨者我今釋彼說利樂諸有情初稽首二句歸敬請加稽首二字總攝能歸三業既身儀端莊口必讚嘆意必虔謹一非一舉一必攝三唯識等八字即所歸三寶唯識性即法寶有二義一謂徧計所遣清淨即世俗唯識相二謂圓成所證清淨即勝義唯識性性勝相劣舉性該之又三十頌中初釋唯識相次顯唯識性後明唯識位舉中以攝初後總以一部為所歸也滿分清淨者即佛僧二寶佛是究竟果人十障究盡二死永捐如蓮華開睡夢覺名滿清淨者三乘因位於二障中斷未窮源名分清淨者雖別言三三非三言三體即一豈唯三一圓融亦復能所不二能歸之外無別所歸方成唯識歸敬菩薩造論恐未符頌意必藉三寶冥加故先歸敬也我今下述造論意我即論主自稱彼說指天親三十頌利謂利益令生解起行因中得聞法之利樂謂安樂斷障證果果上得菩提覺法樂涅槃寂靜樂諸有情即所被機菩薩造論意在於斯次申造論緣起文三初通彰所為二別為凡小三別破四執今初今造此論為於二空至所知障故得大菩提今造下初句先申起次二句正明造論緣由二空者謂真理理尚非一今言二者對所執而言也外道無中執有謂之迷餘乘心外計法謂之謬正解生時翻破迷謬二空理顯此作論之因緣也生解等一句明生解力用二障謂煩惱所知即事理二障下二句轉釋二障起滅所由我法二障二空各相主對起滅隨斷者執有雙單障有輕重空有淺深隨分證隨分斷斷障等一句明斷障功能下二句轉釋斷障所得之果真解脫者簡非孤調解脫大菩提者簡非二乘菩提文中綺文互見左右言之耳此段緣起總令一切有情解二空斷二障證二果故此論之所以作也又為開示謬執我法至於唯識理如實知故又為下二別為凡小謬執我者如下文執我體常周徧等謬執法者即數論冥諦等勝論六句義等餘乘所計離識實有色等諸法亦是謬執故今開示令其稱實而知了達心外無法翳眼若除空華自滅若達二空我法本寂此段開示總為凡小顯唯識理復有迷謬唯識理者至或執離心無別心所復有下三別破四執初句總標迷理或執下別明四執初增益謗即有宗依十二處教執心境俱有次損減謗即清辨依密意空教撥識亦無三迷體用即大乘一類菩薩言八識體唯是一如一水鏡多波像生四迷王所即經部覺天所計以經言士夫六界染淨由心無別心所雖於蘊中亦言心所但於識上分位假立無別實有為遮此等種種異執至得如實解故作斯論為遮下結破種種異執指上四師今明實無外境唯有內心體用條然王所宛爾則令四執氷釋真唯識量理成此結亦兼前迷謬二空及謬執我法者種種之言該之令於下總結三段作論所由第二正宗依教廣成分此釋天親三十頌初二十四行明唯識相次一行明唯識性後五行明唯識行位初明唯識相先假問起若唯有識云何世間及諸聖教說有我法此之一問以唯識對我法互相迭難以為問端上根利智者於此問下即便了然既言唯識云何得有我法悟知心外無境如良馬見鞭影即歸正道何煩論主殷勤秖為中下之機未契障重執深聞不能解是以大士大悲不已巧智無邊假立賓主互為砧鎚舉頌拈出此問乃一論之提綱立義之關鍵破執之前矛邪正之權衡也頌曰由假說我法至謂異熟思量及了別境識舉頌答中初六句先總標三能變前三句略明所變我法次三句略明能變三相異熟即第八識思量即第七識了別境即前六識第八具有三名阿賴耶異熟一切種今不言餘二獨標異熟者異熟果報義最顯故第七梵語末那唐言意思量乃功能今不舉名唯標思量者思量性相力最勝故前六各有別名了別是用今不列諸名總標用者以總用能該六別體故論曰世間聖教說有我法至我謂主宰法謂軌持論曰下釋頌先釋前三句初牒頌第一句假字有二義一無體隨情假即外道隨自妄情計我法故二隨緣施設假即聖教隨位隨緣假施設故我謂主宰者主謂主質如君主有自在力宰謂宰治如宰輔有斷割能又主是我體宰是我用言我有體用故法謂軌持者軌謂軌範可生物解故持謂任持不捨自性故彼二俱有種種相轉至轉謂隨緣施設有異彼二下牒頌第二句初句總標我種種下別釋有情命者等等十六知見一我二眾生三壽者四命者五生者六養育七眾數八人九作者十使作者十一起者十二使起者十三受者十四使受者十五知者十六見者即世間謬立我也預流一來等等那含羅漢辟支菩薩佛即聖教假名我也實德業等即勝論六句并數論等所計法也蘊處界等即內典三科并諦緣度等世出世法也隨緣施設有異者一隨世間虗妄分別緣二隨聖教逗機施設緣我有異者外於五蘊和合法上妄計實有我人眾生有情命者等內於斷惑淺深處假名施設預流三乘等法有異者外論兢生建言各別時方本際實德業等內教被機色心開合三科破迷根界異同四句料揀如是諸相若由假說依何得成如是下先徵釋第三句何字是徵辭徵出下文能變識體彼相皆依識所轉變至彼二離此無所依故彼相下次釋初句舉頌下轉釋了別者了謂了達別謂分別八識皆能了別自分所緣境故定相應者王所同依根故同緣境故定俱生滅故和合似一故如王臣主僕不相離故轉變有二義初隨因緣變施設我法識體者謂識自證分似二分即相見二分變似能緣謂之見分變似所緣謂之相分相見俱依自證起者此明用從體變如蝸牛頭二角出則似二縮則一頭彼二者指我法此者相見二分相見為所依我法為能依離所依無能依故也相見依他起過不在茲我法強設所執有咎或復內識轉似外境至緣此執為實有外境或復下次隨分別變執實我法先約法釋初一句標似外境者謂似我法非外似外我法下二句轉釋分別熏習者我執等三種習氣也由無始虗妄熏習令諸識生起還變相似妄我妄法此我下二句釋妨問云既言內識轉變此不在外何由似外境耶通意可知諸有下結過次舉喻以喻合法愚夫所計實我實法至所依事故亦勝義有愚夫下結判先約假實判亦兼釋前頌中假字徧計所執實我實法情有理無此虗假之假內識所變似我似法隨緣施設此緣假之假外境下約有無判外境非如識之有內識非如境之無此約外境內心判有無由此一句遮過境依下約二諦判問情計外境是無緣起內境是有與識何別釋云境唯俗有識通真俗故云亦勝義有事即體也云何應知實無外境至實我實法不可得故云何下廣釋所變我法先總徵總釋如何實我不可得耶如何下別破我執先徵諸所執我略有三種至潛轉身中作事業故諸所下先敘我大小不定三量文中雖列三執即外道四句中我大色小色在我中色大我小我在色中二句初句略標三種三執皆敘似能立量初計我量是有法體常周徧宗隨處造業受苦樂故因喻如虗空次計我量是有法不定宗隨身大小有卷舒故因舒之大如修羅卷之小如蚊蚋取下破中喻如𬃖籥風三執我量是有法至細宗潛轉身中作事業故因喻如一極微潛轉身中作事業者謂時乎在眼見時乎在耳聞或手舞或足蹈等初且非理所以者何至所修證法一切我合故先破初家初句總斥次徵起先牒執迴彼宗因為我因宗立量破之以彼所執常徧宗破彼後半句隨身受苦樂因徧則不局身中常則不受苦樂又以彼常徧宗破彼初半句能造業因常則無動徧應無轉徧故如何隨身常故如何造業因能成宗因既被破宗義寧立次約同異破先立兩關若謂我同則作受應通一切此成善惡無分過因果相違過解脫應通一切此成凡聖混濫過若謂我異此中仍約體徧破異若是徧則成彼此相雜過若言異不相雜仍復徧義不成又約一人作受應名一切作受應有如前二過一切我處無別者無別即徧義仍約彼徧義破若作受不通一切仍復徧義不成若謂下牒救詞此約各屬為救欲遮前過理亦下破徧則必合屬則不徧合義即徧義如水乳之難分故約合破屬解脫例前凡聖混濫中亦非理所以者何至故彼所言如童豎戲次破次家先總斥次徵起文中牒彼宗因更相擊破先以宗破因我體是有法不應隨身而有舒卷宗常住故因喻如虗空次以因破宗我體是有法應非常住宗有卷舒故因喻如槖籥風槖籥鼓風具也次又一量約隨身破體一一即常也我體是有法如何可執一宗應可分析故因同喻如身下一句結責童豎相撲一起一伏以喻宗成因破因成宗破後亦非理所以者何至諸有往來非常一故三破後家先總斥次徵起先牒執破我量是有法如何能令大身徧動宗至小故因喻如一極徵徧動者即彼所執潛轉身中作事業也若謂下救以速巡救徧動我雖小是有法似徧動宗速巡身故因喻如旋火輪破中以往來因破彼常一宗往來即速巡也我體是有法非常一宗有往來故因喻如旋火輪旋火不局一方輪相定歸生滅以救家似能立三支迴為我真能破又所執我復有三種至三者與蘊非即非離次敘我即離俱非三種文中雖列三執即外道四句中即色是我離色是我二句合前大小成四句五蘊展轉成二十句三世成六十并根本斷常成六十二句也此俱有宗犢子部中所執諸部論師共推不受呼為附法外道初即蘊我理且不然至故彼所執實我不成初破即蘊先總斥次立量總破五蘊我是有法非常一宗即蘊故因喻如五蘊五則不一蘊歸生滅蘊非常一我亦應爾下別破先立量破色蘊內諸色是有法定非實我宗有質礙故因喻如外諸色內諸色即五根四大外色即五塵諸法次立量破受想行識四蘊心心所法是有法亦非實我宗不恒相續待眾緣故因喻如電瓶電不恒續瓶假輪繩以喻心心所法眾緣隨故有起滅故後立量破餘蘊餘行即不相應行餘色即法處所攝色此二猶是色行二蘊攝故餘行餘色是有法亦非實我宗非覺性故因喻如虗空以喻餘行無體性餘色無覺知次立量破離蘊離蘊我是有法理非實我宗無作受故因喻如虗空後立量破俱非蘊俱非蘊我是有法非實我宗非即非離蘊故因喻如缾瓶無覺知非即內蘊瓶有色質非離色蘊瓶非即離非是實我我亦應然依蘊立者如依杌方疑是人非人又既下重牒破非即蘊故不可說有為非離蘊故不可說無為有為是我無為非我例上說之下一句結破又諸所執實有我體至故所執我理俱不成又諸下四番徵覈破彼有法宗因無實我破有法無常破宗無作受破因諸字牒前大小即離等初約思慮有無兩關覈之初約有思慮立量破有思慮我是有法應是無常宗非一切時有思慮故因喻如緣慮心次約無思慮立量破所執實我是有法不能作業不受果宗無思慮故因喻如虗空下一句結若有若無俱非我體又宗因俱不成又諸所執實有我體至故所執我二俱不成二約作用有無兩關覈之初量約有作用破我體是有法應是無常宗有作用故因喻如手足等次量約無作用破我體是有法應非實我宗無作用故因喻如兔角下一句結有無不成又宗及有法俱不成又諸所執實有我體至正見翻令沉淪生死三約我見所緣是不兩關覈之我見者執我之見即乖理謬執之心若非所緣寧知有我如眼不見孰別青黃既非我見所緣故無實我若是所緣如實知故見應非倒無中執有名為顛倒若爾下引教反覆難破先四句引教次二句出毀讚辭若以有我倒見為正則令無我正智為邪豈有下反覆難破豈有無我邪見能證涅槃有我正見翻令沉淪生死耶又諸我見不緣實我至隨自妄情種種計度四約能所緣立量破我見是有法不緣實我宗有所緣故因喻如緣餘心有所緣者謂內識所變蘊然非實我緣餘心者謂緣色等眼識等我見所緣是有法定非實我宗是所緣故因喻如所餘法所餘法者謂色等諸塵初量破能緣我見如翳眼次量破所緣實我如空華二俱虗妄我皆非實是故下結然諸我執略有二種一者俱生二者分別然諸下束廣從略上文我執多種今略束唯二俱生我執無始時來至任運而轉故名俱生先明俱生起相恒與身俱者與身俱滅俱生故此正明俱生相不待等者簡異分別任運而轉者簡非隨緣也此復二種一常相續至起自心相執為實我此復下明執相常相續者能緣所緣無間轉故此執在第七識中托第八見分為本質變起相分影執為內我言自心相者即四分中一也下說準知有間斷者能緣所緣多轉易故在第六識者俱生通六七故識所變者謂本識所變也單言五蘊即聖教法相今加取者取是著義即煩惱取也總謂總緣五蘊為實我別謂五中隨執一為實我此二我執細故難斷至勝生空觀方能除滅此二下明斷位後修道中者二乘則須陀洹已上菩薩則初地已上數數修習者地地重慮緣真也勝生空觀者地前緣修為劣登地真修為勝生空觀即我執正對治數修數滅此言六七俱生地地除也分別我執亦由現在至唯在第六意識中有次明分別起相亦由外緣者兼上內因言也非與身俱者簡異俱生邪教謂外緣邪分別謂邪思惟在第六意識者第六能強思計度故此亦二種一緣邪教至分別計度執為實我此亦下明執相邪教所說蘊即實德業等所說我即神我大小即離等本質相分實我例上可知此二我執麤故易斷至生空真如即能除滅此二下明斷位分別言麤者俱生任運隱密故細分別對緣相顯故麤見道即初果初地初心生空真如即所顯理上約能觀觀此約所觀理文互見耳此言分別二執極喜無也如是所說一切我執至五取蘊相妄執為我如是下結判初約相分本質判有無自心外蘊者指上俱生分別文中四段本質境也或有者謂第七所緣第八見分第六緣識所變五取蘊相二從緣生故言或有或無者謂邪教所說蘊相及所說我相二皆妄說故言或無凡緣境以本質有無不定故自心內蘊者謂四句起自心相即心所變影凡緣境必有相分故云一切皆有是故下總結然諸蘊相從緣生故至橫計度故決定非有然諸下約依他徧計判有無四句中前二自心外蘊亦并四句自心內蘊皆依他緣生故是如幻有四句中後二所說外蘊并四句執為實我徧計橫執故決定是無故契經說苾蒭當知至一切皆緣五取蘊起故契下引證五蘊之法約眾生界說以智推之五蘊俱空經云是身如聚沫不可撮摩即色蘊空是身如泡不得久立即受蘊空是身如𦦨從渴愛生即想蘊空是身如芭蕉中無有堅即行蘊空是身如幻從顛倒起即識蘊空五蘊皆空誰為主宰良由眾生於五蘊中顛倒取著妄計有我故云所有我見一切皆緣五取蘊起實我若無云何得有憶識誦習恩怨等事實我下三番通妨顯理初約憶識誦習設難憶曾更境識現在塵誦未來事益我損我成恩成怨此以實我對憶識等迭難以明實我不無所執實我既常無變至體不離用應非常故所執下牒執破初句牒彼常執後應如前下申出常義後謂今時前謂往昔是事謂憶識恩怨等如嬰兒未閑經史壯年則習未習則無已習則有若我常恒無變則應後如前無前如後有以我前後體無別故方成常義今則不然常義安在若謂下轉救我用變易則順現事我體恒常則成己宗理亦下破體用相即用如體常仍違現事體如用變常義不成然諸有情各有本識至於汝有失非於我宗然諸下顯理本識謂第八識一類者唯屬無記相續者無有間轉任持種子即持種義更互為因即受熏義一切法謂前七轉識及名言熏習等由斯能所熏習力故得有憶識等事總不離識何有實我故所下結責於汝有失者常我不成非於我宗者唯識理顯若無實我誰能造業誰受果耶若無下次約造業受果設難以實我對作受迭難以成實我不無此二誰字意成有我所執實我既無變易至若有變易應是無常所執下牒執立量破無變易者仍牒常宗實我是有法如何可能造業受果宗無變易故因喻如虗空此以無變易因破彼造業受果宗次量云實我是有法應是無常宗有變易故因喻如電光此以有變易因破彼常宗常宗不成實我焉有變易即作受也然諸有情心心所法至造業受果於理無違然諸下顯理心謂有漏心王心所謂相應煩惱煩惱能發業煩惱能潤生由此心心所力得有作受總不離識何有實我我若實無誰於生死輪迴諸趣誰復厭苦求趣涅槃我若下三約生死涅槃迭難以成實我不無此二誰字審覈之辭意成有我所執實我既無生滅至故彼所言常為自害所執下牒執立量破實我是有法如何可說生死輪迴宗無生滅故因喻如虗空又量云常我是有法何為厭捨求趣涅槃宗非苦所惱故因喻如虗空此以彼所執常破彼輪迴厭求既許流轉還滅常我不成故結云故彼所言常秖為自害然有情類身心相續至厭患苦故求趣涅槃然有下顯理捨生趣生謂之相續煩惱即根本染心所業以思為體厭即隨煩惱心所由斯心心所力得有輪迴厭求亦不離識何有實我由此故知定無實我至愚者於中妄執為我由此下總結結中言但有諸識者由上三段顯理中皆約心心所故也故皆不離識此中破我但破外道不破餘乘且開章標敘預流一來等此聖位名字我也賢位雖未斷我已稟如來無我教故其執頗輕雖有我衣我鉢之諍不同外計大小即離姑且置之有云犢子部中所計即聖教我不然已在附法外道中收故上破我執竟如何識外實有諸法至所執外法理非有故如何下破法執先總徵總破外道所執云何非有外道下別徵外道且數論者執我是思至是實非假現量所得先破數論梵語僧佉此翻為數即慧數也數度諸法根本立名從數起論名為數論論能生數亦名數論先敘執執我是思者我謂神我以思為性即第二十五冥諦也受用薩埵等所成者謂此神我欲有所須彼薩埵等隨起覺慧造化大等為我自在受用也薩埵此云勇猛剌闍此云塵坌答摩此云闇昧敵體而言即貪嗔癡也此三即自性三德亦名勝性未生大等但住自分名為自性若生大等名為勝性有勝用故即二十五諦之初諦也所成大等等者謂此自性初生覺覺生我執我執生五微塵即聲觸色味香五微生五大即空風火水地五大生十一根初生五知根謂耳身眼鼻舌次生五作業根謂語具手足大小便道後生心平等根自大至平等即中間二十三法也然大下正明所執謂大等二十三法俱薩埵等三本事合成體皆實有現量之所緣現謂顯現明證眾境不帶名言無籌度心親得法體名之為現量謂度量是楷定之義心於境上楷定自相不錯謬故名之曰量此中三執一三合成二是實有三現量得彼執非理所以者何至如何可說現量得耶彼執下十番破斥初立量破所成非實大等諸法是有法應假非實宗多事成故因喻如軍林等多事謂三本事也既非實有亦非現量得現量緣實不緣假故此以彼三合成破非實有以非實轉破非現量得又大等法若是實有至轉變非常為例亦爾又大下二以能所互破大等諸法是有法非三合成宗是實有故因喻如三本事此以能成實有破所成非三合成次量云薩埵等三是有法亦三合成宗即大等故因喻如大等此以所成三合成破能成亦應一二三合成薩埵等即大等者由數論家執有法與有等性是一故也轉變非常者謂薩埵等能轉變成大等諸法所變大等果是無常為例亦爾者如上立量互破薩埵等是有法亦應非常宗即大等故因喻如大等又量云大等是有法亦應轉變宗即薩埵等故因喻如薩埵等又三本事各多功能體亦應多能體一故又三下三約多功能破謂薩埵等三本事能生大等諸法則各有多功能體亦應有多汝宗執能體一故體一於能能多體亦應多云何只三也能一於體體一能亦應一云何執有能成二十三法之功能也三體既徧一處變時餘亦應爾體無別故三體下四約體周徧破三體既徧者謂體既能生諸法則體徧在一切處謂此三事於一處起用變一法時應一切處俱應起用頓變諸法彼執體徧而無別故今則不爾故知體非徧也或可云一處一法變滅時餘處餘法亦應變滅以體徧無別故許此三事體相各別至故不應言三合成一許此下五破三合成一三事體相各別不應和合共成一相如三人各覇彼此不臣如何可執三合成一不應下破伏救救云未合時有三合時變為一相今破云合與未合體無別故未合體三合時寧一若謂下轉救體異者如金銅鍮石相同者色皆是黃體異故有三相同故合一今牒破成自教相違之過體相既一體應如相冥然是一體異之義不成冥然者隱密難分只應言一合成一相應如體顯然有三相同之義不成顯然者彰灼可了只應言三合成三故不一句結破又三是別大等是總總別一故應非一三又三下六約總別破總一於別應非一別一於總應非三此三變時若不和合至應失本別相體亦應隨失此三下七約一相破若謂不和合如未變時應見三相今不和合亦見一色三合成一此言謬矣若謂和合則本事三體三相俱失又與汝執三事體相各別相違進退推之二俱有咎如何可言三合成一不可說三各有二相至總亦應三如何見一不可下八約二相破彼執三事各有總相可成一大三事各有別相不失自體下約總別相即破應補一句云別即總故別亦應一如何見三以相即言之總別二相自壞若謂三體各有三相至體亦應各三以體即相故若謂下九約三相破先敘執三體各有三相者如薩埵一體即具剌闍答摩三相二體各具三相亦然今一體秖見一相者和雜難知故既有下約見一破既有三相應當見三寧見唯一今秖見一一體三相之義不成復如下約無異破若彼彼具三展轉相望三事應無差別體同名亦混如何知三事有異今既有異各具三相仍復不成若彼下約待三破既待三而成一色以驗一中原不具三又約體相相即破若體即相故三三應成九體不應唯三若相即體故秖應是三相不應言各三又大等法皆三合成至皆應無異便為大失又大下十約諸法無異破因謂三本事果謂大等法唯量即五塵五大十一根應皆無別此則自教相違過又色等諸境若皆三合成諸塵無別應為一根所得眼等諸根若皆三合成體無差別眼能得色耳鼻等亦能得色此則現量相違過又世間所見現比量所知若皆無異此則世間相違過故彼所執實法不成但是妄情計度為有故彼下總結責勝論所執實等句義多實有性現量所得次破勝論梵音吠世史迦薩多羅此云勝立六句義最為勝故先敘執六句一實二德三業四大有五同異六和合實者謂諸法實體德業所依名之為實實有九種一地二水三火四風五空六時七方八我九意德者謂道德有二十四種一色二香三味四觸五數六量七別性八合九離十彼性十一此性十二覺十三樂十四苦十五欲十六嗔十七勤勇十八重性十九液性二十潤二十一行二十二法二十三非法二十四聲業者謂業用動作義也有五種謂取捨屈伸行大有者此唯一種實德業同一有故離實德業外別有一法為體由此大有有實等故同異者亦唯一也如地望地有其同義望於水有其異義諸句相望亦然亦離實等別有自體和合者謂法和聚由和合句令法和合如鳥飛空忽至樹枝住而不去由和合句令有住等多實有性者謂此六句多分是實及有自性是現量所得之境也彼六句中亦有非實非現量得故如和合非現量得故言多彼執非理所以者何至應非離此有實自性彼執下破先總破諸句初量約能生作用破常此是法自相相違因同品中無異品中有故諸句中常住者是有法應是無常宗能生有作用故因喻如所生果次量約不生果破彼離識有性此是能別不極成諸句中常住者是有法應非離識實有自性宗不生果故因喻如兔角等兔角無實體不離徧計心故引為喻以破離識實有諸無下約質礙破諸句無常實有此亦法自相相違因諸句中無常者是有法非實有性宗有質礙方分可分析故因喻如軍林等次量以無質礙破其離識實有此亦能別不極成諸句中無常者是有法應非離識有實自性宗無質礙故因喻如心心所心心所無質礙不離自心以破彼諸句中無常法若無質礙亦非離識別有自性又彼所執地水火風至亦非眼見實地水火風又彼下別破諸句文中實德二句立量對破實句所攝地水火風是有法應非有礙非實句義攝宗身根所觸故因喻如堅濕煖動復以堅濕煖動是有法非無礙非德句攝宗身根所觸故因喻如地水火風此因犯共不定過意令實句有礙成無礙德句無礙成有礙彼此互奪兩俱不成則實德二句皆是謬立業句兼在破中地水火三準上立量地水火實句所攝青色等德句所攝立量云地水火三是有法應非有礙非實句攝宗眼所見故因喻如青色等青黃色等是有法應非無礙非德攝宗眼所見故因喻如地水火三此眼所見因亦犯共不定過準此者例上應責者意令兩俱不成故知下結先結前二量次結後二量風字是衍文例上結文應加故知無實地水火與青色等各別有性之文文無者略也無實等者正顯諸句皆謬立又彼所執實句義中至如麤地等應是無常又彼下立量破實句中常法實句中有礙常者是有法應是無常宗皆有礙故因喻如麤地等有礙者即地水火此是有法自相相違因諸句義中色根所取至許色根取故如地水火風次量破諸句中無質礙法無質礙法即實句中空時方我意德句堅等諸句中無質礙法是有法應皆有礙宗色根所取故因喻如地水火風此亦有法自相相違因又彼所執非實德等至非有攝故如空華等又彼下立量破諸句離識外別有自性二量如文可立非實德等謂非實所攝德業也非有實等者謂非大有所攝實等三句也彼執諸句其體定異故彼此不相攝以空華石女為同品喻者以成實等離識之外本無非謂顯唯識也此俱所立法不成過能成立有所成立無故彼所執有應離實等至故彼有性唯妄計度彼所下立量破大有句初量許其有性破其離實等能別不極成過立量可知次量許其離實等破其非有性所依不成過離實大有是有法應非有性宗許異實等故因喻如畢竟無即龜毛兔角等如有下舉例破先一句舉能例如有非無離有之外無別有性下一句所例如何實等之外有別大有若離下反覆縱奪破上句覆縱上有法指實等下有性指大有下句反縱無法謂虗空等彼既二句奪破下一句結責又彼所執實德業性至故同異性唯假施設又彼下破同異初二句略敘外執初文實德業性即同異性也彼言同異即於實德業上論同論異復執離實德業之外別有同異性理定不然一句總破勿此下牒執家量破此亦下全申執家似能立量此字指同異性是有法非實德業性宗此言離實德業外別有體性異實等故因喻如德業等勿之一字方是破辭亦字對上大有句而來彼執離實德業之外別有大有句今同異句如之是故言亦又應下至實等亦應無別實性等乃舉例破先舉例又應二字承上若謂同異句異實德業別有則同異句非同異句攝又應實句非實句攝異實性故如德文中字句繁疊義似難明今逐字立為有法互為同喻共成三個量又應德句非德句攝異德性故如業業句例立地等下一行准此實等復立八個三支地等諸性即德句所攝堅濕煖動地等體即實句所攝地水火風以堅性為有法非堅攝宗異地體故因同喻如濕字字互為有法同喻故云更相徵詰准此者准上實德業句如實下二句牒例翻破初一句牒例由上十一量文長義廣故此一句總束牒之次一句翻破如實性等外無別實等性例而明之實德業之外亦應無別同異性若離下反覆縱𡙸破初句覆縱次句反縱彼既下二句奪破下一句結破又彼所執和合句義至由前理故亦非實有又彼下立量破和合立量可知彼許下況破設執下縱奪破然彼實等非緣離識至許所知故如龜毛等然彼下總破所緣諸句非現量境實等六句是有法非緣離識實有自體現量所得宗許所知故因喻如龜毛等彼執六句法實有自體是離識別有為我現量所緣得今以非字破之龜毛是妄意識非量所緣用為同喻以破彼六句法非現量得又緣實智非緣離識至假合生故如實智等又緣下立量分破能緣之智非現量智攝初以緣實智立量餘五例立假合生者虗妄根塵假合生故故勝論者實等句義亦是隨情妄所施設下二句結責亦字對前數論言也有執有一大自在天至亦應頓起因常有故三破大自在天先敘執即塗灰外道所計彼執此天為萬物因體實周徧常住能生諸法具此四德破中先以能生展轉逆次而破後破能生先以能生破常若能生果應是無常有作用故次以無常破徧纔生即滅無動義故無容從此轉至餘方次以不徧破實無為體徧性是真實有為不徧性非真實體既下破能生初句牒執次句破常應居一切時徧應在一切處具諸功能應頓生一切法待欲下破救救云體雖常徧具諸功能要待眾生樂欲及緣會方生故無頓生之過違一下斥違教過既待欲緣雖免頓過復違本宗或欲下破欲緣不須待亦應頓起何以故大自在天因常有故因緣具足法應頓生餘執有一大梵時方至生一切法皆同此破四例破餘執先列名敘執大梵者即圍陀論師計梵天為萬物之祖能作一切命無命物是故名常是涅槃因時者即時散外道執一切法皆從時生故時是常是萬物因是涅槃因方者即方論師方生人人生天地滅後還入於方故方是常是一等本際者即安茶論師計謂世界最初唯有大水時有大安茶出形如鷄卵周帀金色時熟破為二段上段為天下段為地中生一切萬物自然者即無因論師計一切萬物無因無緣自然生滅故此是常生一切物是涅槃因虗空者即口力論師謂虗空是萬物因別有一法是實是常展轉生一切法故空是萬物因我者即計我論師謂彼計有薩埵命者生者養育者數取趣者如是等諦實常住故眼能見色耳鼻舌身意應知亦然等者等取宿作因論等皆同此破者例上破之有餘偏執明論聲常至如瓶衣等待眾緣故五破聲論初敘執明論即五明論也謂因明聲明內明工巧明醫方明定量者楷定不易量度不謬亘煥今古故執為常由聲故表彰詮量諸法次執一切聲性是常不從緣生待緣顯發顯時方有詮表如鐘皷待桴而響金石待考而鳴絲竹待指而出文義待吐宣而顯彼俱下次破先立量破明論次立量破餘聲如文有外道執地水火風極微至雖是無常而體實有六破路伽耶論先敘執即順世外道計一切色心等法皆極微成地具四微水具三除香火具色觸二風唯觸一是故四微是實是常能生麤色言麤色者即是子微因量者即父母微最初極微名為父母聚生麤色名曰子微子微雖是無常不越父母故是實有此中四執極微是實是常能生麤色所生麤色不越因量越者超越違越言其不超不違也彼亦非理所以者何至如何可說極微常住彼亦下九番破斥先破因微先立三量破三執初量約有方分破實蟻行者行謂行伍即蟻陣也次量約無方分破其不能生果三量約有作用能生果破常又所生果不越因量至色根所取便違自執又所下四破果不越因量又所生果是有法不名麤色宗不越因量故因喻如極微則此下出相違過極微至細非眼等色根所取若謂麤果色不越因量即同極微亦非色根所取此則違自宗麤色是色根所取一者自教相違過二者現量相違過彼計因果各異能生所生不同故此下文皆約因果迭破若謂果色量德合故至如麤果色處無別故五約量德麤細相混破若謂下牒轉計量謂因量德謂麤德不越因量故非麤麤德合故似麤由斯故是色根所取所執下立量破所執果色是有法無麤德合宗同因量故因喻如極微此以同因量故之因破果色麤不成麤或應極微是有法亦麤德合宗處無別故因喻如麤果色此以處無別故因破極微細應非細麤細混然因果無辨若謂果色徧在自因至由此亦非色根所取六約果徧自因破先牒轉計徧在自因者謂所生果色徧在能生自因極微上由因微眾多不一故果可名麤還為色根所取則此下立量破果色是有法體應非一宗處各別故因喻如所在因處各別者一一極微各住自位也若謂果徧自因因體既多非一果體如因亦應非一因各別故不成麤果既如因還不成麤由此亦非色果所取二過同前若果多分合故成麤至則汝所執前後相違七約多分合成破初句牒轉計多分謂眾多支分謂果色多分合故成麤可成色根所緣之境多因下以因奪果因合足成根境何用果合成麤既多下追破本計非實則汝下結相違過前云不越因量而體是實今云多分合故非實故云前後相違又果與因俱有質礙至或應離變非一非常八約俱有質礙破有質礙即承上多分合義同處即不越因量義立量云果與因是有法應不同處宗俱有質礙故因喻如二極微俱有質礙者如木石不相過極微雖細猶有方分若謂下立量轉救云因果是有法可同處宗體相受入故因喻如沙水銅藥果受因如沙受水因入果如藥入銅誰許下直奪破法法住自位各各不相到或應下縱奪破縱許能受能入今破云受則可離離則非一入則須變變則非常既非一非常則汝宗常義自壞上計量德合徧自因多分合二同處總皆不越因量轉變計成又麤色果體若是一至但是隨情虗妄計度九約事理相違破一分謂少分一切謂全分彼即一切此即一分彼此一體得應俱得故云彼一切應如此一分不許得一切則違道理許得一切則違現事世間現觸見璧等物時唯得此邊不得彼邊故彼下結責進退即許不許也然諸外道品類雖多所執有法不過四種然諸下束廣從略先總標四執一執有法與有等性其體定一如數論等次別破先敘一執有法謂大等二十三法有等性謂薩埵等冥諦彼執非理所以者何至色等應無青黃等異彼執下立量破一切法是有法體無差別宗即有性故因喻如有性一切法即事有性即理事有千差理無二致若法即性體則無差便違己宗我德體異此則自教相違過亦違下世間相違過又若下現量相違過色若即性色無青黃異與眼現量違聲無宮商異香無馨臭異味無甘辛異觸無冷煖異則與諸根識現量俱違二執有法與有等性其體定異如勝論等二執下敘異執有法謂實等有等性謂大有性彼執非理所以者何至應如聲等非眼等境彼執下立量破一切法是有法體不可得宗非有執故因喻如已滅無非有性則同無已滅無體類虗空便違一句責成自教相違過亦違下世間相違過又若下現量相違過立量云色等是有法非眼等境宗非色等性故因喻如聲等餘聲等例立三執有法與有等性亦一亦異如無慚等三執下敘俱亦執彼執非理所以者何至而執為實理定不成彼執下破初句同前二家過次句一異相違如炎凉相別勿執體同次句一異互奪兩俱不成如水火同器自相陵滅一異是有法兩俱不成宗體同互奪故如水火一器次句意云二相極違可令同體一切諸法皆然便違世間差別故以勿字破之或同體故此之一異如鏡中水火影是假非實量云一異是有法是假非實宗和合同體故因喻如鏡中水火影而執下結破四執有法與有等性非一非異如邪命等四執下敘俱非執彼執非理所以者何至色等有法決定實有彼執下破初句亦同前過次約表遮破表謂表顯遮謂遮覆如說水冷是表詮不熱是遮詮四句皆成有過又非下一異俱非成違世過亦違下出違教過是故彼言唯矯避過諸有智者勿謬許之是故下結勿謬許者良以內外大小所立名言率多相似須以邪正定其內外空中甄其大小漸頓分其別圓則使名言纖毫不濫以義定名萬無一失以名求義萬無一得是故勿以名同雙非而謬許之謂為中道上破外道法執竟餘乘所執離識實有色等諸法如何非有餘乘下別破餘乘法執先徵餘者對大而言唯此一事實餘二則非真一執實有二執離識彼所執色不相應行及諸無為理非有故彼所下總破小乘法相五位別分七十五色法十一心法唯一心所四十六不相應行十四無為有三今但破三位者以不執心心所法離心別有故且所執色總有二種至二者無對非極微成且所下先列色法有對者對礙也二色相對互相窒礙如木石不相過根塵相對故一可見有對謂色塵及能造四大二者不可見有對謂五色根及聲香味觸小乘有宗謂極微所成大乘即是識變無對謂法處所攝色皆從對色以立其名略有五種一極略以假想觀折須彌等至極微處二極逈以假想觀析遠逈等至極微時三受所引從所防所發善惡之色得名四徧計所執執色為實從所得色得名五定果色解脫定亦魚米肉山威儀身等彼有對色定非實有能成極微非實有故彼有下先略破有對非實有此以能成破所成何以故能成極微非實有故謂諸極微若有質礙至如何可集成瓶衣等謂諸下次廣破極微非實有彼一執極微是實有二執極微是能成今初一量約有質礙破極微非實有次一量約無質礙破極微不能成有對又諸極微若有方分必可分析便非實有又諸下立量約有方分破極微便非實有有方分可分折故喻如麤色若無方分則如非色云何和合承光發影若無下約無方分破文有五段初立量破極微無方分如何成麤色承光發影者麤色也此破極微不能成麤色既能成麤色此則有方分何謂無方分極微是有法云何和合承光發影宗無方分故因喻如非色日輪纔舉照柱等時至所執極微定有方分日輪下第二舉麤色現事破以明極微有方分先引事日輪東升照柱壁等時逐日光移隨光影轉東面承光西面發影承光下牒事破所成麤色光影處既不同能成極微定有方分又若見觸壁等物時至故此極微必有方分又若下第三約現量破眼見身觸俱現量境得此不得彼者以有方分故所成既爾能成亦然又諸極微隨所住處至由此極微定有方分又諸下第四約和集成麤破不爾者應如非色無質礙如何和集成瓶衣等又彼此相涉亦不成麤由此下結既許和集成麤所執極微定有方分執有對色即諸極微至所執極微必有方分執有下第五約名實相違疏有對者障隔質礙義如木石不相過若能成極微無障隔若爾者則有對色亦無障隔則可山壁由之直度便非障礙有對此則名實相違有方分故便可分析定非實有故有對色實有不成有方下結追責本計承上能成極微有方分故定非實有故所成有對色實有不成五識豈無所依緣色五識下次破離識文先徵起餘乘徵云如上破有對非實有豈眼等五識無所依緣色耶既有依緣之色故知心外有法所依謂五根是眼識等增上所依所緣謂五塵是眼識等所緣雖非無色而是識變至即以此相為所依緣雖非下總釋所依所緣唯識所變謂眼等識雖有所依所緣之色而是本識所變現非是心外別有極微以成根境但諸識生時由內因緣種子力等於第八識上變似五根五塵眼等五識依彼所變根託彼本質境雖不親得要託彼五塵質上變作五塵相現即以彼五根為所依以彼及此二種五塵為所緣緣五識若不託第八識所變便無所緣緣所緣緣中有親疎故然眼等根非現量得至此為所依生眼等識然眼等下別明所依謂眼等根雖識變現而不同色等五塵是現量得既非現量得何以知有以能發生眼等五識由彼彼用比知是有此但等者謂此五根雖屬色法但是識上所現功能非是心外別有大種所造之色此功能言即是發生五識作用觀用知體如觀芽生比知種體故此功能在識在餘雖不可說而外求之理既非有定應許此在識非餘此能發識名眼等根此為增上依生眼識等此眼等識外所緣緣至自識所變為所緣緣此眼下別明所緣初句外所緣緣理非有故者此遮外本質非唯心境宗鏡謂能緣緣不著處此是疎所緣緣下句自識所變者此許眼等識所變相分境是親所緣緣謂能引生似自識者汝執彼是此所緣緣謂能下破能生為所緣緣先牒計謂若有法能牽引生似己相識汝執彼能引生法是此似自識之所緣緣緣似自者以相是識之自分故非但能生勿因緣等亦名此識所緣緣故非但下破所緣緣要具二支一能生二帶相非但能生一義可是所緣緣如彼論云所緣緣者謂能緣識帶彼相起及有實體令能緣識託彼而生今此雖有見託彼生且無此識帶彼相起若唯能生一義是所緣緣則因緣增上等無間此三皆有能生義亦可名此識所緣緣彼既不爾此云何然眼等五識了色等時但緣和合似彼相故眼等下破和合為所緣緣先牒計彼計和合者以五識了色等時帶彼和合相故非和合相異諸極微至勿第二月等能生五識故非和下破初明和合是假非實謂和合相非離極微外有實自體以分析彼和合相至極微時似彼相識定不生故既可分析令識不生故知和合是假非實彼和下承上非實顯非識生緣勿第下引喻證論云和合於五識設所緣非緣彼體實無故猶如第二月如眼錯亂見第二月彼無實體不能生識故非諸極微共和合位至色等極微非五識境非諸下破極微為所緣緣先牒計執家謂共和合位諸極微以微圓實體可與五識各各作所緣今以非字非之此識下一句出其所以謂眼等識上不帶極微相故此約極微破帶彼相起是所緣義今既不帶故非所緣非諸下破極微無和合上計和合位極微有和合相可與五識作所緣今以非字破之不和下一句出其所以謂不和合時無此和合相故謂極微體相合不合同故引不合以證於合非和下牒上若謂不和合時無和合相已和合位有和合相則應合與不合極微體相有異今以非字非之故和下結承上體相既無有異故合不合皆非識所緣境論云極微於五識設緣非所緣彼相識無故猶如眼根等色等極微設有實體能生五識然非所緣前破能生引三緣為例今破極微舉不帶彼相之因共成一量以顯極微非五識境有執色等一一極微至彼相實有為此所緣有執下破和集為所緣緣先牒計謂極微不和集時體微圓故非五識境共和集位彼彼相資有麤相生彼相不離極微故而是實有為此所緣有麤相生即帶彼相起義彼相實有即見托彼生義二支既具故與五識作所緣緣彼執不然共和集位至一識應緣一切境故彼執下破初句總非共和下釋謂集未集極微體一寧以共集而為所緣論云和集如堅等設於眼等識是緣非所緣許極微相故瓶甌下破轉計彼計緣瓶甌等覺相復有別生此仍救成帶彼相義今破云瓶甌等物能成極微微圓平等體無差別緣彼相識亦應無別帶彼相義還復不成論云瓶甌等覺相彼執應無別非形別故別形別非實故共和下復破轉計彼計極微亦有差別今牒破云若共和集位極微有麤相別生為此識境則共和集位一一極微各各應捨微圓小相何以應捨非麤相識可緣細相境何以不緣細境勿餘境識緣餘境故言餘者諸塵互望名餘如緣色眼識可緣聲等若餘識可緣餘一識應緣一切境故許有極微尚致此失況無識外真實極微許有下結況如文故五識所緣緣非外色等其理極成由此定知自識所變至見託彼生帶彼相故由此下顯內所緣緣由此者承上而言由前外色理非有故故知識變相似色塵等相為眼等五識真所緣緣以具見託彼生帶彼相起二義故見謂見分彼謂似色等即有實體能生識義帶有二義一者挾帶即能緣心親挾境而緣二者變帶即能緣心變起相分而緣相亦有二義一者體相相二者相狀相五識緣境於二二義中唯是後義謂於五識體上變帶色等相狀而為眼等見分所緣故論云內色如外現為識所緣緣許彼相在識及能生識故然識變時隨量大小至故說極微是色邊際然識下明識所變相非極微成謂五識變色等時隨其本質量之大小對至即現所現形量如彼本質非別變作眾多極微然後和合共成一物為執下釋妨妨曰識變色等頓現可爾經說極微寧不相違釋云為執麤色有實體人佛說極微令其除折非謂實有極微諸師乘教以假想觀七分七分漸除至不可析又妨云前說極微定有方分是可分析今何又言不可析耶釋云雖此極微等故說下如楞嚴云汝觀地性麤為大地細為微塵至隣虗塵析彼極微色邊際相七分所成更析隣虗即實空性故說極微是色邊際由此應知諸有對色皆識變現非極微成由此下結成已唯識斥彼外計餘無對色是此類故至而可說為真實色法餘無下破無對色先例破或無下立量破餘無對色是有法定非實有宗許無對故因喻如心心所表無表色豈非實有表無下破表無表色表者表彰表顯也即身口二業彰顯心之善惡也無表即意業餘乘徵云有表色聲二塵攝無表法處色攝此諸色法豈非實有此非實有所以者何且身表色若是實有以何為性此非下總破總徵且身下牒表色中身表徵問若言是形便非實有可分析故長等極微不可得故若言下別破身表先破形形即長短形量有宗計形為身表分析長短形量至極微時極微上形量不可得故若言是動亦非實有至滅若待因應非滅故次破動動謂動作即屈伸俯仰等正量部計動為身表初生即滅不至餘方諸動轉義不可得故俱舍云身表許別形非行動為體以諸有為法有剎那盡故有為下二句展轉釋成云何纔生即滅耶有為法滅不待所因譬如電光即現即滅云何法滅不待因耶緣合名生緣離名滅滅若待因應非滅故若言有色非顯非形心所引生能動手等名身表業次破心所引生先敘計非顯謂非青黃等顯色非形謂非長短等形色意謂有色非形顯攝是心力用所引生者由此能動手等名身表業也理亦不然此若是動至非顯香味類觸應知次破動義如前破動因即風風性無體何所表示又風屬觸觸唯無記不通善惡瑜伽論云身語表業通三性故非顯下例餘二塵亦非身表上明色觸此例香味聲唯語表則知五塵皆非身表業也故身表業定非實有故身下結破然心為因令識所變至表示心故假名身表然心下申正義大乘約心變即異小乘心謂第六識謂第八謂以意識為因動身發語獨為最故令本識所變手等前滅後生相似相續轉至餘方雖非實動似有動作表示心之善惡假名身表非謂離心別有也語表亦非實有聲性至外有對色前已破故語表下次破語表初句直破非實一剎下釋一剎那聲雖是實有其相至微無詮表故此句縱其實有奪其詮表多念下一句縱其詮表奪其實有外有下例前聲屬有對前已破竟今不應執然因心故識變似聲至假名語表於理無違然因下申正義准上應知表既實無無表寧實表既下破無表以有表例破然依思願善惡分限至現行思立故是假有然依下申正義思即徧行中思願即別境中欲謂第六識相應若善若惡思欲分齊定限動身發語獨為最故依此假立無表之名謂此下別分釋此字謂無表善惡身語是所發思種是能發增長謂種子將發現行時成熟位也若發則屬有表今於將發猶名無表此依散心通善惡位釋定中約現行思造作位立者以定中現行相不外彰唯己獨知亦名無表此以定心善位釋若種若現俱依思立故非實有世尊經中說有三業撥身語業豈不違經世尊下先設難約三業一有二無設難今但言心撥無身口豈不違經不撥為無但言非色至異熟果故亦名為道不撥下釋初二句直答言非色者謂皆思為性也能動下明三種思皆名為業審謂審慮思決謂決定思意謂第六識此二思與意相應能作動意說名意業若思體動作名業此持業釋若身口意三之業此依主釋起身下釋業字義思名業者造作為義是審下釋異名此之身口是審決思遊行履踐故又身口現作善不善因能通能生未來苦樂之果履故通故名道道猶路也通也輔行引成論問云何名業道答意即是業於中行故故名業道前行後三中後行前七中三是業非道七亦業亦道意即是業者意地思也於中行者行身等也故知身等為意所行名為業道前行等者辯起先後將教所列對起先後文列次第身口居先意三居後起之次第意三在先身口居後先起意地故云前行文列在後故云後三後動身口故云後行文列在前故云前七中字但是助句而已云在此七及三中耳然論文意三是業非道者非身口故亦業亦道者身口二業為意業所行故復名為道今文義立意為能通亦得名道是故後三通至身口故云而能通七前七是業復為意行是故論云亦業亦道故前七業道亦思為自性故前下結成不唯意業思為自性身語二業體亦是思七業者身三口四善惡業也或身語表中思發故假說為業思所履故說名業道或身下復釋身語二表上約能動身發語之思名業此約所發身語表假名為業由內思發故思所履故雙名業道此約依主釋由此應知實無外色唯有內識變似色生由此下結色唯識變上破色法竟不相應行亦非實有至但依色等分位假立不相下破不相應先釋通名相應者和順義謂此非能緣故不與心相應非通善染不與心所相應又非質礙不與色相應又有生滅不與無為相應揀四位法故名不相應謂得非得同分命根無想定滅盡定無想異熟生住異滅名身句身文身共有一十四初總破總徵下三句釋非實所以非如下一句以明非實有體非異下一句以明非異色心別有用由此句結但依下明依色心分位假立此定非異色心心所至如餘假法非實有體此定下約三量釋成前三義初量云此指得非得等是有法非異色心心所有實體用宗許蘊攝故因如色心等喻此以非異色心等宗顯此非異色心別有用也次量仍以此字為有法此以心心所等所不攝故因顯此定非實有體也後量亦以此字為有法此以餘假法喻顯此依分位假立也餘實法謂色心等餘假法謂鏡像水月等依形質真月假立也且彼如何知得非得異色心等有實體用且彼下別釋得非得先大乘問契經說故如說如是至成不成言顯得非得契經下餘乘答補特伽羅此云數取趣十無學法者正語正業正命是戒蘊正念正定是定蘊正見正思惟正精進是慧蘊正解脫是解脫蘊正智是解脫知見蘊此十即無學五分法身也成不成下結經所說二成言正顯於得二不成言顯於非得故知實有體用也經不說此異色心等至現在必有善種等故經不下破初句斥引經不當亦說下引例破七寶者主兵臣主藏臣女寶象寶馬寶此即他身如意寶輪寶此即非情若謂得即成就豈輪王實成就他身及非情耶若謂下遮救初句牒救詞於善下斥若謂輪王於寶有自在力假說成就於善惡法亦有自在力何不許假說成就而執為實得耶若謂下復遮救初句牒救詞寧知下斥若謂七寶是現在可假說者寧知善等非是現在有次句反釋現有理無實法離現有故現在一句轉釋善等種是實非假此言善惡種子是現在法而是實有非是假說云何執七寶是現在而要假說耶七寶現在而可假說種子現在亦應是假如何執為實得又得於法有何勝用至若待餘因得便無用又得下推詰破初一句詰問若言下詰破若言有情具此得故能起一切法者不勞修證應起無為而成聖道又一切無情無得應永不起如何現見草木春生夏長耶又未得已失皆無得應永不生云何亦有未得而得已失復得耶若俱下遮救若謂未得已失雖無現得由有無始俱生得為因所以後時復起破云是則同彼外道一因論便違自教因緣二生又得具三性三性應頓現前救云雖具三性須待若善若惡餘因方起今破云餘因自生得便無用若得於法是不失因至故得於法俱為無用若得下破不失因轉計云得是法之不失因法者即善惡業法得謂得繩輔行七之三準於有部立以得得漸以後得得於前得故使往業能至未來故有部中業入過去得至未來身死得謝未來報起如一業成以一大得得於業法又以小得得於大得第二剎那以三大得得前二得及以業法初念之得俱成法故又三小得得前三大并初剎那九法成就第三剎那二十七法此之得義出自法相釋作無作假使百千劫所作業不忘者以由得繩不斷使之然也故云不失一切有情以此為因成就善等諸法諸可下破成法是有情成於得何為得實無故非得亦無得實下例破非得然依有情可成諸法分位至三現行成就然依下申正義初明得三種成就正顯於得所有染汙法諸無記法生得善法不由功用而現行者彼諸種子若未為奢摩他之所損伏若未為聖道之所永害若不為邪見損伏諸善如斷善根者如是名為種子成就若加行所生善法及一分無記法生緣所攝受增盛因種子名自在成就若現在諸法自相現前轉名現行成就翻此假立不成就名至於諸聖法未成就故翻此下明非得未成就正顯非得如文此類下指廣結略舉一蔽諸復如何知異色心等有實同分復如下釋同分同分者謂彼彼處受生有情同界同趣同生同類位性形等由彼彼分互相似性是名眾同分亦名有情同分先大乘問契經說故如契經說此天同分此人同分乃至廣說次餘乘答此經不說異色心等有實同分為證不成此經下斥引經不當若同智言因斯起故至彼既不爾此云何然若同下牒計例破先牒計智謂智解言謂詮表同分者其境均等若同智言因斯同分境均故起者例破云草木境均亦應有同分亦應起同智言今草本境均而無同分不起同智言則眾有情不因境均起同智言亦無實同分又於下約無窮責破如文若謂為因起同事欲至何要別執有實同分若謂下牒計破先牒計同事謂同所事同欲謂同願樂由同分為因方起同事願樂故知同分實有者理亦下破習以成性由性欲生何須別執然依有情身心相似分位差別假立同分然依下申正義身心相似即同義分者因也分位差別者謂天同類人同類等類各非一故方以類聚物以群分也復如何知異色心等有實命根復如下釋命根命根者識息煖三事連持一期果報不斷名曰命根此依第八種子假立先大乘問契經說故如契經說壽煖識三應知命根說名為壽次餘乘答此經不說異色心等有實壽體為證不成此經下斥引經不當又先已成色不異識至應如受等非實命根又先下舉例破立量比破色不異識前已極成煖是色法應當比知命根亦不離識先一量明若是命根不離識有命根是有法離識無別有宗不異識故因同喻如煖次一量明若離識有非是命根命根是有法非實命根宗異識有故因喻如受想行若爾如何經說三法至有此識因後當廣說若爾下三番問答釋妨初問云若壽煖皆識秖應云識經中何言壽煖識三耶義別下答雖皆是識約義言三阿賴耶識相分色名煖此識種子名壽此識現行名識如四正勤約已生未生善惡二法義說為四但是一精進住無下次問云義雖說三但唯一識住無心位既無有心亦應無壽煖云何經說而壽不滅亦不離煖豈不下答住無心位識不離身故壽煖亦不滅既爾下三問云既爾者牒上識不離身此名有心何謂無心彼滅下答無心位但滅轉識非謂第八證有此識如後引教理此識足為界趣生體至無勞別執有實命根此識下結指體遮執然依親生此識種子至住時決定假立命根然依下顯正義此字揀餘識種識字揀相應法種子揀現行彼所揀者皆非命根今取親生第八種子此種由先善惡業所引業既不同所引種子亦有差別住時隨因長短決定依此種子假立命根復如何知二無心定無想異熟異色心等有實自性復如下釋二無心定及無想異熟先大乘問若無實性應不能遮心心所法令不現起若無下餘乘答文中反答意謂離識別有實法方能遮心等不起若無心位有別實法至如堤塘等假亦能遮若無下牒計舉例破先牒計應無下舉例彼既下例破又遮下引假破實謂修定時於定加行至此種善故定亦名善謂修下顯正義先明二無心加行者謂定前方便也正在定時心心寂滅無復厭患期願是以厭期但在加行位二定差別者厭期不同若無想定但厭前六不恒行心心所若滅盡定兼厭第七染汙恒行心心所故又此二定所依不同一依外道一依聖教界地不同色界五地無色究竟作意不同一欲滅除一求暫息依此不同假立二定無想定前求無想果至依異熟立得異熟名無想下次明無想異熟此於加行位求無想果執彼天以為最極寂靜真解脫處發勝期願而希得故此與無想定有別者彼在因此唯果彼有修此無行彼屬心此屬色所有生得不恒行麤動心心所滅於此分位假立故此三法亦非實有故此下總結三法非實
