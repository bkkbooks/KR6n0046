body:
  text: 明武林蓮居弟子大惠錄如是四緣依十五處至云何此依十五處立如是下明十因先總標依處立因次句徵起一語依處謂法名想至便顯此因是語依處一語下別釋初明依語依處立隨說因謂若有法必有其名如名取相言語尋生依此語故隨見聞等詮說諸義此即能說之語為所說諸義之因故依語依處立隨說因顯揚論曰由於欲界繫法色無色界繫法及不繫法建立名為先故想轉想為先故起語由語故隨見隨聞隨覺隨知起諸言說是故依語依處建立隨說因有義下會通集論論說此因是名想見與語依處義類相同便顯此因是語依處此中十五皆言依處者即語等為言說等之所依處故無別體故下諸依處倣此二領受依處謂所觀待至或成或得此是彼觀待因二領下次明依領受依處立觀待因所觀待能所受性者如觀待手足肢節有執持往來屈伸等用應知能持手等為能受性所持物等即所受性謂觀待此令彼諸事生住成得者謂由觀待能受之者及所受樂等方能令彼善等諸事生住成得反顯若不觀待此能所受性善等諸事皆不能作而無生住成得故顯揚論曰諸有欲求欲界繫樂色無色界繫樂或不繫樂者彼觀待此於彼諸緣或為求得或為積集或求受用是故依領受依處立觀待因三習氣依處謂內外種至謂能牽引遠自果故三習下三明依習氣依處立牽引因謂未成熟諸內外種從於生位轉至熟時然後方能生自現果即此未潤習氣望彼遠果為牽引因四有潤種子依處至謂能生起近自果故四有下四明依種子依處立生起因謂已成熟諸內外種即便能生自現行果此望於彼為生起因顯揚論曰欲繫諸法色無色繫諸法各從自種而得生起愛名能潤種是所潤由此所潤諸種子故先所牽引各別自體今得生起立為生起因五無間滅依處謂心心所至具攝受六辦無漏故五無下五明依六處立攝受因由欲繫諸法無間滅攝受故境界攝受故根攝受故作用攝受故士用攝受故諸行轉如欲繫法如是色無色繫法亦爾作用約所作業用言能助現緣故士用約能作士夫言能作現緣故俱除種子者除內外種此取能為助緣者由真實見依處餘不繫法轉真實見即無漏正見無漏法謂無漏有為無漏無為總該智理也除引現行之自種此無漏現行能助引四智助證涅槃故此諸現緣皆是所依之處攝受因者攝受此諸緣成辦漏無漏法總攝此諸緣依處立攝受因謂攝下簡判攝受五成辦一切有漏色心等法攝受六成辦無漏智理法十一隨順依處至及能引得無為法故十一下六明依隨順依處立引發因由欲繫善法能引欲繫色無色繫及不繫諸勝善法由隨順彼故如欲繫善法如是色無色繫善法亦爾如是不繫善法能引不繫諸勝善法及能引發無為作證又不善法能引諸勝不善法又無記法能引無記勝法由隨順彼故是故依隨順依處立引發因現能引種種能引現故雙舉之十二差別功能依處至及各能得自界果故十二下七明依差別功能依處立定異因差別功能即色心等各別種子此種有能起能證差別勢力望所生果不相雜亂故言定異各能生自界等果者由欲界繫法自體功能有差別故能生自類種種現差別法如欲繫法如是色無色繫及不繫法亦爾能生即生起義能得即證得義各各引生自果不相紊亂故十三和合依處至皆同生等一事業故十三下八明依和合依處立同事因和合依處者從第二領受至十二差別功能和合此十一依處要由獲得自生和合故欲繫法生如欲繫法如是色無色繫法及不繫法亦爾如生和合如是住成得和合亦爾是故依和合依處建立同事因從第二觀待至第七定異共此六因皆同生住成得一事業故十四障碍依處至謂彼能違生等事故十四下九明依障碍依處立相違因由欲繫法將得生時若障碍現前便不得生如欲繫法如是色無色繫法及不繫法亦爾如生如是住成得亦爾是故依障碍依處建立相違因十五不障碍依處至謂彼不違生等事故十五下十明依不障碍依處立不相違因由欲繫法將得生時若無障碍現前便得生起如欲繫法如是色無色繫法及不繫法亦爾如生如是住成得亦爾是故依不障碍依處建立不相違因如是十因二因所攝一能生二方便如是下明二因攝十因初句標相攝次列二因菩薩地說牽引種子至所餘諸因方便因攝菩薩下引瑜伽二處論文約通局以明相攝先引菩薩地舉論標名此說牽引生起引發至如說現行穀麥等種此說下判釋論意有通有局先明能生通攝彼論所說牽引生起名能生因者此說牽引等六因中諸因緣種未成熟位名牽引種已成熟位名生起種俱攝在此二位中故此二位種名能生因雖有下簡現行通妨問云六因中現行生種亦是能生因如初二五九四因中現生種者何故唯言種子不言現耶釋曰現行生種雖有能生義而多間斷略不言之或親下兼收現行亦可名種現親辦果假立種名即如現行穀麥亦得種名據此一釋六因中現種因緣四因中現行皆名能生所餘因謂初二五九至故總說為方便因攝所餘下次明方便通攝所餘謂隨說觀待攝受相違及六因中非因緣法皆是生熟種餘總方便因攝非此二種唯屬彼二因至彼二因亦有非因緣種故非此下結會論文非此牽引生起二種唯屬二因引發定異同事不相違中亦有因緣種皆是二因攝總名能生非唯彼八名所餘因牽引生起中亦有非因緣種皆是餘因攝總名方便有尋等地說生起因是能生因餘方便攝有尋下次引有尋等地等有伺及餘二舉論標名此文意說六因中現種至能親生起自類果故此文下判釋論意有通有局先明能生通攝彼論所說六因中若現若種是因緣者皆名生起因能生因攝次句釋成能親生起自類種現果故此所餘因皆方便攝此所下次明方便通攝所餘謂初二五九及六因中非因緣法皆是生熟種餘總方便因攝非此生起唯屬彼因至彼生起因中有非因緣故非此下結會論文非此生起一種唯屬生起因牽引引發定異同事不相違中亦有因緣種皆是生起因攝總名能生非唯彼九名所餘因生起中亦有非因緣種皆是餘因攝總名方便或菩薩地所說牽引至而增上者多顯故偏說或菩下明菩薩地局攝初句牒論次句局判二種即彼二因所餘諸因即彼餘八雖二下通妨問曰牽引生起內有非能生因云何通言能生釋曰非不簡之從勝顯說又問餘八因內有非方便因云何通言方便釋曰非通取之從多顯說有尋等地說生起因至餘方便攝准上應知有尋下明有尋地局攝初句牒論次句局判生起即是彼生起因餘因應知即彼餘九雖生下通妨問曰生起因中有非因緣種云何通言生起因攝釋曰非通取之去果近親顯故偏說又問牽引中亦有因緣種何故簡之不說釋曰非簡略之去果遠疎隱故不說餘方便准上者問曰餘九因內有非方便因云何通言方便釋曰非不簡之而增上者多顯故偏說所說四緣依何處立復如何攝十因二因所說下明四緣依處立及攝十因二因文中通標論說因緣依種子立至立所緣依所餘立增上論說下先明緣依處立先引論文此中種子即是三四至如外麥等亦立種名此中下判釋論意有通有局先明種子通攝此中種子即是習氣有潤種子隨順差別功能和合不障礙六依處中因緣種攝雖現下通妨簡現行問曰四處現行亦有因緣何故不說釋曰現行雖名因緣間斷不說言四應指因言處應有九四與處互舉者以因數名處即九處耳勿以文害義或彼下兼收現行亦得名種如文如前或種子言唯屬第四親疎隱顯取捨如前或種下次明局攝或種子言唯屬第四親疎下例前通妨問曰有潤種子依處亦有非因緣法今何通取釋曰非通取之去果近親顯故取之又問餘三十一十二十三十五五處中亦有因緣種今何簡捨釋曰餘五處中因緣非不收取去果遠疎隱故捨之言無間滅境界處者應知總顯二緣依處言無下合明二緣依處初句牒論文次句釋義非唯五六餘依處中亦有中間二緣義故非唯下先明二緣通攝非唯五六餘十三依處中亦有等無間所緣緣義故或唯五六餘處雖有而少隱故略不說之或唯下次明二緣局攝唯局五六故餘處下通妨問曰餘十三處亦有中間二緣何故不說釋曰非不取之少隱不說其增上緣義通諸處故今釋文略之如上論云依所餘立增上故論說因緣能生因攝至初能生攝進退如前論說下明四緣攝十因二因先引論文相攝文無十因者二因攝故文中增攝受因者攝緣盡故雖方下通妨問曰方便因中具等無間所緣緣增上三緣何故唯言增上釋曰方便中增上多故偏說又問能生方便中亦有無間所緣何故唯言攝受攝二緣釋曰攝受中二緣顯故偏說初因緣能生因攝問曰能生因中亦有非因緣何故通取釋曰因緣顯勝進而取之又問方便攝受中亦有因緣何故簡捨釋曰二因雖有因緣隱少退而捨之所說因緣必應有果此果有幾依何處得所說下明因緣得果此問有三上已明十因四緣一問因緣和合必應有果次問果數有幾三問果之依處果有五種一者異熟至謂除前四餘所得果果有下先答果數初句總標五種次句列釋一異熟果諸不善法於諸惡趣受異熟果善有漏法於諸善趣受異熟果一自相續無記謂真異熟二異熟生無記謂諸轉識此二總名異熟若單言異熟不攝別報言異熟生總別皆是二等流果一真等流習不善故樂住不善不善法增修習善故樂住善法善法增長二似等流或似先業後果隨轉如殺生者多病短命救贖生者安樂延年三離繫果八支聖道滅諸煩惱斷障所證善無為法若諸異生以世俗道伏諸煩惱不究竟故非離繫果四士用果諸有一類於現法中依止隨一工巧業處起士夫用所謂農作商賈書畵筭數占卜等事由此成辦諸稼穡財利等果五增上果增勝殊上有力無力等若眼識等是根根等增上果乃至意識是意根增上果眾生身分不散不壞是命根增上果二十二根各各能起自增上果瑜伽等說習氣依處至所餘依處得增上果瑜伽下答果依之處先引論習氣處言顯諸依處至不爾便應太寬太狹習氣下判釋論意有通有局先明通得論言依處得果者不可如文取義此顯十五依處中通能得五果則寬狹得中若必如文謂不爾者便應太寬太狹四處得四果此則太狹十一全分得增上此則太寬或習氣者唯屬第三至習氣亦爾故此偏說或習下次明局得習氣唯屬第三習氣依處雖異下通妨問曰感異熟之牽引因餘處亦有此處亦有非牽引因何故通取此處簡餘不取耶釋曰感異熟之牽引因去果相遠習氣依處亦相遠此由感果親顯故偏說之餘處疎隱故偏捨之此對有潤種子依處去果近故言此遠又此習氣感異熟果異時而熟故生報後報有異是故言遠隨順唯屬第十一處至隨順亦爾故偏說之隨順唯屬第十一隨順依處雖等下通妨問曰餘處亦得等流果此處亦得非等流餘果何故通取此處簡餘不取耶釋曰感等流之引發因招同類殊勝行相最顯隨順依處例之亦招同類相顯故偏說之真見處言唯詮第十至而此證離繫相顯故偏說真見唯詮第十真實見依處雖證下通妨如文士用處言唯詮第九至而名相顯是故偏說士用處唯詮第九通妨如文此真見士用二俱言詮者非全屬故如前云攝受五辦有漏法攝受六辦無漏故不言因者六處共故所餘唯屬餘十一處至餘已顯餘故此偏說所餘依處唯屬餘十一處雖十下通妨問曰十一處亦能得餘四果餘四處亦能招增上何故偏言十一得增上不言餘耶釋曰十一多招增上餘四處已顯餘四果故此偏說如是即說此五果中至十因四緣一切容得如是下答因緣得果若異熟果善惡業感故五因增上緣得若等流果親疎緣互助故七因及因緣增上緣得若離繫果了因所了故五因增上緣得若士用果義有寬狹故初家四因增上緣得次家八因三緣得若增上果體通一切故十因四緣通得傍論已了應辯正論至生淨現行應知亦爾傍論下釋緣生相先結前起後本識下先明識種為緣生現初句標種作三緣生現現生現是等無間此種生現是故除之謂各下釋謂各親種於自現果而作因緣種於第八及彼觸等為所緣緣第八及觸等能緣種子故種於彼現有能助力或不障礙為增上緣生淨下例淨種生現三緣亦爾現起分別展轉相望容作三緣無因緣故現起下次明現為緣生現先總標八現分別前後相望作等無間意識緣餘識第七緣第八作所緣緣此識望彼識有能助力或不障碍自他相望作增上緣無因緣者此唯約現皆從自種生故謂有情類自他展轉容作二緣除等無間謂有下次別釋先明自他為緣諸有情類自他相望他心通者能緣彼心作所緣緣彼此有能助力作增上緣除等無間者自他隔故自八識聚展轉相望至五識唯託第八相故自八下明自聚為緣自八識聚彼此互望有能助力或不障碍定有增上無等無間者非自類故所緣緣下先總標有無八於七有者第七能緣第八見故第六能緣心法故前五以第八相分為所仗質故七於八無者餘七非八所仗質故第七於六五無一有者五識唯緣外色是故言無第六能緣意根是故言有餘六於彼第七無者第七唯緣第八不緣前六故第六於五無者五於外轉不緣內故唯託第八相故餘五於六有者第六能緣十八界故自類前後第六容三至能熏成彼相見種故自類下明自類為緣第六前後容三者後念得緣前念是所緣緣前念引生後念是等無間得不障碍助後令起是增上緣非種生故無親因緣餘八七五唯有等無間增上更除所緣緣不緣已滅取現境故許五後見緣剎那過去相者五七前後亦作三緣以前識相分為後識所緣故前七於八所緣容有能薰成相見種者前五薰八相分種第七薰八見分種第六雙薰相見種故為彼第八所緣境故同聚異體展轉相望至勿相分境不同質故同聚下明同聚為緣心與心所和合似一名為同聚相用各別稱為異體即心心所展轉相望有能助力唯有增上而無所緣所仗質同不相緣故或依下簡判所緣緣有無先標或依見分說不相緣依相分說有相緣義謂諸下釋義謂各相分互為質起如識下例明如本識中所持種子為觸等五似種相所託之質觸等與識所緣等故無色觸等有所緣故親所緣緣定應有故若不爾者無色既無器界根身觸等應無所緣境故設許變色亦定緣種勿相分境不同質故觸等定應變似種相故諸相分互為質起有相緣義同體相分為見二緣至但說現起互為緣故同體下明同體四分為緣由上從廣以至狹此中從疎以至親相分為見增上所緣見分於相但為增上相分必無能緣用故見於自證容作增上所緣自證於見但有增上見通非量不能證故第三第四俱作二緣展轉更互相緣俱通能緣所緣故上約同聚王所種子相分彼此可互為質緣此中同體四分不依種子相分說但說現起四分互為緣故非相分等定俱互為所緣故言見分不為相所緣自證不為見所緣淨八識聚自他展轉至相分理無能緣用故淨八下明淨識為緣淨八識聚現起分別若自若他自類前後異體同體展轉相望皆有所緣淨心心所能徧緣故唯除見分非相所緣相分理無能緣用故自證亦為見分所緣淨見屬現量故既現分別緣種現生至現種於種能作幾緣既現下例問現種生種初句牒前種現為緣生現分別次句例問種子亦應從現從種起現種一句正問現及種能作幾緣生於種子種必不由中二緣起至於非親種亦但增上種必下答初句先簡等無間所緣緣次句釋成得現起心心所立中二緣故現於下明種由親因緣增上緣起初二句以現為緣生種次二句以種為緣生種皆約親疎具緣雙隻如文依斯內識互為緣起至況違教理何固執為依斯下結斥前問若唯內識都無外緣由何而生種種分別故此結云內識為緣等即頌所謂以展轉力故彼彼分別生雖分別言總顯三界至如餘論中具廣分別雖分下指廣雖分別言顯心心所而隨勝者諸教立門不同顯示差別二謂真識現識三謂業轉現四加智識五加相續識等餘論廣說雖有內識而無外緣由何有情生死相續雖有下次申第三頌結顯歸源廣明唯識以成前義明生死亦不離識初句領前次句問後眾生生死輪轉隨業受報皆假外緣若無外緣由何生死相續頌曰由諸業習氣至前異熟既盡復生餘異熟頌曰下舉第三頌答論曰諸業謂福非福至此顯當果勝增上緣論曰下釋有四番今初解先釋初句福業謂能感善趣異熟及順人天受善業非福業者謂能感惡趣異熟及順三塗受不善業不動業者謂能感色無色界異熟及順色無色界受善業對欲散動得不動名福非福等即果報相以果名因也因即黑白上上白業此三種業皆以思為體性餘心所法立眷屬名同招引滿異熟果故俱名為業真異熟果酧牽引業異熟生者唯酧滿業此雖下釋習氣名問曰業生即滅何能感果釋曰業雖即滅無招果義然薰本識起自功能即此功能說名習氣是業氣分薰所成故簡曾下簡非現在實有簡非過去曾業是業氣分簡非現所作業如是下正明為緣感果如是習氣數數灌溉至成熟時招異熟果此業習氣正顯能感當果勝增上緣相見名色心及心所至業招生顯故頌先說相見下釋次句一者相見謂即取彼實能取實所取故名二取二者取名色色者色蘊名者四蘊即是執取五蘊為義前所言相中亦通取無為以為本質故今此唯顯取親所緣不能緣得心外法故又變無為之相分影亦是名所攝不離心故三者取心及心所法一切五蘊法不離此二故四者取本末謂取親果第八識是諸異熟之根本故又總報品故名為本餘轉識等異熟是別報品故名為末即取一異熟也彼取者彼上四取此上諸取皆二取攝即是現行之二取也彼所下釋習氣名初彼字即能熏現行後彼字即所生現行初後即能熏所生本識上功能即所熏能生文舉初後以顯其中功能差別名為習氣此顯下正明為緣感果此二取習氣正顯當來世異熟果心及彼相應諸親因緣種俱謂下釋俱字謂業種與二取種俱此明增上緣與親因緣互相助義問頌應親前疎後文何反之答業種雖疎招報實顯故頌先說前異熟者謂前前生至謂後後生業異熟果前異下釋後二句異熟果謂現在總報或即前一生業感或二生三生前業乃至百千生前業感合名前前餘異熟謂當來總報對前名後或二生多生業感合名後後雖二取種受果無窮至何假外緣方得相續雖二下通妨伏問曰二取種子於熏處即生生處即熏生生不已受果無窮頌中何言異熟既盡雖二取下答初一句牒問業習氣下一句總答如因戒善今報人天若不更脩人天果盡惡因苦果例此而言償足自停故言既盡由異下轉釋由異熟果一句釋有盡一者性別業通善惡果唯無記因果性殊不多相順二者難招業雖招果然必異世果方成熟故業習氣有盡如沉麝伊蘭有萎歇故等流增上一句釋無窮一者性同因果無殊體性相順二者易感因果同時互相生故此念熏已即能生果故二取種易感無窮等流增上二兼舉者增上果寬等流亦有等流者種與現行為俱生因種望自類種為同類因故增上無別體即等流性故又是等流果故性同是增上果故易感又二取種望自現行是增上望自類種是等流業種望彼現行及種皆異性故但是異熟由感當來餘生業等種子成熟於今身中前異熟果受用盡時即是此身臨命終位彼所成熟之業復別能生餘異熟果先業盡處後種熟時其異熟果而得復生所以生死不斷絕也由斯下結答由此業果相續無窮何假心外之緣方得生死相續此頌意說由業二取至心心所法為彼性故此頌下總釋頌意由業二取生死輪迴業以思為體二取即心法故皆不離識雜心心所無別性故復次生死相續由諸習氣至作有為法各別因緣復次下第二解先總標生死相續由三習氣次別釋三相一名下初句標名由名言氣分熏習所成故名習氣因名起種名名言習氣謂有下一句出體名言下釋相一表義音聲二顯境心法隨二下結成因緣隨二名言所熏成種作有為法各別親因緣故名習氣有為法即色心也二我執習氣謂虗妄執至令有情等自他差別二我下初句標名謂虗下一句出體問我是虗妄徧計何得熏種答因執蘊等為我之時熏蘊等種名我執習氣我執下釋相一俱生二分別隨二下結成別立義問我執即名言攝何義別立答隨二我執所熏成種令有情等自他差別故別立之三有支習氣謂招三界至於差別果是增上緣三有下初句標名謂招下出體三界異熟是所招業是能招熏成習氣名種有支下釋相一有漏善業二諸不善業隨二下結成趣別隨二有支所熏成種令異熟果善惡趣別應知下結判為緣名言習氣是親因緣我執有支是增上緣問有支業是能招可是增上緣我執種親生異熟果應是親因緣云何亦增上答令自他別故成增上此頌所言業習氣者至俱等餘文義如前釋此頌下結會頌文如文取我下結釋二取名問何故我執名言皆名二取答取我我所及取名言而熏成故皆說名取取是著義俱字指前釋復次生死相續由惑業苦至能作因緣親生苦故復次下第三解明三道輪轉初總攝生死相續由惑業苦發業下別釋三相頌云受取無明惑行有二名業除五餘七支一一皆名苦前二下結判為緣惑業二種助感生死苦故為增上緣眾苦習氣親生生死苦故作親因緣頌三習氣如應當知至俱等餘文義如前釋頌三下結會頌文惑苦即二取惑即能取苦即所取業即業種問業何不名取答取是著義業不得名俱字指前釋此惑業苦應知總攝至然十二支略攝為四此惑下明攝有支初句總標相攝次句列十二支名如論廣釋無明體謂行蘊中癡行支體謂身語意思識支體謂第八識種名色支體四蘊名名色蘊名色六處體謂內六處即六根觸支體謂第八觸全前六異熟除第七觸唯有覆故受支體謂徧行受愛支體謂三界貪取支體通取煩惱有支體取識等五及行支種愛取潤已轉名有故生支體謂識等五現老死支體生支變滅即老死支又稱十二牽連十二重城十二棘園緣生緣起四句三世十二時一剎那具十二等總此十二略攝為四一能引支謂無明行至別助當業皆非行支一能引支先總標二支謂無明行次出能引義此二能引從識至受五果種故此中下別釋二支相先釋無明此中唯取能發正感當果善惡業者後世果是所感善惡業是能感業是所發無明是能發次釋行支即彼所發正感後世善惡諸業乃名為行由此下簡別由此義故順現受業即現作現受別助當業即滿業助滿當果此二皆非行支意顯須感生報後報之業及正引當果業方是行支二所引支謂本識內至是前二支所引發故二所引支先總標五支謂本識內識名色六入觸受五種親能生起當來世中異熟果攝識等五法次出所引義是無明行所引發故問業即善惡行識等五種通色心云何言業薰五種耶答業即身口意三業有色有心故故薰色心五種於諸行中植心種子即是所引識等五種於一剎那為行所集無有所後約為異熟之種名六處支為異熟觸受種名觸受支除本識種為識支體及此三種諸餘異熟蘊種皆名色支此中識種謂本識因至六處與識總別亦然此中下別釋五支相識種通八此中識種謂本識因簡非餘七餘因皆是名色種攝餘因謂七識因皆是名種攝根身因皆是色種攝後六入觸受三因如名次第即後三種或名下約總別釋名色為總總攝五因故識及意入觸受即名中攝餘五入即色中攝餘四為別各別立因故四中隨勝亦立餘種因種名異義同文中別指者何也因約未潤言種約發現言隨勝別立故六處與識例上總別復有二重總別集論說識亦是能引至識是名色依非名色攝故集論下會通經論先會論集論說識亦是能引次句釋成感識業種名識支故問業種名識識種何攝答異熟識種名色攝故次會經經說識支通能所引次句釋成業種識種皆識支故業屬能引識屬所引問論言識屬名色此云何通答識為名色依非名色攝故論約能依名色言故說識是名色攝識等五種由業薰發至潤未潤時必不俱故識等下明五支次第問識等五種由業薰發俱時而有云何而分前後次第釋中初句牒問雖實同時次句約義而分前後識為主餘為伴名色為總餘三為別六入為勝後二為劣六觸是因六受是果聖教約此四義假說前後或依下依現起位說有前後由斯下結答現起時有前後義故於種位對現行時說初薰因位定無現行次第義故復由當來現起果位所生所引得說同時種生現果必定俱故若依識等初薰發位則不可說生引同時已潤與未潤必不俱故三能生支謂愛取有近生當來生老死故三能生支先總標三支謂愛取有次出能生義近生當來世中生老死者已潤六支合為有故即生老死親種子謂緣迷內異熟果愚至親生當來識等種故謂緣下別釋三支相謂緣迷內至五果種已此指前七支是後能生所生根本故故兼舉之謂諸有情受二種果一內異熟果此即正報二及境界所生受增上果此即依報異熟果愚謂迷理無明支由愚內異熟果於後生苦不如實知發正能招後有諸業即是行支業行為緣引發當來五果親種即識等五支又由第二迷境界所生受果愚謂迷事無明緣境界受發起貪愛即是愛支緣此愛故復生四取即是取支或發欲求或發有求或執欲取或執見戒及我語取由此愛取和合資潤能引業種及所引因轉名為有業種及因俱能近有後有果故有處下會通二論業能正感即增上緣名有種能親生即親因緣名有四所生支謂生老死至身壞命終乃名為死四所生支先總標二支謂生老死次出所生義此之二支是前三支近所生故謂從下別釋二支相謂從中有自求父母歌邏羅時至本有中未衰變來如是時間皆生支攝此後衰變壯色不停勢如奔馬新新不住念念消殞總名為老四大散壞一期報終乃名為死老非定有附死立支至將終皆有衰朽行故老非下料簡問生既別立老死何故共立答老非定有夭亡及天上皆無老故附死立支問三相立支病何非支答不徧界趣亦不定有如薄拘羅不識頭痛問老亦不定何故立支答老雖不定徧故立支次句釋成諸界趣生除中夭者將終衰朽朽即老相故名色不徧何故立支至一切一分上二界有問四空無色無想無名此二不徧何故立支答先明定六處未滿皆名色攝次明徧化生五根無用未名六處仍名色攝無色意根未明未名意處仍是名攝由斯下引證無想有色無名四空有名無色故云一切支中一分上二界有受非徧有寧別立支至經說非有非彼全無問上云徧故立支愛非徧有寧別立支次句釋不徧義答先明定定故別立惡趣眾生約彼不求苦果故言無有而言令我何時得安樂亦愛我故又生善趣定有愛故不還下問不還果人對治力強愛必不起寧得善趣定有愛耶答雖無現愛如彼取支定有種故又愛下次明徧生惡趣者於自苦身現我境上亦有愛故依無下問契經中說惡趣無愛何故今說亦有愛耶答中先通經言非全無者此顯少分亦有猶愛我故何緣所生立生老死至依此果位立因為五問所生所引因果性同何故所生唯二所引立五因位下答先明所引先標因位微隱難知差別依當果位別立五支謂續下釋相如文依此下結果位易了差別相故至分位相生說識等五果位下次明所生先標果位顯著易了差別總立二支以顯三苦生顯行苦老顯壞苦死顯苦苦俱舍云略果及略因由中可比二問前言當果五位次第望之以立識等五支果唯二支因何所望答然所生果若在未來為令有情生厭離故說生老死而為二支生即五支現起老死即五支變滅若至現在為令了知分位相生說識等五支次第何緣發業總立無明潤業位中別立愛取何緣下明惑總別問發業潤生皆是煩惱何緣發業總立無明潤業位中別立愛取一問立名不同二問廣略有異雖諸煩惱皆能發潤至而愛潤勝說是愛增雖諸下答先明用捨有別答初問發潤雖等隨位用殊發業位中無明力增故用無明而捨愛取具十一殊勝事一所緣殊勝徧緣染淨故二行相殊勝隱真顯妄故三因緣殊勝惑業生本故四等起殊勝等能發起能引能生所生緣起法故五轉異殊勝隨眠纏縛相應不共四轉異故六邪行殊勝依諦而起增益損減行故七相狀殊勝微細自相徧愛非愛共相轉故八作業殊勝作流轉所依事作寂止能障事故九障礙殊勝障礙勝法故十隨轉殊勝乃至有頂猶有轉故十一對治殊勝二種妙智所對治故潤業位中愛力偏勝故用愛取而捨無明要數下次明單複不同答次問溉灌頻數方生有芽且從初後分愛取二故複用二發起唯一無重繁義故於彼位立一無明故單用一雖取下伏問云取有四種一者欲取謂於諸欲所有欲貪二者見取謂除薩迦耶見於所餘見所有欲貪三戒禁取謂於邪願所起戒禁所有欲貪四我語取謂於薩迦耶見所有欲貪初雖能生欲界苦果餘三通生三界苦果此四通攝一切煩惱何緣說愛增長名取雖取下約勝劣偏說初句牒問而愛潤勝說是愛增從勝而言非無餘惑諸緣起支皆依自地至若現若種於理無違諸緣下簡自他地問諸支相緣唯在自地亦與他地互相緣否釋云諸支相緣皆唯自地有所發行依他無明如下地無明發上地行若不爾者初伏下染所起上定非無明發應非行支所以者何彼地無明猶未起故得彼定已方現前故問從上下地生下上者彼緣何地境界生受而能令彼貪愛現前答若從上地生下地者緣下地受而起愛支從下生上緣上例知由受種受現生愛皆不違理此十二支十因二果至或應過此便致無窮此十下簡世同異問諸緣起支同世異世釋云十因二果定不同世因現有位後果未生果在現時因必過去因中前七與愛取有或異或同潤未潤時俱不俱故已潤則受生報生報定同未潤則受後報後報便異生老死二生終歸滅愛取有三愛起必潤因中前七業定薰種故言各定同世問有說有支兩重因果而歷三世此何唯一釋云如是十二一重因果足顯輪轉及離斷常從因感果迷果行因因滅果生相續無盡施設兩重功不增勝此十二支義門別者至三相位別名生等故此十下約十六番義門分別先判假實前九是實後三是假五是一事謂無明識觸受愛五餘非一事五是下二明一多五唯一事餘非一事行通善惡名色通二六入有六取通四取有該六法生老死支具識等五三唯是染煩惱性故至假說通二餘通二種三唯下三明染不染無明愛取三唯是染從識至受生及老死七唯不染無記性故或緣此七起染假說通二行有二支通染不染屬善惡無記故無明愛取說名獨相不與餘支相交雜故餘是雜相無明下四明獨雜三是獨相九是雜相已潤六支合為有故即識等五名生等故六唯非色謂無明識觸受愛取餘通二種六唯下五明色非色無明等六唯是心法故云非色行名色六入有生老死六支義兼色心故云通二皆是有漏唯有為攝無漏無為非有支故皆是下六明漏無漏先以有為釋有漏次以無漏無為反顯無明愛取唯通不善至七分位中亦起善染無明下七明三性無明愛取不善有覆煩惱性故行唯善惡是業性故有通善惡無覆無記業種果種合為有故餘七無覆異熟果故七分位中亦起善染緣此依此起善染故雖皆通三界而有分有全雖皆下八明界繫分全欲界則全上二界分有無想唯色無名四空唯名無色及六入中唯有意處上地行支能伏下地至有求上生而起彼故上地下九明治所治上地行支能伏下地染即苦麤障妙盡離六行觀厭下欣上有求上生起彼六行故一切皆唯非學無學至生淨居等於理無違一切下十明三學諸支皆非學無學攝問聖者所起有漏善業此行豈非學攝答聖者業行智慧為緣違有支故非有支攝由此下二句釋成非行攝故問若聖不造感後有業生五淨居何業感耶答漏與無漏雜脩靜慮資助下地故業而生謂聖人以兩片無漏夾薰一片有漏練成無漏是那含業有義無明唯見所斷至餘九皆通見脩所斷有義下十一明二斷先初解無明唯見所斷要迷諦理能發行故迷諦理惑見所斷故聖必不造後有業者定無發業煩惱惑故此證無明唯見所斷愛取二支唯脩所斷貪求當有而潤生故初果以上有思惑未盡者必有此故九種命終心者如欲界命終或起欲界心或起色界心或起無色心如欲界起三心餘二亦然皆與俱生愛相應故此證愛取唯脩所斷餘九皆通見脩二斷有義一切皆通二斷至愛取三支亦通見脩所斷有義下次解初句明皆通二斷次引論證預流已斷一切一分無全斷者若無下依論斥前若無明支唯見所斷見道位中應全斷此寧說預流無全斷者若愛取支唯脩所斷見道位中應全未斷寧說彼斷一切一分又說下四句文互隔對說字不字皆貫下句論中但說全界一切煩惱皆能結生不言潤生唯脩所斷何為判愛取唯脩所斷耶論中但說惡趣行唯分別起煩惱能發不謂一切感後有行皆見所斷無明所發何為判無明唯見所斷耶由此下結此三支亦通二斷然無明支正發行者至唯脩所斷助者不定然無下釋成正義先別明三支約正發正潤者局一斷助發助潤者通二斷又染汙法自性應斷至非性應斷不違道故又染下次通明諸支斷相先明諸支二性染不染異故有斷不斷別染汙即是無明愛取及行有中不善者治障相違彼即永斷故有漏不染即是餘九有漏善業無記果報非性應斷不違道故然有二義說之為斷至無想定等唯見所斷然有下次明斷義牒上問曰若有漏善及不染汙法不違道故既非應斷云何前言皆通二斷釋中先總標有二義故說通二斷次別釋一約離縛故言斷縛謂六七二識中俱生惑初彼字謂識等五種生等二支此屬異熟果第七識相應我見等緣之為我次彼字謂有漏善第六識中相應俱生惑與彼善法雜起皆由煩惱緣彼雜彼不得解脫斷煩惱已彼即解脫依離二縛說有漏善無覆無記唯脩所斷是俱生故二約不生故言斷彼字謂惡趣行及無想定等邪行依謂分別煩惱作所依彼等生起斷煩惱已彼永不生依不生斷說諸惡趣無想定等唯見所斷是分別故說十二支通二斷者於前諸斷如應當知說十下結示斷義無明愛取依正助說通見脩所斷餘諸九支依二斷義分屬二斷十樂捨俱受不與受至十一苦俱非受俱故十樂下十二明三受十支樂捨相應除受老死如文十一苦俱受非受俱十一少分壞苦所攝至隨彼相增所說不定十一下十三明三苦十一少分壞苦所攝老死無樂依樂立壞故不說之十二少分苦苦所攝是取蘊性故十二全分行苦所攝四相遷轉故若依三受而說三苦樂受即壞苦苦受即苦苦捨受即行苦故言依捨說行苦十一少分行苦所攝老死無捨故無行苦實義下結顯實義如上若相增不定皆苦諦攝取蘊性故五亦集諦攝業煩惱性故皆苦下十四四諦相攝十二通色通心皆取蘊性總屬苦諦無明愛取是煩惱行有是業皆是能招故屬集諦諸支相望增上定有至契經依定唯說有一諸支下十五明四緣攝先通明四緣增上緣寬故皆定有餘三緣局有無不定經依定說故唯增上愛望於取有望於生至餘支相望無因緣義愛望下別明三緣不定相先明因緣愛增名取愛是取之種子能生現取有即識等五種生即識等現行種望現行有因緣義行即現起業行識即指識支中業種現行薰種有因緣義餘八相望無因緣者非親辦自果故而集論說無明望行至假說無明實是行種而集下伏問集論說無明望行有因緣義何不取之答中初句牒論次釋諸業習氣與無明俱共發行支依有支說無明緣行是增上緣依業種說種生現行有因緣義同時業種假說無明實是行種瑜伽論說諸支相望無因緣者依現愛取唯業有說瑜伽下伏問論說諸支相望皆無因緣何故前言愛望取有望生有因緣義答中初句牒論次釋現行愛取同類相望但有等無間而無因緣唯業種有而望於生但有增上無因緣義無明望行愛望於取至餘支相望二俱非有無明下次明二緣無明望行業行以思為體愛望於取生望老死皆約現行心法言前引後續有等無間後緣前心前為慮託有所緣義有望於生者業種果種而望於生生中識等心法五現果皆為能緣種為所緣種望現說無等無間緣境界受而生於愛愛緣境界亦但所緣亦種望現無等無間餘支相望二俱非有此釋且依鄰近順次至諸聰慧者如理應思此中下結示一依鄰近則異隔越越一越二越多二依順次則異逆次無明緣行等不以行緣無明等三依不相雜亂異於雜亂無明俱時業習氣而為無明四依實緣起九實三假故此中三緣約四義說異此相望為緣不定惑業苦三攝十二者至唯苦諦攝為生厭故惑業下十六明三道攝初句總標相攝無明愛取三支是惑道攝行全有一分是業道攝七全有一分是苦道攝有處下會通餘論有說業全攝有者有支通二業及苦故彼偏依業有說故有說識支業所攝者識支具二業種識種彼偏依業種為識支故伏問云十二有支皆屬苦諦今偏言惑業所招名苦何也釋中初句牒問次釋七唯苦諦不通集諦謂令有情生厭離故由惑業苦即十二支故此能令生死相續由惑下總結由前開章標云生死相續由惑業苦故今釋十二支竟結歸原文十二支即惑業苦復次生死相續由內因緣至助感生死故說為緣復次下第四解先總標次分判因緣二業為因二障為緣者此二二種但增上緣今約正助以分因緣又業招生顯故復名因所以者何生死有二至有定齊限故名分段所以下總徵總列徵意謂有漏業招感生死云何無漏業亦感生死耶次分釋二死一分下先明分段初句標名謂諸下先釋生死相善不善業為感生因煩惱發潤為助生緣三界異熟為所感果三界五趣傳傳論麤細對變易總名麤腥臊雜穢等次中分段三界迭迭論短長若身若命皆有短長有定劑限不能改轉是故名為分段生死二不思議變易生死至妙用難測名不思議二不下次明變易初句標名謂諸下先釋生死相無漏有為諸業為因由所知障助力為緣殊勝異熟為所感果賢聖高下傳傳論麤細對分段總名細次釋變易改麤身為細質易短壽為長年問既改麤為細易短為長何名生死答覺知勢盡名為死入定還資謂之生無漏資感悲願改移妙用難測無定劑限名不思議變易生死或名意成身隨意願成故至生三種意成身或名下會通異名先釋意成身初句標名次句釋義如契下引證先舉能例次舉所例如文三種意成身者一三昧樂正受意生身二覺法自性意生身三種類俱生無行作意生身如次分配三乘亦名變化身無漏定力至非業報身故不違理亦名下次釋變化身初句標名次句釋義如有下引論中問聲聞無學永盡後有何能長時度生積行乃至證成無上菩提設令爾者有應不盡答依變化身行道利生成無上覺非業報身故不違理若所知障助無漏業至如何道諦實能感苦若所下料簡一問若所知障助無漏業能感生死二乘定性此障全在為此所拘應不永入無餘涅槃如諸異生不得解脫為諸煩惱所拘礙故二問集能感苦道唯趣滅無漏定願乃道諦攝如何實能感生死苦誰言實感不爾如何至無能發業潤生用故誰言下答先答後問誰言定願實能感苦復問若不爾者義復如何答云無漏定願資有漏業令業所得現異熟果相續長時展轉增勝依資助力假說名感如是定願資有漏業感果之時非有漏業獨能感果中所知障為緣助力彼業方能感殊勝果然所下次答初問然所知障雖助感生死亦不障解脫所以者何無如煩惱有發潤用是以二乘雖有所知亦入涅槃何用資感生死苦為何用下三問生死逼迫應令速盡有何勝益翻令延長自證菩提利樂他故至乃至證得無上菩提自證下答先總標為二勝利謂不下別釋二利先舉人不定二乘自在菩薩次釋義煩惱能潤生若永斷伏煩惱則無當來苦身觀知分段報終恐廢長時脩菩薩行此利他行遂以定願資現身因令彼長時與果不絕數數資助致成正覺此自利行現身因者謂有漏業彼復何須所知障助彼復下四問既以無漏定願資現身因此足資感何須所知障助又留身久住有何益耶既未圓證無相大悲至故於身住有大助力既未下答約三義釋一由所知執相方起悲願一類迴趣二乘及大菩薩既未圓證無相大悲不能無所求中求無所度中度若不以此所知障力執取菩提有情實有無由發起猛利悲願二明留身意為斷障證理故所知障障大菩提實難卒斷為永斷除登無上覺是故留身久住三身障相依留身斷障依障立身所知障為有漏依既變易身性是有漏此障若無彼身非有非離所依有能依故故於一句結須所知若所留身有漏定願至出三界者隨助因說若所下結判簡異伏問凡所留身是分段耶是變易耶變易身三界攝耶非三界攝耶文中先答初問若所留身有漏定願所資助者分段身攝二乘異生所知境故非不思議微妙用故若所留身無漏定願所資助者變易身攝非諸凡小所知境故微妙勝用難測量故由此下次答後問由此應知變易生死性是有漏三界異熟果攝是有漏業正所得故望無漏業是增上果攝位極如來二死永亡純無漏故降此以還皆三界攝唯有漏故有聖下會通他論有說變易生死名為無漏出三界者隨無漏業資助因說頌中所言諸業習氣至俱等餘文義如前釋頌中下結會頌文俱字如前釋變易生死雖無分段至亦有前盡餘復生義變易下伏問分段生死捨生趣生可言前盡復生變易生死無捨趣義寧得前盡餘復生耶釋中初句牒問次句釋成資助改轉亦有前盡餘復生義雖亦由現生死相續至轉識間斷非異熟故雖亦下伏問現業現取亦令生死相續無窮云何但言由二習氣釋中初句牒問次句釋成而種定有現行不然是故頌中偏言習氣或為下約唯識顯示真異熟因即業種及二取種正能招感真異熟果是本識所執持故不離本識真異熟果即前盡復生總報主是前二因所招感果此異熟果種子亦不離本識故是故皆不說現現異下明簡意問何故唯取種子不取現因答現異熟因謂現起諸業二取雖能遠招來果現起時方熏熏後須潤成熟方感不即與果故問何故唯取真異熟不取異熟生答轉識中異熟生無記轉易起脫非真異熟故故俱簡之前中後際生死輪迴至由此應知唯有內識前中下例淨法初文結前次文標後謂無下釋謂本識內有無漏種由轉識薰漸漸增勝乃至究竟得成佛時捨異熟識得淨無垢任持一切功德種子盡未來際起諸妙用由此下結歸唯識若唯有識何故世尊至亦不離識所以者何若唯下次申後三頌結顯歸源廣明唯識以成前義明三性及一切法皆不離識先略問應知下略答後一句重徵頌曰由彼彼遍計至如無常等性非不見此彼頌曰下舉後三頌答初一行明徧計性我法及有無一異等全無體故如空中華翳眼見故次行初二句明依他起性諸心心所四分無自體故如幻事等眾緣成故次二句明圓成實性諸法所依真性是理體故如晴明空離有無故圓成如依他如繩徧計如蛇後一行明真俗非即非離論曰周徧計度故名徧計至理教推徵不可得故論曰下解釋先略釋初一行周悉普徧較計測度故名徧計種類若干名色各異說為彼彼即能徧計虗妄分別由此彼彼虗妄分別徧計種種所徧計物即所妄執蘊處界等若法若我自性差別蘊處界等為我法所依如契經說世間我見一切皆緣五取蘊起我自性謂橫計主宰我差別謂有情命者等預流一來等或二十句六十五句等法自性謂橫計軌持法差別謂蘊處界等實德業等有無一異俱不俱等此所下牒上明非有此所徧計蘊等法上所有妄執若我若法自性差別總名徧計所執自性如是自性如翳眼空華都無所有或初句顯能徧計識至已廣顯彼不可得故或初下次廣釋先總判頌文初句即能徧計心次句所徧計境謂依他起後二句明徧計所執非有此釋異前上解總約能所皆是徧計所執此解第二句判屬依他是所緣緣故初能徧計自性云何至自性妄執種為所緣故初能下徵釋頌初句有二解有義下初解謂八識及相應有漏攝者皆是能徧計心次二句釋成虗妄分別為自性故有似所緣能緣故說阿下別證第八是能徧計次一句釋成以徧計妄執種子為所緣故有義第六第七心品至曾無有執非能薰故有義下次解謂六七心品是能徧計次以十一句展轉釋成初一句明六七有我法執故第二句引論證意識退能徧計第三句轉釋上句意識通二名故第四句明六七有計度分別故第五句明六七與慧相應五八無慧故第六句明二執與無明俱此簡第八無無明必無二執故第七句明第七有無明無善性唯有我法執故兼簡諸心所非徧計第八句轉證上句癡善不俱故第九句明六七有二執不導空智又簡善慧心所非能徧計第十句舉斷常二執不俱起例上有執不導空智第十一句明六七有執是能薰故亦簡前五無執八非能薰句中所簡併下文一一對斥初家不應通取有漏心等不證實故至而不說唯故非誠證有漏下斥前先斥有漏心品若謂有漏心等不證實理皆名虗妄分別豈不證實心品皆是能徧計雖似下斥二取雖諸心心所皆有似二取相現而有徧計不徧計者非謂二取攝皆是能徧計勿無下以無漏例斥勿無漏心有能所緣亦應有執故後得有能所緣亦應有執故經說下引證智有能所緣身土即所緣智即能緣徧計之義四句料簡一是徧非計諸無漏心能徧廣緣都無計執故二是計非徧有漏第七唯緣第八見分計我故三亦徧亦計即第有漏六周徧計度故四非徧非計即有漏前五及第八各了自分境無計度故雖說下斥藏識緣種藏識緣三類境不唯緣種若緣種是能徧計若緣餘二此又云何故非一切總斥謬引由斯理趣唯於第六第七至徧計不同故言彼彼由斯下結示唯六七二識是能徧計問若唯六七何言彼彼釋云識品雖二謂於二法三法乃至百千法上徧計不同故言彼彼次所徧計自性云何至而非所緣緣故非所徧計次所下徵釋頌次句攝大下引論釋論說所徧計是依他起次句釋成徧計心等所緣緣故圓成下簡圓成實問真俗相依而立若依他起是徧計心所緣緣圓成寧非徧計心所緣境耶答真非妄執所緣境故眾生心處處能緣獨不能緣於般若問真俗既相依依他是所徧計云何圓成非所徧計答依他實性即圓成實徧計心緣依他依展轉說圓成亦是所徧計徧計下約所徧計對簡徧計執伏問依他是徧計心所緣緣成所徧計而徧計所執亦是徧計心所緣有何異耶答徧計所執雖是徧計心之境無實體故而非所緣緣故非所徧計所緣緣義須用實緣起法但名所徧計若有無一異俱不俱等此如空華無別實性無中妄執故名徧計所執雖同徧計心所緣執與不執而自有別徧計所執其相云何與依他起復有何別徧計下釋頌第五句舉上對顯上言依他即所徧計又言徧計所執初句問徧計所執相次句問二相差別其意正顯依他起性問有二義下第二解中一答二義俱明上伏問是能徧計此問所徧計有義三界心及心所至二取名為徧計所執有義下答有二家先初解初二句明有漏心品各各體一而似二生此是徧計所執謂見下判差別謂見相二分是徧計所執情有理無故二所依自證分體名依他起緣所生故云何下徵引聖教證成二義有義一切心及心所至論皆說為依他起攝故有義下次解初文明漏無漏一切心品所變二分皆是緣生亦依他起次文明有無一異等方名徧計所執此答兩問雙釋二相俱明所執不濫所計依他徧計自分諸聖下引證依他唯量者唯是識量一切諸識皆唯識量由所識義無所有故唯二者謂成立有相見二分故相等四法者等後三分十一識者謂身識身者識受者識應受識正受識世識數識處識言說識自他差別識善惡二趣生死識皆名依他起身識謂眼等五界身者識謂染汙意受者識謂意界應受識謂色等六外界正受識謂六識界世識謂生生相續不斷數識謂筭計一乃至無量處識謂器世間言說識謂見聞覺知四種言說自他差別謂依身差別善惡等識謂生死無量不爾無漏後得智品二分至例亦應然無異因故不爾下斥前先總破二分若謂二分非依他起是徧計所執是則因中無漏智果上後得智皆有二分應亦名徧計所執許應下別分破二分若許相分名徧計所執則應聖智見分不緣彼生若許見分名徧計所執緣相智品應非道諦不許下以無漏例斥無漏二分既非徧計有漏亦爾又若下立量反斥二分非所緣緣徧計所執體非有故應如兔角等又應下約不薰種斥若二分體非有故不薰成種後現識生應無二分又諸下牒救斥救云二分體雖非有而能薰種斥云又諸習氣是第八相分攝皆有實體若種非有體豈非有法能作親因緣若緣下約自證立量反覆例明內相見分是依他起分別緣所生故如自證等體自證等體非依他起分別緣所生故如相見二分反覆證之自證體既依他云何二分非依他起同一因故由斯理趣眾緣所生至依他眾緣而得起故由斯下顯示依他頌言分別緣所生者至皆是此中依他起攝頌言下牒頌第六句應知下釋初解染分名緣所生淨分通緣生通實理次解染淨依他能緣慮故皆名緣所生是則下結成染淨皆是依他攝二空所顯圓滿成就至然今頌中說初非後二空下釋頌七八二句初句訓釋圓成實三字圓滿簡非缺減成就簡非不成就實性簡非虗妄顯此下一句約義釋徧謂圓滿義常謂成就義體非虗謬謂實性義簡自下反簡自相謂堅濕等即地水等自相此有彼無則不圓滿共相謂無常無我等生滅不住則不成就虗空體是妄法迷妄有故我是謬執皆無實性無漏下以理簡智無漏有為謂四智菩提離倒故實究竟故成勝用周徧故圓雖亦得此名然今一句正簡頌中所說取理簡智此即於彼依他起上至真如離有離無性故此即下釋於彼等七字初一句總釋說於下別顯於彼者指依他起顯圓成依他體非即離彼言顯不相即於言顯不相離常遠離者顯妄所執二取有無一異等理非有故前者但空前妄執義顯不空依他是緣所成故性者即真如性顯二空非圓成實二空所顯乃名圓成實依他似有二空似無真如離有離無故由前理故此圓成實至則本後智用應無別由前下釋頌九十兩句初句承上總名二性非異非不異異應下分釋反明真如是彼所依實性不可離之故非異依他起性生滅無常若二性不異圓成亦應無常故非不異彼此下轉釋不異圓成唯淨境依他通淨非淨境根本智唯緣淨境後得智通緣淨非淨若此二性不異依他應唯淨圓成應通淨非淨後得應唯緣淨根本應通緣淨非淨故云二用無別云何二性非異非一至勝義世俗相待有故云何下釋頌十一句初句牒前徵起如彼下舉頌喻例明諸法共相皆無常故皆無我故行等法謂蘊界等一切諸法即蘊等法上顯無常無我等義非一非異故異應下分釋反明若無常異行等法則諸行不應無常若無常不異此法此無常性應非彼法共相彼法應非無常由斯下合法初句結成二性非一異次二句釋成法謂依他即世俗法性謂圓成即勝義二諦相待而成非一非異故非不證見此圓成實至依他起性如幻事等非不下釋頌十二句初句反標意顯證真故方能知俗未達下依標反釋此顯達徧計執空方知依他有故無分別下順釋根本智證真如已後得智了達依他如幻雖無始來心心所法至變化所成非有似有雖無下伏問一切異生無始以來諸心心所皆能緣自相見等何故云非不證見圓成不如實知依他有耶釋義如文八喻雖別總喻緣起非實依如是義故有頌言至皆如幻事等雖有而非真依如下引頌反證此中意說三種自性至是故此三不離心等此中下初句總標三性不離心謂心下釋成能變心心所所變相見皆名依他起眾緣生故皆是心分故不離心橫執我法有無一異等於依他上妄執此無實體亦不離心圓成即依他所依實性真俗相依是故亦不離心量云依他起性非有似有眾緣生故如幻事等徧計所執性相都無妄所執故如空華等圓成實性所顯真理離有無故如睛明空是故下一句結不離心虗空擇滅非擇滅等何性攝耶虗空下明義類相攝相攝之意由上標云應知三性亦不離識今以三性攝盡一切世出世法則顯一切皆不離識初攝六無為先問起三皆容攝心等變似至無顛倒故圓成實攝三皆下釋初句總明三攝次別分攝曾聞虗空等名隨分別有虗空等相數習力故心等生時似虗空等無為相現此所現相前後相似無有變易假說為常是則虗空等六唯心所變故屬依他妄執實有此屬徧計若依法性假施設有虗空等相故屬圓成有漏下轉釋上心變故屬依他能變心等通漏無漏若有漏心變者定屬依他若無漏心變者容二性攝淨緣生故攝屬依他離顛倒故圓成實攝如是三性與七真如云何相攝如是下次攝七真如先問起七真如者一流轉真如至七正行真如謂道實性七真下釋先出七真如相次明相攝流轉真如謂真如隨緣成一切法不變隨緣隨緣不變故曰流轉實性實相者無相不相名為實相我法空處真實理顯故曰所顯實性唯識真如謂識通染淨依他依他所依實體故曰唯識實性安立者謂三界以能安立三有眾生故昇沉輪轉備受眾苦苦無逼迫相即苦實性邪行者謂煩惱業行和合積集招集來果集無和合相即集實性清淨者染淨俱淨一切相滅謂生滅俱滅寂滅現前滅無生相即滅實性正行者八正道等治所治故道不二相即道實性此七實性圓成實攝至餘四皆是圓成實攝此七下正明相攝七之實性唯圓成實攝二智所緣境故隨相相攝流轉苦集此三二性攝妄執有三徧計性攝此三雜染依他起攝實相唯識清淨正行皆圓成實攝三性六法相攝云何三性下三攝六法先問起彼六法中皆具三性至皆有妄執緣生理故彼六下釋於五蘊中計有實我實法徧計所攝五皆緣生依他起攝五蘊性空圓成實攝無為同上釋亦通三性三性五事相攝云何三性下四攝五事先問起名相分別正智如如諸聖教說相攝不定至四從緣生皆依他攝諸聖下釋初總標不定謂或下別引四處不定相先引一說彼說下出意有漏心等謂染依他攝相名分別似所詮謂所說之義似能詮謂種種語言無漏心等謂淨依他能所皆戲論相離此總名正智四從下總結能變所變能詮所詮若染若淨俱從緣生皆依他攝或復有處說依他起至二無倒故圓成實攝或復下次引二說彼說下出意有漏心等相分名相餘見分及能變體名分別徧計所執二取情有理無假說為名正智真如無顛倒故圓成實攝或有處說依他起性至隨情立為名相二事或有下次引三說彼說下出意有漏心品四分總名分別所執能詮是名所詮是相復有處說名屬依他起性至體實非有假立義名復有下次引四說彼說下出意有漏四分由名勢力成所徧計故說為名徧計所執有無等隨名橫計假立義名義即相上所計種種有無等也所徧計屬依他徧計所執屬徧計此即符合前解初一頌第二番解依他義同也諸聖教中所說五事至如瑜伽論廣說應知諸聖下結判如瑜下指廣論問曰初自性五法幾所攝答都非所攝第二自性幾所攝答四所攝第三自性幾所攝一所攝等又聖教中說有五相與此三性相攝云何又聖下五攝五相先問起一所詮相二能詮相三二相屬相四執著相五不執著相所詮能詮各具三性至無漏智等為自性故所詮下釋初句總標能詮所詮各屬三性謂妄下別屬三性妄計能所徧計性攝相即所詮名及分別即能詮故云隨應屬依他攝真如謂所詮正智謂能詮故云隨應圓成實攝後得下一句釋智屬能詮義本智雖離能所後得變似能詮故二相屬相唯徧計性攝次句釋成被執著相唯屬依他徧計心等所徧計故次句釋成不執著相唯圓成實攝離執成智故次句釋成又聖教中說四真實與此三性相攝云何又聖下六攝四真實先問起世間道理所成真實至後二真實唯屬第三世間下釋一世間所成真實二道理所成真實三煩惱障淨智所行真實四所知障淨智所行真實世間真實者謂一切世間於諸事中由串習所得共施設世俗性謂地水火風色香味觸等相自昔傳來名言決定自他分別共為真實非邪思觀察所取故道理真實者謂諸正智隨觀察行者依現比聖教三量極善思擇決定智所行所知事以如實因緣證成道理所建立故煩惱障淨所行真實者謂一切聲聞獨覺無漏方便智無漏正智無漏後得智等所行境界所知障淨所行真實者謂諸佛菩薩為入法無我及已入極清淨者依一切法離言說自性無分別智所行境故世間下釋初二真實依他起攝相名分別三事攝故後二真實圓成實攝正智真如二事攝故辯中下引證世間真實徧計性攝共所執故道理真實通三性攝於理生執徧計性攝理隨染緣依他起攝無執清淨圓成實攝後二真實唯圓成攝三性四諦相攝云何三性下七攝四諦先問起四中一一皆具三性至無我所顯為自相故四中下釋先總標四諦一一具三性且苦下別釋先列苦諦下具四觀無常苦空無我一一具三無常下標無常中三皆初句出相次句釋成下皆倣此無性者謂徧計性空常無自性故起盡者謂依他隨緣起盡生滅不住故垢淨轉變者謂實理隨緣凡位隨染垢現淨隱聖位隨淨淨生垢滅苦有下標苦中三所取苦者五蘊是苦取是著義依五蘊起我法二執故云所依於五蘊執著故云所取事相苦者苦苦壞苦行苦心緣苦境苦境偪心心境合舉故言苦苦樂不常有暫時而住樂緣既謝即是壞苦無常所侵即是行苦三苦皆隨緣生故和合苦者八苦五苦等眾苦和合和合性空體不真實空有下標空中三無性者無中妄執性非有故異性者依他與妄執性相異故自性者體離妄執空所顯故無我下標無我中三無相者無我執相故異相者隨緣施設與妄執實我異故自相者無我觀所顯之理為自相故集諦三者一習氣集至三未離繫集謂未離障真如集諦下標集諦中三習氣集者徧計所執自性即所執我法等執字即能執之心習氣即能執所熏種子問能執集心此約現行云何名習氣答執我法所熏之習氣依現行假立故名自性執習氣集等起者謂煩惱發業由業增長煩惱互相為緣引起故未離繫者謂在纏真如滅諦三者一自性滅至三本性滅謂真如故滅諦下標滅諦中三自性滅者徧計自性本不生故二取滅者謂擇滅因緣二取不生故本性滅者謂真如體本寂滅故道諦三者一徧知道至然徧知道亦通後二道諦下標道諦中三徧知者能知所執性空故永斷者能斷染分依他故作證者能證實理故徧知通後二者智能徧知依他及實理故七三三性如次配釋至或假或實如理應知七三下結配三性七三三者謂苦有四三集等各三合有七三如次配釋者皆初句徧計性次句依他起後句圓成實或假或實者集唯實配餘六假配三解脫門所行境界與此三性相攝云何三解下八攝三解脫先問起理實皆通隨相各一至如次此三是彼境故理實下釋初句明一一門皆攝三性隨相下各別分攝空門徧計攝徧計性空故無相門依他攝緣生無相故無願門圓成實攝證實理已無復願求故緣此下明三門所行境界緣此三門復生三忍一本性無生忍者得此空解脫門了本性中無我人壽命畢竟不生忍可於心故二自然無生忍者得此無相解脫門了知緣起如幻無相非自然生忍可於心故三惑苦無生忍者得此無願解脫三界苦果皆由煩惱願求作有漏業若無願求苦無因得則惑苦無生忍可於心故此三云何攝彼二諦至故皆攝在圓成實性此三下九攝二諦應知下釋初二句總標世俗具三勝義唯一世俗下釋成假世俗者諸法非實但有假名隨名妄執故行世俗者三科隨緣生滅轉變故顯了世俗者如智了知情忘理顯故一義勝義此約理釋義者義理謂真如是最勝之義依主釋二得勝義此約果釋得者謂所證得涅槃殊勝當體即義此持業釋三行勝義此約因釋正智為行殊勝聖道而為義故此有財釋此三勝義皆圓成攝如是三性何智所行至圓成實性唯聖智境如是下十凡聖智攝先問起徧計下釋初句明徧計非二智所行次句釋成愚夫下明徧計亦容二智所行境愚夫執有聖者達無故依他起性通凡聖所行凡智任運緣聖智了如幻圓成唯聖境此三性中幾假幾實至不依他緣而施設故此三下十一三性假實先問起徧計下釋初明徧計假實次標依他有假有實聚集下釋聚集即因成假賴緣成故相續即相續假前引後隨故分位即相待假假他成立故皆說為假心心所法及色皆從緣生說為實有若無下伏問緣生之法體即如幻何言實耶釋此如文此依俗諦言實圓成下明圓成唯實次句釋成不假他緣性本真實故此三為異為不異耶至妄執緣起真義別故此三下十二三性一異先問起應說下釋初句總明非異非不異依他上妄執成徧計達依他性空即圓成實三無別體故非異妄執緣起真義別故故非不異如是三性義類無邊恐厭繁文略示綱要如是下指廣結略此中廣明三性通攝真俗一切法者前初問答中云三性亦不離識今三性既廣攝一切法以顯一切法皆不離識識外無餘唯識義立
