body:
  text: 重刻成唯識論自攷錄序三界唯心萬法唯識此性相二宗所由立也說者謂一心真如故號性宗八識生滅故稱相宗獨不曰心有真心妄心識有真識妄識乎馬鳴依一心造起信論立真如生滅二門生滅何嘗離真心別有體也天親依八識造三十頌明真如即識實性與一切法不一不異真如何嘗離妄識別有相也龍樹中論指因緣生法即空假中是生滅外無真如楞伽云心意識八種俗故相有別真故相無別相所相無故是真如生滅非一異而護法菩薩於識論中最出手眼直云為遣妄執心心所外實有境故說唯有識若執唯識真實有者如執外境亦是法執噫苟得此意何至分河飲水哉嘗論之性隨相轉何性不相設不徧達諸相無量差別安知玅性具足如斯染淨功能相本性融何相不性設不深知一性圓頓滿足安知諸相無非事事無礙法界故台宗劇談實相必約百界千如夫五位百法獨非百界千如之性相邪百界千如無非實相五位百法獨非實相邪若不分別五位百法真俗假實種現差別種種不同則所云點如明相迤邐不同一假一切假者不幾儱侗邪護法尅論心心所法各具四分夫相分各各不同可也見分可一向不同邪即見分各各不同可也自證分證自證分可一向不同邪若使一向不同則心王八心所五十一將一人果有五十九自證證自證分抗然角立互不相知不幾割裂紛糅邪然使心王心所惟同一自證證自證分又安得云心心所法各皆四分所成不幾墮用別體同之執邪更就相分論之且如拈一莖華此華本質如來大圓鏡智之相分也佛眼所見華成所作智之相分也佛智所知華玅觀察智之相分也此三為一為異若定異何處別有三華若定一佛眼不視時但滅成所作智相分餘二仍在佛智不緣時但滅玅觀察智相分本質仍在又眼見華時有眼識相分聞華香嘗華味覺華觸各有鼻舌身識相分佛一人既爾迦葉復有三華四微百萬人天各各皆有三華四微如是無量三華四微同在一處似如一鏡不雜不亂無二無別於百萬人天中隨拈一人相分時必攝一切諸人相分於眼等識中隨沾一識相分時必攝餘諸識相分重重無盡無盡重重是可思議邪不可思議邪一華既爾物物皆然色塵既爾六塵皆然相分有質尚爾見分寧獨不然見分通三量尚爾自證證自證分唯現量豈反不然後世弘相宗者何為自設藩域曾弗一深思也是故習性不習相未有不瞞盰者習相不習性未有不膠滯者唯南嶽思大禪師大乘止觀一書出識論未來前具闡性相幽秘蓋深證無師智耳厥後欲明心要須藉文言當知成唯識論大性學惜慈恩沒疏復失傳僅散現大鈔宗鏡諸書及開蒙二卷稍存線索國初以來竟成絕學萬曆初年紫柏大師接寂音之道盛讚此宗爰有俗詮證義集解諸書而紹法師音義為長音義未全故不流通基法主續補成疏亦頗簡要慧法主謂疏多譌復出此自考錄予謂此宗至方而至圓至而不亂至深細而非幻罔至詳明而有綱要設非玅悟莫窮底裏諸家著述固未立極亦各擅所長苟因是而求之深造自得觸著性相源頭不離只今現前一念則知三乘十二分教皆吾心識註脚與馬鳴天親同一鼻孔出氣何竢予言而知深淺得失也成唯識論自攷錄序相宗一教茅塞有年蓋耽靜者流西來不立文字之語謂撥除名相便可直證菩提於相違差別義全無智眼試思楞伽四卷是誰携來此土世界中種種名相何者不攝彼經云略說有三種廣說有八相曰三曰八離識之外更指何物我聞如是而於唯識論可置弗講耶邇時勝義上人善根居士藉此為究竟資糧者不乏然能通其義而箋釋之者僅僅數家高原俗詮之出最先不無異同之議一兩之集解王太史之證義精覈詳贍超俗詮而上覽者自知紹覺之音義絕筆於第八卷手澤具存惜非完璧然光輝之缺月固賢於朧之全月會須廣布原本以惠後來靈源慧師自攷錄之出最晚而義最豐而旨最正洵哉其盡善矣蓋論師之疏決文言猶工師之造機關木人脉絡節腠張減毫髮不得不爾便犯受一塵捨一法之過識論揉於奘師而比量即立於奘師以奘師所立之量證奘師所揉之論三支圓滿毋漏毋濫方稱合轍他家或不盡爾而慧師獨冥契斯理故曰洵哉其盡善也蓋師受紹公衣鉢之傳如領長者家業全而有之已復駐鍚燕都披閱大藏凡涉相教輙鏤心板先後研究三十餘年故能弘宣佛音等仰完器付囑學眾類瀉異瓶斯豈易易哉斯豈易易哉余於此道茫如望洋未測涯涘而沾沾嚮往不啻屠門之嚼展是錄也如入大官厨嘗一臠而知為異味𮨇自攷第自利而止若曰利他非梓弗永會海幢卓居士先獲我心蠲金而付剞劂氏從茲習唯識者執此為指南不至入稠林而墮惡塹其功德豈小補耶崇禎戊辰嘉平月之望瓶城居士閔夢得題成唯識論自攷錄序萬法雖𧷤不離能變能變維何識而已矣識與心異乎生滅不生滅和合一異葢難言之然三藏浩浩海也七為其浪而八王五十一所各有二角一頭從自證體起相見用則各以能緣託彼質變自相為所緣蒲萄暎色卷荷暎聲皆非能變外實有凡小外萬法以徧計執昧圓成實不悟依他緣生無性全妄即真此經論大綱性相合轍而學者岐之飲水分河嘻亦太甚矣成唯識論號曰相宗然如來入楞伽解深密等諸大乘修多羅其濫觴也婆藪盤豆始陷小乘計心外有法阿僧迦患之為禮足內苑而有瑜伽師地百卷之論唯識大義始暢婆藪盤豆悔於厥心遂束以妙伽陀三十而句身約矣親勝火辯護法難陀十師競加箋釋人私十卷靡定一尊唐奘師西學五天應護法遙記取十論折衷之摘其頷珠辭其鱗爪又束百以十而十師之說如出一人糅眾香為丸貫雜華成鬘則今所宗成唯識論是也靈松東指真丹始有相宗之學而慈恩一鉢鼎峙天台賢首間後不數傳寢以微滅開蒙一卷魯靈光獨存唐宋諸名家盡化子虗烏有學者遂滋異說如前七為第八見分本質名緣相分名所緣相質合名所緣緣世間人一倍瞻視而不知其自于唯識之旨當今此事不得不推我雲棲座下紹覺法師而靈源獨得其傳靈源師者勾餘仕族年未壯室以優婆塞入土橋覺師二十年口輪未嘗停轉源師入耳輒服膺朝往暮歸中途尋記其師說必如昔人所稱分水瀉瓶而後已故師歿又幾二十年其所傳習獨不謬海昌刻唯識疏則辯音師補潤覺師所為唯識音義八卷者以行心亦良苦然大非覺師之舊矣及門新伊玄箸諸師每相顧太息會源師游京師未唱善來輒以師說教北方之學者踞猊背點石頭人益知欽其所自一日見海昌疏翩然曳杖履南旋與誰昔同聞之士相論議亦復互有失得懼久而漸訛師說殆將湮泯于是獨走黃鶴山發簏中故書且讀且講且錄尊其所聞不敢一字謬戾於師說結制三月藁成題以自攷謙不敢居述作仍納之簏中挈游京師誰昔同聞之士咸謂覺師再出一披其牘不啻覺師坐土橋與諸名雋揮麈尾時也溝猶瞀儒妄意涅槃煑蔗之味游先大師門于覺師未嘗為役而心嚮𨓏之得見源師以為猶見覺師矣今年夏五蓮居請登覺師座以口輪代轉余往聽焉神觀高凝辯才遐暢土橋之聲于是乎大振謂非軍持灌口者能乎行且擐師首左臂為慈恩續一燈而學士麋集謀公其自攷者源師不獲自閟適棲水海幢卓居士來一見傾槖為剞劂之費歷四三月而成居士今之玄鑑也留心訂讐日與一二學人析疑送難豈獨以布金剞劂足多乎哉嗚呼世之潛心法王者多矣每至此宗則望崖而返富才羨智之士又往往不得其傳訛謬滋甚魯真齊贋孰與辨之吾願師盡刊當世所為異說者庶無負戒賢忍死待奘師之意不獨為土橋吐氣沾沾號一先生可也崇禎元年戊辰雪夜雲棲學菩薩戒弟子大顧若羣合十和南書于湖上瑪瑙寺之精舍成唯識論自攷錄緣起重言十七所以借重先哲之言以發己之聞見也余生三十之年尚不知有古先聖道偶一日步蓮居入先師講室得聞觀經上品上生章一歷耳根即為踊躍慶佛法中有如斯之津梁胡自甘陸沈也耶次日復往如是日復一日雖祁寒溽暑不輟立雪味道積十餘載無虗日無間時師嘗嘉我之志愍我之勤縱雲集握麈之久師必問慧至不慧至而後陞座如是率以為常三際敷揚二時慈注性相台宗一一傳習尤慨台相兩宗久沒其傳矢心必得其旨焉第恨神根暗鈍非惟聞者未及致精猶懼久而缺漏以故誦習師說朝夕乾惕向者俗緣所牽留金臺二十載雖歷塵闤未嘗不以方䇿自隨間臨講肆凡涉相宗輙多異說皆緣相質不明法指心外良可太息近代即有註釋諸家同異初無準的或云相分為所緣本質為緣相質合說名所緣緣或云根本智挾帶真如而緣為親所緣緣有漏心心所及無漏後得智見分緣境變相而緣不簡有質無質皆是變帶相狀為疎所緣緣或以前七識為第八見分或云七大中見識為第八見分或言真如為性境或以四緣配八識或以三自性配八識又以四分配八識又以四分配三自性等此皆難憑也吾先師音義八卷惜乎不獲全璧門人辯音補輯成疏刻之海昌始余獲本喜若復聆師說讀未卒業義或缺如今昔有異指眎同聞悉知其有披襟處且如釋三有為之有為相能所倒置前後文自矛盾又如東西各有一柱東柱承光西柱發影之類其謬稍多諸方咸目蓮居為正學所論著固若是乎此疏實非字字出先師筆也嗚呼同聽者尚自異聞異稟者豈能共旨今年春余歸自京邑寄錫龍居新伊一相兩兄約余同訂一準則為後學之指南暨諸法友亦欲余宣演所習自惟年耄智昏堅以疎漏為辭不獲已於一夏中且講且錄講錄並訖麤分章節詞鄙義疎不搆虗文以葢義不列繁科以適時不廣引旁而害正不騁己是而病人惟事記昔訂今用備末年尋討命名自攷錄非敢舉似大方也惴惴添足之誚是懼豈爝火與二曜爭明哉錄成閣筆為紀始末云爾旹天啟丙寅重九日大惠識
