body:
  text: 明武林蓮居弟子大惠録此識與幾心所相應至以是遍行心所攝故此識下釋相應心所門初句問起次句舉頌答阿賴耶下釋常相應義始自異生終至賴耶未空均名未轉升沉定散流轉還滅世出世間聖凡等位名一切位於此等位恆常與此五所相應此相應是遍行攝者遍一切時恆相隨轉故遍一切心諸識和合故遍一切性遍一切地通凡通聖故觸謂三和分別變異至受想思等所依為業觸謂下別釋五所先標觸體用觸謂觸對性謂體性業謂業用下皆準此謂根境識更相隨順至故說為彼三和合位謂根下先釋三和謂根境識體異名三不相乖反更相隨順故名三和觸依彼三種生又能令彼三種和合故說觸為彼三和合位位者安其生位也如位依人而得建立人復依位而行政令今依三生令三和合故說為位皆有順生心所功能說名變異觸似彼起故名分別皆有下釋分別變異變異者即生也謂剎那滅有勝功力方有能生用故謂根等三皆有順生一切心所功能說名變異分別者相似也如子似父名分別父謂觸亦有似彼根等生起心所功能故名分別變異根變異力引觸起時至但說分別根之變異根變下通妨問曰觸既分別三之變異云何集論唯說似根不言境識釋曰唯言根者從勝義說一由主有殊勝功能故二由近能近生心故三由遍不唯生心所亦生心故四由續常無間故境識不爾境雖能生心心所以非主故又非近故偏缺二義不名為勝心雖是主近生心所不能生心故非遍偏缺一義故非勝境識皆非相續唯根獨勝故集論但說分別根之變異和合一切心及心所令同觸境是觸自性和合下釋體性和合一切心心所者言總意別別謂如眼識相應觸和合眼識心心所同觸色境諸識相應觸例知此為觸體既似順起心所功能故以受等所依為業既似下釋業用既有似三和順生心所功能故與受等作所依止此是其用起盡經說受想行蘊至因二三四和合而生起盡下引證觸生心所行蘊者五十一心所中唯除受想餘四十九皆行蘊攝故言一切以觸而為生緣是故經云二和生識三和生觸四和而生受等瑜伽但說與受想思至極相鄰近引發勝故瑜伽下通瑜伽妨問曰此中言行通諸心所論唯言思何也釋義如文集論下通集論集論唯言為受依者何也答以觸生受最近最勝故謂觸下釋近勝義可意等等不可意非可意非不可意順益等等違損非順非違以凡可意者必順益故云極鄰近餘二准知引發受起比餘勝故然觸自性是實非假至如受等性非即三和然觸下判假實問云觸既由三和生應是假有今立量證知是實觸自性是有法是實非假宗心所性故是食攝故能為緣故因如受想思等六六者謂識觸受想思愛如眼識觸所生受乃至意識觸所生受等故各皆有六也以想等是心所性思是四食中攝受是十二有支中緣此三乃六六法中攝各別有體非假是實證成觸若是六六法攝是實非假別有自性非即三和作意謂能警心為性至心是主故但說引心作意下先標體用諸心通名曰意此能作動故名作意謂此下釋一者應起未起心種此能警覺令起二者已起現行此能引令趣境故名作意雖此下釋妨如文有說令心回趣異境至應非遍行不異定故有說下斥異解先敘回趣異境者正緣此境復引向餘也持心令住者專注不移也彼俱下斥斥初回趣異境應非遍行者掉舉令心易解散亂令心易緣此二大隨中攝故斥次持心令住不異定者此是別境中定故受謂領納順違俱非至能起合離非二欲故受謂下先標體用領納三類境為體起愛為用問順愛違憎云何通能起愛下句釋順境未至求其合已至希不離違境未至冀不合已至望其離故於三境皆能起愛有作是說受有二種至以境界受共餘相故有作下斥異解先敘領所緣者謂領受順等三類境為所緣者是領俱觸者以觸生受此受不納外境唯納俱生之觸即以觸為自性名自性受唯觸是受所緣自相不與心王共緣故此中受唯取第二自性受何以不取境界受以境界受通王所共緣故彼說非理受定不緣至應名因受何名自性彼說下斥初句直斥若似下約義破初句牒計次破觸是受因受即觸果若觸因生受果果即領因凡似因之果亦應領因皆應受性彼既不爾此云何然又觸是受因受既領因應名因家之受觸非受自性何名自性受若謂如王食諸國邑至違自所執不自證故若謂下牒轉計國邑喻觸王喻受食喻領納王從國邑生還食國邑賦即食自物今受從觸生領觸所生受即受自體名自性受理亦下破以彼前執領納俱生之觸為自性故不自證者如刀不自割眼不自見等若不捨自性名自性受至故彼所說但誘嬰兒若不下牒轉計謂受不捨受自性名自性受次句破一切法謂地不捨自堅性水不捨自濕性等亦皆可名自性受乎故彼下結責然境界受非共餘相至名境界受不共餘故然境下破境界受共餘相初句直破次釋此受唯領納順違三境定屬己者名境界受如王於境但能了別而非領納觸只觸對亦非領納想唯想取境像作意唯警心思唯造作等於境相上俱非領納違順等相此受領納不共餘故想謂於境取像為性至方能隨起種種名言想謂下先標體用次釋分齊相者謂方圓高下等依此像狀方起種種名言此是瓶此是衣等思謂令心造作為性至驅役自心令造善等思謂下先標體用次釋正因等等邪因非邪非正因善等等惡非善非惡此五既是遍行所攝至所緣事等故名相應此五下明王所相應遍行所攝者遍一切心一切心中定可得故故與藏識相應遍行相後廣釋者文在三能變中行相異者問云識以了別為行相觸以觸對為行相作意以警心為行相受以領納為行相想以想像為行相思以造作為行相行相既異云何相應而時下答正明相應時同者同居一剎那不前後故依同者皆以末那為俱有依故所緣等者等謂相似各變相分為所緣故事謂體事體雖各別和合似一故由二同二等故名相應此識行相極不明了至是故唯與捨受相應此識下釋受俱門先約識行相明相應捨謂不苦不樂二俱捨故以五義證知此識與捨受相應一極不明了若苦樂受必明了故二不能分別順違境餘受取違順境故三微細苦樂受行相必粗故四一類若是餘受必有易脫故五相續而轉若是餘受必有間斷故識具五義捨相亦然故與相應又此相應受唯是異熟至待現緣故非此相應又此下次約受是異熟明相應初正明異熟謂真異熟隨先善惡業引不待違順現緣隨先業轉故唯捨受苦樂下反顯苦樂反此異熟生屬前六識非真異熟不任先業要待現緣方轉故非此識相應又由此識常無轉變至故此但與捨受相應又由下三約無轉變明相應識與捨俱恆無轉變故有執藏若苦樂俱則有轉變寧得執藏由此反覆證明是故此識唯與捨受相應若爾如何此識亦是惡業異熟若爾下釋妨先問云此識既唯捨受相應則應是善業所招人天異熟如何亦是惡業所招異熟惡業所招寧無苦受若無苦受應非惡招此約三塗異熟為問既許善業能招捨受至如無記法善惡俱招既許下釋先約人天異熟例答既許善業能招人天捨受亦應許惡業招三塗捨受何以善惡皆能招捨受耶次立量釋捨受是有法善惡俱招宗不違苦樂品故因喻如無記法苦樂品者二塗惡是苦品人天善是樂品如何此識非別境等至故此不與別境相應如何下簡非餘所相應初徵起初句總釋互相違故次十句別釋後句總結且別境者別別緣境而得生故此識唯是一類相續故不與別境相應皆如文此識唯是異熟性故至有間斷故定非異熟此識下明不與善染等所俱異熟性謂無記性善等謂信等十一染汙等謂根隨二十六類不同故故不相應惡作等等謂睡眠尋伺俱通三性其無記者有間斷故此無間斷故不相應法有四種謂善不善至阿賴耶識何法攝耶法有下釋三性門先標列四法徵起此識唯是無覆無記至故此唯是無覆無記此識下舉頌總答異熟下別約三釋初約依持用釋文中反顯流轉即惑業生雜染法還滅即涅槃與道清淨法謂識是無覆無記故與此二作依持用若唯善性不應有五趣升沉流轉用若唯染性不應有轉捨轉得還滅用故云應不得成又此下二約持種釋初句直釋是無記故持善染種為善染依次反顯善則違染應不與染作所依染則違善應不與善作所依又此下三約受熏釋是無記故是所熏性受善染熏次反顯若善不受染熏若染不受善熏如香與臰互不受熏無熏習故即無種子無種即無因無因亦無果故曰染淨因果俱不成立具上三義證知唯是無覆無記性攝覆謂染法障聖道故至此非善惡故名無記覆謂下釋無覆無記義文中反顯覆者障蔽義染法謂貪等煩惱聖道謂無漏智淨心謂清淨理謂煩惱能障蔽智理名覆此識非染故名無覆記謂記別善謂白業惡謂黑業人天清升樂果名愛三塗沉墜苦果名非愛各有順益違損殊勝自體可記別名記此非善惡故名無記觸等亦如是者至故說觸等亦如是言觸等下釋心所例王門初文略明王所必同性次又觸下廣顯五義皆同五法相應者阿賴耶與觸等五法相應五所例王一一皆亦與五法相應如觸望賴耶及作意等四是五法相應作意望賴耶及觸等四亦是五法餘三例知四義如文有義觸等如阿賴耶至亦如是言無簡別故有義下斥異解先敘此中觸等例王應一例一切例何也亦如是言無簡別故此解不應以觸等例王名一切種彼說非理所以者何至如何同識能持種子彼說下破初句總斥次立量破觸等是有法不能受熏持種宗不自在故因喻如貪信等受熏持種方名一切種既無受熏持種義如何例王名一切種又若觸等亦能受熏至六眼識等俱時生故又若下初句牒伏計若謂觸等亦能受熏故亦名一切種者應一下破一約一熏成六破二約多種一芽破三約五種無用破四約次第生果破五約六果頓生破皆如文誰言觸等亦能受熏至亦如似火無能燒用誰言下破轉救初一句直救不爾下論家復詰謂觸下出救詞似種相者觸等緣境要托第八所緣三類境為質自變相分為所緣即以所變似種相名一切種顯依所緣得名非謂受熏持種名一切種下復以三句因成立必有似種相識緣三類境觸等若不變似種則與識所緣不等觸等與識所緣既等故應有似種又若謂觸等但緣似根身等不緣似種生無色界無色可托則無所緣無色有所緣故此即似種又心王緣種觸等雖托為質但名疏所緣緣親所緣緣定應有故此即似種此似種相不為因緣生現識等一句欲免前五過謂約所緣緣名一切種非謂受熏持種如何難言種必生果或一或多若頓若漸耶如觸下舉似根不為識所依以例似種不為親因緣亦如下舉似火無燒用以喻似種不為親因緣彼救非理觸等所緣至不爾本頌有重言失彼救下破觸等所緣似種似根等相於後第三句頌文中執受處王緣執受處三類境觸等例王亦變三類似相而緣此句王所可相例由此第二句中一切種言定目受熏持種義不爾者若謂前一切種言亦是所緣似種相則本論有重言之咎又彼所說亦如是言至隨所應說非謂一切又彼下破無簡別初文牒執總破勿觸下別破若謂無簡別觸等如識亦能了別勿字是破辭觸等亦與觸等相應者文總意別應一一言之若謂無簡別者觸應如王亦與觸相應觸與餘四可論相應自不相應故他性相應非自性故餘四例說心所與五法相應者如觸與一王四所論相應也由此下結責故知亦如是言隨所應例而例之非謂一切無簡別也阿賴耶識為斷為常至可為轉識熏成種故阿賴下釋因果法喻門初約斷常問次約非斷非常答恆轉二字釋成頌中以恆轉二字立門今論約斷常為問徵出非斷非常以恆轉釋成意在非斷非常釋成恆轉反覆相成可謂義嚴辭巧也恆謂下轉釋初一句釋恆相無記連持名相續綴前引後名無間次二句釋恆義由體恆常故為五趣四生之本由一類相續故能持種不失轉謂下初一句釋轉相新新不住名生滅因移果易名變異次二句釋轉義生滅故非常因果故非一此明變異義種子義須剎那滅故可為轉識熏成種此明生滅義恆言遮斷轉表非常至外觸等法恆相隨轉恆言二句結成猶如下舉喻前流喻因後流喻果流流無盡故非斷波波轉易故非常阿賴耶識是有法非斷非常宗恆轉故因喻如暴流又此四句結前起後法喻雙標如暴下法喻合釋初喻漂溺有情不出離喻前是界趣生施設本未捨阿賴耶識以來恆溺二死苦海由此有諸趣故次喻隨緣起識浪喻前可為轉識熏成種而體恆相續如楞伽云藏識海常住境界風所動種種諸識浪騰躍而轉生後喻內習氣外相應恆相隨轉喻前隨業升沉持種不失習氣乃是識所執受攝為自體同安危故如水內魚觸等乃是識所相應他性相應非自性故如水外草上下者意明此識隨業升沉流轉此內外法恆隨不離如是法喻意顯此識至故說此識恆轉如流如是下總結立喻意又三初文標謂此下釋剎那剎那果生因滅者謂一一剎那中即因即果即生即滅現種熏生剎那無住非斷非常緣起正理故說下結過去未來既非實有至斷豈得成緣起正理過去下第一番通妨顯理餘乘牒前出妨由前二卷初破餘乘云過未非實猶如空華今聞果生因滅以成非斷非常因滅在過去果生在未來若謂二世非實此乃無因無果則成非常何成非斷此躡世難理過去未來若是實有至常亦不成緣起正理次過去下對斥如文此約常斥斷豈斥他過己義便成至何假去來方成非斷豈斥下顯理初二句承前起後非為斥他成己意在顯正摧邪前因下正顯緣起前言果生因滅者非謂二時前因滅位後果即生義言前後秪在剎那現識上即因即果非異剎那如稱下舉喻喻明稱喻現識兩頭喻因果低昂喻生滅非異剎那云時等雖因果事異生滅相殊同居一時更非前後如是因果念念皆爾相續長時如暴流水何假下結斥餘乘約二世前後立因立果大乘在一念即因即果非斷非常此大小立義之不同也因現有位後果未生至既無因果誰離斷常因現下第二番通妨顯理餘乘牒前立難由上云前因滅位後果即生餘乘不契因果相即而於前後二字生疑還將因果分屬二世為難初難無因望果名因故次難無果望因名果故因果俱無仍成斷滅若有因時已有後果至無因無果豈離斷常若有下對斥餘乘約二世相望對立因果此則因時有果故今斥云果既本有等仍是無因無果還成斷滅此約斷斥斷因果義成依法作用至應信大乘緣起正理因果下責過勸信初句略申正義謂大乘依剎那現法上生滅作用義成因果故所下責過汝以二世因果詰難反招自愆體用即果因緣即因彼此相望互奪俱無次勸信謂此正理深妙離言因果等言皆假施設謂此下顯理初句明理絶言思次句明名言假設因果等言者謂果生因滅非斷非常如此名言皆假施設觀現在法有引後用至假謂現識似彼相現觀現下釋假立相觀謂觀待謂觀待現在法有引後用依所引後法假立當果當果雖無對之仍說現在為後果之因此即現在因假對當果而立也觀待現在法有酬前相依所酬前相假立曾因曾因雖無對之仍說現在為前因之果此即現在果假對曾因而立也現識似彼相現者彼指因果即於現在一念識上觀待過未假名因果餘乘因果二世實有大乘因果依現假立此大小假實之有別也如是因果理趣顯然至諸有智者應順修學如是下總結勸修遠離二邊者因滅故非常果生故非斷酬前故非斷引後故非常前後兩番顯理者前於一剎那上即因即果非斷非常以成緣起正理對破餘乘二世立因立果之不當也後約引後酬前假名施設用顯離言中道對破餘乘實因實果之謬執也有餘部說雖無去來至體相雖殊而俱是有有餘下斥餘部異解初二句總標由上斥二世立因果為不當今於現法初後分因果謂現下二句標敘一念二時現在法極迅速者如石火電光法雖迅疾猶有初生後滅二時生時下二句釋成因果生時酬因此即為果何藉曾因對說現果耶滅時引果此即為因何藉當果對說現因耶此約現在一念法上初後生滅二時建立因果時雖下二句標敘二時一體乃反覆申明之意也前因下二句釋成約一體上論二時故言正滅正生體相下二句結成體謂因果相謂生滅雖殊結二時俱有結一體前大乘言前因滅位後果即生今餘部言前因正滅後果正生二文似同其義逈別前於滅位即生意顯一剎那上即生即滅此雖亦約現法仍分初後言正滅正生此大小乘詞同義異也如是因果非假施設至誰有智者捨此信餘如是下結無前難者無因時有果之難也彼有虗言都無實義至生既現有滅應現無彼有下總斥何容下分斥先破一念二時初約相違破滅若下約三世破次滅若下約有無反覆破若於現法初後分生滅則有義同水火三世各居有無相異等過又二相違如何體一非苦樂等見有是事次破二時一體先立量破生滅是有法如何體一宗相違故因喻如苦樂等生滅若一時應無二至同依一體理必不成生滅下時體迭破初二句約體破時生滅一體則不應言時雖有二次二句約時破體生滅時異則不應言而體是一故生下結破經部師等因果相續至因果相續緣起正理經部下直斥經部因果不成彼不下以正義反顯阿賴耶與轉識現種熏生互為因果故由此下結勸此識無始恆轉如流乃至何位當究竟捨此識下釋斷伏位次門初句牒前次句問後阿羅漢位方究竟捨至永遠離故說之為捨阿羅下舉頌答謂諸下正釋諸聖者謂三乘無學斷煩惱障究竟盡者分別俱生二俱斷盡八地已前才捨藏故粗重即種子永遠離者文中諸聖通三乘此約如來言若約二乘猶未永離金剛道後異熟空故不言所知者所知不執藏故此中所說阿羅漢者至永不復受分段生故此中下轉釋羅漢名不局故次三句出殺賊應供無生三德義云何知然決擇分說至成阿羅漢及如來故云何下先引瑜伽通證三乘斷現名捨次引集論獨證菩薩斷種名捨若爾菩薩煩惱種子至亦不成就阿賴耶識若爾下釋妨約集論以難瑜伽集論言頓斷煩惱成阿羅漢捨阿賴耶反而言之菩薩若未斷盡應皆成就賴耶何故瑜伽說不退菩薩亦不成就等是菩薩云何集論言成就瑜伽言不成就耶彼說二乘無學果位至故彼論文不違此義彼說下先約回心向大答二乘無學位中已捨阿賴耶不定性故回心向大煩惱已斷故必不退轉復起煩惱念念趣菩提故轉名不退菩薩先已捨故不成就阿賴耶雖名菩薩即在羅漢中攝故集論菩薩言成就瑜伽菩薩言不成就文雖似異兩不相違又不動地以上菩薩至此位方名不退菩薩又不下約深位不退答不動以上即八九十地位一切煩惱謂分別俱生法駛流謂所知障任運轉謂自在不為所拘故於一行中起諸行或二至多或無量一至多皆起諸行故念念流入薩婆海故然此菩薩雖未斷盡至此亦說彼名阿羅漢然此下通妨前云此識煩惱粗重永遠離故說名為捨今雖深位猶居在因異熟未空種子尚在何亦言捨通意如文此識謂阿賴耶我見愛等謂末那相應四煩惱即俱生我執生空智果任運現前不復執藏故亦名捨有義初地以上菩薩至能一行中起諸行故有義下敘異解此解言不唯第八已上初地已來亦名不退證理得智斷障起行故雖為利益起諸煩惱至故此亦名不退菩薩問云論言不退菩薩不成就阿賴耶深位不起煩惱可名不退七地已前以同事攝化猶現煩惱何故亦名不退雖為下通意如文然此菩薩雖未斷盡至此亦說彼名阿羅漢問云前云斷煩惱障究竟盡時名阿羅漢今云何七地已前俱生未盡名阿羅漢然此下通意如文故集論中作如是說至故亦說彼名阿羅漢故集下引論證論文通十地故煩惱如毒禪定觀智如呪藥彼說非理七地已前至許便違害諸論所說彼說下斥如文若謂斷分別不復執藏說名為捨者次約預流並破預流初果已斷分別亦應名捨若言初果名捨則與諸論相違諸論皆言四果羅漢方名捨故地上菩薩所起煩惱至寧可以彼例此菩薩地上下敘轉救謂地上煩惱由正智所伏不為過失預流不然不可以預流例菩薩為難彼六識中所起煩惱至由此故知彼說非理彼六下破俱生煩惱通六七二識六識中俱生可如上說治障相違故第七俱生由出觀入觀不時漏與無漏相間運行無漏心位不復執藏有漏心位任運執藏寧不同彼由此下結責故不可言通前七地然阿羅漢斷此識中至爾時便入無餘涅槃然阿下總結非捨下明捨名不捨體勿阿下出不捨所以阿羅漢證有餘涅槃時子縛已斷果縛猶存此身智種子由識體執持此時若無持種識亦無所持種種子既無身智現行不起爾時便應灰身泯智入無餘涅槃故有餘位非捨識體八識成不成應有四句或成就阿賴耶識非轉識謂無心睡眠無心悶絶入無想定入滅盡定生無想天或有成就轉識非阿賴耶識謂阿羅漢若諸獨覺不退菩薩及諸如來住有心位或有俱成就謂餘有情住有心位或有俱不成就謂阿羅漢若諸獨覺不退菩薩及諸如來入滅盡定趣無餘依般涅槃界然第八識雖諸有情至此等諸名通一切位然第下釋義通諸名先總標謂或下別釋釋義皆如文前四名通凡聖因果一切位如來位中集起淨法故執持淨種色根故與淨法為依止故任持出世種子故或名阿賴耶攝一切雜染至有雜染法執藏義故阿賴耶名通異生至七地皆未捨執藏故或名異熟識能引生死至猶有異熟無記法故異熟名通異生至十地金剛道後方空故或名無垢識最極清淨至未得善淨第八識故無垢識唯在如來地淳善淨故菩薩下反顯如文如契經說如來無垢識至解脫一切障圓鏡智相應如契下引證名七義七而體唯一或通或局而該淺深前四通而不局通染淨故後一局而不通局如來故賴耶非通非局非通上聖非局下凡異熟亦通亦局亦通金剛亦局博地阿賴耶名過失重故至心等通故隨義應說阿賴下明斷捨前後究竟極果唯轉其名沉空滯寂名體俱失心等通者義通染淨染隨前捨淨益長時然第八識總有二位至鏡智遍緣一切法故然第下總判二位如文與一下一句釋與五遍行相應常樂下五句釋與五別境相應極淨下一句釋與善十一相應無染汙故簡不與根隨二十六相應無散動故簡不與四不定相應任運一句釋捨受鏡智遍緣釋所緣有漏位局無漏位通染淨廣狹理應爾故云何應知此第八識至聖教正理為定量故云何下引教理證有第八初徵問次總答教理為定量故教謂三經四頌五教理謂十理以此楷定不易度量無謬為證謂有大乘阿毗達磨至由此有諸趣及涅槃證得謂有下先引一經一頌三番釋頌第一番約因緣依持用釋此第八識自性微細至流轉還滅作依持用此第下初二句出引教意第八自性微細體隱用彰故以用顯體頌中下略以二用判頌四句界是因義即種子識至等為依止故名為緣界是下先釋因緣用因緣分釋初句標因種子識出體親生諸法結為因用依是下初句標緣執持識出體諸法等為依止結為緣用雖因緣義別識體唯一約能生義名種子識約依止義名執持識以此二用顯體體一名異也謂能執持諸種子故至是謂此識為因緣用謂能下因緣合明廣釋上義初四句文互隔對承前起後能執持諸種子即前種子為因即變為彼即前親生諸法與現行法為所依即前執持為緣及為彼依即前等無依止變為彼者牒上謂變一句釋成為彼依者牒上謂與一句釋成問云執受但能執受根身不言執受諸識何言與轉識作所依止耶以能下通妨廣釋為依義眼等五識以五色根為俱有依又與下釋第六意識以末那為俱有依末那下立量證末那以第八為俱有依并證意識依末那七八二識自性微細不可了知故立量證明第八下明第八有俱有依謂第七立量如文是謂下結成因緣故以因緣之用顯體也由此有者由有此識至令諸有情流轉生死由此下次釋依持用先釋流轉依持用先牒頌略標體用善謂人天清升樂惡謂三塗沉墜苦第八識出體執持下顯用順流轉法者流轉謂升沉往返苦樂果順即惑業因隨順生死故由識執持惑業苦種令諸有情流轉生死生死即五趣現果苦種於生死為親因緣惑業種於生死為增上緣雖惑業生皆是流轉至是與流轉作依持用雖惑下釋疑疑云惑業苦三皆流轉法何故頌中唯言諸趣不及二耶釋中約通局判頌文初約果勝偏說次約諸趣名因果通攝諸惑下結故以流轉之用顯體也及涅槃證得者由有此識至令修行者證得涅槃及涅下次釋還滅依持用先牒頌略標體用涅槃謂性淨法界證得謂無漏正智第八識出體執持下顯用順還滅法者還滅謂歸還寂滅之理順即能還之道由識執持無漏智種令修行者證得涅槃從無漏種發生淨行斷惑證理故種於現行為生因智於涅槃為了因及者兼也此中但說能證得道至是與還滅作依持用此中下約單雙判頌文初文單約能證道次句釋成涅槃不依此識者清淨法界即識實性識依理理不依識故次文單約所證次句釋成或此下雙說涅槃與道次句釋成能還所還品類同故謂涅下出雙說意能得道約證理言能斷道約斷惑言總唯一無漏智耳能所下結能所斷證者謂能斷道所斷惑能證道所證理故以還滅之用顯體也又此頌中初句顯示至依轉識等理不成故又此下第二番約染淨依釋初句中界字即性義謂識自性無始恆有次句一切法等依者總與染淨法為依止第三句由此有諸趣即別為染依止第四句及涅槃證得即別為淨依止雜染下轉釋集諦即能趣惑業苦諦即所趣生此二世間因果也所能趣者會通頌文道諦即能證得道滅諦即所證涅槃此二出世因果也所能證者會通頌文彼二下結以用顯體依此識者此第八識唯無記性故與染淨為所依前七轉識通善染性不能與二作所依故以染淨依持之用顯體也或復初句顯此識體至離第八識皆不得有或復下第三番約三性依止釋如次配釋第二句依他者諸法皆依緣所生故第三句遍計者諸趣皆由分別執故第四句圓成者理智皆是清淨法故故以三性依止之用顯體也今此下總結三番作用以顯體末句反顯即彼經中復作是說至故名阿賴耶勝者我開示即彼下重引前經第二頌由此本識具諸種子至依斯建立阿賴耶名由此下約受熏持種釋具諸種子即持種義攝藏諸法即受熏義依斯二義名阿賴耶非如勝性轉為大等至能依所依俱生滅故非如下簡異數論師謂勝性轉為大等因果雖殊而體是一果有生滅而因是常今則不爾故云非如能生種子與現行果非一非異故能依所依俱生滅故與雜染法互相攝藏至故說此識名阿賴耶與雜染下約三藏釋初句即能所藏次句即執藏已入見道諸菩薩衆至故我世尊正為開示已入下釋第四句先約地上見道即初地初心真現觀者地前雖修現觀惑未斷理未證名似現觀登地斷惑證理名真現觀能證解者證未窮源解名分覺有所斷有所未斷有所證有所未證故為開示或諸菩薩皆名勝者至非諸轉識有如是義或諸下次通地前未能證解者未能證理未發真智故而能信解者已具信法二行故轉依者一染淨依二迷悟依轉染得淨轉迷得悟故名轉依非諸下結解深密經亦作是說至恐彼分別執為我解深下引第二經第三頌深細顯體種子明功能暴流喻相以能執持諸法種子至不能通達故名甚細以能下釋初句阿陀那具執持執受執取三義諸法種子唯執持者執受四義中闕令生覺受義故色根依處名執受者四義全具故結生相續者結者繫屬義生者受生相續者胎中五位展轉增長乃至捨生趣生由此識與染汙意俱能執取故於母腹中結生相續俱舍云倒心趣欲境濕化染香處無性者謂一闡提無佛性故趣寂者謂定性聲聞沈空滯寂故凡夫如生盲不能窮二乘如眇目不能達是一切法真實種子至恆無間斷猶如暴流是一下釋第二句親生現行名種子轉識隨緣有起滅種識恆無間斷凡即無性愚即趣寂至唯第八識有如是相凡即下釋後二句起分別執者凡愚我執未離更聞第八復增分別如牛皮龍繩遇日轉堅遇水轉急唯第下結入楞伽經亦作是說至恆起諸識浪現前作用轉入楞下引第三經第四頌初一偈唯約喻明次一偈法喻合顯合法皆如文境等者等諸緣也謂諸識隨緣起滅藏識恆無間斷唯此第八可喻如海眼等諸識無如大海至故知別有第八識性眼等下反顯諸識無恆相續義故知一句正顯第八此等無量大乘經中至如增一等至教量攝此等下廣指諸經證有第八諸大下明大乘經是聖言量初以四雙八雙顯次以三支五分證初順理違情故五蘊皆空誰為主宰計我遍常流轉諸趣二棄染趣淨故訶棄煩惱背彼生死趣進無生歸向寂滅三讚內毀外故三寶淨德海水為墨書之莫窮恆沙為舌讚之不盡破四句若紅爐點雪毀百非猶雲卷太虗四表正遮邪故三科緣起以表幻有不無冥諦時方以遮遍計不有立量云大乘經是有法至教量攝宗契經攝故因喻如增一等又聖慈氏以七種因至諸可怖事先預記別又聖下引七因證大乘經是佛說先總標一先下別明一先不記故文中反顯當來有可怖事起如來皆預記別如佛云末法世時有諸魔王入我法中著我袈裟破我正法法必滅盡諸如是等佛先授記此大乘經若是天魔等壞正法故說如來亦應記別今先不記故證知大乘經是佛所說二本俱行故至寧知大乘獨非佛說二本俱行故衆生機器不同如來設教亦異一代所談教法四教收之畢盡所謂藏通別圓教教四門門門四悉四悉隨機令其悅宜治悟藏唯在小三屬衍門是知大小俱行寧獨大乘非佛所說三非餘境故大乘所說至故大乘經非非佛說三非餘境故廣大謂華嚴等甚深謂法華等華嚴法界事理圓融不可測量法華實相百界千如豈能思議聲聞如稻麻尚不能知故非外道所思量境故不為說說亦不信信尚不生豈是彼說四應極成故若謂大乘至是佛所說其理極成四應極成故極成者圓滿極則成就此說彼不說名不極成一切餘佛所說其理極成五有無有故若有大乘至非大乘教不應正理五有無有故大乘者謂大乘理真如實際等大者廣博為義乘者運載為功即大白牛車小乘羊鹿負寡運近止至化城大白牛車任重致遠通至寶所若信有大乘理亦應信有大乘教教能詮理離教無理故離大乘無有成佛者聲聞位歷四階大乘果登圓極是聲聞非大教故不應理六能對治故依大乘經至故應信此是佛所說六能對治故修行者謂萬行可修六度攝盡藏人唯修事度通以即空心修別次第修圓不次修雖四教有殊皆能引得無分別智皆能對治一切煩惱以六度行破六敝故七義異文故大乘所說至是故大乘真是佛說七義異文故謂如說有不可以有取有即非有性色真空舉體全空故如言空不可以空取空即不空性立真色理具三千故如莊嚴論頌此義言至極成有無有對治異文故如莊下引頌證如次對上七義餘部經中亦密意說至非眼等識有如是義餘部下引餘乘五教證有第八初總標謂大下別引初引大衆部密意者言非顯了餘乘不知有第八故此約根本識證知非眼下反顯上座部經分別論者至唯此恆遍為三有因次引上座部及分別論約有分識證知化地部說此名窮生死蘊至唯此識名窮生死蘊三引化地部窮生死蘊證知蘊有三種一者一念頃蘊謂一剎那有生滅法二者一期蘊從生至老死恆隨轉法三者窮生死蘊從無始乃至金剛定恆隨轉法謂此第八遍三界九地有生死處即以此為依直至金剛心後煩惱盡時方捨故名窮生死蘊離第下反顯總簡謂無下別簡初簡色蘊次簡心所蘊三簡不相應行蘊唯此下正成此識名窮生死蘊說一切有部增一經中至三世境故立此四名四引說一切有部四賴耶證知初標列四種謂阿下別釋愛樂欣喜俱名為貪初句愛者總貪三世賴耶為我境樂者樂現在正生賴耶欣者欣過去已生賴耶喜者喜未來當生賴耶依此總別立此四名有情執為真自內我至不應執餘五取蘊等有情下廣釋初明從無始乃至七地已還未斷我執恆生愛著不應一句總簡謂生一向苦受處者至令我自在受快樂故謂生下別簡先簡餘取蘊一向苦受處謂苦偏重處即極熱等地獄無等流樂故餘取蘊謂不相應行蘊即命根衆同分及五蘊身心此餘取蘊彼恆厭逆不生愛著唯愛賴耶文中念我令我二我字即指賴耶五欲亦非真愛著處至雖不貪著而愛我故五欲下次簡五欲五欲謂欲界五塵離欲者謂不還果人已斷欲界九品思盡俱生我執未盡故於賴耶猶生愛著或約初禪已上說樂受亦非真愛著處至雖厭樂受而愛我故三簡樂受離第三靜慮染者謂第四禪已離下地染苦樂兩捨鬬心不交故身見亦非真愛著處至而於內我猶生愛故四簡身見非無學謂有學人已稟信無我故不貪著雖斷分別俱生未離故轉識等亦非真愛著處至雖厭轉識等而愛我故五簡轉識求滅心者謂有學求入滅定外道欲入無想皆厭轉識故色身亦非真愛著處離色染者雖厭色身而愛我故六簡色身離色染者謂無色界聖凡以離色界煩惱居四空故不相應行離色心等無別自體是故亦非真愛著處七簡不相應離色心無體者依色心分位假立色心尚不愛著故不相應亦非愛者異生有學起我愛時至定唯顯此阿賴耶識異生下總結餘蘊有愛指異生不愛指有學而於此識定愛由是下結歸引教彼說指所引經已引聖教當顯正理已引下顯理文結前起後引理有十頌曰持種異熟心趣生有受識生死緣依食滅定心染淨謂契經說雜染清淨至彼持種心不應有故謂契下引經證有持種心顯理復引經者謂依教立理理不憑教則同臆說故憑聖言以顯理若無下反證經中所謂集起持種心應知即此第八識謂諸轉識在滅定等至非染淨種所集起心謂諸下先簡轉識非持種心有謂諸轉識可為集起心今釋云二無心等位有間斷有心位中易起脫立量云諸轉識是有法不能持種非可熏習非染淨集起心宗根境作意善等類別有間斷故易脫起故不堅住故因喻如電光電喻有間斷光喻有轉易此識一類恆無間斷至契當彼經所說心義此識下正明第八是持種心量云此第八識是有法契當彼經集起心宗一類故恆無間斷故堅住可熏故喻如苣蕂若不許有能持種心至應同外道執自然生若不下反顯初違教理失謂諸下現行不熏成種失所起染淨是能熏第八是所熏若無所熏能熏無功是故成失染淨下無因同外失若無因種染淨法起皆自然生色不相應非心性故至寧可執為內種依止色不下簡色不相應立量云色不相應是有法非染淨內法所熏豈能持種宗非心性故因喻如聲光內法謂染淨轉識聲喻色光喻不相應又彼下復約離識無實自性破色是第八所變相分外分所攝非識體性不相應是心之分位離識無體不可執為內種依止轉識相應諸心所法至故持種心理應別有轉識下簡相應立量如文有說六識無始時來至何要執有第八識性有說下敘異執前言轉識有轉易有間斷不可受熏不能持種今謂六識依根境緣起前念識隨緣有起滅後之分位乃識之類無有間斷類者似也即識帶起相似之影名類識之體事通三性有轉易識之類唯無記而無別是所熏能持種由斯下斯字指六識類即此受熏持種成因果何須第八彼言無義所以者何至應不能持內法實種彼言下約假實破數論執大等法是三本事變起是實非假今執類是前念識變起是實應同外道若假則無受熏持種用又執識類何性所攝至別類必同別事性故又執下約三性破初句徵三性次立量別破善惡性善惡類是有法應不受熏宗許有記故因喻如擇滅若是下破無記如文非事下破轉救救云心體是善惡而類唯無記故類不斷破云非事屬善惡類可無記次句釋別者謂三性隨一如識體善類性必同善餘性例同又無心位此類定無至如何可執持種受熏又無下破無心位則無類如文又阿羅漢或異生心至無漏法熏許便有失又阿下約凡聖類同破上謂識類無記可受熏又謂識體善惡類唯無記今云阿羅漢識無執藏唯淨異生識有執藏唯染若凡聖識類同無記應羅漢識類受染熏可成異生此抑聖同凡過異生識類受淨熏不假修持可成聖人此將凡濫聖過二俱有失羅漢是有法應受諸染熏宗識類無記故因喻如異生異生是有法應受無漏熏宗識類無記故因喻如羅漢又眼等根或所餘法至故不應執識類受熏又眼下約根法類同破眼等根等餘五根所餘法謂六塵眼等識等餘五識根塵識類同皆無記若謂識類無記受熏根塵無記亦應受熏然汝不許根塵受熏亦不應執識類受熏反覆立量云根塵是有法應受熏宗無記性故因喻如識類識類是有法應不受熏宗無記性故因喻如根塵又六識身若事若類至能熏所熏必俱時故又六下約能所不同時破有執前念識為能熏後起分位類為所熏立量破云六識若事若類是有法非互相熏宗前後二念不俱有故因喻如隔念者隔念者謂二人身後一句出非互熏所以能熏所熏必俱時故執唯六識俱時轉者至故彼亦無能持種義執唯下破六識受熏持種初句出執謂前五識為能熏第六為所熏俱時轉故不同隔念前理者有間斷故有轉易故故不能受熏持種有執色心自類無間至故先所說為證不成有執下破色心為種先敘執色心各各自類前因後果故先下遮前所引教理證有第八引證不成彼執非理無熏習故至如何可執前為後種彼執下破自類前為後種種子義須熏習方得生長彼執自類前為後種既無熏習種義不成如何下一句正破如何可執自類前為後種又間斷者應不更生至死位色心為後種故又間下破無間彼執無間前為後種破云又間斷者應不更生無色界色間斷無心位心間斷後退歿出定應不更生二乘無學或入滅定或灰身泯智此已間斷應無三種意成身何以無後蘊汝云無間方為後種死位色心已自間斷豈為後種又上句破間斷不生後句破色心不為後種亦不應執色心展轉至非所熏習前已說故亦不下破轉救救云色心展轉互為種生者無色雖無色以有心在二無心定雖無心以有身存即色心互為種生是故二乘無學不無後蘊初句牒執直破次句引前說破轉識有間故色非心性故有說三世諸法皆有至起染淨法勢用強故有說下破三世因果先敘前因現果現因後果然經下通經意經說染淨諸法種子集起名心者起染淨法心用強故彼說非理過去未來至一切因果皆不得成彼說下立量破三世非實又無下破三世因果無作用故不可為因緣若無下反顯須有持染淨種識方成因果有執大乘遣相空理至彼特違害前所引經有執下破執空先敘大乘之理非空非不空般若中偏談空者為破衆生相著乃應機施設有執為究竟撥無一切特違前經引證第八智斷證修染淨因果至亦不謂全無但執非實故智斷下破所執成邪如文若一切法皆非實有至求石女兒用為軍旅若一下約菩薩修行反釋初句牒執菩薩下法喻反明幻敵喻生死石女兒為軍喻菩提資糧若謂生死涅槃一切諸法皆非實有菩薩不應為斷幻化生死勤集夢影資糧期證空華佛果誰有智者行此事耶故應信有能持種心至彼心即是此第八識故應下總結勸信證有第八又契經說有異熟心至彼異熟心不應有故又契下引經證有異熟心若無下反證謂眼等識有間斷故至是異熟生非真異熟謂眼下先簡眼等六識非異熟心有謂眼等諸識皆是心法可為異熟心今簡云隨緣起脫有間斷故三性轉易故業果者謂滿業所感一分無記非一切時者言此時善時惡如電光之有間轉故非異熟心立量如文異熟下二句轉釋有間非異熟心義異熟果及命根等等暖也住時決定豈應斷已更續異熟是有法不應斷已更續宗三法相依住時決定故因如命根等眼等下簡業所感無記六識非真異熟有謂若屬無記者是異熟心今六識中滿業所感者屬無記可為異熟心故此簡云猶如聲等非恆相續是異熟生立量如文定應許有真異熟心至復依何法恆立有情定應下顯有真異熟心酬引業簡非前六是酬滿業遍者簡非諸識局依自根故不遍三界故無斷者簡非間斷變為下一句明異熟功能身器一句反顯以所變對顯能變心是有不相應下二句簡不相應及心心所皆無有變器身功能若無下反顯文中誰字何字反顯是異熟心又在定中或不在定至彼位如何有此身受又在下約定散身受明有異熟心定位無思慮身心寂靜後有怡適之樂散位有思慮身心掉亂後有勞損之苦此若下反明定散後時勞怡皆由定散位中苦樂身受後時怡適由定位樂受後時勞損由散位苦受若不下反顯意顯有異熟心方能持定散位中苦樂受問云異熟唯與捨受俱云何能持苦樂受答捨受不違苦樂品故非佛起餘善心等位至彼心即是此第八識非佛下約三性破明降佛已還一切有情皆有真異熟心餘善心等者謂有漏善惡許時彼者謂起無記心以餘善惡心為有法無記心為同喻此明凡起三性心皆有情攝皆應有真異熟心立量云起餘善心等位是有法必應現起真異熟心宗非佛有情故因喻如起彼無記時由是下結有第八又喫經說有情流轉至彼趣生體不應有故又契下引經證有趣生體若無下反證謂要實有恆遍無雜彼法可立正實趣生謂要下正明趣生體須具實有恆常周遍無雜亂四義實有簡非分位恆常簡非間斷周遍須體周三界無維須一類無記非異熟法趣生雜亂至皆不可立正實趣生非異下約四義逆次簡先明雜亂非異熟法者此句有二義一者反顯是善惡法也由此趣生雜亂二者趣生不雜亂者由此異熟為趣生體故也若非異熟趣生雜亂住此一句釋成因通易識果隔難知故住此者如住人道起十善心則成天趣起三品惡心則成三塗趣何也以無趣生體故諸異下簡不遍諸異熟色謂五根屬無記五識中業所感者謂無記五識此皆不遍趣生無色下一句釋成無色全無者根識俱無故反顯色界五識分無眼耳身三二地居故諸生下簡不恆生得善者謂過去修因感報善如四禪八定定皆屬善及意識中無記一分雖遍下二句牒周遍不雜無色名為意成天故意遍三界善故不雜而不恆有者三塗則無報得善五位無心無意識故不相應下簡非實有依分位故皆不一句總簡唯異熟心及彼心所實恆遍無雜是正實趣生唯異下結成異熟心是趣生體此心若無生無色界至故唯異熟法是正實趣生此心下約無色無異熟色破又無異熟心應名超界聖人先約善心難無色界無異熟心唯有意識若起善心應名聖者無趣生體故設許下救雖無色起善心猶是界內趣生善名有漏善是趣生攝次約無漏心難如那含人居無色界起無漏觀智應非趣生上地思惑未盡猶是趣生故故云違理勿有下結前過指趣生雜亂等四過此失指應非趣生失以異熟心為趣生體免此二過由是如來非趣生攝至故知別有此第八識由是下引如來反證非趣生攝佛無下釋成世尊下轉釋三界果屬苦諦有漏因屬集諦無記法是戲論種已捨已斷故非趣生攝正實下結有第八又契經說有色根身至彼能執受不應有故又契下引經證有能執受心執受根身若無下反證謂五色根及彼依處至彼定由有能執受心謂五下正明能執受心先二句以根身是所執受對明有能執受心唯異熟心先業所引至眼等轉識無如是義唯異下出能執受體即第八異熟心眼等下一句簡轉識非是能執受心無如是一類等義故此言意顯眼等轉識至唯異熟心故作是說此言下出簡意此眼等轉識無如是義之言其意秪要顯轉識無一類等執受根身義非是要反顯能執受唯果熟心問上言能執受唯異熟心今言非顯能執受唯異熟心前後相違者何也答若言能執受唯異熟心諸佛已離異熟無漏色身應無執受無漏色身即無垢識之所執受問既云諸佛色身為無垢識執受上文何言唯異熟心是能執受然能下答如文謂諸轉識現緣起故至不能執受有漏色身謂諸下釋上簡轉識意立三量簡皆如文皆以不能執受有漏色身為宗初一量明轉識隨現緣起滅轉易故因如聲如風故不能執受次量明善染轉識非業所引如非擇滅此無為屬淨善緣闕理顯非業引故因故不能執受三量明無記轉識是異熟生非遍依者各依自根故因故不能執受諸心識言亦攝心所定相應故如唯識言諸心下心所例王亦非執受非諸色根不相應行至彼心即是此第八識非諸下明五色根及不相應行亦不能執受無所緣者反明無能緣也立量如文故應下結有第八又契經說壽暖識三至令久住識不應有故又契下引經證有持壽暖識若無下反證謂諸轉識有間有轉至不可立為持壽暖識謂諸下簡轉識不可立為持壽暖識有間斷如聲有轉易如風立量如文唯異熟識無間無轉至故可立為持壽暖識唯異下立異熟可為持壽暖識立量如文經說三法更互依持至唯識不然豈符正理伏問云經說識言或詮轉識何理定知是第八識經說下釋引經三法更互依持義以明簡轉識意識為能持壽暖為所持壽暖為能依識為所依故云更互轉識非一類非相續故云不然違經正理雖說三法更互依持至何不許識獨有間轉雖說下申難意欲成轉識為能持識初句牒經而許下舉暖不遍為例以例識有間轉何妨不能為能持識耶暖不遍者無色無暖此以不遍例有間轉不遍即有間義此於前理非為過難至故前所說其理極成此於下斥初句直斥謂若下約理斥是處者三界中依法有無處隨指也如欲色界具有三法無間無轉則三法恆相持必有無間無轉異熟識不爾者若無此識則於壽暖無恆持用前以此理者指前二量反覆證成以無間無轉因成立異熟是能持壽暖識非詮轉識舉暖下斥引例不當如無色界無暖暖便無相持用何妨壽與識二恆相持以捨暖時餘二不捨餘二若捨暖必隨捨豈舉暖不遍成立有間之轉識欲壞我所立無間之異熟故前下結顯極成異熟又三法中壽暖二種至彼識即是此第八識又三下明三法皆有漏可互相持若以意識為能持生無色界起無漏心爾時何識能持彼壽無漏觀心破壞有故亦不可言暖能持壽無色無暖故由此下結有第八又契經說諸有情類至生死時心不應有故又契下引經證有生死時心受生時命終時必住散心有心非無心非定心若無下反證謂生死時身心惛昧至必可知如餘時故謂生下明轉識非生死心立量云生死時明了轉識是有法必不現起宗身心昧極悶絶故因喻如睡無夢又此下立量反覆證明初量云生死位中六轉識是有法必不現起宗行相所緣不可知故因喻如無心位次量云生死位中六轉識是有法有是宗行相所緣必可知故因喻如餘散心時此二量明生死位轉識有則必可知無則不現行反顯異熟心不如此真異熟識極微細故至名生死心不違正理真異下明真異熟是生死心真異熟心者若此是有行相所緣俱不可了非如轉識有必可知亦非是無微細運行非如轉識無不現行此識微細運行而又不可了正契經中散有心生死心有說五識此位定無至故受生位意識亦無有說下出異解上言行相所緣俱不可了名生死心今執謂生死位中轉識俱無名不可了不必約不可了名生死心初句直明生死位中無五識意識下明無意識意識生起須賴三因同時意識須同時五識為明了門散位獨頭意識須聞他言教引起定位獨頭須禪定引起生位五識未明著故耳不聞言教故散心無定故生因既無故此意識亦無若爾有情生無色界至引定散心無由起故若爾下牒執破若謂由三種因意識方生有情下約永不生破非但初生無意識生後永遠皆不得生何也無三因故意識若不生何名意成天定心下出無三因所以無色四空名定地定心必由散意識引由散心作念加行故此句標起五識下二句正明無三因無五根故無五識無言語故無他教承上無散心別故無定心若謂彼定由串習力至此即前因何勞別說若謂下救定心由串習故後時現前今牒救詞例破云彼天初生時意識亦由串習寧不現起又欲下例下二界初生串習意識亦應現起若謂串習現起前言三因俱成虗設若由下約初生昧未即現前為救此即下斥同前因破有餘部執生死等位至極成意識不如是故有餘下出餘部執應知下奪彼執意以成正理極成意識不如是故有則必可知無則不現起又將死時由善惡業至若無此識彼事不成又將下約死位執受不執受以證第八下上冷觸漸起者由善惡業故上下執受有異頂聖眼生天人心餓鬼腹旁生膝蓋離地獄腳板出若無下反證無此識故彼事不成轉識不能執受身故至不應冷觸由彼漸生轉識下明轉識不能執受各別依者各依自根故不行者昧不現故不住身者依心根故境不定者遍緣十八界故遍寄身中者同五緣境故其心在在常處諸根故不應一句結唯異熟心由先業力至故知定有此第八識唯異下正明異熟執受由識執受壽不滅暖不離三法不相離故識不執受冷觸便生即屬非情三法相離故雖變下伏問云若不執受同於非情則非識變亦非所緣耶答如文執受四義中但有領以為境義持令不散義唯有執持而無執受故知下結有第八又契經說識緣名色至彼識自體不應有故又契下引證為緣義識即第八名色謂胎中五位識為緣者由業牽識走與赤白和合而成名色故云識緣名色名色為緣者由名色持識令識不散故云名色緣識十二有支中唯此二支逆順互緣故云展轉相依餘十支唯順緣若無下反證謂彼經中自作是釋至此識若無說誰為識謂彼下出經中自釋意非色四蘊者謂受想行識羯邏藍等等謂遏蒲曇閉尸健南鉢羅奢佉此胎中五位相量云名色與識相依而住更互為緣故如二蘆束眼等下簡轉識非此中識有謂轉識可當此識簡意如文此識下反顯說誰為識者反顯第八識也亦不可說名中識蘊至羯邏藍時無五識故亦不下遮異解初文牒異解羯邏藍時無五識者第六即是名中識蘊為緣之識即第八識又諸轉識有間轉故至故彼識言顯第八識又諸下正簡轉識如文故彼下結顯第八
