body:
  text: 明武林蓮居弟子大惠録若有三性如何世尊說一切法皆無自性若有下大章明唯識性初句躡前三性次句問後無性頌曰即依此三性至常如其性故即唯識實性三頌答中初二行明無性次一行正明唯識性由前二十二行廣辨能變差別以顯非空此之二行略明三性無性以顯非有非有非空總成緣起正理將欲顯體要須鴻漸故以無性為入理之門今此二頌聯絡前義冠戴後章兩楹著此深有意焉論曰即依此前所說三性至於有及無總說無性論中先釋第一頌初二句牒頌前二句次句引後頌釋成無性故佛下牒頌後二句密意者對機破著偏說空無遍計非有依圓非無今俱說無故非了義謂後下釋俱說無意依他幻有圓成真實二性非無而有愚夫於彼依他起上遍計執有我法佛為破情於有及無總說無性云何依此而立彼三至而濫第二故此不說云何下釋第二頌初句徵起謂依下立量釋三無性遍計量云遍計所執立相無性體相畢竟非有故喻如空華依他量云依他起性立生無性衆緣生故喻如幻事圓成量云圓成實性勝義無性遠離諸法故喻如太虗雖依下通妨問圓成中無遍計故名勝義無性依他中無勝義故亦得名勝義無性釋云雖依他中無勝義亦得說勝義無性此初依他若說勝義無性則濫第二圓成勝義故此依他不說相章盡此二頌上釋唯識相竟此性即是諸法勝義至為簡前三故作是說此性下釋第三頌正明唯識實性今先釋第一句初句牒頌初句此性二字承上勝義無性是一切法勝義諦故然勝下總標別列四種勝義蘊處界等因緣生法簡非冥諦自性等離此三科世間不成安立故云世間勝義苦逼迫相集招感相滅可證相道可修相四皆審實是所迷所證故云道理勝義我法二空正智所攝此約修成故云證得勝義清淨法界含攝無際曰一體離虗妄曰真萬象軌模曰法分齊分明曰界體即一法界大總相法門體也此約性具故云勝義勝義此中下舉頌簡非簡前取後故最勝道所行義者忘言默契故此諸法勝義亦即是真如至如餘論中隨義廣釋此諸下釋第二第三句初牒頌體一名異故云亦即是真如真謂下釋義世間諸法虗無倒妄遷變轉易非實非常表顯非此故言真如是法住法位世間相常住故云於一切位常如其性故湛然即如義不虗妄即真義異名指廣皆如文此性即是唯識實性至為簡世俗故說實性此性下釋第四句初句牒頌謂唯下釋義對三性簡先以虗實簡遍計次以真俗簡依他簡二取一唯存實性三頌總顯諸契經中至總撥諸法都無自性三頌下結示上釋唯識性竟如是所成唯識相性誰於幾位如何悟入如是下大章明唯識行位初句牒前次問後誰字問人意在簡濫捨小取大故幾位問位令識淺深免上慢故悟入問修頓漸有則道不浪階故謂具大乘二種性者略於五位漸次悟入謂具下總略標答如次答前何謂大乘二種種性至方能漸次悟入唯識何謂下初別釋種性初句總徵二種一者本具二者新薰本性住種性者未聞正法無漏種子無始自成不從薰習令其增長性者體也類也謂本具法爾無漏種子依附阿賴耶識而住不由今有故習所成種性者此聞正法以去聞思修三慧薰修令無漏種子生長數習種性要具下結何謂悟入唯識五位至謂住無上正等菩提何謂下二明五位初句徵起次略列五名皆初句標名次句釋相前二在凡曰修後三入聖曰住云何漸次悟入唯識至復令悟入唯識相性云何下三明漸次悟入初徵謂諸下釋相三資糧位雖無真智憑教生信依觀發解故四加行位雖未親證能引真見故漸次伏除者下忍伏所取中忍伏能取上忍雙證二取空見道伏中已斷分別通達相性故十地位中重慮緣真伏斷俱生故佛果位中障盡理圓二益具足故是為漸次悟入相初資糧位其相云何初資下廣明五位先徵資糧從喻進道以此為糧頌曰乃至未起識至於二取隨眠猶未能伏滅頌曰下舉頌答論曰從發深固大菩提心至由此亦名順解脫分論曰下先釋資糧發心位果既高曠因必深固決擇識謂能觀觀智即取第六善惡心王初心修觀莫不用此若直以此心觀理如用藕絲懸須彌山徒增分別絶念無由若體此性融通無法不趣自然攝得七八二識同為妙觀故得名為境即是觀心外無法唯識理顯初心可修也加行智劣名順猶在行前曰未起為趣下釋菩提心須具四弘無上菩提即佛道誓成修習資糧即法門誓學為有情故即衆生誓度勤求解脫即煩惱誓斷順解脫分謂加行未證涅槃名順加行前因曰分決擇約智解脫約理互立名耳別而言之資糧名順解脫分加行名順決擇分二名義通約遠近而分二別此位菩薩依因善友至令彼不起二取現行此位下釋次二句先略釋因者謂發大心即不生不滅為本修因善友即教授同行二知識作意謂志願勤求資糧即福德智慧依字貫下四法因心既發須值外緣因緣具足志行應修多住外門者多依事相不稱理故故於二取種子猶未伏滅此二取言顯二取取至即是所知煩惱障種此二下廣釋二取先釋第三句二取執取二取之取名二取取二取下釋隨眠初句辨名次四句釋義後一句出體煩惱障者謂執遍計至能障涅槃名煩惱障煩惱下轉釋二障先釋煩惱障初句牒名謂執下列頭數欲界四諦下各有十使上二界四諦每各除瞋合有七十二并欲百一十二並是見道根本之惑修道之惑欲界唯六上二界除嗔合有十并欲共十六見修合辨有一百二十八此皆下明障相所知障者謂執遍計至能障菩提名所知障所知下次釋所知障初句牒名謂執下列頭數文舉見疑等六根本等謂等隨惑煩惱障粗通二性故有多品類以數來顯所知障細唯是有覆無多品類故不顯數覆所下明障相所知境無顛倒性謂真如理菩提謂四智通障理智故前煩惱即是障是持業釋今是所知之障是依主釋所知不是障智障障所知此所知障決定不與至餘由意力皆容引起此所下明所知與諸識俱不俱初句直明不與異熟識俱次三句釋不俱義第八微劣所知粗故第八不與無明慧相應此以無明等為體故所知唯與第六法智俱起障治相待立故第八無智故不與俱七轉下明所知與七轉識多少不定第七唯四法癡法見法愛法慢而無瞋疑第六全俱前五唯三謂貪恚癡眼等下明不俱意法見疑慢定不相應無分別故餘貪恚癡任運而起意識引故此障但與不善無記至癡無癡等不相應故此障下明所知與三性俱不俱初句直明與二性俱次句引論證不善無記癡無下明不與善性俱如明與暗非定俱故煩惱障中此障必有至有勝有劣斷惑前後煩惱下二障辨異初句明煩惱障中必有所知次句釋義此為彼依者如迷樹杌方謂人故體雖下簡異問二障皆以見疑等為體依何差別而立二名初約障用各別答體雖無異障事障理執我執法用有別故故二下次約斷有前後答見道位中生空觀勝法空觀劣斷煩惱為正兼斷所知修道位中法空觀勝生空觀劣斷所知為正兼斷煩惱此於無覆無記性中至若望菩薩亦是有覆此於下約四無記簡四無記中是異熟生無記非餘三種彼威下明簡意勢用薄弱故不障理智故此名下通妨問此障既能覆智障理何言無覆無記釋云不障人空智於二乘名無覆能障法空智於菩薩名有覆若所知障有見疑等至豈彼更無慢無明等若所下通妨舉經為問經說所知種子五住中唯無明住地今何言有見疑等見疑通四住故無明下答先直約無明增勝答如煩下舉例答如諸煩惱種子八十八惑總立見一切住地欲愛色愛無色愛立三住地豈彼四住唯有見愛更無慢無明等以見愛偏增偏立名耳此亦應然如是二障分別起者至伏二現行通有漏道如是下判斷伏差別先約粗細前後二障通二分別俱生分別粗者見所斷攝任運細者修所斷攝二乘下次約三乘雙隻二乘斷隻菩薩斷雙永斷下後約種現伏斷斷種唯無漏伏現通賢位菩薩住此資糧位中至止觀力微未能伏滅菩薩下釋第四句如文此位未證唯識真如至應知亦是解行地攝此位下明依地發解依解修行故名解行對後加行故云亦是所修勝行其相云何至皆是此中所修勝行所修下明所修行先徵起略有下釋相初句標福智萬行雖多此二攝盡指廣從要是故云略次二句釋義依性各屬故且依下處中言六是故云且通相下約通別判或復下約通局判復有下約二利判通則一切皆通二益依相別分名有所屬菩提分等謂四念處四正勤四如意足五根五力七菩提八正道等自利行攝四攝謂布施愛語利行同事四無量謂慈悲喜捨利他行攝如是下結此位二障雖未伏除至於所證修勇猛不退此位下明修道退不退問此位菩薩二障未除所修之行為退不退釋此如文總標練磨故不退一聞無上正等菩提至練磨自心勇猛不退一聞下別釋一菩提廣大屈引他䇿己練如寶所曠遠五百由旬又復無水草人所怖畏處引他已證練磨自心頌曰十方世界諸有情念念已證善逝果彼既丈夫我亦爾不應自輕而退屈二聞施等波羅蜜多至練磨自心勇猛不退二聞下二萬行難修屈省己增修練如身子發心行施為婆羅門乞眼六心猶退省己意樂練磨自心頌曰汝昔惡道經多劫無益勤苦尚能超今行少善得菩提大利不應生退屈三聞諸佛圓滿轉依至堅固熾然修諸勝行三聞下三轉依難證屈引粗況妙練圓滿轉依三祇修行百劫種因時長行遠久受勤苦乃可得成引他粗善練磨自心頌曰博地一切諸凡夫尚擬遠證菩提果汝已勤苦經多劫不應退屈却沉淪由斯下結次加行位其相云何次加下釋加行先徵加行者加功用行也頌曰現前立少物至以有所得故非實住唯識頌曰下舉頌答論曰菩薩先於初無數劫至非前資糧無加行義論曰下先釋加行相文中舉前望後以明加行相菩薩下舉資糧行滿為入下明證道未圓復修下為斷惑證真故正修加行伏除二取謂暖下列加行四名此四下由異名亦名順決擇分故次句釋決擇義謂無漏聖道能決擇真實故近見下約遠近分二位非前資糧無加行義非此加行無資糧義解行義通遠近分二資糧遠見道故加行近見道故暖等四法依四尋思四如實智初後位立暖等下釋四位名義問加行四位智行是同依何有別釋中先標依四位立初後即上下義依下尋思立為暖法依上尋思立為頂法依下如實智立為忍法依上如實智立世第一總一見道前方便智以由觀行明昧淺深不同立此四名而分四位四尋思者尋思名義至二二相同故合思察四尋下總釋初句牒名次句釋義一尋思名二尋思義三尋思名義自性四尋思名義差別名即能詮名句義即所詮義理名詮自性句詮差別名中有自性差別義中亦有自性差別此四總名所取假有實無者謂以方便智了此名等依識假立非實有故如實下釋四如實智以如實智遍知所取名等離識非有及能取識亦不可得名四如實智名義下釋妨問何故名義各別尋求名義自性名義差別則合觀察釋曰能詮所詮名義相異故別尋求名義自性名義差別二二相同故合思察依明得定發下尋思至道火前相故亦名暖依明下別釋暖位初二句標依定發慧依行立位謂此下轉釋無所取創觀者發軫始修也所取名等假有實無故初獲下釋定相法喻合明日前行相謂日將出瞻顧東方已有精色喻慧前方便即此下釋暖義如鑽木求火先有暖氣喻此位是實智前相故立暖名依明增定發上尋思至尋思位極故復名頂依明下釋頂位初二句標依定發慧依行立位觀慧轉勝故曰明增謂此下轉釋無所取暖位已觀此位復慮故曰重觀明相下釋定相方前為優故尋思下釋頂義如身入高山下有微礙故立頂名依印順定發下如實智至忍境識空故亦名忍依印下釋忍位初句標依定發智於無下釋印順義印無所取即下忍位順無能取即中忍位既無下三句轉釋無能所取境識俱離能所雙絶印順下一句依行立位印前下一句釋印順相忍境識俱空故亦名忍釋忍義先單印境空順後識空次單印識空即上忍位依無間定發上如實智至此最勝故名世第一法依無下釋世第一位初二句標依定發智依行立位方前為優故名上智謂前下轉釋印二取空對前顯後此名雙印從此下釋無間相最後剎那即見道故異生下釋世第一義凡心將盡聖智當生故如是暖頂依能取識至世第一法雙印空相如是下總結合前二位者觀行同故忍位開三者淺深異故世第一雙印者功用極故皆帶相故未能證實至彼相滅已方實安住皆帶下正釋頌文先釋前二句皆字通指四位帶者變相觀空故未能親證安立少物者真如似相也以此自謂唯識實性以彼下釋後二句空有二相者前二位境空識有後二位能所俱空空有二相未除故帶相觀心有所得故非實住唯識彼相下以滅相實住反顯未除非是實住依如是義故有頌言至次能取亦無後觸無所得依如下引證菩薩下二句頌暖位影即所取四法義想下二句頌頂位義亦所取重觀所取皆空如是下二句頌下忍位印境空相次能一句頌中上二忍中忍順能取空上忍印能取空又能所俱空影頌世第一位後觸無所得謂觸證真如方無所得頌上彼相滅已方實安住此加行位未遣相縛至未全伏除全未能滅此加下明伏斷差別此位未能斷分別種子何也未遣空有二相故唯伏分別現行問加行用功何故種子未斷現行唯伏釋云分別種現與見道違方俱永斷故俱生現行少分伏除未能全伏俱生種子全未能滅何也有漏觀心故有所得故有分別故此位菩薩於安立諦至非如二乘唯觀安立此位下明所觀諦安立諦者謂四諦真如依苦等四諦下安立故非安立諦謂清淨真如不依諦立故為引下明觀諦功能二種見謂相見道真見道分別二障謂煩惱所知非安下明三乘旁正菩薩正觀非安立旁觀安立二乘唯觀安立菩薩起此暖等善根至託最勝依入見道故菩薩下明所依靜慮善根者四位觀智衆善之根能生一切功德故成就一切佛法故問此四加行諸靜慮皆可修何故有言唯屬第四釋云方便通前成滿局後託最勝依一句釋成依第四第四靜慮捨念清淨故遠離喜樂覺觀故諸佛於此證果故功德佛法依此生故故名最勝依唯依欲界善趣身起至未證唯識真勝義故唯依下明所起趣身欲界中人趣身能修起故次句明簡意餘趣非殊勝者鬼神沉憂愁之苦鳥獸懷獝狘之悲諸天著樂修羅方瞋此位下出異名對前資糧故名曰亦對後已證位未證此位攝次通達位其相云何次通下釋通達位先徵通達者體會真理也頌曰若時於所緣至爾時住唯識離二取相故頌曰下舉頌答論曰若時菩薩於所緣境至有所得心戲論現故論曰下通釋一頌所緣境即所取無分別智即能取不取下一句轉釋上句不取即離義種種戲論相即能取所取離二取相故乃名住唯識即證下二句約智如平等證離二取無有智外如為智所證無有如外智能證於如一如無二如故重言平等能所下二句反釋二取分別有所得故戲論現故有義此智二分俱無說無所取能取相故有義下別釋本智初解初句立定緣如本智相見俱無次句引證論說無二取故有義此智相見俱有至故應許此定有見分有義下次解初句立定此智相見俱有次句轉釋智帶彼真如相起方名緣彼故若無下斥前無相成己有相初句反牒若無真如相名緣真如者次句例斥應緣色智無聲亦可名緣聲智彼既不爾此云何然故應許此定有相分若無下斥前無見成己有見初句反牒若無見分應不能緣寧得說為緣如之智次句例斥真如體性無有能緣亦可名能緣彼既不爾此云何然故應許此定有見分有義此智見有相無至故應許此有見無相有義下第三解初句立定見有相無次句引證論說真如無相可取正智不取於相故雖有下通妨問曰論說無能取今何言有見分釋云論依無分別說非能取非取全無言有見分非全無者正顯無分別智也問曰既無相分何名緣彼釋云雖無相分此智親挾帶真如體相而起智不離如故如自下舉例自證緣見敵體親證不變相故此亦如之變而下二句反例變緣非親證反顯親證非變緣後得變相有分別反例本智不變無分別故應下一句結成加行無間此智生時至初照理故亦名見道加行下釋位名體會即通達照理即見道地地皆見道此最初故偏得此名然此見道略說有二至由意樂力有堪能故然此下廣釋見道初句總標有二一真二相先釋真見道初句牒名謂即下釋義即前根本無分別智能證理斷障故故名見道雖多下通妨問見道之功須八忍八智十六心緣四諦下真如理方得見道何故云加行無間一心見道耶釋云雖多剎那功圓行滿事方究竟而所緣真如體相一味平等總說一心有義下明二師頓漸初解漸入空有淺深故漸證障有粗細故漸斷次有義下次解頓入作意樂欲觀力俱有堪能故二相見道此復有二至別總建立名相見道二相下次釋相見道初句牒名復標有二一觀非安立二觀安立初觀非安立諦有三品心謂下中上次釋三相一有情假謂我相情有理無故緣智謂能緣心此智能遣我執故能除下品分別障故二諸法假謂五蘊法緣起不實故此智能遣法執故能除中品分別障故三此智雙遣我法二執故能除一切障故前二下判屬法類言類者是前法智之類故法真下明此相見道倣真見道起法者取法倣效為義真見道別修人空見分智無間道斷自煩惱障解脫道證人空理別修