未泯相習究竟在果真窮惑盡俱非所攝菩薩得此二見道時至能盡未來利樂一切菩薩下結示二道勝益諸平等謂三平等一切衆生一切菩薩一切如來悉皆平等多百門者得百三昧見百世界見百諸佛入百法門示現百身化百世界等次修習位其相云何次修下釋修習位先徵修習者重慮緣真也頌曰無得不思議至捨二粗重故便證得轉依頌曰下舉頌答論曰菩薩從前見道起已至妙用難測名不思議論曰下釋先釋初一句初句承前次二句起後見道起已者見道位有三心初心斷惑即無間道中心證理即解脫道後心起修即勝進道此當後心餘障謂俱生煩惱所知後二句正釋頌或離下復釋皆如文是出世間無分別智至即十地中無分別智是出下釋第二句初句牒頌是字承上無得不思議次句釋成出世智二取下轉釋一約能斷世間隨眠或出下復釋一約無漏證真此智下一句結具二義餘智不然者暖等諸智體非無漏故後得不能親證理故數修此故捨二粗重至令彼永滅故說為捨數修下釋第三句初句牒頌數修此者承上無分別智能捨二粗重故重慮緣真頻修觀行俱生二種地地除之染種粗重故無堪任善無漏種細輕有堪能故是故相違此能捨彼二粗重故至證得如斯二轉依果此能下釋第四句初句承上次句牒頌依謂下先明染淨依初句出體依他起謂根本識次句明所依義能與染淨法為所依故染謂下轉釋染淨義二分即染淨二分由數下約修因力顯轉依功由轉下明轉二障證得二果成立下結示論意轉染得淨皆由依他起故今此論成立唯識意在於斯或依即是唯識真如至在大牟尼名法身故或依下次明迷悟依初句出體唯識真如謂識之體性次句明所依義能與迷悟作所依故愚夫下轉釋迷則生死始悟則輪回息由數下約修因力顯轉依功如雖下通妨問真如性淨本自無染何言離染名為轉依釋此如文雖於下問菩提涅槃二俱果德得則俱得此中何故偏得涅槃不得菩提釋云頌意但顯唯識性唯識性即性淨涅槃二乘下明大小乘依此立名有別聲聞究竟孤調解脫如來果滿萬德俱圓云何證得二種轉依至二種轉依由斯證得云何下廣釋轉依先徵起謂十下總標言十地者一極喜地至能益自他生大喜故言十下別釋初句標名次釋義得入此地具二十五三昧破二十五有顯二十五我性我性即聖性聖性即佛性開佛之知見發真中道斷無明惑具證二空顯真應二身緣感即應百佛世界現十法界身入三世佛智地能自利利他真實大慶名歡喜地二離垢地具淨尸羅遠離能起微細毀犯煩惱垢故初句標名次釋義離能起誤心犯戒煩惱垢等清淨戒具足故一即因離謂離能起誤犯煩惱二果行離謂離犯戒惡業三對治離謂淨戒具足然惑有二一粗二細犯亦有二一粗二細由粗煩惱起於故犯由細煩惱起於誤犯尚不起誤何況故耶三發光地成就勝定大法總持能發無邊妙慧光故初句標名次釋義隨聞思修照法顯現故名發光謂三慧照當地所聞之法又定為能發持為能持慧光為所發所持由前二地戒能生定因定發慧故四焰慧地安住最勝菩提分法燒煩惱薪慧焰增故初句標名次釋義不忘煩惱薪智火能燒故名焰地焰即菩提慧焰謂根本智火能燒惑智二障薪薪多火熾轉增勝故五極難勝地真俗兩智至合令相應極難勝故初句標名次釋義得出世間智方便善巧能度難度故名難勝謂真俗無違極難勝故以三地同世未能得出四地雖出而不能隨俗多滯二邊難以越度今得出世又能隨俗巧達五明真俗無違能度偏滯實為難勝六現前地住緣起智引無分別最勝般若令現前故初句標名次釋義以有分別智妙達緣生引無分別大智現前悟無染淨真如名曰現前七遠行地至無相住功用後邊出過世間二乘道故初句標名次釋義善修無相行功用究竟能過世間及二乘出世間道一善修無相到無相邊二功用至極三望前超過故名遠行八不動地無分別智任運相續相用煩惱不能動故初句標名次釋義前六地為相用所動第七雖得無相猶住功用今此地中報行純熟令無相觀任運無間功用不動故名不動九善慧地成就微妙四無礙解能遍十方善說法故初句標名次釋義得無礙力說法成就利他行故名善慧得無礙慧尚未稱善遍說遍益方名為善十法雲地大法智雲至如空粗重充滿法身故初句標名次釋義大法智雲謂總緣一切諸法之智衆德謂陀羅尼門三昧門等喻如水者智能藏彼衆德如雲含水有能生彼勝功能故蔭蔽者隔斷義如空粗重即所知障少分及煩惱障謂此粗重廣大如空此智能隱蔽之令不為障礙故攝論云又大如雲覆隱如空廣大無邊惑智二障故又此智充滿所證所依法身猶如大雲充滿虗空故如是十地總攝有為至令得生長故名為地如是下釋地義先出體性有為功德謂四智中觀察平等二智也非餘二者此唯因位餘二在果故無為功德謂地地中所證真如也與此下釋地義地有依持生長之義故以為名十勝行者即是十種至謂受用法樂智成熟有情智十勝下釋此分十一門先十行名義初句標波羅蜜多名施有下別釋義此十勝行前六各有三後四各有二雖各二三顯示差別度度皆具自利利他財施謂無染心捨資生具無畏施謂止損害濟拔悸怖法施謂無染心如實宣說契經等法律儀戒謂於不善能遠離法防護受持由能防護諸惡不善身語等業此即是戒此能建立後二尸羅攝善法戒由自防護能修供養佛等善根能令證得力無畏等一切佛法饒益有情戒由自防護能饒益一切有情令修一切善根法故耐怨害忍即生忍是成熟有情因安受苦忍即法忍是成佛因寒熱饑渴蚊虻等種種苦事皆能忍受無退轉故諦察法忍是前二忍所依止處堪忍甚深廣大法故被甲精進謂最初時自勵我當作如是事誓言假使熱鐵輪在我頂上旋我所作為終無退誓即被甲也攝善利樂二進如戒中釋由自精進故安住靜慮為得現法樂住離慢見愛得清淨故引發靜慮為能引發八神變等一能小二能大三能輕四能自在五能有主六能遠至七能動地八能隨自在所作辦事靜慮為欲饒益諸有情類以能止息饑儉疾疫諸怖畏等苦惱事故般若三品如文方便二者有大智故所作善等不為自求回向有情故不住生死有大悲故為拔濟諸有情類不專利己故不住涅槃二俱無住故稱善巧願謂要誓一佛道無上誓願成二衆生無邊誓願度發僧那於始心終大悲以赴難力謂堪能由思擇力正思決擇應作不應作故由修習力所修善法有勝堪能無怯弱故智有二者由智助成般若令所修滿足受用覺法之樂復由此智成熟有情亦令受用大乘法樂此十性者施以無貪至一切俱行功德為性此十下次十行體性此十行體必依身口意三業及善心所五別境而修各各義相如文配釋後五皆擇法者論說第六是根本智後四皆是後得智并眷屬者如行施時以無貪為體與無貪俱行餘信慚等則是眷屬如施既爾餘行亦然此十相者要七最勝至一一皆應四句分別此十下三十行勝相要七最勝所攝方可到彼岸謂諸世間及二乘亦修施等但感人天有漏及二乘果不到彼岸安住菩薩種性者五性之中簡非餘四菩薩種性方趣極果依止大菩提心者如經云不發菩提心是為魔業悲愍一切有情者不愍有情而行施等秪求自利非兼利故非波羅蜜事業最勝者若不具行一切善事則施等行寡不能滿足無上菩提果故無相智所攝者即三輪體空故回向菩提者問既言回向何異依止大菩提心答彼發大心未必回向此中回向亦定發心又發心在行前回向在行後不為二障間雜者即三時無悔也悔即煩惱不了性空即所知四句者一是施非波羅蜜謂離七種而行布施二是波羅蜜非施謂依七種所集戒等三亦施亦波羅蜜謂依七種所行布施四非施非波羅蜜謂離七種而修戒等如戒四句既爾餘九四句例知此但有十不增減者至證十真如無增減故此但下四十行增減此十不增減者依所治所證皆有十故復次前六不增減者至此如餘論廣說應知復次下前六約治障明不增減除六障者施治慳貪戒治毀犯忍治瞋恚進治懈怠定治散亂智治愚癡次二句約二利故修行成熟廣說如論者六度自體謂棄捨防護堪耐䇿勤心住決擇六度相捨依正名檀防止七支名戒打罵不報名忍為事始終名精進四禪八定名禪分地息諍名般若六度相生謂捨家持戒遇辱須忍忍已精進進已調五根根調知法界六度對治慳吝毀犯忿恚懈怠散亂惡慧六度果報富具色力壽安辨又施報富戒報善道忍報端正進報神通禪報生天智報破煩惱六度功德施即大富位自在所攝戒即大生所攝忍即大眷屬徒衆所攝進即大資生業事成就所攝禪即無疾惱少欲等所攝智即一切工巧明處聰慧所攝如意無失六度滿相尸毗王代鴿檀滿普明王捨國尸滿羼提仙人為歌利王割截無恨忍滿大施太子抒海并七日翹足讚弗沙佛進滿尚闍黎鵲巢頂上禪滿劬嬪大臣分閻浮提七分息諍智滿又施等三增上生道至諸菩薩道唯有此二又施下約二道明不增減施感大財多饒財寶戒感大體謂尊貴身忍感眷屬有情歸附由富勝形及多眷屬趣中增上名增上生道精進勇猛能伏煩惱定能發通成熟有情智慧解悟成就佛法有此三德名決定勝道諸菩薩道唯有此二若闕一種道不成故又前三種饒益有情至永伏永滅諸煩惱故又前下約二利明不增減初三利他布施資財饒益於彼持戒自軌不損惱彼忍辱無違堪忍彼惱次三自利問定能伏惑智能斷惑可得對治之名精進不然何名對治釋云精勤修習對治煩惱行故亦得治名又由施等不住涅槃至由此前六不增不減又由下約無住明不增減前三大悲饒益有情不住涅槃後三大智斷滅諸惑不住生死不住二邊是涅槃因由此下結示此字指前四番後唯四者為助前六至如解深密廣說應知後唯下明後四不增減初句總標以四助六方便下別釋助相回向方便助施微因回為勝果拔濟方便不惱忍惱拔濟彼故上求下化誓願以助精進思擇修習轉劣成勝以助靜慮智能引發出世間慧十次第者謂由前前至釋總別名如餘處說十次下五十行次第初約引持釋前前引發後後者身財無吝便能持戒為護禁戒便修忍辱修忍辱已能發精進精進勇猛能辦靜慮具靜慮已便能發慧得出世慧能行方便有慧方便能發誓願發大願已有堪能力有堪能故能得受用法樂成熟有情之智後後持淨前前者任持於智方能淨力乃至任持尸羅令施清淨次約粗細釋前粗後細者布施為粗持戒則細戒望於忍戒粗忍細傳傳論粗細難易修習者承上粗細轉明難易布施則易屬外財故持戒為難防身口故望忍又易忍屬心故傳傳論難易粗故易修細故難修前八並名前前後八並名後後隔位相望故致重言第一不名後以無前故第十不名前以無後故第二唯名後非是後後無前前望故第九唯名前非是前前無後後望故第一第二唯名前前不名後後無前前故第九第十唯名後後不名前前無後後故中間餘六亦名前前亦名後後別名施等總名波羅蜜此云彼岸到一一行契性空皆悉到於彼岸此十修者有五種修至如集論等廣說其相此十下六十行修圓依五圓滿初句總標依五修十一依下別釋五修任持修者住菩薩種性任持一切佛法而修作意修者謂以勝解決定願樂等心誓求菩提而修意樂修者謂以無懨足起大意樂起大慈悲憐愍有情志期度脫而修方便修者謂無分別智達三輪體空使微因成大善故自在修者謂地上菩薩分證法身而能隨類現身得自在故分得四辨能宣佛法得自在故以此自在而修施等依此下結又此五修會前七最勝於前七中唯除第四事業及第六回向其餘如次即此五修此十攝者謂十一一至展轉相望應作四句此十下七十行相攝先自類相攝初句總明一一通攝一切互相順故如頌云檀度攝於六資生無畏法此中一二三是名修行住戒定各攝六度如後三學中釋餘可例知後四既為第六所攝是故十法一一互融依修下明別攝依前前引發後後義則前定攝於後以後必待前引故後不攝前以前不待後引故依後持淨前前義則後必攝於前以後能持淨前故前不攝後以前不能持淨後故純雜四句一是純非雜如初地純修於施不修餘九故二是雜非純通修餘行故三亦純亦雜正修布施兼修餘行故四非純非雜依別行門不修此十故此實有十而說六者至後得智攝緣世俗故此實下次六十互攝根本後得二智合則言六開則成十此十果者有漏有四至或互相資或二合說此十下八十行感果謂資糧加行屬有漏位所修諸行感果有四謂等流增上異熟士用除離繫者唯無漏故通達修習屬無漏位所修諸行感果亦四謂等流增上士用離繫除異熟者唯有漏故而有下通妨問有處說有漏無漏皆感五果何也答或漏無漏互相資說或二合說十與三學互相攝者至甚深廣大如餘處說十與下九十攝三學初明戒學初句總標次別釋三義一律儀戒者白四羯磨性重譏嫌等無差別不為愛見羅剎毀戒浮囊二攝善法戒者厭惡出家捨於所愛即是檀纖毫不犯拒逆羅剎即是尸安忍打罵寧耐八風即是忍守護於戒犯心不起即是精進決志持戒不疑不動即是禪知戒是解脫本非牛狗等即是般若雖列六度六全成戒三饒益戒如文三戒與二乘共不共者律儀是共餘二不共以二乘不能攝佛法故不能廣益有情故又聲聞律儀止持作犯菩薩律儀或開或遮斯則共中不共唯佛一人居淨戒此戒甚深戒體稱性遍周法界此戒廣大定學有四一大乘光明定至引發作業如餘處說定學下次明定學初句總標次別釋四義初光明定者定能生慧故此為能照依理立教依教修行依行得果此為所照定光能了始終因果故二集福王定者定能集諸行故衆生縛著世間生活業務不能暫捨菩薩棄之一心入禪是名檀若不持戒禪定不發又入禪時雜念不起任運無惡是尸拘撿身口捍勞忍苦制外塵不著抑內入不起是忍初中後夜繫念相續行住坐臥心常在定間念不生是精進一心在定不亂不味是定若一心在定能知世間生滅法相深識邪僞是般若定中能具能生諸功德慈悲荷負故言集福如王後二如文此四所緣者謂大乘法為所緣故對治者謂一切法總相緣智以楔出楔遣阿賴耶識中一切粗重障故堪能者謂住靜慮樂隨所欲而受生故引發者謂能引發一切世界無障礙神通故作業者謂能顯示轉變往來卷舒或顯或隱所作自在故慧學有三一加行無分別慧至所緣行等如餘處說慧學下次明慧學初句總標次別釋三義攝論釋加行慧是尋思慧又希求慧加行名無分別者由此能生無分別智亦得此名根本慧是正證慧是內證慧加行是此智因後得是此智果後得慧是起用慧是攝持慧此三依初後立名雖異體唯是一言起用攝持者攝持種種功德故起種種化用故自性者謂於真義不異計度以為自性所依者謂無分別智所依心非思議故亦非非心為所依止心種類故以心為因數習勢力引得此位名心種類此即顯示智所依心出過一切思量分別因緣者謂於大乘言音熏習聽聞由此所引功能差別及如理作意等所緣者即是無性所顯真如解脫增益損減二邊斯是無分別智所緣境界行相者於所緣境相似而行故名行相無分別智於真如境相似而行離一切相作意行相以為行相如是三慧初二位中至加行現種俱已捨故如是下約位判三慧種現初二位謂資糧加行此二位中三智種子皆有以具法爾無漏種故現唯加行慧者未證真如無本後二智故通達位中現唯本後二智者以初見道乍證真如無加行故修習位中有二義別始從見道乃至七地位中種現皆三以七地已前位位之中皆有無間解脫及勝進道故八地以去現唯二者以無功用不假加行而修進故若爾進趣後位以用何智釋云用後得作無漏觀任運進趣入餘位故究竟位中現種俱二者金剛道後解脫道中并捨加行種故若自性攝戒唯攝戒至定攝靜慮慧攝後五若自下正明相攝此中相攝有四種義一自性攝不取俱行助伴但各舉其當體而言故云戒唯攝戒等二若并助伴相攝者此三學與十行一一皆攝一切三隨用相攝者戒攝前三施即戒之資糧戒即自體忍即戒之眷屬性故四隨相顯相攝者戒攝前四前三如前及加攝精進者由精進力守護防非戒令淨故定慧相攝如文此十位者五位皆具至若現若種俱唯無漏此十下十十行修位漏無漏初句標五位皆修十行修習位最顯如經云初地修檀最為增上乃至第十地修智最為增上即最顯義然初下復約五位顯此十行種現通漏無漏若資糧加行位頓悟菩薩所修勝行種通有漏無漏現唯有漏種通無漏者此指法爾無漏種言也後位種通無漏皆然漸悟菩薩於初二位所修勝行種現俱通有漏無漏現通無漏者謂於地前修生空觀已伏分別現起煩惱與觀相應勝行通無漏故然於俱生現起煩惱猶未永伏是故亦通有漏通達位中現唯無漏者已斷分別二障種故修習位中復分二位七地已前生空法空或出或入所修勝行種現應通二故八地以去現唯無漏者遠行地後純無漏故種通有漏者法執未盡故究竟位中種現俱無漏此十因位有三種名至及煩惱種故未究竟此十下十一因位異名梵言阿僧祇此云無數初無數劫者且約釋迦因位而言從古釋迦至尸棄佛中值七萬五千佛爾時自未知作佛此是初阿僧祇爾時下釋名名義爾時行微惑強未得無漏依勝解力修諸勝行但有到彼岸之名字約位則屬資糧加行第二無數劫者從尸棄至然燈佛中值七萬六千佛爾時自知作佛口不向人言此是第二阿僧祇爾時下釋名近義爾時行增感伏所修未得無功用住故名近波羅蜜多約位即是通達及修習中七地已前第三無數劫者從然燈至毗婆尸佛中值七萬七千佛爾時自知作佛口亦向人言此是第三阿僧祇爾時下釋名大義爾時行力轉增純無漏故惑永不行故名大波羅蜜多約位則八地以上猶有下簡異究竟所知種現煩惱種子此二猶有故未究竟此十義類差別無邊至而皆攝在十到彼岸此十下指廣結略地地相增言一行行類攝言十十重障者一異生性障至是故二性無俱成失十重下釋十重障初二句標總別名謂二下出障體謂此異生性障依分別煩惱所知種立斷此二種即得聖性二乘下明大小乘所斷單復不同二乘見道唯斷煩惱一種名得聖性菩薩見道雙斷煩惱所知名得聖性二真下通妨難云若異生性見道前捨無漏果起無有凡聖俱成就失今既依於見道斷種即無間道有惑種俱見道即聖惑種即凡此有凡聖俱成之失釋中先約法直明見道現前彼種不成猶明下次舉喻顯如言明生暗滅不妨明生不與暗並如言一稱低昂不妨昂時即低是故下合法見道聖位現在前時異生性種必不成就是故二性無俱成失無間道時已無惑種至及證此品擇滅無為無間下簡二道差別先問斷惑下釋由二義故起無間已復起解脫一者無間期心斷惑解脫期心證理二者無間斷彼惑種解脫捨彼粗重無間下通妨問曰惑種粗重有何差別而分二道斷耶釋云無間起時雖無惑種解脫為捨無堪任性及證無為故分二道文中言種子粗重無堪任性下文又言隨眠者此約何義立名有別集論云若善品所攝有堪任性及無記品所攝染汙品所攝皆名種子若染汙品所攝及無記品所攝名為粗重無堪任故若染汙品所攝唯名隨眠又於諸自體中所有種子若煩惱品所攝名為粗重亦名隨眠若異熟品所攝及餘無記品所攝唯名粗重不名隨眠若信等善法品所攝種子不名粗重亦非隨眠何以故由此法生時所依自體唯有堪能非不堪能是故一切所依自體粗重所隨故粗重所生故粗重自性故今言無間斷種子者約分別種子中染汙品說解脫斷粗重者約俱生粗重中有覆無記是染汙品氣類攝故此二輕重異故先重次輕粗重即無堪任性下文隨眠唯染汙品雖見道生亦斷惡趣至後粗重言例此應釋雖見下正明初地所斷問見道亦斷惑惡趣諸業及惡趣諸果今何但言斷異生性耶釋中初句牒問而今下釋云煩惱是能起業果二種之根本以本攝末亦斷業果文中略不言耳由斯下承上俱斷故說初地通斷二愚現行及彼粗重一執下釋二愚相執著我法愚謂分別煩惱所知即異生性障二惡趣雜染愚謂即諸業諸果應知下問愚即癡分執著我法可名為愚業果非癡分攝何亦名愚釋云惡趣業果是愚品類總說為愚後准此者後九地誤犯三業等皆即愚品亦說為愚故云後准此釋或彼下又一解或彼初地說斷二愚者即利鈍障相應二無明也利即五見鈍即貪等但二無明不兼業果故彼粗重言顯彼二愚種子次又一解或粗重言不約種子但約二愚所起無堪任性問種子粗重此二義同何云非種而是粗重如入上舉例釋如無心二定所斷苦根非現非種而名粗重此中所斷亦然非是種子而名粗重即無堪任性後九地斷例此皆然雖初地所斷實通二障至不斷隨眠故此不說雖初下約二障簡異先約二障簡問初地菩薩通斷二障今異生性障是何攝耶釋中初句牒問次句正簡異生性障意取所知說十下二句釋成十地障愚即是無明所知非染汙故反簡不取煩惱染汙故問曰何故不說斷煩惱障釋云此與二乘共斷故不言之次約見修二斷簡又十無明不染汙者唯依十地修所斷俱生所知說非謂見所斷分別說問曰此修習位亦伏煩惱斷彼粗重何故但說斷所知耶釋中初句牒問而非下釋云斷煩惱障非是十地正意故不說斷煩惱隨眠正意唯在斷所知故前簡分別煩惱種菩薩雖斷與二乘共斷故不說此簡俱生煩惱種留種助生不斷故不說理實初地修道位中至將成佛時方頓斷故理實下明地地初後斷障問曰既言十地無明依修所斷說是則初地亦斷俱生一分何故前言初地斷異生性障是分別起耶釋云理實修道亦斷俱生一分今言斷分別者且約最初所斷而言初地有三心初心斷分別後心斷俱生後地約粗細分二心所斷例知問曰何故初心斷已後心復斷耶釋中住滿下出初地斷俱生之所以滿地謂初地後心所應斷障謂二地邪行障三時道者初時無間道斷本地惑中時解脫道證本地理後時勝進道進斷次地惑初地後心若不進斷則初中後三道應無差別既分道別故知亦斷俱生一分如初地後心即入二地初心故初地後心所斷即二地初心所斷障唯一種約粗細分二耳故說下引證先證斷所知現觀即六現觀中四五二觀留煩下明不斷煩惱所以二邪行障謂所知障中至或唯起業不了業愚二邪下初句標名謂所下出障體邪行者犯戒垢心也覆淨尸羅故名曰障及依障所起誤犯身口意所作之業彼障下明障相由斯下承上俱斷故說二地通斷二愚現行及彼粗重下釋二愚相一愚即俱生所知障以無明為體二愚即誤犯三業依無明而起是愚品類總說為愚或唯下又一解或是能起業之無明不了業性空故三暗鈍障謂所知障中至能障總持聞思慧者三暗下初句標名謂所下出障體忘失聞思修三慧故名暗鈍彼障下明障相此中總說通障三慧下二愚中別分各障由斯下承上說斷二愚一欲下釋二愚相一欲貪能障定及修慧問曰上標所知今何得舉欲貪煩惱釋云昔時彼障多與欲貪俱起約相依義名欲貪愚障斷欲伏欲依障轉故二聞持愚持即思也持有四種法持義持呪持能得忍持愚通障之四微細煩惱現行障至故能永害此身見等四微下初句標名謂所下出障體此障乃第六識相應俱生身見等煩惱攝最下下約三義釋微細最下品者有覆無記故不作意者任運起故遠隨現行者自無始隨逐身轉故彼障下明障相菩提分法者以有身見障四念處不能觀身不淨等問上言所知今言煩惱者何也釋云昔時彼障多與身見同體起故約相依義說煩惱名菩提分法正斷所知此我見等亦永不行問曰初二三地何不能斷釋此如文寧知此與第六識俱至故此但與第六相應寧知下簡異先問六七二識皆有俱生身見何理定知唯第六俱第七下釋第七我見與純無漏性相違故七地已前未純無漏猶得現起八地以去方永不行此之身見與我愛等為依持故七地滿心方頓伏故又第六俱粗第七俱細粗者前伏細者後伏故此四地所伏煩惱唯第六俱身見等言亦攝無始至煩惱二愛亦永不行身見下釋等字此之等言亦攝所知障攝定愛法愛定法二愛是煩惱名由與二愚俱起是故攝入所知由斯下承上說斷二愚一等至愛愚即是定愛相應所知二法愛愚即是法愛相應所知所知障攝二愚斷故煩惱二愛亦永不行五於下乘般涅槃障至即是此中樂涅槃者五於下初句標名謂所下出障體厭苦欣寂義同二乘欣厭未忘取捨角立彼障下明障相能障真俗無差別道此地真如名類無別故由斯下承上說斷二愚二愚即是欣厭六粗相現行障至未能多時住無相觀六粗下初句標名謂所下出障體言粗相者形於後地名為粗相簡非種子故名現行十二緣生名染粗相十二緣滅名淨粗相彼障下明障相無染淨道謂最勝般若現前即證無染淨真如由斯下承上說斷二愚執有染者執有順生因緣流轉門執有淨者執有逆觀因緣還滅門相觀多行者有相觀多無相觀少七細相現行障至未能空中起有勝行七細下初句標名謂所下出障體言細者形於前地故說為細此亦觀因緣與前異者前執流轉還滅之染淨相此執流轉還滅之生滅相彼障下明障相由斯下承上說斷二愚一執有取生二求無取滅作意求無未能從空出假故八無相中作加行障至生空智果不違彼故八無下初句標名謂所下出障體令無相觀不任運起加行障故前之下對前三地歷明此地於無相中有加行故未能任運現相現土是故為障如是下明障相由斯下承上說斷二愚一無相中作加行二不能自在現相土亦攝相土者愚中攝此一分故八地下簡所斷障由此地有加行障故但斷六識中煩惱障不斷第七中所知障生空智果不違彼故者反顯加行障能障法空智故九利他中不欲行障至皆是此中第九障攝九利下初句標名謂所下出障體利他中不欲行障者如經云第八不動地菩薩入無生法忍三際平等寂滅現前若諸佛不與此菩薩無量起智門者彼時即入究竟涅槃棄捨一切利衆生事即此障也彼障下明障相總標障四無礙解由斯下承上說斷二愚初愚障三種無𠵨解次愚障辨才無礙解皆如文愚能下結此愚能障四種無礙解即是第九地中第七識細所知障攝十於諸法中未得自在障至大法智雲及所含藏者十於下初句標名謂所下出障體彼障下明障相由斯下承上說斷二愚一障所起事業者謂化他神通作用如華嚴云佛子此地菩薩智慧明達神通自在隨其心念能以狹世界作廣世界廣世界作狹世界或隨心念於一毛孔示現一切佛境界莊嚴之事等二障大法智雲謂能含之智所含藏者謂力無畏諸功德愚能障此二種此地於法雖得自在至證大涅槃大菩提故此地下明斷佛地餘障初句結前次句起後謂有下出障體所知種現煩惱種子金剛喻定即十地滿心將入佛地無間道斷障究盡喻如金剛由斯下承上說斷二愚故集下引證通證三乘無學頓斷二障頓證二果故
