body:
  text: 明武林蓮居弟子大惠録已説二十隨煩惱相不定有四其相云何已説下釋不定先結前徵後頌曰不定謂悔眠尋伺二各二頌曰下舉頌答論曰悔眠尋伺於善染等至定遍地故立不定名論曰下釋通名此四名不定者信等唯善貪等唯染各唯局一此非如彼通善通染故名不定等等無記顯此四位遍通三性也非如下二句舉例以定對顯不定觸等遍心欲等遍地各皆定遍此非如彼此四唯局意識不遍餘七心前二唯在欲後二止初禪不能定遍地故名不定前一句約通二言不定後二句對定遍例不定悔謂惡作惡所作業至如是事業是我惡作悔謂下次釋別相初釋悔先出別名次出體用惡作者謂所作業惡也惡己所作之業追隨懊悔為性障止為業止體寂靜悔與掉俱囂動障之此即下轉釋悔名惡作惡作是因名追悔即果稱今於悔位名惡作者此即於果假立因名即有財釋也次句釋果立因名意先惡所作後方追悔故悔先下則先不作亦惡作攝次舉事釋相悔先應作不作是我惡作作與不作皆名惡作者如先不作善後起悔心此悔名善若先作惡後起悔心此悔亦善先不作惡後起悔心此悔不善若先作善後起悔心此悔不善無記作不作例之故此遍通三性眠謂睡眠令身不自在至如餘蓋纏心相應故眠謂下釋眠六情暗曰睡四肢放解曰眠先二句出體用觀體惺察暗劣障之謂睡下轉釋身不自在者身通四儀眠唯局臥故心極暗劣釋昧寤時六識靈明照了眠位心智昏暗狹劣一門轉者釋略意識緣境通乎內外夢中獨頭略向內門此與定寤外儀似同昧略有異定位惺惺寤時周悉二字合顯睡眠體用有無下辨異問無心睡眠無此體用何故亦立此名答由此似此假立此名如餘下立量喻有體用睡眠非無體用心相應故如餘蓋纏謂五蓋十纏也睡眠蓋纏所攝餘為同品有義此二唯癡為體説隨煩惱及癡分故有義下明二法分位四解不同初解癡為體引論證成有義不然亦通善故至説隨煩惱及癡分攝有義下次解通染淨不然二字斥前次句立通二性應説下釋成染二以癡為體淨二體即無癡論依下通前所引有義此説亦不應理至如不信等説為癡分有義下三解初二句總斥前無記悔眠不屬善染應無體耶應説下申己意悔思慧攝眠思想攝皆初句標次句釋次引論世俗有以證他分攝彼染下立量通前引論染汙悔眠説為癡分是癡等流故如不信等有義彼説理亦不然至隨癡相説名世俗有有義下四解初二句總斥非思慧思想為體次句立意悔纏眠纏是二體性應説一句明別有體與餘一句以用有別顯體有別此二與餘五位心所行相別故隨癡一句通論意論隨他相名世俗有非無別體尋謂尋求令心匆遽至體類差別不可得故尋謂下合釋尋伺先出尋體尋逐追求令心匆務急遽於意言境粗疏運轉為性次出伺體伺候觀察令心匆務急遽於意言境細密運轉為性意言境者意所取境多依意地名言故此二下合明二用於意言境細轉與安住身心作所依於意言境粗轉與不安住身心作所依粗細雖異並用思慧一分為體若令心安即是思分令心不安即是慧分思者徐而細故慧者急而粗故言並用者有兼有正若正用思急慧隨思能令心安若正用慧徐思隨慧亦令不安尋則正用慧兼用思一分伺則正用思兼用慧一分故云並用思慧一分為體於意下通妨問云體皆思慧何義顯別答二體雖同而尋粗轉則淺推度而伺細轉則深推度粗細淺深義類各別若離下反顯若離思慧尋伺體性不可得故及義類差別亦不可得二各二者有義尋伺各有染淨二類差別二各下釋二各二三解不同初解尋伺是二各有染淨二別故名二各二有義此釋不應正理至或復各有纏及隨眠有義下次解初句斥前次句舉悔眠對斥此師亦以尋伺為二但言不應通淨唯應在染故斥云悔眠亦有染淨二故故不應以染淨名各二若以染淨名之濫及前二故不應理應説下舉例正釋如染心所有根本隨惑二性不同例此尋伺各有不善有覆無記二性或各有纏隨眠名二各二纏謂現行眠謂種子有義彼釋亦不應理至故置此言深為有用有義下三解初二句斥前不定四後有此言故如何唯局尋伺故不應理應言下次申正義應言二者牒頌二字次句標列此初二字顯二種二一種二謂悔與眠二種二謂尋與伺此二下釋義此二二種牒上悔眠尋伺各有種性品類故故一二言顯二二種此各下釋各二此字指悔眠尋伺一一通二故言各二謂染與不染非如一句舉例對顯各二相善所唯善染所唯染各唯定一此非如彼故言各二或簡唯染故説各二言次句釋簡意有亦説為隨煩惱故為顯此四通染不染不定一相故説二各二言深為有用者如上種類各別通染通淨簡唯染具此多義故言有用四中尋伺定是假有至而論亦説世俗有故四中下異門分攝初判假實尋伺假有引論證成悔眠二解初解假有次正解是實唯後下一句舉尋伺假有對顯悔眠是實世俗下三句通前引論論世俗言但顯後二非顯前二又如下立量顯實悔眠體雖是實論亦説世俗有故如內種子四中尋伺定不相應至前二亦有互相應義四中下自類相應尋伺二法定不相應次句釋不相應義思慧體同故粗細用異故依於下通妨難云尋伺若不俱起如初禪伺起尋不起豈不濫同近分無尋唯伺地答依於尋伺有染離染立三地別初禪尋伺俱染立有尋有伺地近分先離尋染立無尋唯伺地二禪二染俱離立無尋無伺地不依種起現行有無立名故此三地無雜亂失不應為難俱與下明尋伺與悔眠容互相應悔眠亦互相應四皆不與第七八俱至第六識俱非五法故四皆下諸識相應四皆不與第七八俱義如前説者第八中簡云惡作等四無記性者有間斷故定非異熟第七簡云惡作追悔先業此緣現境睡眠重昧外緣暫起此唯內執尋伺依外門轉此依內門故非彼俱悔眠唯與第六俱起非是前五相應法故有義尋伺亦五識俱至任運分別謂五識故尋伺二解初解尋伺亦五識俱次引論證復引瑜伽尋伺即七分別分別即尋伺復引雜集任運分別謂五識會通瑜伽尋求伺察任運諸分別今此二論分別既同以證五識亦有尋伺七分別者謂有相分別無相分別任運分別尋求分別伺察分別染汙分別不染汙分別有義尋伺唯意識俱至曾不説與苦樂俱故次解尋伺唯意識俱次引論證此是意識不共法故復引論説尋伺憂喜相應不説尋伺苦樂相應五識有苦樂不説苦樂以證尋伺不與五識相應捨受遍故可不待説至而似憂故總説為憂捨受下通妨難云尋伺有苦樂俱但彼論文略而不説例如捨受定有亦不説故釋曰捨受遍故可不待説苦樂非遍何緣不説復難云五識有苦樂尋伺無苦樂若言尋伺無苦樂而説尋伺不與五識俱然前云初靜慮有意地樂純若處有意地苦若言尋伺無苦樂亦應尋伺不與意識俱耶釋曰初靜慮樂總名為喜純若處苦總名為憂既説尋伺憂喜相應是故尋伺唯與意俱又説尋伺以名身等至以名身等義為境故又説下約所緣明與意俱論説尋伺以名句文身義為所緣唯意識境非五識緣是故尋伺唯與意俱故與五識定不相應然説五識有尋伺者顯多由彼起非説彼相應然説下通前瑜伽初句牒次句釋五識有尋伺者顯五識多分由尋伺引起非説此與彼尋伺相應雜集所言任運分別至由此五識定無尋伺雜集下通前雜集初二句先判二論義別雜集所言與瑜伽異彼説下正釋義異雜集説任運即是五識瑜伽所説七種分別是五識同時意識相應尋伺故彼一句斥引不成由此一句結五識定無尋伺有義惡作憂捨相應至純苦趣中意苦俱故有義下諸受相應先初解悔與憂捨俱戚行釋憂無記釋捨眠與喜憂捨俱歡戚中庸釋成通三義尋伺與憂喜樂捨俱次釋樂俱初靜慮中意有樂故有義下次解四各加苦次釋苦俱純苦趣中意有苦故四皆容與五別境俱行相所緣不相違故四皆下別境相應四皆五俱能緣行相所緣境界彼此不相違故悔眠但與十善容俱至初靜慮中輕安俱故悔眠下與善相應悔眠唯在欲界但與十俱不通上地故無輕安尋伺全俱通初禪故故有輕安悔但容與無明相應至此彼展轉不相違故悔但下煩惱相應悔但癡俱次釋不與九俱意悔行相粗貪等九法細故餘三全與十惑俱此彼不相違故悔與中大隨惑容俱至眠等位中皆起彼故悔與下隨惑相應悔與中大俱次句明不俱意忿等各為主故餘三與二十全俱次句明俱意眠位皆容起故此四皆通善等三性於無記業亦追悔故此四下明三性攝初句總明四通三性次句別明悔通無記問於善惡業追悔云何亦通無記釋如文有義初二唯生得善至聞思位中有悔眠故有義下別釋善性悔眠唯生得善不通加行次句釋不通意悔相粗鄙眠相昧略加行細悉故尋伺通生得亦通加行次句釋通加行聞所成等等思修三慧皆有尋伺故有義下次家釋悔眠亦通加行次句釋通加行聞思即加行亦有善悔善眠息故後三皆通染淨無記至不能尋察名等義故後三下別釋無記後三皆通二無記染謂有覆淨謂無覆悔非有覆悔相粗猛彼審細故無記有四異熟威儀工巧神通悔唯中二謂威儀工巧非定果者明除意非禪定故除神通非果報故除異熟眠除第四非定引生者釋除神通異熟生心亦得眠者釋有異熟異熟生心謂無記第六尋伺除異熟有三無記彼解微劣一句釋除意惡作睡眠唯欲界有至餘界地法皆妙靜故惡作下明界繫先判界攝如文餘界地法皆妙靜者此明尋伺粗動不遍上七地上地法皆妙靜故悔眠生上必不現起尋伺上下亦起下上悔眠下明現起上地有情悔眠不現者唯欲有故上地起下尋伺下地起上尋伺下上尋伺能緣上下至夢能普緣所更事故下上下明相緣伺尋二法下能緣上上能緣下悔眠二解初解悔眠不能緣上次句釋成不緣悔粗近故眠昧略故次解悔眠亦緣上境次二句釋成能緣邪見悔修定故夢緣上起曾更境故悔非無學離欲捨故至有為善法皆無學故悔非下明三學攝悔非無學者此唯在欲不還果人已捨欲界染故後三皆通學無學等此三善性攝者名有為善求解脫者是有學位所為善法亦皆無攝學究竟者所為善法亦皆無學攝悔眠唯通見修所斷至故通見修非所斷攝悔眠下明三斷攝悔眠唯通見修所斷此顯不通非所斷亦邪下一句釋成二斷邪見力起者見所斷攝等者等有漏善攝者修所斷攝非無下一句釋非所斷無漏道引者非所斷今初非字簡之非非所斷亦非一句舉例對釋非所斷憂受深求解脫是非所斷此非如彼故非非所斷有漏者已斷後起無漏者非所斷則無學眠非所斷攝尋伺通三斷尋伺下釋通三義尋伺雖非無漏能引無漏者通見修斷無漏引生者通非所斷有義尋伺非所斷者至瑜伽説彼是分別故有義下二家判尋伺所攝初解判尋伺非所斷者於五法中唯第三分別攝次引論證是分別五法者一名二相三分別四正智五如如有義此二亦正智攝至又説彼是言説因故有義下次解非唯分別五法中分別屬有漏故亦通正智攝説正下釋成正智攝八聖道中正思惟是無漏故思能令心尋求伺察故又説思惟是言説因思是語加行故此釋思惟是無漏思引尋伺亦是無漏故正智攝未究竟位於藥病等至故此二種亦通無漏未究下轉釋菩薩在於未究竟位於諸法門及衆生心行等未能周悉如實了知後得智中為他説法必假尋伺推求藥病然後隨機為説妙法非如佛地無功用説故此二種亦通無漏雖説尋伺必是分別至後得正智中亦有分別故雖説下通論斥前論説尋伺必是分別而不定説五法中第三後得智中亦有分別故論所説者正智中分別屬無漏故非第三分別屬有漏故此約名同義別斥之餘門準上如理應思餘門下結示如是六位諸心所法至設爾何失二俱有過如是下明王所即離先總申問答初三句問王所為離為即次句答設令即離為有何失次復總難若即若離二俱有過若離心體有別自性至或似於信等無別染善法若離下先釋離心之過初句舉定離心如何下引教出過如契經説三界唯心又説所緣唯識所現攝論頌云心遠行獨行無身寐於窟能調伏難伏我説婆羅門今此頌中所言心者亦名為意亦名為識言遠行者遊歷一切所識境故獨行者無第二故無身者無形質故寐於窟者居在內故難伏者性𢤱悷故引頌初句者意顯無別心所染淨由心者如契經説心雜染故有情雜染心清淨故有情清淨士夫六界者如瑜伽論云四大空識能成有情色動心三最勝所依色依四大動依於空心依於識皆不言心所又莊嚴論説心似二現似信似貪無別染善離心實有若即是心分位差別至因緣無別故與聖教相違若即下次釋即心之過初句舉定即心分位如何下引教出過喻伽中問云諸法誰相應為何義故建立相應答他性相應非自性故為遍了知依自性清淨心有染淨法若增若減是故建立相應又説心與心所俱時而起如日與光光若即日云何空中復見圓日以此喻明所非即心瑜伽頌言五種性不成有一沙門若婆羅門欲令名中唯心實有非諸心法此不應理何以故且説諸蘊有五種性不成就故又若彼計分位別故有五性者分位別計亦有過失何以故是諸分位展轉相望作用差別若有若無皆成失故若言有者由相異故便應有異實物體性若言無者計分位別則為唐捐又不應説如六識身分位差別由六識身所依所緣有差別故是諸分位一處可得故不應理若謂轉變亦不應理何以故於有色物可轉變故得有分位前後差別非於無色有如乳酪生酥等異又心因緣無差別故行別分位不應道理於一剎那必不可得差別因緣令彼分位而有差別是故汝計分位差別不應道理又違教故唯心實有不應道理如契經言貪嗔癡等惱染其心令不解脫若唯有心二不俱有是即貪等應不依識若汝復謂以識為先亦不應理無差別過前已説故又復經言三和合與觸俱生受想思等又餘經説如是諸法恆共和合不可説言如是諸法而可分析令別殊異又佛世尊為欲成立此和合義説燈明喻是故不可離彼俱生而説和合故名所攝四無色蘊心與心所更互相應道理成就應説離心有別自性應説下申正義如是六位諸心所法離八心王有實自性前斥離心有過今立離心別有者以有後文二諦融判此為語端以成非即非離也以心勝故説唯識等至及現似彼皆無有失以心下通前引教問曰教言唯識唯心今謂離心別有此云何通答曰教説唯識等者以心勝所劣從勝言也一能為主二能為依三行相總四恆決定心所不爾故心勝也次通心似二現心所依心勢力引生故説似彼現非彼心所即心又言唯識唯心者亦攝心所恆相應故唯識下結顯離過等言者謂遠行獨行染淨由心士夫六界等此依世俗若依勝義至是謂大乘真俗妙理此依下結示諦理且依世俗別説有體若依勝義非即非離諸識下例王亦然俗故相有八真故相無相是謂下一句結成二諦已説六識心所相應至及無心二定睡眠與悶絶已説下明識現起分位初文結前徵後次舉二行頌答初句六識共依門次四句六識俱轉門後三句五位不行門論曰根本識者阿陀那識至以根本識為共親依論曰下先釋第一句共依門阿陀那此云執持言根本者轉未轉依染淨諸識現行生起之根本故共依者現行本識為諸識所共增上緣依親依者即種子識是諸識各別親種為諸識親因緣依五識者謂前五轉識至衆緣和合方得現前五識下釋第二句俱轉門五識下明總説五識意種類相似者一同依色根故二同緣外境故三俱緣現在故四俱現量故五俱有間斷故是故總明隨緣現言顯緣合生不合不生非常現起緣者頌云眼識九緣生耳識唯從八鼻舌身三七後三五三四若加等無間從頭各增一九緣者根境空明作意種子根本染淨分別八除明緣七除空明五除空明染淨分別分別即自染淨即根三唯作意及自種子根境是一依緣同故四唯根境種子作意各又增一等無間緣今謂五識內依本識外隨作意五根境等衆緣和合方得現前由此或俱或不俱起至此等法喻廣説如經由此下釋第三四句由隨緣現或俱或不俱次句釋俱不俱衆緣頓合五識俱生漸次合時或四至一如水濤波隨風等緣或多或少如經廣説由五轉識行相粗動至故無緣礙令總不行由五下釋後頌初一句先通明諸識諸識行相有粗有細所藉衆緣有多有少所以現時有起不起又五識身不能思慮至由斯不説此隨緣現又五下次別明六識問前五言隨緣有現不現時意識亦隨緣何故常現起今釋中以前五識有間對顯意識常起此約思慮能與不能是故轉處內外門異故令五六現起有殊五位者何生無想等至故六轉識於彼皆斷五位下釋後三句五位不行門先總徵標列次別釋無想天因中習定求離粗想承斯定方生彼天中違六轉識想滅為首從此立名廣果無想身壽雖同廣果以無尋伺為因果無想以無心為因果有義彼天常無六識至又説彼為無心地故有義下料簡六識有無先初解初句立定常無六識次三句引教證成唯有有色支者十二支中名色一支有色無名故有義彼天將命終位至依長時説非謂全無有義下次解初句立定彼天命終要起轉識次句釋成潤生愛與意識俱故瑜伽下引證然説下通前引教有義生時亦有轉識至如餘本有初必有轉識故有義下第三解初句立定生時亦有轉識次句釋成中有必起潤生惑故如餘下舉例明有轉識餘謂餘禪天本有初者俱舍頌云本有謂死前俱生剎那後本有即是今身未至當有故言初者即本有初生時也量云正受生時是有法必有轉識宗以彼中有必起潤生愛故因如餘本有初瑜伽論説若生於彼至先有後無乃名入故瑜伽下引入義證成初生有轉識生彼唯入不起彼本下釋成初句反釋次句順釋彼本有初必有轉識後時滅此而住無心乃名入故決擇分言所有生得至故彼初位轉識暫起決擇下引滅義證成初生有轉識生得者謂報得異熟生心心所滅此名無想故此言下轉釋論意顯本有初有異熟生無記轉識暫時現起由昔串習此定勢力違前轉識令不現行因此引起真異熟識分位差別説名無想如善下例明加行善根所引發定故名善定此亦應然無想引生説名無想異熟不爾下斥前以論義責示若本有初竟無轉識如何可言唯生得滅既言生得滅故彼初位轉識暫起彼天唯在第四靜慮至能感彼天異熟果故彼天下明所居界地初句判定在四靜慮四禪有九天此當第四次二句釋不居上下地意下地想心粗動難斷上無無想異熟處故無處者四空滅色存心無想滅心存色彼既無色無存異熟色處即能下約因顯果思即意業此為能引定為所引思為能感果為所感因既無想果必稱因及無心二定者謂無想滅盡定俱無六識故名無心及無下次明二定初二句牒頌總標別列二名次句先釋無心通名無想定者謂有異生至令身安和故亦名定無想下別釋無想定先明修因功能遍淨即三禪中第三天伏此天貪此上未伏厭想如瘡如癰如病如箭入體出離作意為先令六轉識及心所滅想滅下釋立名義問心所俱滅何唯無想答想滅為首立無想名問既言無想何復名定答如文修習此定品別有三至窮蒲壽量後方殞沒修習下明定類差別因有精勤怠情於現法退不退異果中形色壽命不同分下中上種類差別窮蒲壽量者盡五百劫也此定唯屬第四靜慮至四業通三除順現受此定下明攝屬界地初句判屬第四靜慮善所引故唯善下上地無如前所説四業者一順現受上上品善不善業最極殊勝現身便受故二順生受中品之業稍降上者次生便受故三順後受又稍劣中品者二生已後乃至多生受故四順不定受最微劣下品業排遣在後時節不定故瑜伽四句料簡謂時定報不定報定時不定時報俱定時報俱不定時報俱定屬前三餘三句屬第四除順現受者非於現生即受彼天報故通不定者或有外道由謗解脫生地獄故或轉修正業超出界故此是時報俱不定句也有義此定唯欲界起至故唯有漏非聖所起有義下明修起處初解欲界修起次解欲界修色界起除無下明此定有漏聖所不居除無想天至究竟者四禪九天無雲福生廣果無想無煩無熱善見善現色究竟謂上流般不還果人遍沒者越無想天生色究竟此由下釋越義此天由外道厭想欣彼果入故唯有漏非聖所起是故除之瑜伽論云此無想定非學所入亦非無學何以故此中無有慧現行故此上有勝寂靜住及生故又復此定不能證得所未證得諸勝善法由是稽留誑幻處故滅盡定者謂有無學至由偏厭受想亦名滅彼定滅盡下別釋滅盡定先明修因功能學無學聖已伏或離第八地染有頂不定由暫求止息想作意為先令不恆行心心所及染汙末那染分及彼心所悉皆滅盡立滅下承上義立名故立滅盡名令身安住調暢柔和故亦名定次句兼出別名由此加行偏厭受想故亦名為滅受想定修習此定品別有三至上品修者畢竟不退修習下明定類差別因有精勤怠情於現法中有退不退分下中上三品差別此定初修必依有頂至非無學攝似涅槃故此定下明修處初修必依非想地歷觀四諦為入定之方便由慧資定故定慧均修故次第下問何故唯依有頂答始從初禪乃至有頂鄰接而入九次第定此最後故上無別地是故定屬於彼雖屬下問此位有頂猶屬界繫是有漏耶答根本味禪隱沒有垢無記故是有漏此依根本淨禪不隱沒無垢有記觀練薰修九十八使山動故是無漏問必依有頂亦可通餘地否答定法轉深奮迅超越出入自在從初禪不假方便次第入滅定復從滅定從上向下逆次而出還至初禪故云餘地亦得現前問定慧屬道諦學等何攝答非二所攝寂靜微妙似涅槃故非學所攝非真涅槃亦非無學攝此定初起唯在人中至知有藏識不斷滅故此定下明起處初句明此定初起唯在欲界人中次二句釋成上界亦起若得自在生色無色亦得現前問色界可起無色無身云何得起答中引證無色名意成天者彼天雖無業果非無名攝非色四蘊是以亦起此定無色界色是佛境界非諸二乘所知無色雖起有二不同不信藏識者生彼不起恐成斷滅故已信藏識亦得現前知不斷滅故要斷三界見所斷惑至隨應後得所引發故要斷下明伏斷現起差別先初解先約斷惑釋要斷見惑方能初起斷見已入聖位二乘在初果初心菩薩在初地初心異生一句反釋若未斷見是異生性異生不能伏滅有頂心心所故此定下次約證理釋要證二空隨應後得所引發故先根本智證二空已後得智中修加行入於人法空二乘或單菩薩或復而不決定故云隨應有義下八地修所斷惑中至生上八地皆得後起有義下次解此解非唯斷見亦須斷思三界中唯除非非想下修惑中要全斷欲九品盡餘但伏除然後方能初起此定欲界下一句釋斷欲所以二性謂不善有覆二性繁雜障定強故故須斷之唯説下一句引人證不還者已斷欲界九品惑盡不來欲界受生無學菩薩亦然隨所應者如上二空單復或全超半超遍沒隨生八地皆得後起義有要斷下之四地至生上五地皆得後起義有下三解下八地中要斷下之四地謂欲至三禪餘但伏除變異下一句釋斷下地所以變異受謂苦樂憂喜此相應煩惱種粗動轉易障定強故彼隨下一句準前單復等若伏下惑能起此定至斷下末那俱生惑故若伏下通妨先難初句牒前次二句正難若伏下惑能起此定後於所伏不斷之惑退轉現起之時豈生上地已却來斷下惑耶伏下生上應是有頂斷亦下先順問答初句直答如生下一句例答如生上地得無學者斷下末那俱生惑故此亦應然然不還者對治力強至但由惑種潤上地生然不下伏難云若伏餘惑能起此定後所伏者不退轉不現起生餘地者豈生彼者無潤生惑耶釋云不還居四禪若生上四地時不假現行但由惑種潤生雖所伏惑有退不退至故無生上却斷下失雖所下次違問答有退即牒前顯難不退即牒後伏難而無伏下生上者此義意在斷下生上故無却斷之失前番順答然約七識俱生煩惱種三乘將得無學果時一剎那中三界頓斷故生上地得無學者有斷下地俱生惑義此言頓斷者任運內起無粗細故次番違答此約六識俱生煩惱種三界九地一一漸次九品別斷或為一聚九品別斷故無伏下生上地義寧有生上却斷下失此言別斷者通緣內外粗細境生品類差別有衆多故若諸菩薩先二乘位至一切位中能起此定若諸下明定起位次先明回心先既已得隨處可起無復論其位之高下若不爾者或有乃至至方能現起滅盡故若不下明直往漸悟者七地後心永伏諸惑欲界九品雖未永斷而能如彼得不還者於此位中能起此定論説下引證有從初地即能永伏至亦能現起滅盡定故有從下明頓悟者初地即能永伏如阿羅漢已斷者彼十地中皆起此定經説下引證無心睡眠與悶絶者至令前六識皆不現行無心下總標睡眠悶絶初句牒頌次釋通名二位俱名無心者六識皆不行故疲極等緣所引身位至而由彼似彼故假説彼名疲極下別釋睡眠初釋相此睡下通妨難云眠即心所與心相應此既無心寧有心所釋曰此睡眠時雖無彼昧略之體而由彼引起與彼相似是故依彼假説睡眠此非心所風熱等緣所引身位亦違六識故名極重悶絶風熱下別釋悶絶釋相如文或此俱是觸處少分除斯五位意識恆起或此下明分攝此字指睡悶疲極風熱等緣皆屬觸塵處攝言少分者觸有二十六種地水火風四種是實其餘冷暖澀滑飢渴飽悶等皆依四大差別假立今此二位俱借身根為緣引起一分是身根攝故曰少分由此意識不起除此五位之外意識恆常現起正死生時亦無意識何故但説五位不行正死下釋及與二字先問起如文有義無生及與言顯至説及與言顯五無雜有義下答釋先初解彼説下次解初句斥前次徵釋聖教云六時無心不及死生故應説下正釋皆如文顯五無雜者無想因界似同故二定俱滅心故睡悶外相無異故著此及與言顯無雜亂此顯六識斷已後時至由此不説入無餘依此顯下通妨問云既言六時此何不説無餘依耶釋云此五位顯後時從自種起無餘一入永入故此不説此五位中異生有四至唯得存一無睡悶故此五下判凡聖有無聖唯後三者除無想天無想定如來菩薩唯得存一者并無睡悶故是故八識一切有情至是謂略説識俱轉義是故下總結五隨緣現而非常起意雖常起五位中無故八識中二恆俱轉意識不遇五種違緣前五識身隨緣頓漸則三俱轉乃至八俱是謂略説識俱轉義若一有情多識俱轉至彼俱恆時唯有一故若一下六番料簡躡前諸識俱轉為難初問一有情身唯應一識多識俱轉非一有情餘乘唯知有一識故若立下答初句牒問若立有情依識多少汝起一識名一有情者次句反難至無心位一識不生爾乃應當非有情數又若依識立有情者識與戒善相應起位爾時可説人趣有情設起破戒惡心此屬三途他分應非人趣自分然立下正釋依命根數及異熟識立俱不違理此恆唯一故一身唯一等無間緣至説多識俱者許此緣多故一身下二問諸心心所依四緣生餘緣或可容多等無間緣一身唯一如何俱時有多識轉既許下先答無間緣先順問答此等無間既引多所寧不許引多心一引一聚故又誰下次違問答奪破唯一諸心心所前念引後皆名等無間此緣多故又欲一時取多境者至識前後生不應理故又欲下次答多識俱轉先約衆緣力齊諸識應俱前問如何俱時有多識轉今釋諸根不壞衆境現前諸緣和合作意正生而欲多取寧不一時諸識俱轉又心所性雖無差別至寧不許心異類俱起又心下約心所例俱起問云諸識俱轉此則異類並生此約小乘心不並生為難今釋云又如諸心所法雖心法性無有差別然善染類別於一身中一時俱轉互不相違當知藏識與諸轉識於一身中一時俱轉亦互不違又如浪像依一起多故依一心多識俱轉又如下約喻喻俱起初句喻依一水起多浪依一鏡起多像次句合法依一藏識多識俱轉又若不許意與五俱至如散意識緣久滅故又若下約同時意識證俱起若一身中唯一識轉是則不許意與五俱意非五俱取彼所緣應不明了前五以意為分別依意以前五為明了門量云意識取所緣應不明了不與五俱故如散位獨頭意識緣久滅法意既五俱以證諸識俱轉如何五俱唯一意識至相見俱有種種相故如何下三問既五識俱唯一意識如何同眼識取色又同耳識等取聲等或一時取多境如眼下舉例並答此以五識取境非一例顯意識取境或多如一眼識於一時間於一事境唯取一類無異色相或於一時頓取非一種種色相如眼識於衆色如是耳鼻舌身識或於一時於一事境唯取一類無異相或於一時頓取非一種種相如是分別意識於一時間或取一境相或取非一種種境相當知道理亦不相違相見下一句轉釋取多義量云五俱意識是有法於色等境取一或多宗相見俱有種種相故因喻如眼等識何故諸識同類不俱至一已能了餘無用故何故下四問此躡前問也如一眼識既有種種見相應有多同類眼識體俱轉體用相依故如何不俱耶此以見分之用多而難體亦應多於自下答識於自所緣不可了者多亦奚為若可了者一已能了餘無用故是故不俱此言見分雖有多種而了青黃等種種相識體唯一如諸臣輔宰治各各不同君主唯一若爾五識已了自境至名有分別五識不爾若爾下五問此亦躡前既云一已能了餘無用者五識已了自境用意何為五俱下答先約意識為五分別依次約意識於五境能明了取眼等諸識緣境如鏡照物無別分析意識於中標指能明了故由此下證成聖教依此名有分別五識不爾不應一例多識俱轉何不相應至如五根識互不相應多識下六問多識既俱應如王所有相應義今何不爾非同下答王所相應者具五義生同一剎那和合似一定俱生滅同所依根共所緣境今此諸識雖有剎那俱起之義非同境故問意與五俱豈非同境釋云設同境者彼此所依體數異故所依謂根體謂自證數謂心所如五下例釋例如五根五識雖俱時轉彼此異故互不相應此亦應爾量云諸識俱轉是有法互不相應宗彼此異故因如五根識八識自性不可言定一至如幻事等無定性故八識下結成非一非異初句先標非定一次三句釋成行相謂見分所依謂根所緣謂境相應謂心所皆各異故又此滅彼生故能熏四義所熏四義相各異故亦非下初句先標非定異次三句釋成引經水波無異楞伽云藏識海常住等因果性者更互為因性亦常為果性次舉喻明無定量云八識自性是有法非一非異宗無定性故因如幻事等如前所説識差別相至真故相無別相所相無故如前下釋疑問云既非定異前何廣説三能變識六位心所差別性相初句牒問次釋説差別者依世俗理非勝義諦如伽下引證相所相者能相所相如火以煙焰而為能相彼復以火而為所相諸識亦爾執持思量了別而為能相彼復以識而為所相真勝義中皆不可得已上釋第三能變竟已廣分別三能變相至由斯一切唯有識耶已廣下重申六頌結顯唯識由前開章以我法對唯識互為問端論中廣明所變我法非實能變三相差別此中結顯歸源廣明唯識以成前義初申第一頌文中結前問起已明能變為二所依云何離似無實我法由斯一切唯有識耶頌曰是諸識轉變至由此彼皆無故一切唯識頌曰下舉第一頌答論曰是諸識者謂前所説至非不離識心所法等論曰下解釋先約轉變見相釋即開章彼相皆依識所轉變而假施設已下一段義同先釋初句是諸識言亦攝心所皆能變似見相二分是故依之立轉變名所變下釋第二句即此所變似見相分名為分別及所分別以是能取所取相故此約見相二分釋即是因緣變由此下釋第三句初句標由斯識變似見相理彼所妄執實我法性離似所變決定非有次二句反覆釋離此無別有物物非離此別有非離所依有能依故是故下釋第四句諸心心所色不相應四皆有為虗空等六即是無為前三實有第四假有如是一切皆不離識唯言下結唯言但遮離識實物非為遮止不離識法是故亦有心所等法或轉變者謂諸內識至唯識義成契會中道或轉下次約轉變我法釋即前開章或復內識轉似外境已下一段義同先釋初句謂諸內識及彼心所我法分別熏習力故生起之時變似我法外境相見立轉變名此能下釋第二句謂此能變三界心及心所即名分別虗妄分別為自性故此所執取實我法性名所分別虗妄分別所執境故此約能變所變釋即是分別變由此下釋第三句由此轉變似我法相彼實我法決定皆無前引教理已廣破故是故下釋第四句是故一切皆唯有識妄分別有二都無故唯言下結唯言為遮遍計所執離識實物不遮不離識法故真空及依他起亦是有性由斯下結示唯識我法非有離增益邊空識非無離損減邊唯識義成中道理顯由何教理唯識義成豈不已説由何下重申教理證成先略問略答雖説未了非破他義己義便成應更確陳成此教理雖説下次廣問答先問前雖廣引教理已彰唯識論意兼破外執顯理義隱於中唯識義猶未了今請應更確陳如契經説三界唯心至又説有情隨心垢淨如契下先引教答先引華嚴心如工畫師等二引深密境唯識現三引楞伽法不離心四引無垢經隨心垢淨連引四經文雖有別義意秪成唯識又説成就四智菩薩至境若實有此云何成又説下次引阿毗達磨經所説四智先標次釋一相下初句標智相違識相智者謂所緣境相與能緣識彼此互望更相違反了知心變故名為智謂於下轉釋一處者謂一恆河四類有情隨業異見鬼見猛火人見清流天見琉璃畜見窟宅此皆不離各各能變之識以此驗之境非實有隨業自殊如必是真寧容各異二無所緣識智謂緣過未至彼境既無餘亦應爾二無下初句標智無所緣識智者謂識所緣如空華陽𦦨本無所有愚者計實智者達無故名為智謂緣下轉釋先以獨頭意識所緣非實以例五識現緣亦非實有散意識緣過未等非實有境分別宛然以此例餘餘亦應爾畢竟無法識現可得現可得者豈不都無三自應無倒智謂愚夫智至不由功用應得解脫三自下初句標智自應無倒智者無中執有謂之倒見以實見實應非倒智謂愚下轉釋愚夫於無中執有但是倒情若令凡心能得實境彼應自然成無顛倒不由功用應得解脫如於無常等法謬計常樂我淨但是倒情果能實證真常真樂等應成無倒正智今則不然仍成倒見四隨三智轉智一隨自在者至於唯識理決定悟入四隨下初句標智隨智轉智者衆境變更皆隨智轉智能了知故名曰智一隨下別釋三智初釋隨自在智轉智八地已上得心自在菩薩能任運變大地作黃金攪長河為酥酪令應見者如實而見若離於心有別實境如何地等隨菩薩心轉作黃金酥酪二隨觀察者智轉智依勝定修觀法者如修十六妙觀落日水氷地樹池樓等隨觀一境衆相現前又修九想八背捨十一切處等但隨觀者觀行轉變一切皆成境若是實寧隨心轉三隨無分別智轉智諸菩薩得根本智證真如時真如妙境與智冥合平等平等能所一如內外凝寂一切境相皆不現前境若是實何容不現菩薩下結又伽他説心意識所緣至此等聖教誠證非一又伽下引教證成心意識即三能變此之所緣皆不離識是故我説一切唯心此等下廣指諸教極成眼等識五隨一故如餘不親緣離自色等極成下立量顯理先約能緣立量先明前五識量云極成眼等識是有法不親緣離自色等宗五隨一故因如餘耳等四識五識相望互為有法同喻應成五量離自色者本質境也不親緣者疏所緣緣也意成不離識相分色是親所緣緣也餘識識故如眼識等亦不親緣離自諸法餘識下次明後三識量云餘識是有法亦不親緣離自諸法宗識性攝故因如眼識等此識所緣定非離此二隨一故如彼能緣此識下次約所緣立量先明五塵所緣即相分此字即自證體二隨一者即相見二分中相分能緣即見分量云此識所緣相分是有法定非離此自證分宗相見二中隨一相分攝故因同喻如能緣見分見分不離自證分證成相分不離自證分所緣法故如相應法至此等正理誠證非一所緣下次明法塵所緣謂後三所緣法相應法謂心王與心所相應心所與心王相應彼此不離故量云後三所緣是有法決定不離心及心所宗法故因同喻如相應法王所相應既不相離證成所緣之法不離能緣心及心所此等下總結正理故於唯識應深信受至離有離無故契中道故於下總證勸信顯理我法非有者以是遍計所執性故空識非無者依他圓成非所執故慈尊依此説二頌言至有無及有故是則契中道慈尊下引證依此者依此長行説後二頌愚夫所執實我法性但是迷情妄分別有於此識變見相分上我法二性畢竟都無此識中唯有二無我空於彼二空亦有此識空識互言有者依真立俗故真俗相依故此頌長行前二句我法非有空識非無故説下一頌承上顯理非無故非空非有故非不空有無牒非不空有有牒非空此頌長行離有離無初句雙遮次句雙照遮照同時故契中道此頌且依染依他説理實亦有淨分依他此頌下簡示頌言都無但無我法非無染分依他即有漏識又非所執是妙俗諦故不都無淨依他即無漏識亦是圓成實若唯內識似外境起至處時身用定不定轉若唯下八番問答先一問難此謂世事乖宗難初句牒前唯有內識都無外境次正難寧見世間情非情物處定時定而身不定作用不定各各而轉既有世事寧不乖宗如夢境等應釋此疑如夢下答如夢中獨頭妄亂意識緣夢中境苦樂得失計為實有夢時非無及至於醒了無所得二十頌云處時定如夢身不定如鬼同見膿河等如夢損有用何緣世尊説十二處何緣下次二問難此謂聖教相違難若但是識應唯意法何緣更説五內色根及五塵境成十二處今言唯識識外無餘不立根境寧不與教相違依識所變非別實有至令知外法亦非有故依識下答初句約唯識總答十有色處皆依第八識變離識之外非別實有為入下明建立十二處意一切愚夫妄執有我由斯生死輪轉無窮欲令悟入無我真空説六二法令其觀察何處有我如遮下舉例猶如有人撥無後世墮斷見坑為遮此故説諸有情捨生趣生如旋火輪未有休息復有未達諸法空寂不能趣向無上菩提為欲令入法無我空故説萬法唯識所以者何令知外法亦非有故速入法空證無上覺此唯識性豈不亦空不爾如何此唯下次三問難此謂唯識成空難前言諸法皆空此唯識性豈不亦空識性不空還成有法不爾二字略答如何二字覆徵非所執故謂依識變至由此慈尊説前二頌非所下答依他識性非所執故説法空者依識所變似外境上妄執實法理非有故説為法空非無離言正智所證清淨依他唯識性故説為法空此唯識性是妙俗諦此若無者二諦應無所以者何真俗相依而建立故撥無二諦是惡取空諸佛説為不可治者諸佛説空法為度於有故若復執有空諸佛所不化應知諸法有空不空由此慈尊説前二頌遍計不有依圓不無不有不無中道理成若諸色處亦識為體至一類堅住相續而轉若諸下次四問難此謂色相非心難初句牒前識變若十色處亦識為體應如意法非有質礙何緣乃似色相顯現又能變識剎那轉易間斷何緣所變色相一類堅住相續而轉名言薰習勢力起故至是故諸識亦似色現名言下答色相堅住而轉者謂諸無始虗妄分別皆是名言薰習力起故愚夫執有智者達無由執有故迷之則生死始染法依之而生由達無故悟之則輪回息淨法依之而生此之色相迷悟機關染淨依處謂此若無正倒無託染淨無依故云無倒無染亦無淨法是故下結非住似住非色似色如有頌言亂相及亂體至及與非色識若無餘亦無如有下引證亂相謂所變色相即色識亂體謂能變識體即非色識若相體俱無亦無染淨法是故説諸識亦似色而現色等外境分明見證現量所得寧撥為無色等下次五問難此謂現量違宗難諸色聲等五外境相分明見證現量所得寧撥為無若唯有識豈不與現量相違現量證時不執為外至不可執為是實外色現量下答難家不知現非二量差別故興無有相違之難今答中先二句以前五現量對意識非量而分執不執標定五識現量證境之時得法自性無分別故不執為外後意識非量計度妄執在外故現下承上執不執而分內外以判有無五識現量得色等境是自親相分識所變故亦説為有意識非量所執外色妄計度故説彼為無又色等境是心分故非色似色是內分故非外似外如夢所緣亦非色似色非外似外法喻參明不可執實若覺時色皆如夢境至於自色境不知唯識若覺下次六問難此謂夢覺相違難初句牒前如從下正難若謂覺時所緣如夢唯識今觀法喻似不全同如從夢覺知彼夢境皆唯心現今覺時所緣何故不知唯識而執心外實有耶如夢未覺不能自知至由斯未了色境唯識如夢下答先舉喻如夢未醒不能自覺夢境唯心要至醒時返思夢中一切唯識覺時下次合法覺時境色應知亦然未至真覺位不能自知萬法唯識至真覺時亦能追覺所緣唯識未得下結答未得真覺恆處夢中由斯未了色境唯識此之法喻參明符合云何以在夢生死妄覺欲同真覺耶外色實無可非內識境他心實有寧非自所緣外色下次七問難此謂外取他心難初句領前他心下正難他心實有若不能緣不名他心智若能緣之仍成心外有法誰説他心非自識境至如緣他心色等亦爾誰説下答初句立定他心是所緣次句約親疏判謂識下釋初句直明識無實用諸識生時無實作用次二句舉喻反明非親所緣識緣境時不能於外吸攬中歸猶如手等親執外物亦不於中趣外奔逸如日舒光親照外境但如下正喻親疏緣此中法廣喻略今展喻以從法但如淨鏡影似質現名照彼物非親能照親所照者謂自現影識緣他心亦爾託之為質此約本質疏所緣緣明了他心非親能了親所了者謂自識變故契下引證法法不相到但識生時似彼相現名取彼物如緣下例緣五塵如眼識緣色境時對彼本質色似彼本質相分顯現名取彼色非眼識親到彼色處親所了者即自變相分餘識緣境亦然説有異境何名唯識既有下次八問難此謂異境非識難若言唯識識外無餘既有他心為疏所緣何成唯識奇哉固執觸處生疑豈唯識教但説一識奇哉下答初句責疑次句略立雖疏所緣離自識有然不離他能變之心非有所緣便違唯識若謂離自心即非唯識者豈唯識教但説一識不爾如何不爾下復問不唯一識義復云何汝應諦聽若唯一識至誰為誰説何法何求汝應下答初句誡聽次下斥失六法界凡四法界聖佛法界尊三乘界卑菩薩為因佛界為果佛為九説九從佛求謂諸有情各有識故此事方成若唯一識如是等事悉不成就故唯識言有深意趣至定離諸識實有色等故唯下正釋初句標立識言下百法總成五位一者心法謂八種識二者心所法謂六位心所三者色法謂所變相四者不相應行法謂分位差別五者無為法謂彼空理所顯真如識自下五位唯是一心一識自性故二識相應故三心王心所二所變故四前三分位故五前四所依實性故如是五位諸法皆不離識總立識名唯言但遮愚夫所執遍計外實色等不遮內識所變依他不離識法若如是知唯識教意至故定應信一切唯識若如下顯益勸信初文解行證入自利利他非全下反顯故定下勸信若唯有識都無外緣由何而生種種分別若唯下次申第二頌結顯歸源廣明唯識以成前義初句躡前次句問後若唯有識都無外緣如一眼識生須假外空明根境等為增上緣助之令生既無外緣內心分別由何而起未有無心境曾無無境心頌曰由一切種識至以展轉力故彼彼分別生頌曰下舉第二頌答論曰一切種識謂本識中至非持種識後當説故論曰下釋義先釋初句初牒頌標名一切種識次出體謂識所持功能差別次明用此生四果名一切種此種以識為體除離繫者非種生故道所證故謂離繫果雖可克證而非種生須起現行真無漏道斷結得故此現起道亦從種生望於彼果有展轉義然非此中正意所説此説能生分別種故彼是無漏清淨種故此識下辨種識名義問若爾只當言一切種如何言一切種識耶答雖此種子有能生之功而種無依以識為體故此是本識相分非餘即以所依而為自體種離本識無別性故種識二言簡非種識現識名識而非是種餘種名種而非是識今簡非彼故言種識又顯本識所持之種非顯此種能持之識此差別義後當廣説此識中種餘緣助故至共不共等識種盡故此識下釋次句種得餘現行為增上緣等助轉變成熟顯變種多重言如是此攝名言我執有支共不共識種盡故展轉力者謂八現識至彼皆互有相助力故展轉下釋第三句八現行識及相應相見分等互相助力此現助彼種彼現助此種故言展轉即現識等總名分別至分別類多故言彼彼即現下釋第四句即現識等總名分別而有王所染淨性受界地現比量等類別故言彼彼此頌意説雖無外緣至淨種現行為緣生故此頌下總判頌意諸染識種由諸現識等展轉助力彼彼得生何假外緣諸淨下例淨亦然諸清淨種轉變差別現行淨法為緣助故彼彼淨法而亦得生何假外緣方得生起所説種現緣生分別云何應知此緣生相所説下旁門廣辦因緣依處相攝感果先問緣初句躡前次句問後緣且有四一因緣至此體有二一種子二現行緣且下答總標四緣次別釋四相一因緣下先標名感果曰因助生曰緣親辦自果亦有助生義故因即是緣故名因緣次指體列數有為法者有簡無體法為表有作用簡非無為親能成辦自果者一種子二現行種子者謂本識中至此唯望彼是因緣性種子下釋種子初句標名如上須具六義次句出體謂三性三界九地等功能差別能引下釋用以能引為義故次後自類功能即種子所引種子同時自類現果即種子所生現行此唯下結成因緣此字即種子彼字即所起種現望所起果此為因緣現行者謂七轉識至此唯望彼是因緣性現行下釋現行初句標名謂顯現現在現有也次句出體謂七轉識至界地等餘熏下釋用能熏本識生自類種此唯下結成因緣第八心品無所熏故至極微圓故不熏成種第八下釋簡除意問第八亦有現行何故唯取轉識及相應不取第八釋云第八是所熏非能熏若取第八為能熏則無所熏故問相見性等何亦能熏釋云非簡所依王所獨是能薰此能依相見性等亦是能熏故問何故除佛果善極劣無記釋云無記極微劣故佛果極圓滿故俱不熏種現行同類展轉相望至亦非因緣不親生故現行下簡非現行同類謂諸現行識及善染等各各自類前後展轉相望但名等無間有開導義皆非親因緣各從自種生故一切異類謂諸識及相應等異類相望但名增上有助生義亦非因緣不親生故有説異類同類現行至展轉相望為因緣故有説下通餘處妨假説者以餘諸緣假名因緣故有唯説種子是因緣者依顯勝説聖説下引證轉識與阿賴耶互為因緣如炷與焰展轉生燒亦如束蘆俱時而轉故因緣性定應有二不可執言唯種非現有種生現種引種現熏種現引現前三親因緣後一真等流二等無間緣謂八現識至等而開導令彼定生二等下釋等無間緣初標名前於後法力用齊等中無間隔引令後法生起名等無間緣次句出體八現者簡非種子及色不相應後句釋用自類者顯非他識為緣前念望後縱經多却亦能開闢引導令彼後法定當生故多同類種俱時轉故至由斯八識非互為緣多同下料簡先簡種現俱轉多同類種謂諸識自類種子引生自現或自現引自種俱時轉故非此緣攝須自類不俱方是此緣由斯下承上例簡自類種現俱起尚非此緣是故八識異類俱起非互為緣量云多同類種引生現行是有法非此緣攝宗俱時轉故因如不相應行心所與心雖恆俱轉至故得互作等無間緣心所下明收相應問上言自類不俱可作此緣然心與心所異類俱起云何互作此緣釋云心與心所雖恆俱轉而互相應和合似一定俱生滅事業必同一開導時餘亦開導故展轉作等無間緣入無餘心最極微劣至等無間法故非此緣入無下簡無餘心前無開導之用後無當起之法故非此緣云何知然論有誠説至此是彼等無間緣故云何下引證初句徵起次引論如前文釋即依此義應作是説至善與無記相望亦然即依下約諸識界地歷明先明藏識初句立界地引生三界九地更互相生下上下釋義下死生上上死生下互相開導其義等故有漏下約漏無漏為緣初句明有漏藏識引生無漏無漏藏識不引有漏次句釋不引義善與下例二性無記引善善不引無記善性第八非佛無故此何界後引生無漏至回趣留身唯欲界故此何下明無漏起處先問起或從下答先標列二界謂諸下次正釋初句標人次句立色界後引無漏次句釋義異生求佛必生五淨居天得菩提故二乘下初句標人次句立欲界後引無漏次句釋義二乘回趣必留欲界身故彼雖必往大自在宮至色界心後亦得現前彼雖下通妨問回趣大乘必往大自在宮成佛方轉無漏何言欲界引生釋義如文有義下次解回趣之人亦色界後引生無漏然五淨居無回趣者經不説彼發大心故然五下通妨問經言五淨居天無回趣者何言色界後引生無漏釋云五淨居無回趣者約不發大心者説若有回趣亦通色界第七轉識三界九地至前後位中得相引故第七下次明第七初句立界地互相引生隨第下一句釋義隨第八生處所繫故有漏下約漏無漏互為緣初句立互相生十地下一句釋義第七因中轉故十地位中出觀入觀漏與無漏相間起故二性相望亦然染無記謂有覆不染無記謂無覆此二亦然生空下一句釋義生空智果前後謂出觀時此屬染位智果現前謂入觀時此屬淨位染淨相引故此欲色界有漏至地上菩薩不生彼故此欲下簡無色如經言六欲四禪天王如次即十地菩薩故第六轉識三界九地至決擇分善唯色界故第六下三明第六初二句立界地等互各為緣潤生下一句釋義潤生位善不善得相引故等者等漏無漏第六因中轉故漏無漏互相引故生空前後位善染二無記得相引故初起下明無漏起處初句立色界後次句釋義決擇善謂四加行第六初起無漏在四加行此四善根必依第四靜慮方得成滿故唯色界後起眼耳身識二界二地至善等相望應知亦爾眼耳下四明前五初二句分判五識界地各各自類互作等無間緣善等下明善染各於所依界地為緣有義五識有漏無漏至未成佛時容互起故有義下明漏無漏有二解先初解初句立漏無漏互為緣未成下一句釋義此師謬謂五識因中亦有轉義有義無漏有漏後起至此二於境明昧異故有義下次解初二句立有漏引無漏無漏不引有漏無漏下釋義無漏五識非佛無故非佛五根定有漏故根是異熟相分攝故異熟識有漏故五根有漏五色根有漏故五識有漏根是五識不共俱生同境所依此若有漏發無漏識理不相應故此二於境明昧異故有漏根於境如翳目視無漏識於境如淨眼觀豈令昧根發明妙識三所緣緣謂若有法至此體有二一親二疏三所下釋所緣緣初標名謂能緣之心帶彼相起名所緣謂有實體能生識故名緣具此二支名所緣緣謂若下先總釋義謂若有法者是泛指之辭隨舉一也有者實有也簡非龜毛無體之法具有五義有實體從自證分變故實用相有生見之用故從實種生從所薰相分親種起故現在實法簡非過未及空華故託本質而起非如獨影無質故此釋緣義帶己相者帶謂變帶相謂影相言己相者相即心體自分所攝故此釋所緣心即八箇心王相應即五十一心所言或者有起不起故所慮謂是心之所緣慮處故即帶彼相起義所託即此所緣境又能牽心令生是心之所託故即託彼而生義次列數一親二疏如眼等五識緣境須託第八所變五塵為本質於此質上隨量大小頓變五塵相現以彼及此二種五塵皆為所緣緣所緣緣中有親疏故若與能緣體不相離至應知彼是親所緣緣若與下次別釋親緣能緣謂見分體謂自證分親所緣者即相分謂與能緣見分共一所依體不相離是見分等內所慮託等者等自證證自證後三皆有能緣義故內所慮託顯此相分非外有故相了別法心分雖殊生與所生其體不二應知彼是親所緣緣即四分中之相分四緣中之所緣若與能緣體雖相離至應知彼是疏所緣緣若與下別釋疏緣疏所緣者即本質謂與能緣不共所依體相離故但為所託本質能起內所現相取與所取體雖不同內所慮託然似彼現應知彼是疏所緣緣即第八識相分諸識託為本質親所緣緣能緣皆有至離外所慮託亦得生故親所下約親疏簡有無親所緣緣於能緣心決定皆有以離所緣必不生故諸心心所四緣生故前云自心內蘊一切皆有疏所緣緣於能緣有無不定如起獨頭緣過未境離外本質亦得生故有相分境不仗質故前云自心外蘊或有或無第八心品有義唯有親所緣緣隨業因力任運變故第八下歷明諸識有無初明藏識初解唯有親所緣緣初句立次句釋有義亦定有疏所緣緣要仗他變質自方變故有義下次解定有疏所緣緣初句立次句釋有義二説俱不應理至一切位中有無不定有義下第三解初句總斥前二自他下別斥初家若謂唯有親所緣緣此不應理自他身土可互受用他所變者為自質故此二句釋成亦有疏緣自種下別斥次家若謂定有疏所緣緣亦不應理自種於他無受用理他變為此不應理故非諸有情種皆等故此三句釋成無疏應説下正釋疏所緣緣不定自種及根疏緣定無無質可託故器界與身轉未轉位皆有無不定或託他質或不託故第七心品未轉依位至緣真如等無外質故第七下次明末那未轉依位俱生我執恆相應故緣第八識起自心相執為實我故亦定有疏所緣緣已轉依位此非定有緣真如無我無外質故第六心品行相猛利至疏所緣緣有無不定第六下三明意識一切位中有無不定同時意識緣現境所仗質有獨頭意識緣過未所仗質無前五心品未轉依位至緣過未等無外實故前五下四明五識未轉依位鈍劣故唯緣現境必仗外質方起內所慮託而亦定有已轉依位通緣三世無外質故此非定有四增上緣謂若有法有勝勢用能於餘法或順或違四增下釋增上緣先標名與力助成令彼生長故名增上謂若下釋用有法者簡非無體有殊勝勢力作用能於餘法者此能助彼故或順或違者如雪如曝皆能令物增長説此與彼為增上緣雖前三緣亦是增上至生住成得四事別故雖前下通妨問曰此增上用前三緣中豈不亦有今復別明者何也釋云雖前三緣亦是增上而今第四除彼取餘四緣名義有通有別通皆增上別名因緣等前三從別受稱今第四得通名耳除別取通者為顯諸緣差別相故問前云或順或違能令餘法增長此於幾處轉耶釋云此順違用於四處轉令生令住令成令得四事別故然增上用隨事雖多至應知即是二十二根然增下顯體先標數二十二根於六事增上義立謂於取境眼等六根有增上義命根於住一期相續有增上義男女二根於續家族有增上義樂等五根於能受善惡業果有增上義信等五根於世間淨有增上義未知等三根於出世淨有增上義前五色根以本識等至及善念等而為自性前五下先出十九根體本識等等自種子淨色即清淨四大謂五色根以本識及種子所變眼等淨色為體男女二根以身根少分為體命根以本識親種一期不斷分位假立非別有體意根總以八識為體八識俱轉別立一根故前云彼容六識有時無故意非定成根苦等五根以自受為體信進二根以善位信勤為體念定慧三根以別境中善念善定善慧為體未知當知根體位有三種至能遠資生根本位故未知下次出後三根體先未知當知根先明位一根本見道位有十六心八忍八智前十五心將見未見第十六心已見道故無未知當知故是故除之二四加行位近能引發根本故三資糧位即三賢位從初發心乃至未得決擇分即見道順決擇即加行未得者即加行前也所有善根遠資根本故於此三依信等五根至非正善根故多不説於此下出體於此三位中所有信進念定慧意喜樂捨總此九根為此未知當知根體加行下通妨問加行等位求證愁戚亦有憂根何故不説釋此如文前三無色有此根者有勝見道傍修得故前三下簡別前三無色謂空處識處無所有處旁修得者決擇分善在四靜慮勝見道者兼修上定故三無色亦有此根或二乘位回趣大者至但説地前以時促故或二下二乘回趣大菩提者為證法空於地前亦起未知當知根九地下通妨問法空無漏智雖未起生空無漏智果已成何謂未知當知耶釋云彼於生空雖已具知未達法空尤所當了所證九地所攝生空無漏智皆是菩薩未知當知根未能證入法空理故問菩薩初見道位亦有此根何故但言地前亦起答以時促故一剎那即見道故是故不説轉名已知根故始從見道最後剎那至非正善根故多不説始從下明已知根體先明位見道最後剎那謂見道初心從此乃至金剛喻定謂十地滿心所有下出體信等無漏九根皆此根性未離下通妨如前諸無學位無漏九根一切皆是具知根性諸無下明具知根體無學位下明位次出體三乘極果所有信等無漏九根皆名具知根有頂雖有遊觀無漏而不明利非後三根有頂下通妨問既後三根皆名無漏三乘行人依有頂地遊觀無漏亦應有無漏根何故前言前三無色有此根不言有頂者何也釋云行人修九次第定雖依有頂遊觀而止觀並運將入滅時意偏在定慧不明利非後三根是故不言有頂二十二根自性如是諸餘門義如論應知二十下結自性如是者假實異故餘門謂性界學等如論應知
