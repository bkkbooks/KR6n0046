body:
  text: 明武林蓮居弟子大惠録次染汙意何受相應此染下明相應受此意同前初能變俱是捨受故頌中不出由有二家異解不同故今論中申出辨訛顯正初句徵起有義此俱有唯喜受恆內執我生喜愛故有義下出初解初句明末那於五受中唯與喜俱次句釋成此執第八為自內我恆生喜愛故有義不然應許喜受乃至有頂違聖言故有義下出次解初不然二字總斥次約違教斥聖言喜受止通第二靜慮末那遍通三界有頂謂非非想地若謂末那與喜受俱受應隨識亦至有頂故斥云違聖言故應説此意四受相應至緣唯捨地善業果故應説下申己釋初句總明四受相應五中餘苦謂生下釋四受義謂隨所緣界地善惡果報不同故相應受有憂喜樂捨四別有義彼説亦不應理至故此相應唯有捨受有義下出第三解初句總斥前二家此無下釋不應意此字謂末那任運簡非隨緣一類謂唯無記緣內簡非外緣執我謂無別執故云恆無轉易變異受謂憂喜樂此以識無轉易故斥云不應與變異受相應又此下復以今頌文對前藏識約説不説以辨同異初泛約二識義有異者頌皆別説例今受義若異頌應別説次約今受頌無別説定與藏識受同故結判云此識應唯捨受唯者顯不與憂喜樂相應未轉依位與前所説至恆於所緣平等轉故未轉下結判上文先明轉未轉位心所廣狹未轉依位與前所説十八心所相應此句結前轉依與二十一心所俱起舉名列數如文如第八識已轉依位者舉例明也此句例上例下例上轉依第七亦有二十一心所例下已轉依位亦唯捨受俱任運下二句結成唯捨受恆以十種真如為所緣境平等轉故末那心所何性所攝有覆無記所攝非餘末那下釋三性門初句問起性有四種今徵四中何所攝耶何字是徵辭次句舉頌標答非餘者簡非餘善不善及無覆也此意相應四煩惱等至若已轉依唯是善性此意下釋先明未轉位初釋有覆等者等八隨也聖道者謂入聖之道即正智也自心謂本具淨性即真理也此俱染法能覆理智故云有覆障礙隱蔽即覆義次釋無記如文如上下通妨伏問云根隨煩惱通染二性何唯言有覆無記攝耶答中先舉例上二界謂色無色諸煩惱等由禪定力攝伏藏覆染用不勝極微細故任運轉故故是無記例此染法所依微細任運以顯能依染法亦然故亦無記次明轉依位中與十一善法相應故唯善性簡非餘三末那心所何地繫耶隨彼所生彼地所繫末那下釋界繫門初句問起地謂三界九地文中雙徵王所繫屬何地次舉頌答初彼字謂第八識次彼字指界地謂隨第八生何地末那即何地繫謂生欲界現行末那至之所繫縛名彼所繫謂生下轉釋先明未轉依先釋界地繫謂有情生於欲界現行簡非種子末那及相應即欲界繫乃至二字超文謂生餘界地亦然即餘地繫何以知其隨生隨繫末那心所恆緣自地藏識為我非緣他地藏識為我故若起下次釋異熟繫二名雙舉者業所引果故末那執藏故若起彼地酬先引業異熟藏識現在前者名生彼地染汙末那緣彼藏識執為內我此染汙意即繫屬彼異熟藏識名彼所繫前二彼字指界地後三彼字指異熟或為下三釋煩惱繫若生欲界現行末那相應心所即為欲界諸煩惱等之所繫縛乃至有頂應知亦然名彼所繫若已轉依即非所繫若已下次明已轉依非所繫者轉依無漏不為界繫不為異熟繫不為煩惱繫此染汙意無始相續至阿羅漢滅定出世道無有此染下釋斷伏位次門先問初句問斷次句問伏阿羅下舉頌總答若伏若斷通名無有阿羅漢者總顯三乘至俱暫伏滅故説無有阿羅下先略釋三乘無學果俱名阿羅漢真窮惑盡故此位種現永斷名無研真斷惑名有學或入滅盡定或修人空觀於此二位現行不行暫伏名無出定出觀後復還起故曰暫伏謂染汙意無始時來至俱無漏故名出世道謂染下次廣釋逆次先釋聖道暫伏問無學位中此識永斷可言無有有學位中俱暫伏滅如何亦言無有答諸有漏道謂四禪八定但能伏六識中染染汙第七微細恆行不能伏滅次明二乘聖道有能伏義無我解即人空觀言真者謂人空根本智治障相違故我執不行後得智是彼根本智平等流類亦違我執故言無有真無下結會頌文根本後得俱名出世道滅定既是聖道等流極寂靜故此亦非有滅定下次釋滅定例同聖道亦真無漏故云等流故此染意亦復非有由未永斷此種子故至此復現行乃至未滅由未下釋暫義明復現行伏問云滅定聖道既皆無漏能違染意何云暫伏今釋云滅定聖道染意雖無由未永斷此種子故從此起已此諸染法猶復現行自未滅還恆相續轉故云暫伏然此染意相應煩惱至故無學位永不復起然此下次明無學永斷先明斷相分別煩惱通見所斷無漏善法是非所斷今此染法是俱生故是染汙故意顯是修所斷極微下明斷分齊此染種子與有頂地意識中下下品現行煩惱同時頓斷所以者何種子與彼勢力齊等俱極微細故有頂謂非非想地下下煩惱謂九品中最下品也即第八十一品思惑金剛下明斷位次金剛喻定者三乘即那含後心慚悟菩薩即遠行地後頓悟菩薩即法雲地後頓斷此種成阿羅漢永不復起故言無有二乘無學回趣大乘至應義等故不別説之二乘下通妨問曰二乘無學回小趣大從初發心至未成佛位居菩薩前無學時已斷染汙應有四位何故唯言三耶答中約三德均等故不別説皆已永害煩惱賊故應受世間妙供養故永不復受分段生故此中有義末那唯有至又説為識雜染依故此中下次辨有淨末那先出初家異解初句謂唯有煩惱障相應染末那反言不許有淨末那聖教下一句釋成無淨意三位皆無煩惱障既無相應障末那亦無故無淨意又説下二句釋成有染意四是根本煩惱攝故雜染即是煩惱義故末那與之相應前六轉識隨之成染故為諸識雜染所依以此證之故唯有染意有義彼説教理相違至定有俱生不共依故有義下次出正家解初句總斥違教理出世下略釋違教無染下略釋違理無染意識謂淨第六俱生者六七俱時轉也不共依者第六以第七為不共根量云無染意識是有法定有俱生不共依宗轉識攝故因喻如有染意識執無淨意豈非違理論説藏識決定恆與至爾時藏識定二俱轉論説下別廣破違教先違瑜伽初引文若住下以論意顯滅定聖道二位有淨第七住滅定位六識俱無若無第七爾時藏識應無識俱恆定一識俱轉之文虗設住聖道謂第六修觀時若無第七爾時藏識應一識俱無二識俱爾時藏識定二俱轉之文又成虗設顯揚論説末那恆與至故知此意通染不染顯揚下次違顯揚初句即是染意次句即無染意恃舉為行即相應我慢翻彼成平等行即相應淨末那故知一句結成通染淨或應作成恐文誤若由論説阿羅漢位至彼既不爾此云何然若由下三違本論初句牒執彼執無淨末那故應由下舉第八例破頌言三位無者依染意説非無淨末那但捨其染不捨其體次二句反覆例明又諸論言轉第七識至許佛恆行如鏡智故又諸下四違諸論廣破違教初一句引論彼如下立量順明平等智是有法定有所依相應淨識宗智所攝故因喻如餘智謂成所作等三智也此識下反難違論所依識也能依智也不可下遮轉計若謂彼智依六轉識初句直破平等智恆行轉識間斷故次以恆行故因鏡智為同喻以成恆行平等智不依轉識明有淨末那也量云平等性智是有法不依六轉識宗許佛恆行故因如大圓鏡智又無學位若無第七識至然必有此依如餘識性故又無下廣斥違理立量云無學位第八識必有俱有依是識性故如餘眼識等此依即第七也又如未證補特伽羅至非依第八彼無慧故又如下約法執所依明有淨意此約二乘明不染釋之先舉有學我執恆行以例二乘無學法執恆行法執所依即是第七此識下反徵釋依第七也法執即慧不依第八八無慧故不與彼俱由此應信二乘聖道至彼未證得法無我故由此下勸信彼我執但與煩惱障俱聖教皆言三位無者但無我執由此者承上法執相應末那應信三位不無淨末那彼未證得法無我故法執以第七為所依故法執不障彼智而名淨故又諸論中以五同法至五恆有依六亦應爾又諸下明意識有依顯有第七五同法者論以前五識為第六識同法喻量云第六意識定有俱生不共依極成六識隨一攝故如眼等識宗因有失者若無第七宗有能別不極成失因有共不定過若許前五亦無有依以成第六無依欲免因中共不定過宗中仍有能別不極成過今五同法恆有所依離俱有根必不轉故定應許六此依恆有此依即是淨第七是故定有無染汙意至非無第八此亦應爾是故下結申正釋是故二字承上之辭如上教理推徵定應許有第七淨意於無學滅定及出世道中恆起現前言彼下結會頌文無有二字之義如説下舉例證成此亦應爾者如淨第八非無亦應有淨第七此意差別略有三種至起補持伽羅我見此意下通明染淨第七總標有三位差別初通下別釋三相應初明人我見相應意異生恆時相續二乘下明間起一類菩薩者約漸悟也有漏心位意緣藏識起人我見反顯無漏心位則不現起次通一切異生聲聞至彼緣異熟識起法我見次通下明法我見相應意異生聲聞獨覺恆時相續未證法無我故一切下明間起一切者通約頓漸也法空智果不現前位意緣異熟起法我見言異熟者通至後位故反顯法空現前則不現起後通一切如來相續至異熟識等起平等性智後通下明平等智相應意如來恆常相續永斷二障究竟二空盡來際故菩薩下明間起見修道中法空智果現前平等性智現起反顯法空不現則不現起言無垢異熟者金剛道前異熟未空故言異熟觀起執忘因中暫轉復名無垢此約智有隱顯言間起補特伽羅我見起位至如夜迷杌等方謂人等故補特下明二執現起雙單差別問前列中初一單言我見相應彼位豈無法我見耶初二句直答雙起次句釋成我必依法故杌喻法執人等喻我執文外反顯法不依我故我法二見用雖有別至不相違故此亦應然我法下明二執用別體同問曰二見用別云何俱起兩不相違文中釋云用別體同故不相違一慧者同體也次舉眼等識為喻眼識自證分體一而有了別青黃見分多用見分用別同依一體彼此不違餘識亦爾量云我法二見是有法同依一慧宗用雖有別而不相違故因喻如眼等識二乘有學聖道滅定至皆唯起法執我執已伏故二乘下單明法執起位以顯法不依我初通明三乘伏我執唯起法執二乘言聖道滅定者定慧法起治障相違我執已伏故頓悟菩薩言修道者期心頓斷見道初心粗垢先落我執已伏故漸悟菩薩言生空現前者藥病主對我執已伏故故此三乘皆唯起法執二乘無學及此漸悟至亦唯起法執我執已斷故二乘下明斷我執唯起法執二乘無學期心單斷捨執藏時我執已斷唯起法執回心漸悟菩薩期心次斷此根初解先得人空我執先斷故法智現前法執不起法智不現亦唯起法執亦者對上二乘言也八地以上一切菩薩至猶起法執不相違故八地下別明深位菩薩起法執一切者通舉若頓若漸菩薩也我執皆永不行者通指分別俱生二我執也或已下釋不行義漸則永斷不行頓則永伏不行法空下明法智不現法執猶起問曰法空雖不現生空現前智生執盡云何猶起今答云不相違故生空與法執不相主對故言不違文外反顯法空智果現前法執有間如有經説八地以上至不爾煩惱亦應在故如有下引證深位法執一切煩惱者分別俱生也所知障即法執此言現行不約種子不爾者恐謂深位菩薩是種非現今釋云若所知種在言在者煩惱種在亦應言在那言唯有所知法執俱意於二乘等至説名無覆不障彼智故法執下約法執判先判染不染問大小兩乘法執俱在於末那誰染誰淨答二乘名不染菩薩名染二乘名不染者唯修人空觀期心但斷煩惱障所知不障彼智故於菩薩名染者所知能障彼法智故由此下次判覆無覆由此二字承上菩薩名染亦名有覆不障人空智於二乘名無覆是異熟生攝從異熟識至餘不攝者皆入此攝是異下簡異熟前言隨第八所生緣被執我即繫屬彼恐謂即是真異熟簡云法執俱意是異熟生次句釋成異熟生問曰前六無記名異熟生今此雖非真異熟隨異熟繫亦可名異熟何故亦名異熟生答云真異熟名唯局第八異熟生名不唯前六通八識故次舉例明如增上緣名寬餘三緣所不攝者皆增上緣攝餘不下結歸本意餘真異熟所不攝者皆異熟生攝云何應知此第七識至聖教正理為定量故云何下引教理證有末那先問起小乘謂未來名心過去名意現在名識種種分別然無別體云何離眼等識別有第七聖教下總答謂薄伽梵處處經中至了別名識是三別義謂薄下先引教別釋先通引諸經心意識三是三別名集起思量了別是三別義名義既別應有別體文雖通引意歸末那以此證有第七如是三義雖通八識至粗動間斷了別轉故如是下釋義伏問曰諸識俱可名心皆有積集義俱可名意皆有等無間緣義俱可名識皆有了別自分境義勿謂名義別而令體有別初句牒伏問而隨下答約義勝相顯故各有差別第八獨名心者集起義一切現行所熏集諸法種種子為因能生一切起諸現法如是顯勝故獨名心餘識不然雖有積集無集起義第七名意者思量義有漏位中恆審思量藏識為我無漏位中恆審思量無垢異熟為無我二等字等此也餘識不然不恆不審故餘六名識者了別義別境謂六塵各緣也外門轉故粗三性不常故動隨緣起脫故間斷七八不然一性無間內門細轉故勿以通名而濫別義如入楞伽伽他中説至能了諸境相是説名為識如入下復引楞伽通證三名各各召體又大乘經處處別説至前已廣説故不重成又大下廣證有第七何以知諸大乘經所説必為定量耶此義前已廣説即指慈氏先不記等七因解脫經中亦別説有至恐厭廣文故不繁述解脫下復引深密別證染意先引頌證定彼經下引經自釋先釋前二句對治下次釋第三句爾時下釋第四句無自性者此諸煩惱無實自性非今現無本來空寂但於迷時妄謂為有至於悟後始知空耳如是下總結已引聖教當顯正理至若無此識彼應非有已引下顯理先結前起後謂契下引經恆行不共微細無明所依證有第七不共無明出體微細恆行示相覆蔽真實顯用無明為能依第七為所依此以能依顯所依也若無下反釋經言不共無明由依此識而有若無此識經中所説無明應非有故非離所依有能依故謂諸異生於一切分至覆真實義障聖慧眼謂諸下初順釋先出能依無明體用一切分即是善惡升沉定散等位也覆真實義者二空所顯真如之理為此所覆而不發明障聖慧眼者真無漏道清淨慧眼為此所障而不開曉無明即體覆障即用此顯能依有體有用也如伽他説真義心當生至俱行一切分謂不共無明如伽下引證真義心謂無分別智正當生時常能為礙俱行異生一切分位謂極微細不共無明此證以用顯體也是故契經説異生類至醉纏心曾無醒覺是故下引經結示無明所盲謂障聖慧眼醉纏心謂礙真義心異生恆居生死長夜而不醒覺者無明使之然也長夜有四句分別一是長非夜如七俱貪等三及妙平二智相應心品二是夜非長如六識相應無明三亦長亦夜即七俱無明四非長非夜即六識餘貪等若異生位有暫不起至有行不行不應理故若異下次反釋恆行義初句立意經言恆行無明故次句釋成與異生俱迷理無明或行不行不應正理此言意顯無不行時也此依六識皆不得成至許有末那便無此失此依下正約所依識體結成文中以六識對顯此覆真實恆行之義依六轉識皆不得成所以者何識有間斷此無明亦應間斷則非恆行無明恆染彼轉識亦應恆染則非三性轉易若謂依六識有此二過故應許有恆行末那方免斯愆染意與恆四惑相應此俱無明何名不共染意下三家釋不共義無明不與餘俱定依第七先問起染意恆與四惑相應意俱無明與三共轉何名不共有義此俱我見慢愛非根本煩惱名不共何失有義下初解以意俱無明是根本惑釋不共義見慢愛三非根本惑雖四惑俱三非同類名為不共亦何所失有義彼説理教相違至與四煩惱恆相應故有義下次解初句斥前次釋純隨煩惱無見等故此三煩惱是十根本煩惱中攝故處處皆説染意與四惑俱何言此三非根本惑應説四中無明是主至曾不省察癡增上故應説下申正釋初二句以無明為餘染法之主釋不共義能與諸染作因依故次二句約迷增上轉釋主義此俱見等應名相應至如無明故許亦無失此俱下約餘三並問癡既增上名為不共餘三非增上應如心所名相應耶若為下答餘三若增上為主應亦名不共若約生死流轉貪愛為主若依障初聖道不受聖教見慢為主見則偏執一理安肯受教慢既恃己豈復求他故此三者若為主時亦名不共例如無明許亦無失有義此癡名不共者如不共佛法唯此識有故有義下三解約此識獨有餘識所無以釋不共義例佛十八不共法唯佛獨有餘人所無故名不共若爾餘識相應煩惱至唯此識有故名不共若爾下約餘識俱染並問此俱無明餘識所無名不共者餘識俱惑此識所無亦應名不共耶依殊下答初句明依勝義立非互一句斥前問難謂第下釋殊勝用能障理智故如是勝用此有餘無故名不共此中三解初以根本釋不共於文多謬於義全疏次以是主釋不共義雖稍當文不會經三以不共釋不共文契標章義符經旨既爾此俱三亦應名不共至對餘癡故且説無明既爾下約餘三並問既爾二字牒上無明勝用名不共此俱見等勝用亦然亦應名不共無明下答癡是三主見慢愛三皆用無明為因故獨得此名餘為主時亦名不共既皆可名不共偏言無明者為對餘識俱癡顯此用勝且説無明名不共耳不共無明總有二種至二獨行不共此識非有不共下料簡不共初句總標恐此中不共濫獨行故此恆行不共第七相應名為恆行不與第六間斷者共名為不共餘識間斷故云所無反顯此識中有獨行不共者不與忿等俱起或不與餘煩惱起此識非有者反顯餘識俱故故瑜伽説無明有二至非貪等俱者名獨行無明故瑜下引證初相應證恆行與三惑俱故非貪等俱證獨行是主獨行唯見所斷至忿等皆通見所斷故是主下釋獨行二義復約見修二斷以明二種差別言是主者力用粗猛自能為主能發惡業顯是分別故見所斷次引經證見所斷有學永斷故不造新業故言非主者行相微細不發惡業顯通俱生亦者通見修所斷也忿等小隨各自為主故皆見斷反顯非主獨行不與彼俱通見修斷此中唯釋獨行明二斷者意在簡濫顯是也是主唯見斷非主通見修二斷意顯恆行不共唯修所斷恆行不共餘部所無獨行不共此彼俱有恆行下約大小乘部結判有無恆行不共約部而言餘小乘部中曾所未説不言第七故故言餘部所無反顯大乘所説有此識故約識而言此識所有餘識所無獨行不共約部而言大小皆説故言此彼俱有約識而言餘識中有此識中無又契經説眼色為緣至若無此識彼意非有又契下引教證成約意識增上緣依證有第七初文通引六識以前五為同法其意別指意識意法為緣者意根為增上緣法塵為所緣緣二和生識故意即第七識若無下反證若無此第七識者經中所説增上緣意則應非有唯一法塵為緣也謂如五識必有眼等至此識若無彼依寧有謂如下引理證成初以同法證如眼等五識六轉識中攝故必有眼等增上不共俱有所依意識既是六轉識中攝理應許有此依彼依即是此第七識此識下反證此識若無彼增上等依寧有量云意識必有增上俱有所依六識中攝故如五識不可説色為彼所依至隨念計度二分別故不可下破色為依餘乘取肉團心為第六依今初句直破次句釋成經云意法為緣意屬心故非色法故又五識依色但有隨念而無計度若執意識依色者應如五識亦唯隨念不應通二分別故亦不可説五識無有至俱時而轉如牙影故亦不下破五無依上以五識有俱有依為同法證第六有依今執五識無依欲證第六亦無初句直破次句釋成五識與根俱時而轉故次喻俱轉牙與種影與形不相離故牙當作芽又識與根既必同境如心心所決定俱時又識下破等無間意非等無間意可為此識依識與所依必俱時故立量云又識與根決定俱時必同境故如心心所由此理趣極成意識至極成六識隨一攝故由此下立量結極成意識必有不共顯自名處等無間不攝增上生所依極成六識隨一攝故如眼等五識不共者如眼根是眼識不共依不與餘識共故顯自名處者謂依眼之識名為眼識餘亦如是等無間不攝者非等無間意根之所攝也增上生者謂根是識之增上生緣也所依者根是識之俱有所依也隨一攝者謂於六識隨一所攝也又契經説思量名意若無此識彼應非有又契下約思量名證有第七先引經恆審思量故若無下反證謂若意識現在前時至既爾如何説名為意謂若下釋義有謂等無間意即經中所説思量名意非第七名今釋云意識現前彼滅非有體既非有用定不成既爾二字牒上體用思量既俱不成如何經説名意若依聖言量思量即第七非等無間若謂假説理亦不然無正思量假依何立若謂下破假説有謂思量名意者應知假説非關實有體用初二句直破次二句以正破假假依正立故假名為意由正思量無正思量假依何立若謂現前曾有思量爾時名識寧説為意若謂下破第六無意名彼救云謂過去時現在曾有思量今雖已滅得名為意今初句牒計次句破云爾時名識寧説為意故知別有第七末那至已滅依此假立意名故知下結第七末那以具恆審思量義故方得名意等無間意依此假立又契經説無想滅定染意若無彼應無別又契下引經無心二定差別證有第七染意下反證謂彼二定俱滅六識至一有一無彼二何別謂彼下釋義滅定無想此二俱滅前六及彼相應體謂前六心體數謂彼相應心所此二俱滅故曰無異二定有別者唯染汙意於二定中一有一無則有差別無想唯滅前六染意則有滅定非唯前六兼滅染汙一分染意則無若無第七於彼定中為有為無彼二無心有何差別若謂加行界地依等至是故定應別有此意若謂下牒伏救破彼救云二定別者由加行等故非由第七今文初句牒救次句總破次正破彼差別因者謂由有此第七識故若出離想作意為先令不恆行心心所滅想滅為首立無想名此定唯屬第四靜慮而有漏攝若止息想作意為先令不恆行及染汙心心所滅立滅盡名雖屬有頂而無漏攝此意若無彼因寧有集論二定有五門差別加行即定前作意界地謂四禪及有頂所依謂佛弟子説力及外道説力自體者無想以有漏異熟色為體滅定以無漏心法為體假立者無想粗動心等暫不現起假立滅定兼染汙不行假立是故下結又契經説無想有情至若無此識彼應無染又契下引經無想天染證有第七一期生謂五百劫心心所滅無六轉識也若無下反證謂彼長時無六轉識至便非聖賢同所訶厭謂彼下釋義初句無六轉識謂六識中我執無也次句若無此意謂第七中我執亦無也謂諸我執唯於六七二識中有二識俱無我執便無何處見有具縛凡夫一期生中都無我執都無者謂無二識中我執也彼既長時無有我執應如涅槃清淨無漏便非聖賢同所訶厭初後有故無如是失至餘法受熏已辨非理初後下展轉釋救云彼天六識及彼心所初半劫滅後半劫生初後有故無如是失破云中間四百九十九劫心心所滅無故有過救云過去未來有我執故無如是失破云過去非常未來非現如空華等無故有過所得下約理斥所得無者謂無想定前求無想報故所熏成種招彼異熟染汙末那緣彼執我依之粗動想等不行於此位中假立無想有情若無能執末那所得無想異熟應無所得無故能得無想有情亦無伏救云不必末那執即依異熟立無想有情今釋云無想異熟即不相應法前已遮破藏識無者謂染汙末那緣第八藏識我見愛等執藏為自內我攝藏一切雜染品法令不失故由斯以立阿賴耶名若無染意藏識應無藏識無故熏習亦無受熏持種義皆不成伏救云餘法亦可受熏今釋云餘法受熏已辨非理故應別有染汙末那至由斯賢聖同訶厭彼故應下以我執結成有染意又契經説異生善染至若無此識彼不應有又契下引經三性心中恆帶我執證有第七若無下反證謂異生類三性心時至所起施等不能亡相謂異下釋義謂異生類善染無記三性心時雖外起善惡不動業而內一類相續執我由內恆常執有我故令六識中所起施戒等不了體空執取於相故瑜伽説染污末那至末那滅已相縛解脫故瑜下引證染意遍為諸識依止彼未滅時令六識中相縛見縛不得解脫染汙滅已方得解脫言相縛者謂於境相至此意未滅時識縛終不脫言相下轉釋瑜伽初牒次釋謂由染意恆執我故令六轉識於所緣境不能了達如幻事等由斯見分相分所拘不得無礙解脫自在故名相縛依如下復引伽他證論又善無覆無記心時至勿由他解成無漏故又善下別約善無覆心時我執證明第七凡起善及無覆無記心皆名有漏者由有我執故若無我執應非有漏救云六識中自有煩惱可成有漏破云自身現行相續之中六識善染不俱起故救云現行善染雖不俱起由有過未煩惱緣縛故成有漏今破云去來緣縛非現非常理非有故救云如施等雖善由受施者具惑故成有漏破中初句牒救直破次句舉例並破豈施無漏淨田令我有漏施心亦成無漏彼既不爾此云何然又不可説別有隨眠至彼非實有已極成故又不下展轉釋初破隨眠轉計云別有隨眠異心心所是不相應行蘊所攝於善等時現相續起由斯善等成有漏法又不可説四字是牒救破詞所以者何隨眠非實有前已極成故亦不可説從有漏種至勿學無漏心亦成有漏故亦不下破漏種生救云善等有漏由從無始有漏種生此有漏種不由熏習法爾而有故成有漏亦不可説下二句牒救彼種下先破漏種由與漏俱成有漏種先無我執與善等俱彼種無因成有漏故非由下次破漏生若謂無始有有漏種有漏法起以此為因非由下一句直破勿學下舉例並破若謂有漏種生成有漏者應學無漏心亦成有漏勿字是破辭學無漏心亦從有漏種子生起然彼不成有漏法種自相續中不與漏俱故彼既不爾此云何然雖由煩惱引施等業至彼復如何得成有漏雖由下破染引救云善心雖非染俱由前煩惱所引是故施等成有漏法今破云雖由煩惱引施等業而施業起時煩惱已滅不俱起故非漏正因所以者何以有漏言表漏俱故又無下舉例並破又無記業隨先業轉不待現緣非煩惱引彼復如何得成有漏無記非染引得成有漏善等有漏豈煩惱引然諸有漏由與自身至異生既然有學亦爾然諸下釋正義然諸有漏施等諸業由與自身現行煩惱俱生俱滅互相增益方成有漏自身簡非他惑現行簡非隨眠俱生俱滅簡非過未互相增益簡非有漏種由此熏成有漏法種後時現行從此種起有漏義成異生下例有學有學俱生猶未永滅理亦應然無學有漏雖非漏俱至故成有漏於理無違無學下通妨妨云無學已斷我執然非漏俱云何亦有有漏法耶如難陀之貪身子之嗔畢陵之慢等釋云無學有漏雖非自身現行煩惱俱生俱滅互相增益方成有漏而從先時有漏種起故成有漏於理無違然不熏成有漏法種自相續中非漏俱故由有末那恆起我執至而識類別實有八種由有下結證有下總結然有下通妨總通七八二識妨難難云餘處經中唯説六識不説七八二識者何釋此如文已上釋第二能變竟如是已説第二能變第三能變其相云何如是下釋第三能變文中結前問後頌曰次第三能變至了境為性相善不善俱非頌曰下舉頌答頌有三十六句約九門分釋一差別門次第至六種二體性門了別為性三行相門了別為相四三性門善不善俱非五相應心所門此心所至不定六受俱門皆三受相應七共依門依止根本識一句八俱轉門五識隨緣現至意識常現起九五位不行門除生無想天至悶絶論曰次中思量能變識後至五謂依發屬助如根論曰下依門解釋初二句結前起後此識下先總標差別門謂名下別釋隨根立名初句標六名根者俱舍云身根有九事十事有餘根具五義者一依根之識依俱有根而得住故二根所發識由眼等根所引發故三屬根之識識繫屬根如子之屬父故四助根之識根如鏡光照物無別分析由識於境能了別故五如根之識俱有情數之所攝故雖六識身皆依意轉至辨識得名心意非例雖六下簡濫難云若識隨根立名者六皆依意轉悉應名意識釋中約共不共答雖六識身皆依意轉而五以意為共所依唯第六以意為不共今隨不共立意識名例如五識依五色根各隨不共立名無彼此相濫過或唯依意故名意識五非唯依意兼依色根故不名意識伏難云隨根立名者第八依意應名意識第七依心應名心識今釋云隨根五義辨識得名非辨心意不應為例或名色識乃至法識至謂於六境了別名識或名下隨境立名初句標六名次句釋義末句轉釋謂此六識於色聲等六境有了別用故名為識今從境立正順識義色等五識唯了色等至故六識名無相濫失色等下簡濫難云若隨境立名者第六與五同時或了色乃至或了觸亦可名色識乃至觸識釋中約通局答色等五識唯各了色等故名色識乃至觸識第六通能了一切法故名法識或能了法獨得法名前五不能故不名法故六識名無相濫失不可知執受處了第二能變云依彼轉緣彼此第三能變中何故不説依緣釋中初句明不説意後句指前指後於次能變中已説所依即前通明諸心三所依此六所緣義便當説即後二門了境為性相次言了境為性相者至能了別境名為識故次言下釋頌第三句體性行相二門初句牒頌雙標次句釋義句中以雙顯釋雙標後二句分釋雙顯義了別識之體了境識之用體用皆能了境故由斯了別境義順識義故兼釋別名者別前心意唯此六名識如契經説眼識云何至餘所依了如前已説如契下引證初引文彼經下以釋經説眼識依於眼根乃至意識依於意根如是且説不共所依經説眼識了別諸色乃至意識了別諸法如是且説未轉依位見分所了餘共所依者謂五識皆依六七八識六依第八餘已轉依見分所了者謂一根發識緣一切境此六轉識何性攝耶謂善不善俱非性攝此六下釋第四句三性門初徵起次舉頌答俱非者謂無記非善不善故名俱非略釋俱非二字能為此世他世順益至非於他世故不名善能為下別釋三性先釋善相此世謂現在他世謂當來所作善業能感二世所欲從心致大饒富人天下簡果從因問曰人天樂果清升順益可名善否今答云樂果隨先業轉此世雖能順益報盡未然此取業因通二世者方名為善能為此世他世違損至非於他世故非不善次釋不善相所作惡業能令二世所求不遂擾惱身心惡趣下簡果從因問曰惡趣苦果沉墜違損可名不善答云苦果隨先業轉此世雖能違損償足自停此取業因通二世者方名不善於善不善益損義中不可記別故名無記三釋無記相非順益義無善可記非違損義無不善可記此六轉識若與信等至俱不相應無記性攝此六下出體明相攝上但出善不善二性相此中出體信慚愧無貪無嗔無癡勤安不放逸行捨不害六識與此相應是善性攝無慚無愧忿恨惱覆嫉慳害嗔與此相應是不善性攝俱不相應是無記攝有義六識三性不俱至便違正理故定不俱有義下釋三性俱不俱初解不俱謂六識三性定不俱起次二句釋不俱義同緣外境故三性互違故五識下設三性俱起難初二句立定六識俱起善染性同謂五識生必由意識為分別依導引而起俱時而生同緣五境同善同染若許下正難五識三性俱行意識隨之應通三性後句結成不俱瑜伽等説藏識一時至非一生滅無相違過瑜伽下通妨難云瑜伽等説藏識一時與轉識相應三性俱起何謂不俱引論雖引一句全文其意唯用轉識三性俱起釋云彼云一時依多念説如説一心非一生滅今依一念故不容俱與彼論文無相違過有義六識三性容俱至前所設難於此唐捐有義下次解俱起六識三性容俱率爾下釋俱義率爾謂創初之心或多謂五俱起或少謂二三四如眼識率爾必是無記耳鼻等流成善成染五識既容俱起三性必俱五識下斥前難五識與意雖定俱生而善性等不必同故前難五識三性俱行意識爾時應通三性今以五識例意識性不必同此難徒設故瑜伽説若遇聲緣至若有希望後時方出故瑜下引證先明二識俱起次判屬性諸瑜伽師入禪正受若遇聲緣從定起者此是與定相應善意識俱轉之餘耳識生領受此聲後方出定非唯下明二識必相假先明意識必須耳識非唯彼定相應意識能取此聲無餘耳識若唯意識無耳識者定中意識不能聞聲於此音聲不領受故不應出定非取下明耳識必須意識若謂耳識領受聲時即便出定故不與與定相應意識俱時而轉理亦不然非取聲時即便出定領受聲已若有希望後方出定故聞聲時心猶在定定應二識共取此聲在定耳識率爾聞聲至率爾墮心定無記故在定下判屬二性初句標定率爾耳識非善次句釋成無記定中意識理應是善此明二識俱起性不同用顯三性容俱由此誠證五俱意識至亦緣五境不説同性由此下結證性不同無記耳識與定相應善意俱轉諸處下復引同境不同性之文結證三性容俱雜集論説等引位中五識無者依多分説雜集下釋妨難云集論説等引位中無有五識何故説與定相應意識俱轉餘耳識聞聲釋云彼依多分此約少分等引者此通有心及無心定離沉掉名之曰等引生功德名之曰引此既通有心定彼依多分或可言無此約少分或可言有故彼此文不相違反若五識中三性俱轉至已永滅除戲論種故若五下結判俱起問五俱意識既不能與前五同性何故前文説六識三性亦容俱起文中約偏不偏答偏注者一向也如眼識屬善意識一向偏注亦成於善或餘識不善意識偏注亦成不善若不偏注意便無記故六下結成俱起得自在下明佛位唯善性攝後二句簡二性道諦攝故非不善滅戲論故非無記六識與幾心所相應頌曰至三受共相應六識下明相應心所門初句問起頌曰下舉頌答論曰此六轉識總與六位至如屬我物立我所名論曰下總標六位恆依下先釋心所通名以心為依方能現起故更互相應和合似一故繫縛攝屬於自心王故名心所次舉例明如屬我物立我所名屬心之法名為心所心於所緣唯取總相至如畫師資作模填彩心於下釋行相心於所緣唯取總相唯者明不取別相心所於境不唯取總亦取別相亦者明兼取總相心事者了境作用名事次舉喻心如畫師所如弟子取總相如作模取別相如填彩故瑜伽説識能了別至此表心所亦緣總相故瑜下引證遍行初句明心王唯了境之總相作意下諸句明心所兼了總別相即諸心所取所別相者此句該通上下未了者未明了也今作意能明了之可意等等非可意及俱非相攝受謂順益等謂損害俱相違相言説因者由想安立境之分齊方能生起種種名言正因等等邪因俱非相故作下一句結名心所諸句皆言此者指總相也餘處復説欲亦能了至皆於所緣兼取別相餘處下引證別境諸句中亦字兼總相言也由此下例餘四位兼取總別相由此二字承上二位作意能警心心所起觸能令心對境皆有順生心所功能受與想俱受能起愛愛生諸取思為行蘊主欲能希望解能決定念能記憶定慧了得失由此二位緣境方能引起善染等四位諸心所法後一句釋成諸位亦兼取總別相雖諸心所名義無異而有六位種類差別雖諸下依標分類問曰通名心所通具恆依等義名義無異何分六位差別答中初句牒問次句依類分六善染等種類差別故謂遍行有五別境亦五至於善染等皆不定故謂遍下依類列數一切下略釋六位別義如文然瑜伽論合六為五至由此五位種類差別然瑜下引證合意根隨俱染共為一位復以下依四辨五先標四一切一切性謂善等三性一切地謂三界九地一切時謂過未現三時一切俱謂與八種識俱相應次正辨差別遍行具四一切可知別境唯初二者通三性故遍九地故善唯有一善遍九地故染四皆無者不通善淨故不遍上地故善時無故第八不相應故不定唯一者於善染等皆不定故次一句結此字指四一切此六轉識易脫不定至非逼非悅名不苦樂受此六下釋頌第四句受俱門先總標三受相應六識有易脫故與變易受相應領順下別釋受相非逼非悅者中容境也不苦不樂者捨受也如是三受或各分二至苦受亦由無漏起故如是下增數分判先標分二釋中初約身心次約漏無漏後句釋無漏通苦受問曰無漏是道諦攝永盡諸苦云何通苦受釋云修無漏者勞心苦志然後方得是故苦受亦由無漏起或各分三謂見所斷至又學無學非二為三或各下先標分三釋中初約三斷次約三學非所斷謂無漏受也非學非無學謂凡位也或總分四謂善不善有覆無覆二無記受或總下先總標分四釋中初約四性總分四樂受即善苦即不善捨即二無記有義三受容各分四至彼皆容與苦根相應有義下次約一一受別分四謂善與三受相應不善二無記亦皆與三受相應五識下釋五識相應任運煩惱純苦趣中任運煩惱此二煩惱不發惡業者是有覆無記故與苦根相應論説憂根非無記故此釋有覆無記既通苦受例之亦通樂捨有覆説通三受例之無覆無記及善不善亦應通三受是故三受容各分四瑜伽論説若任運生至意地一切根相應瑜伽下引證證任運生一切煩惱有覆無記攝皆於三受現行可得若通前六識無記者遍與諸識中三受相應不通一切識身者唯與意地三受相應此證有覆既通三受例善不善無覆亦通三受雜集論説若欲界繫至故知三受各容有四雜集下證不善有覆通三受前約任運煩惱不發惡行者是有覆攝今約雖是任運發惡行者亦是不善亦者顯任運者通二性也所餘謂欲界繫餘不發惡者及餘上二界任運煩惱皆是有覆無記所攝此證不善有覆通三受例善及無覆亦通三受故知下結據標結文釋及引證應皆例之三受各容有四或總分五謂苦樂憂喜捨至無分別故平等轉故或總下初總標分五次列名三中下釋分意逼身名苦悅身名樂逼心名憂悅心名喜無分別者通前五識名為苦樂有分別者唯在第六名為憂喜尤重者苦樂輕微者憂喜捨不分者非逼非悅於身於心無別異相純無分別無有輕重故不分二諸適悅受五識相應至安靜尤重無分別故諸適下約諸識相應分樂喜適悅受者領順益境故五識相應恆名為樂意識相應約界地分有三種別欲界及初禪近分二禪近分名喜初禪根本二禪根本名樂名喜三禪近分及根本名樂近分謂未至地諸逼迫受五識相應至意地戚受名憂根故諸逼下約諸識相應分苦憂逼迫受者領違損境故五識相應恆名為苦意識相應有二家釋不同先初家解初句正釋唯憂次引教貼釋唯憂瑜伽論説生地獄中至尚名為憂況餘輕者瑜伽下雙證六識通苦憂異熟生者即前六識五識俱者屬苦意識俱者屬憂逼迫無間名曰相續又引尋伺者乃意識相應不共法一分者一向苦受處也故知下結意地重蹙尚名為憂輕者亦爾此釋意識唯憂無苦有義通二人天中者至純受尤重無分別故有義下次家解意戚通二約五趣分有三種別人天唯憂地獄唯苦旁生鬼界名憂名苦捺洛迦此云苦器瑜伽論説若任運生至現行可得廣説如前瑜伽下引證旁生鬼界通苦任運煩惱有覆無記性攝皆通三受廣説如前者通一切識身者遍與一切根相應不通一切識身者意地一切根相應此證意識通苦又説俱生薩迦耶見至論説憂根非無記故又説下引證地獄意識唯通苦受俱生簡非分別身邊二見意識相應唯無記故是苦非憂後句引論貼釋憂非無記反顯無記是苦此釋意識唯苦無憂又瑜伽説地獄諸根至純苦鬼界傍生亦爾又瑜下此段乃次家引證地獄意地唯苦無憂之文瑜伽中二十二根八根定成就謂眼耳鼻舌身命苦捨三根定不成就謂樂喜憂餘十一根或成或不成餘三定是樂喜憂根以彼必成現行捨故餘三下二句乃次家判論定成定不成之文也初句判憂定不成次句判捨定成今判憂既不成只證地獄唯苦無憂以成己意復奪初家意地憂不成也豈不容捨彼定不成寧知彼文唯説容受豈不下二句乃初家奪他救己之文因次家判捨定成今奪云捨定不成因次家判樂喜憂不成今救云寧知彼文唯説容受此句徵結次家汝寧知三受中憂不成也容受者即樂喜憂三受雖通言三受救家意許憂是成就根應不説彼定成意根彼容六識有時無故應不下二句乃次家縱難初家之文先難初家不許捨成就初家不許捨次家不許憂二家互奪各不許一則成就根中止有七今縱難之今文言意根者如下文云意根總以八識為自性又瑜伽云能令依止隨自在轉增上義故八識皆隨意轉故別立一根地獄位中六識既無意根不成故不可以意根足成第八意根既不可為第八必以捨根為第八捨根既是成就根憂根定是不成就根不應彼論唯説容受至如何説彼定成八根不應下四句乃初家詰難次家憂不成就之文初句直難不可以憂為不成根次句指論難破論言諸根中三不成就此文通漫而無的指之辭又無別因以顯憂不成汝何為判憂不成耶第三句縱問若論言憂不成就則成就根中止有七故第四句詰難如何定成八根若謂五識不相續故至可有希求淫欲事故若謂下乃次家破初家伏救之文初家伏救云五識相應是苦受意識相應是憂受今地獄中分形碎質五根不成根不成故則五識不相續則無苦受違境唯逼心根故有憂受此救憂是成就今文牒執破云死生悶絶寧有憂根有執喜根亦爾設執下牒執一形者謂男女根中隨指一根也理亦下初句總破次釋義可知由斯第八定是捨根第七八識捨相應故由期下結先結捨是成根由斯二字承上所簡餘諸根既不可當第八故結云定是捨根次句釋捨義前六有不行時七八恆相續故如極樂地意悅名樂至故餘三言定憂喜樂如極下次結憂是不成根先舉例極樂地意悅名樂無喜以例極苦處意迫名苦無憂後句指論餘三定憂喜樂以結憂是不成根餘處説彼有等流樂至無異熟樂名純苦故餘處下通妨妨云今判餘三中樂不成餘處不妨説地獄有等流樂例之今雖判憂不成何妨地獄亦有憂初句牒妨應如下釋隨轉者隨順機宜權轉施設也立世毗曇云人養六畜飲食溫清者在熱獄得冷間在寒獄得溫間此之溫冷果似前因假名等流是異熟果應知彼是隨轉理説或説雜受處者謂輕獄中或可有樂純受重獄必無異熟果報樂故名純苦然諸聖教意地戚受至或隨轉門無相違過然諸下通前引教初句牒前引教次釋依多分説者人天名憂旁生鬼界名憂名苦故瑜伽論説生地獄中至傍生亦爾者亦依隨轉門瑜伽下牒前引教次釋亦依隨轉故又彼苦根意識俱者是餘憂類假説為憂又彼下引類通意俱苦根名為憂者是餘趣憂之類假説為憂而實是苦或彼苦根損身心故至顯揚論等具顯此義或彼下比例明地獄苦損身心故而亦名憂例如近分喜益身心故而亦名樂既近分名樂而實是喜以例明之地獄名憂而實是苦然未至地定無樂根説彼唯有十一根故然未下通妨難云寧知是喜而亦名樂豈不容彼定成樂根釋云未至地唯有十一根故十一根中無樂故十一謂眼耳鼻舌身意命苦憂喜捨由此應知意地戚受至恐文增廣故不繁述由此下總結有義六識三受不俱至非一生滅無相違過有義下明三受俱不俱初正明不俱瑜伽下通妨有義六識三受容俱至諸佛已斷憂苦事故有義下次正明俱起義以順違中境俱起對顯三受容俱如前三性故不重釋前所略標六位心所至勝解念定慧所緣事不同前所下廣明六位體用差別先徵二位頌曰下舉頌答遍行別境論曰六位中初遍行心所至由教及理為定量故論曰下先釋遍行初文體用指前次文徵遍行相次句總舉教理答此中教者如契經言至由斯觸等四是遍行初引經證觸受想思四是遍行心起定有故廣説者指耳聲乃至意法等又契經説若根不壞至此等聖教誠證非一次引經證作意亦是遍行雖根境和合必由作意方能生識故心起必有故是遍行復引云於此者謂境也心所於境作意心王即於境了別王若了別所即作意共和合者王所同時故是遍行廣説者觸對領納想取造作皆與王同時恆共和合故是遍行此等下結理謂識起必有三和至餘非遍行義至當説理謂下引理釋彼定生觸必由觸有即前文觸依彼生令彼和合此明觸是遍行若無下反釋作意等四文中皆反覆釋受中言隨一者三受中隨一受也思中言隨一者思能役心造善惡無記之業三業中隨作一業也由此下結餘非遍行者指別境也次別境者謂欲至慧至於六位中次初説故次別下釋別境初句標名次句釋別境義多分不同者定慧同一所觀故云何為欲於所樂境希望為性勤依為業云何下別釋欲先徵出體用希求冀望而為自性精進斷依而為業用有義所樂謂可欣境於可欣事欲見聞等有希望故有義下先初解所樂謂可欣樂非是可厭及中容境也欲見聞等謂非不欲也於可厭事希彼不合至若不希望亦無欲起於可下通妨難云於可厭事若未合時希彼不合若正合時望彼別離豈非有欲此但下釋希彼不合者此但求彼不合之時謂有可欣自體可合故望彼別離者此但求彼別離之時謂有可欣自體不離故非於可厭之事而起希望故於下簡先簡可厭中容境無欲次簡於可欣境若不希望亦無有欲此明欲以希望為體有義所樂謂所求境至若不希求亦無欲起有義下次解所樂謂所樂求可欣求合可厭求離希望有欲於中下簡中容境及欣厭境若不希求皆無有欲有義所樂謂欲觀境至由斯理趣欲非遍行有義下第三解所樂謂樂欲觀一切事者遍通欣厭中容三境也欲觀察謂非任運若不下簡若不欲觀及隨境任運觀者此全無欲由斯一句結成前文餘非遍行有説要由希望境力至故經説欲為諸法本有説下簡異解先敘由希望力引生心心所方取所緣復引經欲為諸法本以證欲為心心所本意成欲是遍行彼説不然心等取境至由欲能生心心所故彼説下破初句略斥次約義斥作意引心令趣自境諸心心所取自所緣非由樂欲又聖教説若根不壞境界現前作意正起方能生識不説由欲生心心所如説諸法愛為根本豈心心所皆由愛生如説下例破由經説欲為諸法本諸心心所皆因欲起經中亦説諸法愛為根本豈心心所皆由愛生彼既不爾此云何然故説欲為諸法本者至故論説此勤依為業故説下通經結示説欲所起身口意若善若惡一切事業或説欲發勤由勤助成一切善事故經言諸法欲為其本云何勝解於決定境至由此異緣不能引轉云何下釋勝解先徵出體用於決定境謂非猶豫印定任持而為自性不可誘引改轉為業謂邪下轉釋謂依教理明證之力於境審諦決定印持由斯異緣不能牽引令移此義而趣餘義故猶豫境勝解全無至由斯勝解非遍行攝故猶下簡非遍行故猶豫境非審決心全無勝解非遍行攝有説心等取自境時無拘礙故皆有勝解有説下簡異解先敘取境無礙由勝解力意成解是遍行彼説非理所以者何至此應復待餘便有無窮失彼説下破初句略斥次徵釋非理不為礙者即所緣諸法不被礙者即心心所能作增上緣警覺發起心等者根及作意皆非勝解能成此事若謂由此勝解根及作意方勝發起則此勝解復應待餘便有無窮失云何為念於曾習境至令不忘失能引定故云何下釋念先徵出體用於曾習境謂非未習明審記憶不忘為性等持所依而為業用謂數下轉釋謂由念力數數憶持曾所受境令心明記而不忘失能引定起故為彼依於曾未受體類境中至故念必非遍行所攝於曾下簡非遍行曾未受境及不明記即全無念故非遍行體謂所受自體類曾受同類相似之境有説心起必與念俱能為後時憶念因故有説下簡異解先敘若心起時必與念俱何也由念於境明審記持能為後時憶念因故意成念是遍行彼説非理勿於後時至足為後時憶念因故彼説下破初句略斥次例破若謂後時有憶念故前必有念而為其因不可後時有癡信等前亦有此而為其因然前心等或想勢力足為後時憶念之因故不可執心前定有念云何為定於所觀境至依斯便有決擇智生云何下釋定先徵出體用謂繫心所觀專精傾注不令散亂而為自性智慧所依而為業用謂觀下轉釋謂觀如理不如理及俱非境由定勢力令心專注而不散逸依斯便有決擇智生定能發慧故心專注言顯所欲住至前後境別應無等持心專下釋專注心專注言謂表此心所欲住境此定令心即便能住非唯一境而不遷移不爾下反顯見道歷觀上下八諦前後境別而不是一若非專注應無等持故專注言非唯一境境雖改轉心隨專注若散心緣境為境所牽若定心緣境非境牽心故名為定若不繫心專注境位便無定起故非遍行若不下簡非遍行有説爾時亦有定起但相微隱有説下簡異解先敘設不繫心專注境位亦有定起但相微隱而不昭著非是全無意成定是遍行應説誠言若定能令至作意令心取所緣故應説下破初句誡次句設執反詰理亦下破三和合位是觸用故若謂下復設執詰亦不下破一剎那心時之最促自不易故若言下重設執詰彼亦下破心取所緣由作意力皆非定故有説此定體即是心經説為心學心一境性故有説下簡異解初敘定體即心次引經貼釋心學者三學中定為心學戒為身學慧為口學智在説故心一境性句轉釋心學此定為心一境性故彼非誠證依定攝心至如念慧等非即心故彼非下破先破引經依定攝心定能令心一於境故言定乃心之學根力下立量破即心定非即心根力覺道等道品攝故如念慧等念慧等道品攝故非即是心此云何然云何為慧於所觀境至由慧推求得決定故云何下釋慧先徵出體用於所觀境料簡決擇而為自性斷除猶豫而為業用謂觀下轉釋謂觀得失俱非境中由慧推求而得決定依斯永斷所有疑惑於非觀境愚昧心中無簡擇故非遍行攝於非下簡非遍行於非所觀及迷暗心中無決擇智故非遍行有説爾時亦有慧起至對法説為大地法故有説下簡異解先敘爾時者指上非觀境及愚昧心但慧相微隱而亦有起非慧全無大受句舉例如纖微物為大物所受隱覆寧知對法句引證遍行愚智心中皆有故意成慧是遍行諸部對法展轉相違至説十非經不應固執諸部下破初二句破論互違不為定量次二句破違經謬執然欲等五非觸等故定非遍行如信貪等然欲下立量總結欲等五定非遍行非觸等故如信貪等有義此五定互相資隨一起時必有餘四有義下明現起分位先初解此欲等五行相無違更互資益所在恆俱隨一起時必有餘四有義不定瑜伽説此至所緣能緣非定俱故有義下次解先總明此欲等五現起不定次引瑜伽證四一切中無後二者不遍一切時故不遍一切心故所緣四境不定俱起對顯能緣五位非恆相應或俱或不俱故起一至四名不俱起五名俱應説此五或時起一至謂不專注馳散推求應説下別明不定相先唯起一能所各別獨自行單境隻心名起一所樂起欲決定起解曾習起念所觀起定謂愚下料簡通妨簡意明有專注而無簡擇彼加下妨云愚昧心中既無簡擇何故説彼緣所觀境釋云定前加行少有聞思故或依下轉難既言少有聞思亦可兼慧何云所解唯定釋云今依多分不約少時故言唯定如戲下引事證成或於下所觀起慧不專注故無定馳散推求故唯慧或時起二謂於所樂至起定及慧合有十二或時下起二境若兩兩不同心則雙雙各異合有十個二乃至二字超文下文例然所樂決定起欲解所樂曾習起欲念所樂所觀起欲定所樂所觀起欲慧決定曾習起解念決定所觀起解定決定所觀起解慧曾習所觀起念定曾習所觀起念慧於所觀起定慧或時起三謂於所樂至起念定慧合有十三或時下起三境既三三共起心亦三三合生合有十箇三所樂決定曾習起欲解念所樂決定所觀起欲解定所樂決定所觀起欲解慧所樂曾習所觀起欲念定所樂曾習所觀起欲念慧所樂所觀起欲定慧決定曾習所觀起解念定決定曾習所觀起解念慧決定所觀起解定慧曾習所觀起念定慧或時起四謂於所樂至起後四種合有五四或時下起四境若前後變更心則逆次除一合有五箇四所樂決定曾習所觀起欲解念定或於此四起欲解念慧所樂決定所觀起欲解定慧所樂曾習所觀起欲念定慧決定曾習所觀起解念定慧或時起五謂於所樂決定曾習所觀境中具起五種或時下起五所緣既俱心亦共境總心齊名起五如是於四起欲等五總別合有三十一句如是下總結初句標結言總意別雖有單雙三四合離不同皆名於四起五次句結數起五名總起一至四名別合三十一句欲等各起成單五欲對後四成四句解三念二定唯一是則名為十句二欲解對三只成三欲念對二欲定一解念對二解定一念定慧三一成十欲等五句逆次除如是只成五句四欲等俱起成一句是名總別三十一或有心位五皆不起至及藏識俱此類非一或有下次明不起如非四境者非所樂等四境也率爾心者創始剎那心也藏識俱者有漏第八也如此類中五皆不起第七八識此別境五至依轉未轉皆不遮故第七下明諸識相應隨位有無者未轉依位第七唯一慧第八全無若已轉依二識皆具五第六下先標諸位皆與五法相應次釋依轉未轉皆不遮故有義五識此五皆無至不能推度無簡擇故有義下明五識二師有無初師明皆無如文有義五識容有此五至餘三準此有慧無失次師明容有但相微劣而非增上皆如文遮等下通妨問云五識性散云何有定釋中等引者梵語三摩呬多通於有心無心離沉掉故名等引生功德名引等持者梵語三摩鉢底唯局有心散心論遮等引之定五識無故言性散動非遮等持之定故容五識有定由此下引證有慧眼耳二通通名慧性以例餘三五皆有慧未自在位此五或無至五識皆有作事智故未自下明未轉或無已轉定有通緣真俗正遍知故取境親明無猶豫故因窮久遠之實修果窮久遠之實證故又三世宿命明故那伽常在定故五皆具有智故最極增上而非微劣此別境五何受相應至以審決等五識無故此別下明受相應初句徵起有義下先初解欲與喜樂捨相應以彼一句釋除意憂苦二境非所樂故解念定慧通憂喜樂捨除苦以審一句釋除苦意審決等謂解念定慧與第六相應不與五識相應五識有苦意識無苦此四既不與五識相應是故除苦此前意地無苦師釋也有義一切五受相應至由斯欲等五受相應有義下次解一切謂五法總明五法皆與五受相應論説下別證欲有憂苦初句證欲有憂愁戚即憂相次句釋有苦希求即欲意有苦根等者此前意地有苦師釋也論説下引論通證欲有憂苦貪愛即欲相應法也苦根下釋四法有苦意識既有苦根解念定慧是意識相應法以此證知審決等四應有苦受又五下復以五識有苦證四法亦通苦印境等四即前微細解念定慧由斯下總結別境與五受相應此五復依性界學等諸門分別如理應思此五下結例餘門分別性謂三性界謂欲界繫等學謂三學此五既具四一切中初二則知三性三界皆通第六意識依轉未轉既皆不遮則知學等亦應皆有如是等類例推可知
