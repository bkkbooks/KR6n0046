body:
  text: 明武林蓮居弟子大惠録復如何知諸有為相異色心等有實自性復如下破生住異滅初大乘問契經説故如契經説有三有為之有為相乃至廣説契經下次餘乘答三有為者謂欲色無色三界繫法若色若心皆屬有為有為相者謂生住異滅四相有為法上由此無常遷轉不停故名此四為有為相以經説三有為之有為相證知異色心外別有有為相此經不説異色心等有實自性為證不成此經下破先斥引經不當非第六聲便表異體至無為相體應異所相非第下別分三番例斥俱破能所異體第六聲即八轉聲中第六屬聲也唯識開蒙云體業具為從屬依呼今此之字正當彼中第六屬字謂繫屬也連也攝也初直破云不可因此之字便表能所異體次句例破例云色心之體體即色心彼既不因之字表異此云何然又非能下一句直破能相謂生等四相所相謂三有為法非字破能所定異次句例破堅相等等濕暖動地等等水火風勿字約地等外無堅等破又若有下一句牒縱次句例破無為相謂不生不滅等無為所相謂虗空等應字是反語應異者反顯不異也彼無為能所既不異此云何然又生等相若體俱有至又住異滅用不應俱又生下破能相有寶自性上計諸有為相異色心外有實自體初句牒計次句以用奪體用不齊興體非俱有若相下救以相違故用不頓興而體俱有體亦下立量例破體不應俱有生等用是有法不頓興宗相違故因喻如體例云生等體是有法亦不應俱有宗相違故因喻如用又住下以體奪用承上立量體既不俱住異滅用亦不應俱有餘乘以四相對三世生在未來住異滅三執同現在故也此三既不俱有云何執同現在能相所相體俱本有至又執生等便為無用能相下雙破能所體用俱有初句牒執次句以用例明能相所相用是有法俱本有宗無別性故因喻如體故云用亦應然此明立則俱立若用俱有又違上文用不頓興若謂下破轉計初句執家約更待因緣成上用不頓興次句破云所待因緣應非本有用非本有體亦應然能所相用是有法應非本有宗更待因緣故因喻如能所相體何也性相同故此明破則俱破體用既俱非本有此與本執俱有相違又執下承上更待因緣破云所執生等便為無用因緣自生因緣自滅非關生等故此斥云無用所相恆有而生等合至彼此異因不可得故所相下立量顯能所不異體所相謂三有為法生等謂能相立量云三有為法是有法而生等合宗所相恆有故因喻如三無為無為所相恆有既不與生等合以證有為所相恆有亦應非生等合也能所體異可以論合今以無為為同類言不與生等合者以破有為法上無別生等來合即有為法上論生論滅者以明非異色心別有又去來世非現非常至故彼所執進退非理又去下立量破過未非實有性立量如文以四相對世故破三世即破四相生名下破對世不當生名下四句約現未破不當滅若下二句約有無破不當又滅下四句約同異破不當故彼下約進退結不當退生於未來進滅於現在故云非理然有為法因緣力故至後一是無故在過去然有下申正義初六句標四相有無即生滅暫有即住異本無下八句釋四相無而歘有謂之生相似相續謂之住剎那遷改謂之異化有歸無謂之滅前三下以四相對二世此異餘乘所對如何無法與有為相如何下釋妨先立難問云滅是無法如何與有為法作相表此後無為相何失至雖俱名表而表有異表此下約表直答生表下先明剎那四相生表於今方有滅表今猶未無異表遷變改易住表非久遠用故此下結此依剎那假立四相至是故四相皆是假立次明一期四相此依下結前一期下起後初有下正明初有謂始生時後無謂終死時後法如前説名相似中無間斷謂之相續漸漸改易名曰轉變故經云二十之時衰於十歲乃至六十日月歲時念念遷變等是故下以假立結斥餘乘實有復如何知異色心等有實詮表名句文身復如下破名句文身先大乘問契經説故如契經説佛得希有名句文身契經下餘乘答此經不説異色心等有實名等為證不成此經下破初斥引謬若名句文異聲實有應如色等非實能詮若名下立量破如文縱其異聲有奪其非能詮謂聲能生名句文者至此足能詮何用名等謂聲下破聲能生名等初句牒計彼計聲是能生名句文是所生以所生為能詮能所既異復計名等異聲實有此聲下破此聲自有音韻屈曲足可為能詮何用生名等為能詮此破其聲不必生名等為能詮若謂聲上音韻屈曲至應異色處別有實體若謂下破轉救初句牒救由上許音韻屈曲可為能詮今救云聲上音韻屈曲即我所説名句文體異於聲而定實有所見下例破形量屈曲謂長短等彼若異色別有此音韻亦應然彼既不爾此云何然此破名等異聲實有若謂聲上音韻屈曲至此應如彼聲不別生名等若謂下破轉救舉喻轉救謂音韻聲如絃管聲非是能詮還欲成生名等為能詮此應下立量並破音韻聲是有法不別生名等宗非能詮故因喻如絃管聲此仍牒後絃管聲非能詮而不能生名等以證音韻聲既非能詮亦不能生名等又誰説彼定不能詮至不別生實名句文身又誰下大乘徵由上餘乘舉絃管聲非能詮以喻音韻聲非能詮今徵意云絃管聲亦可為能詮如人聞聲了知宮商等音以證音韻聲即是能詮何用生名等聲若下餘乘立量救絃管聲是有法無詮用宗無情法故因喻如風鈴聲應有者反言無也上以絃管聲喻同音韻聲此以風鈴聲喻同絃管聲此三皆無詮用必生名等為能詮此應下牒破既云絃管風鈴無詮用而不生名等此音韻聲如彼二聲亦不別生名句文立量破如上若唯語聲能生名等至執能詮異語天愛非餘若唯下餘乘轉計由上大乘以絃風不能生名等以證語聲不生名等今餘乘計云絃風無情不生名等唯語聲屬有情能生名等如何下大乘牒破既許唯語能生如何不許唯語能詮而要生名等為詮耶何理一句餘乘難即次句救異語不下大乘約通局如次答能詮即語通欲界人天共了故能詮異語唯局二禪已上故以光為能詮故云異語不通下界故曰非餘然依語聲分位差別至文即是字為二所依然依下申正義問既聲即能詮如何有名等別答云依語聲分位差別如梵音斫芻若二字分呼未有所目説為字分位若二字合呼詮於眼體説為名分位更添阿薩利縛名為眼有漏説為句位故依分位以立名等自性者如言火唯詮燒熱自性差別者如言香火簡非草木火等文即墨字為二所依瑜伽云云何名身謂依諸法自性施設自相施設由遍分別為隨言説唯建立想是謂名身云何句身謂即依彼自相施設所有諸法差別施設建立功德過失雜染清淨戲論是謂句身云何文身謂名身句身所依止性所有字身是謂文身此三離聲雖無別體至蘊處界攝亦各有異此三下明不即離分位故不離差別故不即雖不即離而假實有異聲是實法名等假立由此下約二無礙解所緣判差別法無礙解緣名等辭無礙解緣實聲聲與下約三科判異色蘊聲處聲界即攝聲行蘊法處法界即攝名等且依此土説名句文至妙香味等假立三故且依下問云聲上屈曲即以為教色上屈曲亦應得為教答云且依此土此方真教體清淨在音聞故若通餘土六塵皆可光明等即色香味觸法塵也皆可立名句文如淨名等所説依聲假立簡非餘乘執為實有有執隨眠異心心所是不相應行蘊所攝有執下別破隨眠隨眠謂煩惱種子隨逐有情眠伏藏識或隨增過故名隨眠彼亦非理名貪等故如現貪等非不相應彼亦下破立量如文執別有餘不相應行準前理趣皆應遮止執別下例破餘不相應謂流轉定異相應勢速次第時方數和合性不和合性等法本無咎因執成過是故破情不破法也上破不相應行法竟諸無為法離色心等決定實有理不可得諸無下破三無為謂虗空擇滅非擇滅先總破且定有法略有三種至故不可執無為定有且定下引例對顯現所知如色心者色有質礙心有緣慮世智可知現受用如瓶衣者盛持潟貯蔽形遮醜亦世智知不待比量而知眼耳等等鼻舌身謂五色根即清淨四大天眼所不能見由彼彼有生識之用以用比度比量證知無為反此非世智知非比量證此顯聖人現量正智親證故斥云不可凡情世智執為離識實有設許下破實有有用者縱其實有立量以無常破之無為是有法應是無常宗有實用故因喻如眼耳等以有實用故是無常反明無為真常非離色心實有然諸無為所知性故至離色心等實無為性然諸下明無為非離色心實有立量如文上言無為非世共知非如色心現所知今量中立無為是所知性如色心等前後似違今則不然前約色心是世智知無為非世智知今約無為是聖智證故用世智所知色心為同喻以喻無為是聖智知義不濫也色心等所顯者緣闕不生時性空理顯故又虗空等為一為多又虗空下約一多總徵若體是一遍一切處至有應相雜無應不遍若體下別破虗空體一先出虗空義體一周遍容受隨能下破先初句破一能合法謂大小方圓等隨合成多此以遍奪一次句破遍若謂定一遍義不成一所合處餘不合故此以一奪遍不爾者雙救是一是遍牒救破云若是一遍諸法應互相遍諸法若不互遍則一遍之義仍復不成此以諸法不互遍雙破一遍若謂下轉救若虗空與法合則有如上體多餘不合互相遍三過今謂虗空不與法合體一體遍皆成不與法合者虗空自虗空諸法自諸法容受之義則不成立量破不能容受虗空是有法應非容受宗不與法合故因喻餘無為又色下復破一遍上約空中容色破此約色中有空破雜則非一無則不遍此約有無破一破遍也一部一品結法斷時至執彼體一理應爾故一部下破餘二無為先破一一部謂貪嗔等部一品謂上中下品結法者上下五分煩惱結使也擇滅者以智慧決擇斷諸結使也非擇滅者不由智決諸法緣闕不生時性空理顯名非擇滅破義如文若體是多便有品類至虗空又應非遍容受若體下立量破多初量總破三無為虗空等無為是有法非實無為宗有品類故因喻如色等虗空下立量別破虗空無為虗空是有法非遍容受宗有品類故因喻如色等餘部所執離心心所實有無為準前應破餘部下例破餘部所執者即後三種無為準前一多例破又諸無為許無因果故應如兔角非異心等有又諸下上破無為非實有此中約無因果故因立量總破諸無為離心之執然契經説有虗空等諸無為法略有二種然契下顯正義總標二種一依識變假施設有至無有變易假説為常一依下明依識變施設初句標謂依意識分別變也謂曾下釋始則聞名分別由名言熏習數修觀力後心心所生時似無為相隨觀變現依識所變此獨影境也此所下通妨問曰無為體常今所變相隨心生滅云何言常釋云前後相似者由前引後以後似前故無有變易者彼此相同故雖非真常故可假説二依法性假施設有至是法真理故名法性二依下明依法性施設初句標謂空下釋先出所依法性初句指體空無我謂能觀觀智真如謂所顯實理有無下示義與一切法非一異者一切法即俗此法性即真故言非一真如遍在一切一切不離真如故言非異是法下依理立名法性者謂諸法所依真實理性離諸障礙故名虗空至理非妄倒故名真如離諸下次明假施設有顯依一理施設衆名諸障礙者謂色心一切諸法簡擇力者智慧觀力雜染者謂諸煩惱執障究竟證會謂所證所會真理不由等者謂自性清淨涅槃緣闕所顯者諸法緣離性空理顯苦樂受滅者四禪捨念清淨苦樂頓捨鬬心不交想受不行者第九次第定不恆行恆行染汙心心所滅名滅盡定此五皆依真如假立真如亦假施設揚聲止響故遮撥下顯真如名亦是假立損減名撥無增益名執有勿幻曰實非妄曰真空有真實之名遣情施設不同餘宗離色心等至故諸無為非定實有不同下結示上破無為法竟外道餘乘所執諸法至亦如幻事非真實有外道下以三量總顯外道餘乘所執諸法非離心有非實有性所取能取即相見二分彼此即本質相分初量顯所取非離識有次量顯能緣不緣外質唯緣內境三量顯心心所是如幻有非是實有三量皆如文上言外境不有內心不空恐執者計心為實故以如幻遣之五位諸法悉破竟為遣妄執心心所外至如執外境亦是法執為遣下釋妨問云上破外境不有廣明內心不無今何言亦如幻耶釋意可知然諸法執略有二種至妄計度故決定非有然諸下束廣從略釋義與前我執義同但我法為異耳俱生下明俱生起相此復下明執相此二下明斷相分別下明分別起相此亦下明執相此二下明斷相如是下約相分本質結判有無是故下總結妄執然似下約依他遍計判有無故世尊説慈氏當知至依他起性如幻事等故世下引證立量如文諸識所緣二句此明非離心有依他如幻二句此明不可執實上破法執竟如是外道餘乘所執至緣用必依實有體故如是下總結顯我法離識皆非實有故心下結簡心外法初句結心外本質色非是親所緣緣次句結必用有實體相分境為所緣緣現在彼聚心心所法至如非所緣他聚攝故現在下立量簡心外心亦非親所緣緣如文彼此者心王與心所共為一聚諸識相望互為彼此非所緣者如眼識望聲名非所緣同聚心所亦非親所緣自體異故如餘非所取同聚下立量簡心所亦非心王親所緣緣如文自體異者心王心所各有自證體故如餘非所緣者如聲非眼所緣彼聚心非此聚緣由此應知實無外境唯有內識似外境生由此下結由上從疏以至親不但不緣心外法亦不緣心外心又亦不緣自聚王外所由此王尚不緣所心尚不緣心故知實無外境唯有內心似外境生以結前頌彼依識所變之意是故契經伽他中説至習氣擾濁心故似彼而轉是故下引證如文有作是難若無離識至如何説心似外境轉有作下釋妨先難此難即躡上似字而生標中反言無實我法假亦應無謂假下釋先法次喻真火喻真事似火喻似事猛赤法喻共法乃可下結假説牛等重立喻我法下例標結成斯則有假似故亦應有實若無有實應無假似云何説言似外境生反覆成難彼難非理離識我法至假説火等俱不成故彼難下答初文指前總破次句總標依類依實俱不成類謂似類即似事也人之猛赤類乎火故言類火之猛赤是實有故言實衣類假説理且不成至應亦於水等假説火等名依類下先破喻中依類初句牒計總斥猛赤下別破火之猛以勢言赤以色言變生成熟化有歸無名之為德人之猛以性言赤以色言言類有二謂猛赤相及德然人之猛赤類真火有猛赤之德非類有故是則猛赤類有德則不共若無共德而可假説水無火德何不名火以水亦有猛赤法故若謂猛等雖非類德至現見亦有互相離故若謂下牒救云猛赤之德雖非類有然人色赤者性必猛性猛者色必赤有似乎火一體不離故可於人假説火名此亦下破現見有人猛而不赤赤而不猛故類既無德又互相離至故知假説不依類成類既下結不依類依實假説理亦不成至無共假説有過同前依實下次破依實實者即猛赤德也初句牒計總斥猛赤下別破初句標猛赤德非人火共有謂猛下轉釋非共有此中亦約無共德破人之猛赤以色心為體依人而住火之猛赤以火微色微觸微為體依火而住既人火之德體依各異則人無火德而可假説過同説水若謂人火德相似故至由此假説不依實成若謂下牒轉救云德相似故可假説者理亦下破但説似火人不言似德人故由此下結不依實又假必依真事立者至故知假説不依真事又假下次破法初牒計總斥真謂下先出真相真謂自相者謂法自體如地之堅性水之濕性等乃無分別現量智得假智及詮俱非其境者此言真相俱非假智及詮所得之境正明假不依真謂假下轉釋假智者謂作行解有分別心言詮者謂表義名句文身不得自相等者如五識及明了意識初念俱現量心得法之自相若後念意識起時是帶名言有作解心唯於色等共相而轉共相者謂諸法上無常無我等相乃有分別比量假智所得亦非下謂假智詮雖不得自相亦非離此別有方便施設自相為假所依此總言假智不詮真假智但依意言聲起意言不及處此智便不行能詮謂言及智所詮謂義與境故知下結假不依真由此但依似事而轉至是故彼難不應正理由此下申正義似事者謂共相也增益者謂現量智了自相已於後剎那有比量智變現影相此是增益由前假智既不依真事似事而立故知但依增益似相而轉問曰前言不依似事今言但依似事此云何通答前言似者約事彼此言似如鍮似金此相似似也此言似者約識變影相增益境言似故前言類須破此言似須依是故下結責前難然依識變對遣妄執至故於識所變假説我法名然依下明遣執故言似由此下引證結歸開章假字釋前三句竟識所變相雖無量種而能變識類別唯三識所下釋頌中後三句文中初結前次起後謂能變識雖有八種約類而言則唯有三一謂異熟即第八識至及言顯六合為一種一謂下初略釋三名初異熟者有三義一異時而熟異謂別異屬因熟謂成熟是果異因居現在果熟於未來故二異類而熟類謂三性品類如因中造善造惡所感果報雖苦樂不等總是異熟果因通善惡果唯無記故三變異而熟如造業熏種須數灌溉種子增盛因種變易果方成熟故多異熟者不同前六唯一分故二恆審思量者謂恆常審察思惟度量也此簡餘識第八恆而不審第六審而不恆前五非恆非審唯此第七亦恆亦審於未轉已轉恆常審度我無我相故三了境相麁者謂七八雖俱了境而見相微細故唯此前六了別六塵境相最粗顯故六合為一及言顯之及者兼并義此三皆名能變識者至有漏善惡熏令生長此三下釋能變義總標二種能變初釋因能變一因下標名初句言習氣者指因等流者謂前七中三性親種後果似前因即前平等流類故名等流異熟者謂前六中善惡業種屬無記性前因通善惡後果唯無記性類別異故名異熟前七是能熏第八是所熏二因習氣在第八中故無者熏令生已生者熏令長生長即能變義前六中不言無記者無記業闕有勝用不熏種故第七無記為能熏者有覆性故二果能變謂前二種習氣力故有八識生現種種相次釋果能變二果下標名初句牒前因謂因能變果故親疏二種灌溉成熟有力有八識生指果現種種相謂相見分等即能變義等流習氣為因緣故至名等流果果似因故等流下分釋先明等流果初句牒因前七三性種二取攝是親因緣八識體謂各自證分相謂各相見分此即是果差別而生即能變義差別者謂諸心心所三性四分等異也名等流果者謂習善等所引同類或似先業後果隨轉異熟習氣為增上緣至名異熟果果異因故次明異熟果初句牒因前六有漏善惡種業種攝是增上緣由上等流親因緣正招感八識果今善惡業種為增上緣助感識生六道四生苦樂由此而分第八前六此即是果酬引業者謂業有力能牽引第八總報主是善惡趣一期報主施戒業引人天果報殺盜業引三塗果報一期無間恆相續故名真異熟酬滿業者謂業無力唯感前六中一分無記是別報由因中善惡瞋忍勝劣高下不同別報自分壽夭貴賤妍全闕不等從真異熟生不名真異熟何也有間斷故果異因者謂異性而熟故其能造業唯第六識善惡性者能造引滿二業前五一分善惡者唯能造滿業七八非造前五一分無記亦非其招業成果第八識全前六一分非業招者第七識全前六一分善不善性其第八是總報主總業招前六一分無記是別報別業招無記心等及根身亦別業招皆名正報器世間亦別業招仍名依報此中且説我愛執藏至名為異熟非謂一切此中下簡異上言真異熟及異熟生皆名異熟故今簡之唯取第八此頌中標異熟者此取具三義者名為異熟非謂前七可當此名也雖已略説能變三名至且初能變其相云何雖已下廣釋三能變相文中結前起後別徵初能變頌曰初阿賴耶識至恆轉如暴流阿羅漢位捨次頌答頌有十句分十二門解釋阿賴耶自相門異熟果相門一切種因相門不可知難知門執受處所緣境界門了能緣行相門常與下相應門唯捨受受俱門是無覆無記三性門觸等亦如是心所例王門恆轉如暴流因果法喻門阿羅漢位捨斷伏位次門論曰初能變識大小乘教至藏初過重是故偏説論曰下依門解釋先釋自相門初句出名通大小乘謂阿毗達摩等及增一阿含等阿賴耶此云藏具三藏故初標謂與下轉釋雜染互為緣者諸法於識藏識於法亦爾更互為因性亦常為果性此明能藏所藏義有情執為我者由染汙末那執此見分為自內我此明我愛執藏義此即下結此三藏義是識自相攝植習氣因任持現行果而為自相故此識下簡濫自相分位多者具因相果相也今唯言藏者最初捨故過失重故故偏言之此是能引諸界趣生至異熟實不共故偏説之次釋果相門初句明得名義梵云毗播迦此云異熟此字指第八善不善業是能引因諸界趣生是所引異熟果故得異熟名離此下反顯謂此正是命根等此即下結果相此識下簡濫多位者謂善惡凡聖等不同多種者或名心或名所知依等別今異熟果名實不共餘自相因相又不共如來地以在有漏故故偏言之此能執持諸法種子至持種不共是故偏説三釋因相門初句明得名義梵云阿陀那此言執持此以所持顯能持名離此下反顯此即下結因相此識下簡濫因相多種者染淨色心共不共等種異所持雖異能持種義不共餘自相果相故偏言之初能變識體相雖多略説唯有如是三相初能下總結一切種相應更分別至體用因果理應爾故一切下廣明一切種初二句標徵謂本下出體自果即所生色心等果功能即能生作用即種子自體差別者謂色心染淨種種異故謂第八自證分上一分生現功能約能生義邊名之為種此與下辨相本識是體種子是用能持所持故非一攝用歸體故非異種子是因所生是果種現相生故非一因果相符故非異雖非一異而是實有假法如無非因緣故雖非下約假實判伏問曰種非一異是假非實初句直答是實親因緣故次句以假法反成此與諸法既非一異應如瓶等是假非實此與下立量妨難如文若爾真如應是假有許則便無真勝義諦若爾下牒難立量答真如是有法應是假有宗非一異故因喻如種子許假則無真諦彼既不爾此云何然此妨與上伏問雖同答意有別上顯種子為因緣此顯真如是勝義然諸種子唯依世俗説為實有不同真如然諸下約真俗判上言種子同真如俱實今簡種子是俗諦有真如是勝義有種子雖依第八識體至見分恆取此為境故種子下約四分判如文諸有漏與異熟識至善性攝故唯名為善諸有下約三性判有漏種初約體性門故唯無記次約功能差別門可通三性望能熏因及所生果而言也無漏種非無記攝望因望果俱是善故體不相順故二性類別故能治所治故有漏無漏故故唯是善非無記攝若爾何故決擇分説至異熟種子皆異熟生若爾下釋妨牒上無漏種非無記約論為難二十二根下三知根唯無漏信等五根通漏無漏而言皆有異熟種子皆異熟生驗此亦通無記何言唯善性耶雖名異熟而非無記至非無記性所攝異熟雖名下釋初句牒論雖名異熟次句直明非無記依異下約所依得名異性下以同喻顯無漏種是有法非無記性宗異性相依故因喻如眼識依眼根識通三性根唯無記故或無下約變異而熟名之聞思熏習轉變成熟故此中有義一切種子至由熏習力但可增長此中下出三家本始意先本有一切下出本有意由熏下釋熏習意問種子即習氣習者熏習何言不從熏生今釋云但可熏令增長非從熏生如契經説一切有情至如是等文誠證非一如契下引證引二經證本有如文惡叉聚者言染淨種多故引論證熏令增長諸有下復證漏無漏種雖俱本有若般涅槃者漏無漏種皆具若不般涅槃者唯有漏種便闕三乘無漏法種次結又諸有情既説本有至法爾所得本性住性又諸下引論説本有五種性別此證本具凡聖種子一聲聞二緣覺三如來四不定五闡提又引論證無漏種未知當知知知已又從無始傳來者謂有情無始暗識相傳依附本識法爾淨種由此等證無漏種子至有漏亦應法爾有種由此下例無漏既爾有漏亦然由熏增長不別熏生如是建立因果不亂由熏下結成因果義第八識中本有種子由諸轉識熏令增長不由別別熏令生起種現相生互為因果如是建立故無錯亂若許新熏漏與無漏善與不善亦互相熏因果錯亂有義種子皆熏故生至如麻香氣華熏故生有義下次新熏初句直明熏生前引經言無始有種種界者所熏能熏俱無始有故知無始熏習成就種子下約字義明熏生法喻如文如契經説諸有情心至外種熏習或有或無如契下引經論證內種謂本識中功能差別此即不共種外種謂器界穀麥等此即共種自受用者有熏他受用者無熏又名言等三種熏習至故有漏種必藉熏生又名下明有漏種藉熏生名言等三者謂名言我執有支三種習氣此三攝盡色心根塵依正有漏之法彼三下約義結成唯始非本無漏種子亦由熏習至是出世心種子性故無漏下明無漏種亦由熏生法界等流者謂般若涅槃圓覺等謂聞無漏正法熏成無漏種子名出世心種性既從聞熏故唯始起有情本來種性差別至但依有障無障建立有情下斥前初句直斥前家次句依障成立己意如瑜伽説於真如境至依障建立非無漏種如瑜下引證於真如者迷悟依故畢竟者謂永不可害不般涅槃謂一闡提也一生無暇故二放逸過故三邪解行故四有障過故唯斷煩惱即二乘性利鈍分二故俱斷二障即佛種性故知下結成依障所説成就無漏種言依當可生非己有體所説下破前地獄三無漏根是種初句牒前下句釋義依當來有可生義名為成就非謂地獄已有種體有義種子各有二類至此即名為本性住種有義下第三家雙具本始初總標初本有蘊處界功能差別者十八界十二處五蘊各各功能不相紊亂法爾者顯非功力任運本具餘引證指初家説本性住結成本有二者始起謂無始來至此即名為習所成種次始起現行者一顯現簡非種子二現在簡非過未三現有簡非空華兔角等習所成結成新薰若唯本有轉識不應與阿賴耶為因緣性若唯下先斥初家若唯本有一句牒初家偏執轉識下一句反明轉識與賴耶作親因緣正明轉識為能熏此證新熏豈唯本有耶如契經説諸法於識藏至展轉相生互為因果如契下引頌證初句識為能藏諸法為因識為果次句識為所藏識為因諸法為果故後二句云更互亦常等此頌下申頌意攝大乘説阿賴耶識至又如束蘆互相依住攝大下引論證如文喻中炷焰生燒者炷生焰喻種生現焰燒炷喻現熏種此約增上緣例親因緣次束蘆相依此約俱有因以喻種現互為因果唯依此二建立因緣至與阿賴耶有因緣義唯依下牒定所引經論意若諸下牒執反斥上引經論雙證能熏所熏互為因果據標結文意在能熏為斥初家無新熏故非熏令長可名因緣勿善惡業與異熟果為因緣故非熏下破熏長由前初家云由熏習力但可增長今正家意要熏生方名因緣初句牒破次句約善惡例破云善惡業但可作增上緣非親因緣破彼熏長亦非親因緣又諸聖教説有種子至故唯本有理教相違又諸下總斥違教故唯下結違教理若唯始起有為無漏至善等應為不善等種若唯下二斥次家若唯始起一句牒次家偏執有為下以五句反顯須本有有為無漏者謂四智菩提斷惑證理故清淨涅槃了因之所了四智菩提生因之所生若無法爾本有親種應不得生救云聞法界等流正法聞熏習故可為無漏種遮云聞熏是有漏心不應為無漏種反此無漏應生有漏諸佛有漏善不善等例爾應皆互生分別論者雖作是説至故無漏法非無因生分別下斥心淨為種先牒彼引教分別論者指釋經論家心性下出論家釋經之文故無下乃始起家引此心性本淨為無漏種故云無漏法非無因生雖作是説之句乃今論主斥始起家之辭而心性言彼説何義至以體前後無轉變故而心下二句總結若説空理一句牒計彼以空理名為本淨空非下破心指四智菩提空理真常而非智種常法下出非種子義種子義須剎那滅故云常法定非種子等若即説心應同數論至勿善惡等互為因故若即下破即心初句牒計應同下約同外破心相生滅而體本寂應同數論所計自性惡無下約三性破先破二性心通三性若謂本淨惡與無記俱應是善則無二性之別許二性心是善應與信等相應何名惡無記不許是善尚不名善況是無漏有漏下立量破善性非是無漏有漏善心是有法性非無漏宗稱雜染因喻如惡心等故不下結有漏心不應與無漏為因勿善一句以善惡反覆互例若有漏心性是無漏至差別因緣不可得故若有下以有漏無漏互明差別因緣者同心法也又異生心若是無漏至種子現行性相同故又異下約異生應名聖者難若異下牒救則心下破救意以現行心性雖無漏而相有染不名無漏無斯應名聖者之過為救破意謂則心種子亦非無漏何也種子現行性相同故若種子亦性淨而相有染應不得名無漏種子何故汝論説異生唯得成就無漏種子然契經説心性淨者至性是無漏故名本淨然契下通經義言心性者即是真如真如是心真實性故或心體本無煩惱名性本淨非有漏心性是無漏故名本淨然真如體常非心之因亦非種子非有下結責謬引由此應信有諸有情至有漏法種類此應知由此下顯正義由此者承上性淨非無漏四智因故應信有本有及新熏二種初文顯本有無漏下顯新熏後勝進者謂資糧加行見修等位勝進之言通淺深故無漏法者即現行觀智有漏下例有漏亦應具本始故諸聖教中雖説內種至故説內種定有熏習諸聖下通前引教牒上引內種定有熏習以證新熏而不下二句約論意斥撥無本有然本下通論中熏習之言雙具生長明其本有故説下結此言有漏種子具本始二義其聞熏習非唯有漏至故亦説此名聞熏習其聞下通無漏由聞熏始起初句牒斥上謂有漏心聞正法所熏無漏種是始起聞正下明熏習非唯熏始起亦熏本有出世心者謂無漏正智故亦下結教意熏習該通本始二種聞熏習中有漏性者至方便説為出世心種聞熏下判二類有漏心中聞正法熏成種子是有漏性本有無漏種子屬無漏性今判云有漏性者三斷中是修所斷五果中感勝異熟果四緣中為增上緣無漏性者是非所斷是正因緣感果應是等流果如有漏戒施是有漏性所感人天尊貴報名勝異熟此正下疑云有教中説有漏施戒名為出世心種今何説為增上緣耶釋意可知如無性攝論云此聞熏習雖是世間有漏心而是出世間心種子性故依障建立種性別者至障有可斷不可斷義依障下通瑜伽依障建立性別初二句標正約無漏種子判性別謂若下釋性別故由下結無漏種即智種能發現行治障相違故約無漏種子有無以明障有可斷不可斷義然無漏種微隱難知至而説依障立種性別然無下通妨問曰既約無漏判性別云何論中約障判釋義可知不爾下反明若不約無漏斷障彼障有何別因有可害不可害者若謂下轉計法爾障別無漏下例責云何不許無漏種子法爾而有若本下約義反斥明由無漏種發生現行聖道能害二障依此立五性差別既彼聖道必無生義説當可生亦定非理既彼下破無漏根當生義文中承上若無無漏種現行聖道永不得生説無漏根當生亦非其理然諸聖教處處説有至故唯始起理教相違然諸下總斥違教故唯下結違教理由此應知諸法種子各有本有始起二類由此下總結然種子義略有六種至不可説有能生用故然種下明種子義先總標列下別釋一剎下標名謂當處出生隨處滅盡謂體下釋義種子體須剎那生滅方有能生勝用如世穀麥假水土緣展轉變易方有生芽之用非如數論計自性體常有能成大等之用故此遮云常法常無轉變不可説有能生用如虗空體常無能生用故二果俱有謂與所生至故但應説與果俱有二果下標名謂因果同時不相離異謂與下釋義種因現果二俱同時二俱現在兩相和合成種子義此下承上明遮前後簡非同時及非現在相離簡非和合現種下轉釋初句種屬無記現通三性故名異類互不相違即和合義一身即現義俱時即俱義有能生用名果俱有非如下轉釋上遮句種子引種子皆無記性名自類前後無俱現義相違無和合義種生現果因果同時名果俱有種引後種因果前後名必不俱雖因下一句牒上俱不俱而現下明取不取意初句取種因現果俱現同時種望現果有能生用是故取之次句不取種引種何也前因在位後果未生故無自體後果生時前因已滅故無自體是故不取依生下明立名所由初句明依生現名種次句明不依引種名種故但下結三恆隨轉謂要長時至此顯種子自類相生三恆下標名恆者常也隨轉即相應義謂要下釋義長時者恆也從初熏乃至發現行時一類者唯無記性相續者無間無斷究竟謂成熟位謂此種子要與本識相應無間而轉又復種子自類前後相隨至成熟位此遮下遮轉識非如種子恆相隨轉轉易謂三性非一類間斷者謂非長時相續此恆隨轉顯種引種義四性決定謂隨因力至生異性果有因緣義四性下標名性謂三性決定者簡非不定謂隨下釋義因力謂過去能熏若惡若善因也善惡等是所生等者等染淨色心功能即種子謂所熏能生前後平等染淨不易因果相符故名決定此遮下遮餘部色心染淨互為因緣故五待衆緣謂此要待至故種於果非恆頓生五待下標名待謂停待衆緣即根境空明作意親因緣分別染淨根本謂此下釋義如眼識九緣等此遮下初以衆緣遮自然生次以待緣遮緣恆有故種下結引六自果謂於別別至具斯六義成種非餘六引下標名謂因果相生毫無雜亂謂於下釋義各各因引生別別果謂色生色心生心等此遮下初遮外道自在天等一因生一切法次遮餘部色心互為因緣色與心作所緣緣心與色作增上緣此是親因緣引自果是故遮之唯本下結前六段外穀麥等識所變故至令不斷絶即名引因外穀下辨異由種子名通故須簡濫識所變者謂第八所變相分實是現行無六義故非實種子許有因故假名種子外種親望於芽為能生因傳望莖等為能引因準此內種亦有二因賴耶是內種子親望名色為能生因傳望六處至老死為能引因內種必由熏習生長至是共相種所生果故內種下簡內外種熏習有無兼判親踈二緣為增上緣者外種望所生果為增上緣必以內種為親因緣何也是第八識共相種所生果故自受用者有熏習他受用者無熏習上明種子是因緣以能生故若細詳之應有四句料簡謂種生現種引種現熏種現引現前三類親因緣第四類真等流是因緣是種子前二是也非因緣非種子第四是也是因緣非種子第三是也非因緣是種子外穀麥是也此中明種於四義中雙取前二若正明一切種義獨取初一種生現謂本識中親生自果功能差別故依何等義立熏習名至令種生長故名熏習依何下明熏習義初總徵總答何等名為所熏四義至性不堅住故非所熏何等下別徵所熏下別釋一堅住性問諸識俱心法及色法皆可受熏俱得名所熏耶今以堅住性簡之堅謂無轉易即是一類住謂無間斷即是相續由堅住故方能攝植習氣乃是所熏此指第八具有此義此遮下明遮轉識謂前七也前五隨緣起滅第六五位不行第七地上染淨轉易色法無緣慮是故簡之量云轉識是有法非所熏宗不堅住故因如聲風等轉識亦可互立二無記性若法平等至唯帶舊種非新受熏二無記性問七八互為俱有依二恆俱轉第七有堅住義可是所熏今以無記性簡之無記者謂淨無記平等即無覆無記如素帛故能受熏此遮下明遮善染如青黃彼此違逆不能容納故非所熏第七有覆亦在染攝由此下舉如來淨識極善強盛無所容納不受新熏三可熏性若法自在至依他堅密故非所熏三可熏性問第八心所具上二義可是所熏今以可熏性簡之自在謂心王有為主義性非堅密者簡非堅固密緻謂體性虗踈也此遮下明遮心所依他不自在無為堅密如金石皆非所熏四與能熏共和合性至可是所熏非心所等四與能熏和合問此人第八望他人前七具上三義可是所熏今以共和合簡之同剎那時同一身處能所故不即一身故不離此遮下明遮他身不同處前後不同時無和合則相離故非所熏唯異下結第八識具此四義非心所等等者如上所簡何等名為能熏四義至無生長用故非能熏何等下別徵能熏下別釋一有生滅問諸法皆能熏無為法亦可為能熏否今以有生滅簡之有作用故故是無常有作用故生長習氣此遮下明遮無為不變故是真常無有作用不能生長二有勝用若有生滅至勢力羸劣故非能熏二有勝用問第八心心所恆轉如流此有生滅可為能熏今以有勝用簡之雖有生滅亦須善染勢力增勝方能引生習氣此遮下明遮異熟心心所無覆無記勢力羸劣故非能熏色法無緣慮不相應行無實體皆非能熏三有增減若有勝用至前後佛果應有勝劣三有增減問若取勝用佛果善法殊勝無過可為能熏今以有增減簡之若有勝用亦須有增減攝植習氣此遮下明遮圓滿故無增減彼若下反顯有勝劣者以前佛熏多後佛熏少故四與所熏和合而轉至具此四義可是能熏四與所熏和合問他人前七具上三義可為我之能熏今以與所熏和合簡之此遮下明遮義同所熏釋唯七下結如是能熏與所熏識至如熏苣勝故名熏習如是下總明熏習義先法次喻苣蕂者胡也本無香因熏故有二俱生滅熏習義成能熏識等從種生時至因果俱時理不傾動能熏下明互為因果立量云現種三法是有法因果俱時宗互相生熏故因喻如炷焰等能熏生種種起現行至設名因緣應知假説能熏下例同因果初因果例種現相生次因果例種引種前後引生此二下結成親因緣除此下明遮餘法非因緣者如現引現色引色等是謂略説一切種相是謂下總結前章一切種相應更分別下所有體相本始六義熏習因果等文此識行相所緣云何謂不可知執受處了此識下雙徵能緣所緣二門謂不下舉頌雙答了謂了別即是行相識以了別為行相故了謂下逆次略釋先釋能緣了別者謂明了分別也行相者謂明了之心行於境相也處謂處所即器世間是諸有情所依處故處謂下次釋所緣先明所依處如文執受有二謂諸種子至攝為自體同安危故次執受二者謂種子一根身一各具二義執中二義一攝為自體二持令不散受中二義一領以為境二令生覺受種子即名言等三習氣根即五根清淨四大身即根依之處葡萄朵等此二下結執受雖俱執受三類不等根身具四義一攝為自體同無記性故二持令不散第八任持不爛壞故三領以為境第八親相分故四令生覺受同安危故若器世間唯得領以為境持令不散二義故但緣而不執受若有漏種四義中缺令生覺受一義但有執持而無執受若無漏種四義中唯得持令不散一義故非緣非執受攝為下二句二二義中每略舉一以二攝二故執受及處俱是所緣至行相仗之而得起故執受下一句總明三類境俱是第八所緣阿賴下轉釋因緣力者一者第八自種因緣成熟力二者三類境親種因緣成熟力自體生者謂第八現行自證分體從自種生三類相分境從自證分體變起能緣行相得起者內仗自證體變外託相分為緣總言相見俱依自證起故此中了者謂異熟識至此了別用見分所攝此中下逆次廣解先釋行相門即頌中了字初文略指異熟見分然有漏識自體生時至似能緣相説名見分然有下通明心心所諸分初出二分家初明諸識二分彼相下明心所例王亦二分似所下會通名義若心心所無所緣相至自境如餘餘如自故若心下立二量反證有所緣并下二量意明安慧唯立一心之未盡初量云心心所是有法應不能緣自所緣境宗無所緣故因喻自境如餘自所緣者如眼識以色為自所緣自境如餘者色境如聲香等不為眼識自所緣次量云心心所是有法應一一能緣一切宗無所緣而有能緣故因喻餘如自故如一眼識無自所緣色而有能緣者應一切聲香等皆如自色為所緣若心心所無能緣相至或虗空等亦是能緣若心下次立二量反證有能緣初量云心心所是有法應不能緣宗無能緣相故因喻如虗空次量云虗空是有法亦是能緣宗無能緣而能緣故因喻如心心所此言心無見分今既能緣證空無見應亦能緣有是理乎反顯心能緣者有見分故故心心所必有二相至能覺所覺分各自然而轉故心下結由上四量反成有能所緣以此證之故心心所必有二分如契下引證初句明唯有內心次句明皆無外境後二句明有二分自然轉者相見各從自種生故執有離識所緣境者至是心心所自體相故執有下出三分家先大小乘辨異先明小乘三分相離識境者小乘計心外有法説為所緣以所變相分為能緣行相能緣見分為自證體事心與心所同所依緣至識受想等相各別故心與下判定小乘王所三分同異心與心所貫下同所依者如眼識王所同依眼根同所緣者同緣外本質色境以相分為行相各自變相故行相相似事雖數等等者事即體事數即心所王依見分與數依見分彼此平等無差而相各異了別領納等各各有別故達無離識所緣境者至如不曾更境必不能憶故達無下明大乘三分大乘了知唯識故無離識境以相分為所緣見分為能緣二分所依名自證體此若下反釋有自證意明難陀二分之未盡心心所見分緣境由自證分證明後時方能記憶若無自證後時應不自憶如不下舉見分例更者為經歷如見分更境由前見故後時復覩記憶宛然如不曾更必不能憶見分如尺相分如布自證如人若無人知數尺量布必不能自知數故心與心所同所依根至識受等體有差別故心與下判定大乘王所三分同異同依一根故以相分為所緣各自變起故云相似以見分為行相王所了別領納等用不同故云各別王依自證雖與數依自證彼此平等無差而識受等體相差別此之所緣不同前王所同緣本質也此之能緣不同前以相分為行相相似也此之所依不同前以見分為所依事也大小三分雖同其意逈別然心心所一一生時至即能量及果彼三體無別然心下承上大小宗雖不同以理推徵若王若所各有三分所量下出三分名義量果謂自證體如集下引證初句證相分次句雙證見分自證第三句雙釋上句末句結成無外境相見俱依自證起故又心心所若細分別至證自體者必現量故又心下出四分家先立四分此若下反證有第四意明陳那三分之未盡初約心分明有第四次約量果明有第四不應下恐前家救云即以見分為第三果今遮云不應等見分下出不應義非量攝故證自體者必現量故此四分中前二是外至非即非離唯識理成此四下判先判內外前二是用故判屬外後二是體故判屬內此約體用義言內外非如離心之內外初唯下判能所緣初標相分唯所緣後三俱通能所緣謂第下轉釋兼判三量第二見分但緣相分見分通三量所緣相分境既有三謂性獨影帶質故能緣量亦通現比非三種第三自證能緣第二見分并第四證自證分則第二第四又為所緣證自證分唯緣第三自證則第三又為所緣何以第四不緣第二見分以為自證所緣故云無用後二皆現量攝故得互為量果故心下結無無窮過者謂第三第四既皆現量故得互證無無窮過若不然者更須第五證第四如是展轉其過無窮內外能所故非即唯是一心故非離是故契經伽他中説至此中見者是見分故是故下引證此頌下釋頌意如是四分或攝為三至或攝為一體無別故如是下束廣從略上從一識開二三四分不同從略以至廣故今束之從廣以至略四分約量果門三分約體用門二分約心境門一心約唯識門此言見是能緣義者恐濫上四分中見故置此言上依門雖別取捨有由悉檀被機各皆當理如入楞伽伽他中説至此一心言亦攝心所如入下引證唯心如是下指廣故識行相即是了別了別即是識之見分故識下結歸此言見分即頌中了字所言處者謂異熟識至即外大種及所造色所言下釋所緣門即頌中處字先牒定謂異下釋異熟即能變心共相種即器界種人人所變各別名為唯識有情同業相感處所無異然有相似共受用義相與他同熏成自種名共相種由種子因緣成熟力故變似色等等餘四塵也大種即地水火風所造即色香味觸言外者相分言外如上所判雖諸有情所變各別至如衆燈明各遍似一雖諸下釋伏疑疑云既有情所變各別如何現見是一今牒釋云相相似故處無異故如衆下舉喻例明如衆燈之明體異明一量云諸有情所變器界是有法似一宗而相相似處所無異故因如衆燈之明誰異熟識變為此相誰異下別明所變不同能變種異由種不同有共中共共中不共不共中不共不共中共故以誰字徵出誰人誰種所變有義一切所以者何至業增上力共所起故有義下釋共中共種變有三師今初云一切有情變引經證成同業相感故有義若爾諸佛菩薩至變為此土復何所用次第二家先斥前若爾下牒前破所變土有四土淨穢不同能變亦有聖凡差別今此一切之言無所簡別則有凡聖混濫之過諸佛應實變穢折伏剛強權現則可異生應實變淨土攝受有緣暫覩則可應實二字是斥之辭又那含聖者厭離有色消礙入空必不下生變此何用是故現居及當生者至諸業同者皆共變故是故下正釋現居當生所變由現居故佛居淨而生居穢故無生佛雜變之失由當生故故無無色變下土之失經依下通前經義一切有二少分一切一切一切經依同業少分一切言也有義若爾器將壞時至此變為彼亦何所益第三家先斥前若爾下牒前斥器界有成住壞空各二十劫然彼器非常情俱生滅故要七火一水七水火後風壞時既無現居當生者則此將壞之界誰識變耶又諸下復破當生難那含超出必不下生異生退歿豈不變耶通人間五十年下天一晝夜承斯壽五百上五倍倍增空天展轉上壽永劫下地數災預變何用設有下難無色無身色界有身豈不變耶通上色界身細下界地粗上下懸隔不相依持變彼何益然所變土本為色身至雖無有情而亦現有然所下正釋他方自地者如他方五趣雜居地望此雜居名曰自地業分相同彼識亦變此地餘地例然此説一切共受用者至鬼人天等所見異故此説下釋共中不共種變初句結前若別下例釋如頌云鬼旁生人天各隨其所應等事心異故許義非真實各隨所應者隨自業力也等事者共也心異者不共也此明各隨自業異熟識中共中不共種所變起故諸種子者謂異熟識至如真如性不違唯識諸種下釋不共中不共種變異熟識即能持有漏種即所持同無記性故是所緣無漏種唯善性非無記攝故非所緣雖非下通妨妨云既非所緣與心相離豈不違唯識耶立量釋云無漏種是有法不違唯識宗非所緣而不相離故因喻如真如有根身者謂異熟識至即內大種及所造色有根下釋不共中共種變先通明似色根者謂眼等五根即清淨四大根依處謂如葡萄朵新卷葉等即身根攝此二即能造四大所造四微而成根是不共中不共種變身是不共中共種變有共相種成熟力故至不爾應無受用他義有共下正釋不共中共他人身處是我共種所變不爾下反釋受用他者一切有情互相緣故此中有義亦變似根至彼餘尸骸猶見相續此中下通異解初句明變根辨中下引證似自他身之中亦變五根現故有義下顯正義初句直明唯變身次句明不變根似自下通所引論謂論中文總意別説自識變自根身他識變他根身故生下引現事證唯變身尸骸相續者正顯衆有情識之所變故若能變他人之根雖死亦應有見聞故前來且説業力所變至隨現緣力擊發起故前來下約定不定判前所變初句牒前業力因緣變是定若定下初二句標不定等者等通力所變下明不定相身器多恆相續者一期利物或折或攝現穢現淨故多相續少分或暫時聲光多暫時者一時緣繫林沼聲光機忘應息故多暫時少分或久停略説此識所變境者至及墮法處所現實色略説下總結十有色處謂五根五塵即根身器界并種子即三類境也墮法處者謂五塵落謝影即法處所攝色所現實色者法處色有五種謂極逈極略遍計所執受所引生定果前四是假定果是實定果實色是異熟識所變餘四假色是意識分別妄生何故此識不能變似至初必有用後但為境何故下通明諸識有二種變先假問由上云十有色處等是異熟變今假不變心等所緣為問端徵出二變中為是何等變耶何故不變心耶有漏下答通明諸識有二種變以顯異熟唯因緣變略標二種通言因緣變者謂五八及意識一分皆伏親踈因緣生唯是現量任運緣性境故通言分別變者謂第七及意識一分皆計度分別生通非比量緣帶質獨影故初有實體用後但為所緣故頌云性境不隨心獨影唯從見帶質通情本性種等隨應是因緣非分別謂五八非因緣是分別謂第七亦因緣亦分別謂第六非因緣非分別謂不相應行異熟識變但隨因緣至不爾諸佛應非遍智異熟下別顯異熟唯因緣變初二句答異熟唯因緣變以有實用故唯變色若變下答以無實用故不變心相分一句出無用所以不能緣者如化人心也須彼下舉有用者反顯若彼心等有實能緣用者須別從此識中種生而非識變今是識變故無實用無為下一句例無為是觀心中現亦非因緣變故亦無用故異下一句結答不變故不緣至無漏下明無漏心不同有漏亦變亦緣故有漏位此異熟識至彼識亦緣此色為境故有下總結三所緣在欲下判界地所緣不同如文阿賴耶識當言於欲界中緣狹小執受境於色界中緣廣大執受境無色界空無邊處識無邊處緣無量執受境於無所有處緣微細執受境於非想非非想處緣極微細執受境不可知者謂此行相至量難測故名不可知不可下明難知門初明能緣行相不可知次明所緣境界不可知云何是識取所緣境至無想等位當知亦爾云何下重徵行相難知如滅下答謂此識行相微細難知如滅定中識不離身故極微細故立量云緣境行相是有法應信為有宗微細不離身故因喻如滅定中識此以滅定中識證成微細行相為有復如何知滅定中有識耶復立量證滅定中識是有法應信為有宗有情攝故因喻如有心時有情無想下例無想如滅定亦有識
